<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mkeyz Studio — Oyentes en Vivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --violet: #b388ff; --violet2: #d1b8ff; --green: #00e676;
            --red: #ff4d4d; --blue: #4fc3f7; --orange: #ff9800;
            --text: #f0f3ff; --muted: #9a8fb8;
            --card: rgba(20, 15, 35, 0.85); --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #020408);
            color: var(--text); font-family: 'Inter', sans-serif;
            min-height: 100vh; padding: 6px 6px calc(6px + env(safe-area-inset-bottom)); overflow-x: hidden;
            overscroll-behavior-y: contain;
        }
        .floating-spheres, .shooting-stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
        .sphere {
            position:absolute; border-radius:50%;
            background: radial-gradient(circle at 30% 30%, rgba(179,136,255,0.5), rgba(100,60,200,0.15));
            box-shadow: 0 0 20px rgba(179,136,255,0.4); animation: floatSphere linear infinite; opacity:0.7;
        }
        @keyframes floatSphere { 0%{transform:translateY(0) scale(1);opacity:.5} 50%{transform:translateY(-40px) scale(1.1);opacity:.8} 100%{transform:translateY(0) scale(1);opacity:.5} }

        .main-scroll { max-height: 100vh; overflow-y: auto; padding-bottom: 8px; }

        .player {
            background: rgba(20,15,35,0.75); backdrop-filter:blur(25px); border-radius:16px; padding:8px 12px; margin-bottom:6px;
            border:1px solid rgba(179,136,255,0.3); box-shadow:0 0 8px var(--violet); display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .album-art { width:40px; height:40px; border-radius:12px; background:linear-gradient(145deg, #2a1f4a, #1a123a); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .visualizer { display:flex; gap:2px; align-items:flex-end; height:16px; }
        .vbar { width:3px; border-radius:2px; background:var(--violet); animation:eqAnim 0.8s infinite alternate; }
        .vbar:nth-child(1){height:6px} .vbar:nth-child(2){height:12px} .vbar:nth-child(3){height:9px} .vbar:nth-child(4){height:14px} .vbar:nth-child(5){height:7px}
        @keyframes eqAnim { 0%{transform:scaleY(0.5)} 100%{transform:scaleY(1.3)} }
        .track-info { text-align: center; }
        .track-name {
            font-weight:800; font-size:0.85rem; letter-spacing:1px;
            background: linear-gradient(135deg, var(--violet2), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
        .live-badge { display:inline-flex; align-items:center; gap:3px; background:rgba(179,136,255,0.15); padding:2px 8px; border-radius:12px; font-size:0.6rem; color:var(--violet2); margin-top:3px; }
        .live-badge .dot { width:5px; height:5px; border-radius:50%; background:var(--violet); animation:pulseDot 1.4s infinite; }
        @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin:6px 0; }
        .mini-stat { background:var(--card); border-radius:10px; padding:8px 4px; border:1px solid rgba(179,136,255,0.2); text-align:center; font-size:0.6rem; }
        .mini-stat .value { font-family:'Orbitron',monospace; font-size:0.85rem; color:var(--violet2); text-shadow:0 0 6px var(--violet); }

        /* Auditoría compacta */
        .audit-panel { background:var(--card); border-radius:12px; padding:8px; margin:6px 0; border:1px solid rgba(179,136,255,0.3); display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; }
        .audit-score-wrap { text-align:center; }
        .risk-score { font-family:'Orbitron',monospace; font-size:1.6rem; font-weight:800; transition: color 0.5s ease; animation: pulse 2s infinite; }
        @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
        .risk-status { padding:3px 12px; border-radius:14px; font-size:0.65rem; font-weight:700; transition: background 0.5s ease; }
        .risk-details { font-size:0.6rem; color:var(--muted); text-align:center; }

        .profiles-stats { display:flex; flex-wrap:wrap; gap:3px; margin:4px 0; justify-content:center; font-size:0.6rem; }
        .profile-stat { background:var(--card); padding:3px 8px; border-radius:10px; border:1px solid; display:flex; align-items:center; gap:3px; }
        .antidetect-panel { background:var(--card); border-radius:10px; padding:6px; margin:4px 0; border:1px solid rgba(179,136,255,0.3); }
        .antidetect-title { font-size:0.65rem; color:var(--violet2); margin-bottom:4px; text-align:center; }
        .antidetect-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
        .antidetect-item { background:rgba(0,0,0,0.3); border-radius:8px; padding:6px 4px; border:1px solid rgba(255,255,255,0.1); text-align:center; }
        .antidetect-label { font-size:0.55rem; color:var(--muted); }
        .antidetect-value { font-size:0.7rem; font-weight:700; margin-top:2px; }

        .recommendations-panel { background:var(--card); border-radius:10px; padding:6px; margin:4px 0; border:1px solid var(--violet); display:none; text-align:center; font-size:0.6rem; }
        .recommendations-panel.show { display:block; }

        .filter-bar { display:flex; gap:4px; align-items:center; justify-content:center; margin-bottom:4px; }
        .filter-bar select { background:var(--card); color:var(--text); border:1px solid var(--violet); border-radius:6px; padding:4px 6px; font-size:0.6rem; }
        .filter-bar button { background:var(--violet); border:none; padding:4px 10px; border-radius:10px; font-weight:700; font-size:0.6rem; cursor:pointer; color:#000; }

        .map-area { margin:4px 0; border-radius:14px; overflow:hidden; border:1px solid rgba(179,136,255,0.2); }
        #mapid { height:200px; width:100%; }
        .leaflet-container { background:#0a0a1e; }

        .chart-area { background:var(--card); border-radius:10px; padding:6px; margin:4px 0; border:1px solid rgba(179,136,255,0.2); }
        .chart-header { display:flex; flex-direction:column; align-items:center; gap:4px; margin-bottom:4px; }
        .chart-title { font-size:0.7rem; font-weight:800; color:#fff; text-shadow:0 0 6px var(--violet); }
        .chart-controls { display:flex; gap:6px; align-items:center; }
        .view-btns { display:flex; gap:3px; }
        .view-btn { padding:3px 8px; font-size:0.6rem; font-weight:700; border:1px solid rgba(179,136,255,0.5); border-radius:10px; background:rgba(20,15,35,0.7); color:var(--text); cursor:pointer; }
        .view-btn.active { background:var(--violet); color:#000; border-color:var(--violet); }
        canvas#activityChart { width:100%; height:140px; display:block; background:rgba(0,0,0,0.2); border-radius:8px; }

        .btn-group { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
        .btn { background:var(--card); border:1px solid rgba(179,136,255,0.4); padding:6px 12px; border-radius:14px; font-weight:700; font-size:0.6rem; color:var(--text); cursor:pointer; transition:0.2s; }
        .btn:hover { border-color:var(--violet); box-shadow:0 0 8px var(--violet); }
        .btn.gold { background:linear-gradient(135deg,var(--violet),#7c4dff); border:none; color:#000; }
        .btn:disabled { opacity:0.4; pointer-events:none; }

        .controls-bar { display:flex; align-items:center; gap:4px; margin:4px 0; background:var(--card); padding:6px 10px; border-radius:14px; border:1px solid rgba(179,136,255,0.4); justify-content:center; }
        .controls-label { font-size:0.6rem; font-weight:600; color:var(--muted); display:flex; align-items:center; gap:3px; }
        .controls-label svg { width:14px; height:14px; fill:var(--violet); }
        .scrubber-wrapper { position:relative; width:50px; height:26px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); border:1px solid var(--violet); border-radius:6px; touch-action:none; user-select:none; }
        .scrubber-value { font-family:'Orbitron',monospace; font-size:0.8rem; color:var(--violet2); pointer-events:none; }
        .scrubber-indicator { position:absolute; left:0; top:0; height:100%; width:0%; background:rgba(179,136,255,0.2); pointer-events:none; transition:width 0.1s; }
        .controls-select { background:rgba(0,0,0,0.4); color:var(--text); border:1px solid var(--violet); border-radius:6px; padding:3px; font-size:0.6rem; }
        .controls-btn { background:var(--violet); border:none; padding:5px 10px; border-radius:10px; font-weight:700; font-size:0.6rem; cursor:pointer; color:#000; display:flex; align-items:center; gap:3px; }

        .persist-bar { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
        .persist-bar .btn { font-size:0.6rem; padding:5px 8px; }

        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a1530; color:var(--violet2); padding:5px 12px; border-radius:14px; z-index:999; border:1px solid var(--violet); font-size:0.6rem; transition:transform 0.3s; }

        .magic-modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); }
        .magic-modal.show { display:flex; }
        .magic-box { background:linear-gradient(145deg,#1a1030,#0f0a22); border:2px solid var(--violet); border-radius:20px; padding:16px; max-width:320px; width:90%; text-align:center; animation:magicIn 0.6s ease; }
        @keyframes magicIn { 0%{transform:scale(0.5) rotate(-5deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
        .magic-title { font-family:'Orbitron',monospace; font-size:1rem; color:#fff; text-shadow:0 0 12px var(--violet); margin-bottom:10px; }
        .magic-stat { display:flex; justify-content:space-between; margin:4px 0; font-size:0.7rem; }

        .context-menu { position:absolute; z-index:1000; background:rgba(20,15,35,0.96); border:1px solid var(--violet); border-radius:10px; padding:3px 0; min-width:130px; box-shadow:0 0 12px var(--violet); display:none; }
        .context-menu.show { display:block; }
        .context-menu-item { padding:6px 10px; cursor:pointer; font-size:0.65rem; color:var(--text); }
        .context-menu-item:hover { background:rgba(179,136,255,0.2); }

        .chart-tooltip {
            position: absolute; background: rgba(20,15,35,0.96); border: 1px solid var(--violet);
            border-radius: 8px; padding: 4px 8px; pointer-events: none; z-index: 50;
            opacity: 0; transition: opacity 0.15s; font-size: 0.6rem; color: var(--text);
            white-space: nowrap; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .chart-tooltip.visible { opacity: 1; }
    </style>
</head>
<body>
    <div class="floating-spheres" id="spheres"></div>
    <canvas class="shooting-stars" id="starsCanvas"></canvas>
    <div class="main-scroll">

        <div class="player">
            <div class="album-art"><div class="visualizer"><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div></div></div>
            <div class="track-info">
                <div class="track-name">🎛️ MKEYZ STUDIO</div>
                <div class="live-badge"><div class="dot"></div><span id="liveCount">0</span> escuchándote</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="mini-stat"><div class="value" id="totalPlays">0</div><div class="label">🎵 Tus plays</div></div>
            <div class="mini-stat"><div class="value" id="totalOtherPlays">0</div><div class="label">🎧 Otros plays</div></div>
            <div class="mini-stat"><div class="value" id="uniqueListeners">0</div><div class="label">👥 Oyentes</div></div>
            <div class="mini-stat"><div class="value" id="activePlatform">0</div><div class="label">🟢 Activos</div></div>
        </div>

        <!-- Auditoría compacta -->
        <div class="audit-panel" id="auditPanel">
            <div class="audit-score-wrap">
                <div class="risk-score" id="riskScore">0%</div>
                <div class="risk-status" id="riskStatus" style="background:#555;">—</div>
            </div>
            <div>
                <div class="risk-details" id="riskDetails"></div>
                <div style="font-size:0.6rem;color:var(--muted);margin-top:2px;" id="auditFlags"></div>
            </div>
        </div>

        <div class="profiles-stats" id="profilesStats"></div>

        <div class="antidetect-panel">
            <div class="antidetect-title">🛡️ Indicadores</div>
            <div class="antidetect-grid">
                <div class="antidetect-item"><span class="antidetect-label">Gini</span><div class="antidetect-value" id="giniValue">—</div></div>
                <div class="antidetect-item"><span class="antidetect-label">Ratio</span><div class="antidetect-value" id="ratioPlays">—</div></div>
                <div class="antidetect-item"><span class="antidetect-label">Picos</span><div class="antidetect-value" id="suspiciousPeaks">0</div></div>
                <div class="antidetect-item"><span class="antidetect-label">Binge%</span><div class="antidetect-value" id="bingePct">0%</div></div>
            </div>
        </div>

        <div class="recommendations-panel" id="recommendationsPanel">
            <div><strong>🧠 Recomendaciones</strong></div>
            <div id="recList"></div>
        </div>

        <div class="filter-bar">
            <select id="filterCountry"><option value="">🌍 Todos</option></select>
            <select id="filterPlatform"><option value="">📱 Plataforma</option></select>
            <button id="heatmapToggle">🔥 Heatmap</button>
        </div>

        <div class="map-area"><div id="mapid"></div></div>

        <div class="controls-bar">
            <span class="controls-label"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Cantidad:</span>
            <div class="scrubber-wrapper" id="scrubberWrapper">
                <div class="scrubber-indicator" id="scrubberIndicator"></div>
                <span class="scrubber-value" id="scrubberValue">10</span>
            </div>
            <span class="controls-label"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Perfil:</span>
            <select id="profileSelect" class="controls-select"><option value="aleatorio">🎲 Aleatorio</option><option value="fiel">🔒 Fiel</option><option value="explorador">🔍 Explorador</option><option value="ocasional">🎲 Ocasional</option><option value="binge">🔥 Binge</option></select>
            <button onclick="generateListeners()" class="controls-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Generar</button>
        </div>

        <div class="chart-area">
            <div class="chart-header">
                <div class="chart-title" id="chartTitle">📊 Actividad (1D)</div>
                <div class="chart-controls">
                    <div class="view-btns">
                        <button class="view-btn active" id="view1D" onclick="setView('1D')">1D</button>
                        <button class="view-btn" id="view7D" onclick="setView('7D')" disabled>7D</button>
                        <button class="view-btn" id="view28D" onclick="setView('28D')" disabled>28D</button>
                    </div>
                    <button class="btn" id="normalizeBtn" onclick="toggleNormalize()" style="padding:3px 8px;font-size:0.6rem;">📊 Normalizar</button>
                </div>
            </div>
            <canvas id="activityChart"></canvas>
            <div class="chart-tooltip" id="chartTooltip"></div>
            <div id="progressWrapper" style="display:none;text-align:center;margin:4px 0;"><span id="progressLabel">0%</span><div style="width:80%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin:3px auto;"><div id="progressBarFill" style="height:100%;width:0%;background:var(--violet);border-radius:2px;"></div></div></div>
        </div>

        <div class="btn-group">
            <button class="btn gold" onclick="addListener()">➕ Añadir</button>
            <button class="btn" onclick="startSimulation('1D')">1 Día</button>
            <button class="btn" onclick="startSimulation('7D')">7 Días</button>
            <button class="btn" onclick="startSimulation('28D')">28 Días</button>
            <button class="btn" onclick="resetAll()">🔄 Reset</button>
        </div>

        <div class="persist-bar">
            <button class="btn" onclick="saveScene()">💾 Guardar</button>
            <button class="btn" onclick="loadScene()">📂 Cargar</button>
            <button class="btn" onclick="exportJSON()">📤 Exportar</button>
            <button class="btn" onclick="importJSON()">📥 Importar</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
        </div>

    </div>

    <div class="toast" id="toast"></div>
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-profile="fiel">🔒 Fiel</div>
        <div class="context-menu-item" data-profile="explorador">🔍 Explorador</div>
        <div class="context-menu-item" data-profile="ocasional">🎲 Ocasional</div>
        <div class="context-menu-item" data-profile="binge">🔥 Binge</div>
    </div>
    <div class="magic-modal" id="magicModal">
        <div class="magic-box">
            <div class="magic-title">✨ Simulación Completa ✨</div>
            <div id="magicContent"></div>
            <button class="btn gold" style="width:100%;margin-top:10px" onclick="closeMagicModal()">Cerrar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script>
    (function() {
        const STORAGE_CURRENT = 'mkeyz_oyentes_current', STORAGE_SCENES = 'mkeyz_oyentes_scenes', STORAGE_AUDITS = 'mkeyz_oyentes_audits';
        // Esferas
        const spheresContainer = document.getElementById('spheres');
        for (let i = 0; i < 12; i++) {
            const sphere = document.createElement('div');
            sphere.className = 'sphere'; sphere.style.width = (Math.random() * 50 + 25) + 'px'; sphere.style.height = sphere.style.width;
            sphere.style.left = Math.random() * 100 + '%'; sphere.style.top = Math.random() * 100 + '%';
            sphere.style.animationDuration = (Math.random() * 15 + 10) + 's';
            spheresContainer.appendChild(sphere);
        }
        // Estrellas fugaces
        const starsCanvas = document.getElementById('starsCanvas'), starsCtx = starsCanvas.getContext('2d');
        function resizeStars() { starsCanvas.width = window.innerWidth; starsCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeStars); resizeStars();
        let stars = [];
        for (let i = 0; i < 6; i++) stars.push({ x: Math.random()*starsCanvas.width, y: Math.random()*starsCanvas.height*0.3, len: 40+Math.random()*30, speed: 3+Math.random()*5, opacity: 0.3+Math.random()*0.4 });
        function drawStars() {
            starsCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
            stars.forEach(s => { s.x += s.speed; s.y -= s.speed*0.4; if(s.x>starsCanvas.width+80||s.y<-80){s.x=Math.random()*starsCanvas.width; s.y=Math.random()*starsCanvas.height*0.2;} starsCtx.beginPath(); starsCtx.moveTo(s.x,s.y); starsCtx.lineTo(s.x-s.len,s.y+s.len*0.5); starsCtx.strokeStyle=`rgba(179,136,255,${s.opacity})`; starsCtx.lineWidth=1.5; starsCtx.shadowColor='#b388ff'; starsCtx.shadowBlur=6; starsCtx.stroke(); });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        const PROFILES = {
            fiel:{name:"Fiel",icon:"🔒",color:"#00e676",activity:0.8,myRadio:0.7,change:0.15,idle:0.1,max:15,session:5},
            explorador:{name:"Explorador",icon:"🔍",color:"#4fc3f7",activity:0.6,myRadio:0.3,change:0.5,idle:0.2,max:8,session:3},
            ocasional:{name:"Ocasional",icon:"🎲",color:"#b388ff",activity:0.3,myRadio:0.4,change:0.3,idle:0.4,max:5,session:2},
            binge:{name:"Binge",icon:"🔥",color:"#ff4d4d",activity:0.9,myRadio:0.9,change:0.05,idle:0.05,max:30,session:8}
        };
        const countryCities = {
            "Rep. Dominicana":[{name:"Santo Domingo",lat:18.48,lng:-69.93}], "España":[{name:"Madrid",lat:40.42,lng:-3.70}],
            "Brasil":[{name:"São Paulo",lat:-23.55,lng:-46.63}], "México":[{name:"CDMX",lat:19.43,lng:-99.13}],
            "Francia":[{name:"París",lat:48.86,lng:2.35}], "Colombia":[{name:"Bogotá",lat:4.71,lng:-74.07}],
            "Argentina":[{name:"Buenos Aires",lat:-34.60,lng:-58.38}], "EE.UU.":[{name:"Nueva York",lat:40.71,lng:-74.01}],
            "Perú":[{name:"Lima",lat:-12.05,lng:-77.04}], "Chile":[{name:"Santiago",lat:-33.45,lng:-70.67}],
            "Canadá":[{name:"Toronto",lat:43.65,lng:-79.38}], "Italia":[{name:"Roma",lat:41.90,lng:12.50}],
            "Japón":[{name:"Tokio",lat:35.68,lng:139.76}], "Reino Unido":[{name:"Londres",lat:51.51,lng:-0.13}],
            "Australia":[{name:"Sídney",lat:-33.87,lng:151.21}]
        };
        const platforms = [{name:"Spotify",color:"#b388ff"},{name:"Apple Music",color:"#e040fb"},{name:"YouTube",color:"#ff4081"},{name:"Deezer",color:"#aa66cc"}];

        canvas.addEventListener('mousemove', function(e) {

            if (idx >= 0 && idx < n && Math.abs((x - 40) - idx * stepX) < stepX * 0.6) {
                mouseChartX = idx;

        function drawChart() {
            const w=canvas.width,h=canvas.height; ctx.clearRect(0,0,w,h);
            const data = currentView==='1D'?data1D:(currentView==='7D'?data7D:data28D);
            if(!data) return;
            let {activity, plays, otherPlays} = data;
            const labels = data.labels;
            if (normalizedMode) {
                const maxA = Math.max(...activity, 1), maxP = Math.max(...plays, 1), maxO = Math.max(...otherPlays, 1);
                activity = activity.map(v => v / maxA); plays = plays.map(v => v / maxP); otherPlays = otherPlays.map(v => v / maxO);
            }
            const maxVal = normalizedMode ? 1 : Math.max(...activity, ...plays, ...otherPlays, 1);
            const pad={top:12,right:12,bottom:20,left:28},cw=w-pad.left-pad.right,ch=h-pad.top-pad.bottom,n=labels.length,stepX=cw/(n-1);
            ctx.strokeStyle='#2a1f4a'; ctx.beginPath(); ctx.moveTo(pad.left,pad.top); ctx.lineTo(pad.left,h-pad.bottom); ctx.lineTo(w-pad.right,h-pad.bottom); ctx.stroke();
            ctx.fillStyle='#9a8fb8'; ctx.font='7px Inter'; ctx.textAlign='center';
            const step=n<=7?1:(n<=28?7:5);
            for(let i=0;i<n;i+=step) ctx.fillText(labels[i],pad.left+i*stepX,h-pad.bottom+10);
            function line(arr,color,dash){ ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash(dash||[]); ctx.beginPath(); for(let i=0;i<n;i++){const x=pad.left+i*stepX,y=h-pad.bottom-(arr[i]/maxVal)*ch; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);} ctx.stroke(); ctx.setLineDash([]); }
            line(activity,'#b388ff'); line(plays,'#00e676',[4,4]); line(otherPlays,'#4fc3f7',[2,4]);
            if (mouseChartX >= 0 && mouseChartX < n) { const x = pad.left + mouseChartX * stepX; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.setLineDash([2,4]); ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, h-pad.bottom); ctx.stroke(); ctx.setLineDash([]); }
        }
        function toggleNormalize() { normalizedMode = !normalizedMode; document.getElementById('normalizeBtn').textContent = normalizedMode ? '📊 Normalizado' : '📊 Normalizar'; drawChart(); }

        // Auditoría
        function runAudit() {
            const giniVal = parseFloat(document.getElementById('giniValue').textContent) || 0;
            const ratioVal = parseFloat(document.getElementById('ratioPlays').textContent) || 0;
            const peaksVal = parseInt(document.getElementById('suspiciousPeaks').textContent) || 0;
            const bingeVal = parseInt(document.getElementById('bingePct').textContent) || 0;
            const listenersCount = listeners.length;

            let riskScore = 0;
            const flags = [];
            if (giniVal > 0.7) { riskScore += 40; flags.push("Gini > 0.7"); }
            else if (giniVal > 0.5) { riskScore += 20; flags.push("Gini > 0.5"); }
            if (ratioVal > 20) { riskScore += 30; flags.push("Ratio > 20"); }
            else if (ratioVal > 12) { riskScore += 15; flags.push("Ratio > 12"); }
            if (peaksVal >= 4) { riskScore += 20; flags.push("≥4 picos"); }
            else if (peaksVal >= 2) { riskScore += 10; flags.push("≥2 picos"); }
            if (bingeVal > 50) { riskScore += 20; flags.push("Binge > 50%"); }
            else if (bingeVal > 30) { riskScore += 10; flags.push("Binge > 30%"); }
            if (listenersCount < 10 && ratioVal > 10) { riskScore += 15; flags.push("Pocos oyentes + ratio alto"); }
            riskScore = Math.min(100, riskScore);

            let status, statusColor;
            if (riskScore < 25) { status = "✅ Desapercibido"; statusColor = '#00e676'; }
            else if (riskScore < 55) { status = "⚠️ Aviso"; statusColor = '#ff9800'; }
            else { status = "🚫 Riesgo Baneo"; statusColor = '#ff4d4d'; }

            const scoreEl = document.getElementById('riskScore');
            scoreEl.textContent = riskScore + '%';
            scoreEl.style.color = statusColor;
            const statusEl = document.getElementById('riskStatus');
            statusEl.textContent = status;
            statusEl.style.background = statusColor;
            document.getElementById('riskDetails').textContent = flags.length ? 'Flags: ' + flags.join(', ') : 'Sin flags';
            document.getElementById('auditFlags').textContent = '';

            const entry = { date: new Date().toLocaleString(), riskScore, status, flags };
            auditHistory.unshift(entry);
            if (auditHistory.length > 15) auditHistory.pop();
            try { localStorage.setItem(STORAGE_AUDITS, JSON.stringify(auditHistory)); } catch(e) {}
        }

        function updateIndicators() {

            const arr=state.map(s=>s.dailyPlays||0),total=arr.reduce((a,b)=>a+b,0);

            const gini=total?sum/(2*arr.length*total):0; document.getElementById('giniValue').textContent=gini.toFixed(2);

        }
        function analyzeRecommendations() {

        function getRandomCity(country) { const cities=countryCities[country]||[{name:"Desconocido",lat:40.42,lng:-3.70}]; const c=cities[Math.floor(Math.random()*cities.length)]; return {name:c.name, lat:c.lat+(Math.random()-0.5)*0.1, lng:c.lng+(Math.random()-0.5)*0.1}; }
        function createMarker(l,s,index) {

        function populateFilters() {

        function generateListeners() {

        function changeProfile(index,newProfile) { listeners[index].profile=newProfile; state[index].profile=newProfile; const p=PROFILES[newProfile]; state[index].maxDailyPlays=p.max; state[index].dailyPlays=0; renderDots(); updateProfileStats(); updateIndicators(); autoSaveCurrentState(); }

        document.addEventListener('click',()=>{contextMenu.classList.remove('show');});

        function enterRadio(i) { const s=state[i],p=PROFILES[s.profile]; if(!s.active||s.dailyPlays>=s.maxDailyPlays)return; s.inMyRadio=true; s.trackTimeLeft=200+Math.floor(Math.random()*50); s.dailyPlays++; s.sessionRemaining=p.session-1; totalMyPlays++; updateStats(); renderDots(); updateIndicators(); }
        function leaveRadio(i) { state[i].inMyRadio=false; state[i].otherTrackTimeLeft=200+Math.floor(Math.random()*80); updateStats(); renderDots(); }
        function updateStats() {
            document.getElementById('totalPlays').textContent=totalMyPlays; document.getElementById('totalOtherPlays').textContent=totalOtherPlays;
            document.getElementById('uniqueListeners').textContent=listeners.length; document.getElementById('activePlatform').textContent=state.filter(s=>s.active).length;
            document.getElementById('liveCount').textContent=state.filter(s=>s.inMyRadio).length; drawChart();
        }
        function simulateTick(factor,simA,simP,simO,index) {
            state.forEach((s,i)=>{const p=PROFILES[s.profile];if(!s.active){if(Math.random()<p.activity*0.1*factor)s.active=true;return;} if(s.inMyRadio){s.trackTimeLeft-=30;if(s.trackTimeLeft<=0){if(s.sessionRemaining>0&&s.dailyPlays<s.maxDailyPlays){if(Math.random()<1-p.change){s.trackTimeLeft=200+Math.floor(Math.random()*50);s.dailyPlays++;s.sessionRemaining--;totalMyPlays++;simP[index]++;}else leaveRadio(i);}else leaveRadio(i);}}else{s.otherTrackTimeLeft-=30;if(s.otherTrackTimeLeft<=0){s.otherTrackTimeLeft=200+Math.floor(Math.random()*80);totalOtherPlays++;simO[index]++;}if(s.dailyPlays<s.maxDailyPlays&&Math.random()<p.myRadio*0.1*factor){enterRadio(i);simP[index]++;}}if(s.active&&!s.inMyRadio&&Math.random()<p.idle*0.1)s.active=false;});
            simA[index]=Math.max(simA[index],state.filter(s=>s.inMyRadio).length);
        }
        function runSimulation(days) {
            const spd=2880, total=days*spd, simA=[],simP=[],simO=[], dc=days===1?24:days;
            for(let i=0;i<dc;i++){simA.push(0);simP.push(0);simO.push(0);}
            let step=0; simulationRunning=true; document.querySelectorAll('.btn').forEach(b=>b.disabled=true); document.getElementById('progressWrapper').style.display='block';
            function batch() {
                const end=Math.min(step+500,total);
                for(let s=step;s<end;s++){const day=Math.floor(s/spd), hour=Math.floor(((s%spd)*30)/3600), idx=days===1?hour:day; if(day>0&&s%spd===0){state.forEach(s=>{s.dailyPlays=0;s.maxDailyPlays=PROFILES[s.profile].max;s.sessionRemaining=0;if(s.inMyRadio)leaveRadio(state.indexOf(s));});} simulateTick(getActivityFactor(hour),simA,simP,simO,idx);}
                step=end; document.getElementById('progressLabel').textContent=Math.round(step/total*100)+'%'; document.getElementById('progressBarFill').style.width=(step/total*100)+'%';
                if(step<total) setTimeout(batch,0);
                else {
                    if(days===1) data1D={labels:Array.from({length:24},(_,i)=>i+'h'),activity:simA,plays:simP,otherPlays:simO};
                    else if(days===7){data1D=gen1D(simA,simP,simO);data7D={labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],activity:simA,plays:simP,otherPlays:simO};}
                    else {data1D=gen1D(simA.slice(0,7),simP.slice(0,7),simO.slice(0,7));data7D={labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],activity:simA.slice(0,7),plays:simP.slice(0,7),otherPlays:simO.slice(0,7)};data28D={labels:Array.from({length:28},(_,i)=>'D'+(i+1)),activity:simA,plays:simP,otherPlays:simO};}
                    finishSimulation(days);
                }
            }
            batch();
        }
        function gen1D(dA,dP,dO) { const hA=new Array(24).fill(0),hP=new Array(24).fill(0),hO=new Array(24).fill(0); const tA=dA.reduce((a,b)=>a+b,0),tP=dP.reduce((a,b)=>a+b,0),tO=dO.reduce((a,b)=>a+b,0); for(let h=0;h<24;h++){const f=getActivityFactor(h);hA[h]=Math.round(tA*f/10);hP[h]=Math.round(tP*f/10);hO[h]=Math.round(tO*f/10);} return {labels:Array.from({length:24},(_,i)=>i+'h'),activity:hA,plays:hP,otherPlays:hO}; }
        function showMagicModal(plays, other, oyentes, gini, ratio, peaks, bingePct) {

            magicModal.classList.add('show');

            const plays=data1D?data1D.plays.reduce((a,b)=>a+b,0):totalMyPlays, other=data1D?data1D.otherPlays.reduce((a,b)=>a+b,0):totalOtherPlays;
            const gini = document.getElementById('giniValue').textContent, ratio = document.getElementById('ratioPlays').textContent;

        function setView(v){currentView=v; document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); document.getElementById('view'+v).classList.add('active'); document.getElementById('chartTitle').textContent='📊 Actividad ('+v+')'; drawChart();}
        function resetAll() { if(simulationRunning)return; listeners=[]; state=[]; totalMyPlays=0; totalOtherPlays=0; data1D=data7D=data28D=null; updateStats(); renderDots(); drawChart(); updateProfileStats(); updateIndicators(); }
        function closeMagicModal() { magicModal.classList.remove('show'); }
        function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.transform='translateX(-50%) translateY(0)'; setTimeout(()=>t.style.transform='translateX(-50%) translateY(80px)',2000); }

        // Persistencia
        function getCurrentData() { return { listeners: listeners.map(l => ({...l, _marker: undefined})), state: state.map(s => ({...s})), totalMyPlays, totalOtherPlays, data1D, data7D, data28D, timestamp: Date.now() }; }
        function restoreData(data) { if (!data) return false; listeners = data.listeners.map(l => ({...l})); state = data.state.map(s => ({...s})); totalMyPlays = data.totalMyPlays || 0; totalOtherPlays = data.totalOtherPlays || 0; data1D = data.data1D || null; data7D = data.data7D || null; data28D = data.data28D || null; updateStats(); renderDots(); updateProfileStats(); updateIndicators(); populateFilters(); if (data7D) document.getElementById('view7D').disabled = false; if (data28D) document.getElementById('view28D').disabled = false; return true; }
        function autoSaveCurrentState() { try { const data = getCurrentData(); localStorage.setItem(STORAGE_CURRENT, JSON.stringify(data)); } catch (e) {} }
        function loadSavedState() { try { const raw = localStorage.getItem(STORAGE_CURRENT); if (raw) { const data = JSON.parse(raw); if (data.listeners && data.listeners.length > 0) { restoreData(data); return true; } } } catch (e) {} return false; }
        function saveScene() { const name = prompt('Nombre de la escena:'); if (!name) return; const data = getCurrentData(); data.name = name; data.savedAt = new Date().toLocaleString(); try { const scenes = JSON.parse(localStorage.getItem(STORAGE_SCENES) || '[]'); scenes.push(data); localStorage.setItem(STORAGE_SCENES, JSON.stringify(scenes)); showToast('Escena guardada: ' + name); } catch (e) { showToast('Error al guardar'); } }
        function loadScene() { const listDiv = document.getElementById('sceneList'); try { const scenes = JSON.parse(localStorage.getItem(STORAGE_SCENES) || '[]'); if (scenes.length === 0) { showToast('No hay escenas guardadas'); return; } listDiv.innerHTML = scenes.map((s, i) => `<div style="padding:5px;border-bottom:1px solid var(--violet);cursor:pointer;" onclick="loadSceneByIndex(${i})">${s.name} (${s.listeners.length} oyentes, ${s.savedAt || ''})</div>`).join(''); listDiv.style.display='block'; } catch (e) { showToast('Error al cargar escenas'); } }
        function loadSceneByIndex(index) { try { const scenes = JSON.parse(localStorage.getItem(STORAGE_SCENES) || '[]'); if (scenes[index]) { restoreData(scenes[index]); autoSaveCurrentState(); document.getElementById('sceneList').style.display='none'; showToast('Escena cargada'); } } catch (e) {} }
        async function exportJSON() {
            const data = getCurrentData(); const jsonStr = JSON.stringify(data, null, 2);
            try { const blob = new Blob([jsonStr], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'oyentes_mkeyz.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showToast('Archivo exportado'); }
            catch (e) { try { await navigator.clipboard.writeText(jsonStr); showToast('JSON copiado al portapapeles'); } catch (err) { showToast('Error al exportar'); } }
        }
        function importJSON() { document.getElementById('importFile').click(); }
        function handleImport(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const data = JSON.parse(e.target.result); if (data.listeners && data.listeners.length > 0) { restoreData(data); autoSaveCurrentState(); showToast('Importado correctamente'); } else { showToast('Archivo no válido'); } } catch (ex) { showToast('Error al leer el archivo'); } }; reader.readAsText(file); event.target.value = ''; }

        window.addListener=addListener; window.generateListeners=generateListeners; window.startSimulation=startSimulation; window.setView=setView; window.resetAll=resetAll; window.closeMagicModal=closeMagicModal;
        window.saveScene=saveScene; window.loadScene=loadScene; window.exportJSON=exportJSON; window.importJSON=importJSON; window.handleImport=handleImport; window.loadSceneByIndex=loadSceneByIndex; window.toggleNormalize=toggleNormalize;

        resizeCanvas();
        if (!loadSavedState()) { generateListeners(); } else { resizeCanvas(); drawChart(); }
        setInterval(()=>{if(!simulationRunning)updateStats();},5000);
    })();
    </script>
</body>
</html>
