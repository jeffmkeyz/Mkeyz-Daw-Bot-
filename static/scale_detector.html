<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mkeyz Studio — Oyentes en Vivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --violet: #b388ff; --violet2: #d1b8ff; --green: #00e676;
            --red: #ff4d4d; --blue: #4fc3f7; --orange: #ff9800;
            --text: #f0f3ff; --muted: #9a8fb8;
            --card: rgba(20, 15, 35, 0.85); --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0e1a, #020408);
            color: var(--text); font-family: 'Inter', sans-serif;
            min-height: 100vh; padding: 6px 6px calc(6px + env(safe-area-inset-bottom)); overflow-x: hidden;
            overscroll-behavior-y: contain;
        }
        .main-scroll { max-height: 100vh; overflow-y: auto; padding-bottom: 8px; }
        .player {
            background: rgba(20,15,35,0.75); backdrop-filter:blur(25px); border-radius:16px; padding:8px 12px; margin-bottom:6px;
            border:1px solid rgba(179,136,255,0.3); box-shadow:0 0 8px var(--violet); display:flex; align-items:center; justify-content:center;
        }
        .track-name {
            font-weight:800; font-size:0.85rem; letter-spacing:1px;
            background: linear-gradient(135deg, var(--violet2), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin:6px 0; }
        .mini-stat { background:var(--card); border-radius:10px; padding:8px 4px; border:1px solid rgba(179,136,255,0.2); text-align:center; font-size:0.6rem; }
        .mini-stat .value { font-family:'Orbitron',monospace; font-size:0.85rem; color:var(--violet2); text-shadow:0 0 6px var(--violet); }

        .audit-panel { background:var(--card); border-radius:12px; padding:8px; margin:6px 0; border:1px solid rgba(179,136,255,0.3); display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
        .risk-score { font-family:'Orbitron',monospace; font-size:1.6rem; font-weight:800; }
        .risk-status { padding:3px 12px; border-radius:14px; font-size:0.65rem; font-weight:700; }

        .profiles-stats { display:flex; flex-wrap:wrap; gap:3px; margin:4px 0; justify-content:center; font-size:0.6rem; }
        .profile-stat { background:var(--card); padding:3px 8px; border-radius:10px; border:1px solid; display:flex; align-items:center; gap:3px; }

        .antidetect-panel { background:var(--card); border-radius:10px; padding:6px; margin:4px 0; border:1px solid rgba(179,136,255,0.3); }
        .antidetect-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
        .antidetect-item { background:rgba(0,0,0,0.3); border-radius:8px; padding:6px 4px; border:1px solid rgba(255,255,255,0.1); text-align:center; }
        .antidetect-label { font-size:0.55rem; color:var(--muted); }
        .antidetect-value { font-size:0.7rem; font-weight:700; }

        .recommendations-panel { background:var(--card); border-radius:10px; padding:6px; margin:4px 0; border:1px solid var(--violet); display:none; text-align:center; font-size:0.6rem; }

        .filter-bar { display:flex; gap:4px; align-items:center; justify-content:center; margin-bottom:4px; }
        .filter-bar select { background:var(--card); color:var(--text); border:1px solid var(--violet); border-radius:6px; padding:4px 6px; font-size:0.6rem; }

        .map-area { margin:4px 0; border-radius:14px; overflow:hidden; border:1px solid rgba(179,136,255,0.2); }
        #mapid { height:200px; width:100%; }

        .chart-area { background:var(--card); border-radius:10px; padding:6px; margin:4px 0; border:1px solid rgba(179,136,255,0.2); }
        canvas#activityChart { width:100%; height:140px; display:block; background:rgba(0,0,0,0.2); border-radius:8px; }

        .btn { background:var(--card); border:1px solid rgba(179,136,255,0.4); padding:6px 12px; border-radius:14px; font-weight:700; font-size:0.6rem; color:var(--text); cursor:pointer; }
        .btn.gold { background:linear-gradient(135deg,var(--violet),#7c4dff); border:none; color:#000; }

        .controls-bar { display:flex; align-items:center; gap:4px; margin:4px 0; background:var(--card); padding:6px 10px; border-radius:14px; border:1px solid rgba(179,136,255,0.4); justify-content:center; }
        .scrubber-wrapper { position:relative; width:50px; height:26px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); border:1px solid var(--violet); border-radius:6px; touch-action:none; user-select:none; }
        .scrubber-value { font-family:'Orbitron',monospace; font-size:0.8rem; color:var(--violet2); pointer-events:none; }

        .scale-panel { background:var(--card); border-radius:12px; padding:8px; margin:6px 0; border:1px solid var(--violet); display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; }
        .scale-panel input { width:70px; background:transparent; border:1px solid var(--violet); border-radius:6px; color:var(--violet2); font-family:'Orbitron',monospace; text-align:center; padding:3px; }

        .modal-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);
            display:none; align-items:center; justify-content:center; z-index:10000;
        }
        .modal-content {
            background:linear-gradient(145deg,#1a1030,#0f0a22); border:2px solid var(--violet);
            border-radius:20px; padding:16px; max-width:320px; width:90%; text-align:center;
            animation: popIn 0.6s ease; box-shadow:0 0 60px var(--violet);
        }
        @keyframes popIn { 0%{transform:scale(0.5) rotate(-5deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
    </style>
</head>
<body>
    <div class="main-scroll">
        <div class="player"><div class="track-name">🎛️ MKEYZ STUDIO</div></div>

        <div class="stats-grid">
            <div class="mini-stat"><div class="value" id="totalPlays">0</div><div class="label">🎵 Tus plays</div></div>
            <div class="mini-stat"><div class="value" id="totalOtherPlays">0</div><div class="label">🎧 Otros plays</div></div>
            <div class="mini-stat"><div class="value" id="uniqueListeners">0</div><div class="label">👥 Oyentes</div></div>
            <div class="mini-stat"><div class="value" id="activePlatform">0</div><div class="label">🟢 Activos</div></div>
        </div>

        <div class="audit-panel">
            <div><div class="risk-score" id="riskScore">0%</div><div class="risk-status" id="riskStatus">—</div></div>
            <div style="font-size:0.6rem;" id="riskDetails">Sin datos</div>
        </div>

        <div class="profiles-stats" id="profilesStats"></div>

        <div class="antidetect-panel">
            <div class="antidetect-grid">
                <div class="antidetect-item"><span class="antidetect-label">Gini</span><div class="antidetect-value" id="giniValue">—</div></div>
                <div class="antidetect-item"><span class="antidetect-label">Ratio</span><div class="antidetect-value" id="ratioPlays">—</div></div>
                <div class="antidetect-item"><span class="antidetect-label">Picos</span><div class="antidetect-value" id="suspiciousPeaks">0</div></div>
                <div class="antidetect-item"><span class="antidetect-label">Binge%</span><div class="antidetect-value" id="bingePct">0%</div></div>
            </div>
        </div>

        <div class="recommendations-panel" id="recommendationsPanel"><div id="recList"></div></div>

        <div class="scale-panel">
            <span style="font-size:0.7rem;">🎯 Oyentes objetivo:</span>
            <input type="number" id="targetListeners" value="500" min="1">
            <button class="btn gold" onclick="recommendScale()">🧠 Recomendar</button>
            <button class="btn gold" onclick="applyScale()">✅ Aplicar</button>
        </div>

        <div class="filter-bar">
            <select id="filterCountry"><option value="">🌍 Todos</option></select>
            <select id="filterPlatform"><option value="">📱 Plataforma</option></select>
            <button class="btn" id="heatmapToggle">🔥 Heatmap</button>
        </div>

        <div class="map-area"><div id="mapid"></div></div>

        <div class="controls-bar">
            <span style="font-size:0.7rem;">Cantidad:</span>
            <div class="scrubber-wrapper" id="scrubberWrapper"><span class="scrubber-value" id="scrubberValue">5</span></div>
            <select id="profileSelect" style="background:var(--card);color:var(--text);border:1px solid var(--violet);border-radius:6px;padding:4px;font-size:0.7rem;">
                <option value="aleatorio">🎲 Aleatorio</option><option value="fiel">🔒 Fiel</option><option value="explorador">🔍 Explorador</option><option value="ocasional">🎲 Ocasional</option><option value="binge">🔥 Binge</option>
            </select>
            <button class="btn" onclick="addListeners()">➕ Sumar</button>
            <button class="btn" onclick="generateListeners()">🔄 Regenerar</button>
        </div>

        <div class="chart-area">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                <span style="font-size:0.7rem; font-weight:800;" id="chartTitle">📊 Actividad (1D)</span>
                <div style="display:flex; gap:4px;">
                    <button class="btn" onclick="setView('1D')">1D</button>
                    <button class="btn" onclick="setView('7D')" disabled id="view7D">7D</button>
                    <button class="btn" onclick="setView('28D')" disabled id="view28D">28D</button>
                    <button class="btn" onclick="toggleNormalize()">📊 Normalizar</button>
                </div>
            </div>
            <canvas id="activityChart"></canvas>
            <div id="progressWrapper" style="display:none;"><span id="progressLabel">0%</span><div style="height:3px;background:var(--violet);width:0%" id="progressBarFill"></div></div>
        </div>

        <div style="display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin:4px 0;">
            <button class="btn gold" onclick="addListener()">➕ Añadir</button>
            <button class="btn" onclick="startSimulation('1D')">1 Día</button>
            <button class="btn" onclick="startSimulation('7D')">7 Días</button>
            <button class="btn" onclick="startSimulation('28D')">28 Días</button>
            <button class="btn" onclick="safeMode()" style="border-color:#00e676;color:#00e676;">🛡️ Modo Seguro</button>
            <button class="btn" onclick="resetAll()">🔄 Reset</button>
        </div>

        <div style="display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin:4px 0;">
            <button class="btn" onclick="saveScene()">💾 Guardar</button>
            <button class="btn" onclick="loadScene()">📂 Cargar</button>
            <button class="btn" onclick="exportJSON()">📤 Exportar</button>
            <button class="btn" onclick="importJSON()">📥 Importar</button>
            <button class="btn" onclick="loadCSV()">📈 Cargar CSV</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
            <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCSVUpload(event)">
        </div>
    </div>

    <div class="modal-overlay" id="magicModal">
        <div class="modal-content">
            <div style="font-weight:800; font-size:1rem; margin-bottom:8px;">✨ Informe</div>
            <div id="magicContent"></div>
            <button class="btn gold" style="width:100%; margin-top:8px;" onclick="closeMagicModal()">Cerrar</button>
        </div>
    </div>
    <div class="modal-overlay" id="csvModal">
        <div class="modal-content">
            <div style="font-weight:800; font-size:1rem; margin-bottom:8px;">📈 CSV Cargado</div>
            <div id="csvContent"></div>
            <button class="btn gold" style="width:100%; margin-top:8px;" onclick="closeCSVModal()">Cerrar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script>
    (function() {
        // ---------- CONSTANTES ----------
        const PROFILES = {
            fiel:{name:"Fiel",icon:"🔒",color:"#00e676",act:0.8,myRadio:0.7,change:0.15,idle:0.1,max:15,sess:5},
            explorador:{name:"Explorador",icon:"🔍",color:"#4fc3f7",act:0.6,myRadio:0.3,change:0.5,idle:0.2,max:8,sess:3},
            ocasional:{name:"Ocasional",icon:"🎲",color:"#b388ff",act:0.3,myRadio:0.4,change:0.3,idle:0.4,max:5,sess:2},
            binge:{name:"Binge",icon:"🔥",color:"#ff4d4d",act:0.9,myRadio:0.9,change:0.05,idle:0.05,max:30,sess:8}
        };
        const countryCities = {
            "Rep. Dominicana":[{name:"Santo Domingo",lat:18.48,lng:-69.93}],
            "España":[{name:"Madrid",lat:40.42,lng:-3.70}],
            "Brasil":[{name:"São Paulo",lat:-23.55,lng:-46.63}],
            "México":[{name:"CDMX",lat:19.43,lng:-99.13}],
            "EE.UU.":[{name:"Nueva York",lat:40.71,lng:-74.01}],
            "Francia":[{name:"París",lat:48.86,lng:2.35}],
            "Colombia":[{name:"Bogotá",lat:4.71,lng:-74.07}],
            "Argentina":[{name:"Buenos Aires",lat:-34.60,lng:-58.38}]
        };
        const platforms = [{name:"Spotify",color:"#b388ff"},{name:"Apple Music",color:"#e040fb"},{name:"YouTube",color:"#ff4081"}];
        const namePool = ["Carlos","Ana","João","Luis","Marie","David","Sofía","Pedro","Emily","Rafael"];
        let listeners = [], state = [], totalMyPlays = 0, totalOtherPlays = 0;
        let data1D = null, data7D = null, data28D = null, currentView = '1D', simulationRunning = false;
        let recommendedScale = [], normalizedMode = false;

        // ---------- MAPA ----------
        const map = L.map('mapid', {center:[20,0], zoom:2, zoomControl:false, attributionControl:false});
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(map);
        let markersLayer = L.layerGroup().addTo(map), heatmapActive = false, heatLayer = null;

        function getRandomCity(c) {
            const cities = countryCities[c]||[{name:"Desconocida",lat:40,lng:-3}];
            const city = cities[Math.floor(Math.random()*cities.length)];
            return {name:city.name, lat:city.lat+(Math.random()-0.5)*0.1, lng:city.lng+(Math.random()-0.5)*0.1};
        }
        function addListenerWithProfile(profile) {
            const countries = Object.keys(countryCities);
            const c = countries[Math.floor(Math.random()*countries.length)];
            const city = getRandomCity(c);
            const plat = platforms[Math.floor(Math.random()*platforms.length)];
            const name = namePool[Math.floor(Math.random()*namePool.length)];
            listeners.push({name,country:c,city:city.name,lat:city.lat,lng:city.lng,platform:plat.name,color:plat.color,profile});
            const p = PROFILES[profile];
            state.push({active:true,inMyRadio:false,trackTimeLeft:0,otherTrackTimeLeft:0,dailyPlays:0,maxDailyPlays:p.max,sessionRemaining:0,profile});
        }
        function renderDots() {
            markersLayer.clearLayers();
            state.forEach((s,i)=>{
                const l=listeners[i];
                if(document.getElementById('filterCountry').value && l.country!==document.getElementById('filterCountry').value) return;
                if(document.getElementById('filterPlatform').value && l.platform!==document.getElementById('filterPlatform').value) return;
                markersLayer.addLayer(L.circleMarker([l.lat,l.lng],{radius:6,fillColor:s.active?l.color:'#555',color:s.active?PROFILES[l.profile].color:'#555'}));
            });
            if(heatmapActive) updateHeatmap();
        }
        function updateHeatmap() {
            if(heatLayer) map.removeLayer(heatLayer);
            heatLayer = L.heatLayer(listeners.map(l=>[l.lat,l.lng]),{radius:18,blur:12,gradient:{0.2:'#ff00ff',0.4:'#b388ff',0.6:'#00e676',0.8:'#ffff00',1:'#ff0000'}}).addTo(map);
        }

        // ---------- GRÁFICO ----------
        const canvas = document.getElementById('activityChart'), ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = canvas.parentElement.clientWidth; canvas.height = 140; }
        window.addEventListener('resize', ()=>{ resizeCanvas(); drawChart(); });
        function drawChart() {
            const w=canvas.width, h=canvas.height; ctx.clearRect(0,0,w,h);
            const data = currentView==='1D'?data1D:(currentView==='7D'?data7D:data28D);
            if(!data) return;
            let {activity, plays, otherPlays} = data;
            const labels = data.labels;
            if (normalizedMode) {
                const maxA = Math.max(...activity,1), maxP = Math.max(...plays,1), maxO = Math.max(...otherPlays,1);
                activity = activity.map(v=>v/maxA); plays = plays.map(v=>v/maxP); otherPlays = otherPlays.map(v=>v/maxO);
            }
            const maxVal = normalizedMode ? 1 : Math.max(...activity,...plays,...otherPlays,1);
            const pad={top:12,right:12,bottom:20,left:28}, cw=w-pad.left-pad.right, ch=h-pad.top-pad.bottom, n=labels.length, stepX=cw/(n-1);
            ctx.strokeStyle='#2a1f4a'; ctx.beginPath(); ctx.moveTo(pad.left,pad.top); ctx.lineTo(pad.left,h-pad.bottom); ctx.lineTo(w-pad.right,h-pad.bottom); ctx.stroke();
            ctx.fillStyle='#9a8fb8'; ctx.font='7px Inter'; ctx.textAlign='center';
            const step=n<=7?1:(n<=28?7:5);
            for(let i=0;i<n;i+=step) ctx.fillText(labels[i], pad.left+i*stepX, h-pad.bottom+10);
            function line(arr,color,dash){ ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash(dash||[]); ctx.beginPath(); for(let i=0;i<n;i++){const x=pad.left+i*stepX, y=h-pad.bottom-(arr[i]/maxVal)*ch; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);} ctx.stroke(); ctx.setLineDash([]); }
            line(activity,'#b388ff'); line(plays,'#00e676',[4,4]); line(otherPlays,'#4fc3f7',[2,4]);
        }
        function toggleNormalize() { normalizedMode=!normalizedMode; drawChart(); }

        // ---------- SIMULACIÓN ----------
        function updateStats() {
            document.getElementById('totalPlays').textContent=totalMyPlays;
            document.getElementById('totalOtherPlays').textContent=totalOtherPlays;
            document.getElementById('uniqueListeners').textContent=listeners.length;
            document.getElementById('activePlatform').textContent=state.filter(s=>s.active).length;
            drawChart();
        }
        function enterRadio(i) { const s=state[i]; if(!s.active||s.dailyPlays>=s.maxDailyPlays) return; s.inMyRadio=true; s.trackTimeLeft=200; s.dailyPlays++; totalMyPlays++; }
        function leaveRadio(i) { state[i].inMyRadio=false; state[i].otherTrackTimeLeft=200; }
        function simulateTick(factor,simA,simP,simO,index) {
            state.forEach((s,i)=>{
                const p=PROFILES[s.profile];
                if(!s.active){ if(Math.random()<p.act*0.1*factor) s.active=true; return; }
                if(s.inMyRadio){
                    s.trackTimeLeft-=30;
                    if(s.trackTimeLeft<=0){
                        if(s.sessionRemaining>0 && s.dailyPlays<s.maxDailyPlays){
                            if(Math.random()<1-p.change){ s.trackTimeLeft=200; s.dailyPlays++; totalMyPlays++; simP[index]++; }
                            else leaveRadio(i);
                        }else leaveRadio(i);
                    }
                }else{
                    s.otherTrackTimeLeft-=30;
                    if(s.otherTrackTimeLeft<=0){ s.otherTrackTimeLeft=200; totalOtherPlays++; simO[index]++; }
                    if(s.dailyPlays<s.maxDailyPlays && Math.random()<p.myRadio*0.1*factor){ enterRadio(i); simP[index]++; }
                }
                if(s.active && !s.inMyRadio && Math.random()<p.idle*0.1) s.active=false;
            });
            simA[index]=Math.max(simA[index],state.filter(s=>s.inMyRadio).length);
        }
        function runSimulation(days) {
            const spd=2880, total=days*spd, simA=[],simP=[],simO=[], dc=days===1?24:days;
            for(let i=0;i<dc;i++){simA.push(0);simP.push(0);simO.push(0);}
            let step=0; simulationRunning=true; document.querySelectorAll('.btn').forEach(b=>b.disabled=true); document.getElementById('progressWrapper').style.display='block';
            function batch() {
                const end=Math.min(step+500,total);
                for(let s=step;s<end;s++){
                    const day=Math.floor(s/spd), hour=Math.floor(((s%spd)*30)/3600), idx=days===1?hour:day;
                    if(day>0 && s%spd===0){ state.forEach(s=>{ s.dailyPlays=0; s.maxDailyPlays=PROFILES[s.profile].max; s.sessionRemaining=0; if(s.inMyRadio) leaveRadio(state.indexOf(s)); }); }
                    simulateTick(getActFactor(hour),simA,simP,simO,idx);
                }
                step=end; document.getElementById('progressLabel').textContent=Math.round(step/total*100)+'%'; document.getElementById('progressBarFill').style.width=(step/total*100)+'%';
                if(step<total) setTimeout(batch,0);
                else {
                    if(days===1) data1D={labels:Array.from({length:24},(_,i)=>i+'h'),activity:simA,plays:simP,otherPlays:simO};
                    else if(days===7){ data1D=gen1D(simA,simP,simO); data7D={labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],activity:simA,plays:simP,otherPlays:simO}; }
                    else { data1D=gen1D(simA.slice(0,7),simP.slice(0,7),simO.slice(0,7)); data7D={labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],activity:simA.slice(0,7),plays:simP.slice(0,7),otherPlays:simO.slice(0,7)}; data28D={labels:Array.from({length:28},(_,i)=>'D'+(i+1)),activity:simA,plays:simP,otherPlays:simO}; }
                    finishSimulation(days);
                }
            }
            batch();
        }
        function gen1D(dA,dP,dO) { const hA=new Array(24).fill(0),hP=new Array(24).fill(0),hO=new Array(24).fill(0); const tA=dA.reduce((a,b)=>a+b,0),tP=dP.reduce((a,b)=>a+b,0),tO=dO.reduce((a,b)=>a+b,0); for(let h=0;h<24;h++){ const f=getActFactor(h); hA[h]=Math.round(tA*f/10); hP[h]=Math.round(tP*f/10); hO[h]=Math.round(tO*f/10); } return {labels:Array.from({length:24},(_,i)=>i+'h'),activity:hA,plays:hP,otherPlays:hO}; }
        function getActFactor(h) { if(h>=7&&h<=9)return 1.4; if(h>=12&&h<=14)return 1.2; if(h>=19&&h<=22)return 1.5; if(h>=0&&h<=5)return 0.3; return 0.8; }

        function finishSimulation(days) {
            simulationRunning=false; document.querySelectorAll('.btn').forEach(b=>b.disabled=false);
            document.getElementById('progressWrapper').style.display='none';
            updateStats(); updateIndicators(); setView('1D');
            const plays = data1D?data1D.plays.reduce((a,b)=>a+b,0):totalMyPlays;
            const other = data1D?data1D.otherPlays.reduce((a,b)=>a+b,0):totalOtherPlays;
            showMagicModal(`Simulación ${days}D completada`,
                `<div class="magic-stat"><span>🎵 Tus plays:</span><strong>${plays}</strong></div>
                 <div class="magic-stat"><span>🎧 Otros plays:</span><strong>${other}</strong></div>
                 <div class="magic-stat"><span>👥 Oyentes:</span><strong>${listeners.length}</strong></div>
                 <div class="magic-stat"><span>📊 Gini:</span><strong>${document.getElementById('giniValue').textContent}</strong></div>
                 <div class="magic-stat"><span>🔁 Ratio:</span><strong>${document.getElementById('ratioPlays').textContent}</strong></div>
                 <div class="magic-stat"><span>⚠️ Picos:</span><strong>${document.getElementById('suspiciousPeaks').textContent}</strong></div>
                 <div class="magic-stat"><span>🔥 Binge:</span><strong>${document.getElementById('bingePct').textContent}</strong></div>`);
        }
        function startSimulation(mode) { if(simulationRunning)return; if(!listeners.length){ showToast('Añade oyentes primero'); return; } runSimulation(mode==='1D'?1:mode==='7D'?7:28); }
        function setView(v) { currentView=v; document.getElementById('chartTitle').textContent='📊 Actividad ('+v+')'; document.getElementById('view7D').disabled = !data7D; document.getElementById('view28D').disabled = !data28D; drawChart(); }

        // ---------- AUDITORÍA ----------
        function updateIndicators() {
            if(!listeners.length){
                document.getElementById('giniValue').textContent='—';
                document.getElementById('ratioPlays').textContent='—';
                document.getElementById('suspiciousPeaks').textContent='0';
                document.getElementById('bingePct').textContent='0%';
                document.getElementById('riskScore').textContent='0%';
                document.getElementById('riskStatus').textContent='—';
                return;
            }
            const arr=state.map(s=>s.dailyPlays), total=arr.reduce((a,b)=>a+b,0);
            let sum=0; for(let i=0;i<arr.length;i++) for(let j=0;j<arr.length;j++) sum+=Math.abs(arr[i]-arr[j]);
            const gini=total?sum/(2*arr.length*total):0;
            document.getElementById('giniValue').textContent=gini.toFixed(2);
            const ratio = total/listeners.length;
            document.getElementById('ratioPlays').textContent=ratio.toFixed(1);
            let peaks=0; if(data1D){ const avg=data1D.activity.reduce((a,b)=>a+b,0)/24; data1D.activity.forEach(v=>{ if(v>avg*3&&v>2) peaks++; }); }
            document.getElementById('suspiciousPeaks').textContent=peaks;
            const bingePct = Math.round(listeners.filter(l=>l.profile==='binge').length/listeners.length*100);
            document.getElementById('bingePct').textContent=bingePct+'%';

            // Auditoría
            let riskScore=0;
            if(gini>0.7) riskScore+=40; else if(gini>0.5) riskScore+=20;
            if(ratio>20) riskScore+=30; else if(ratio>12) riskScore+=15;
            if(peaks>=4) riskScore+=20; else if(peaks>=2) riskScore+=10;
            if(bingePct>50) riskScore+=20; else if(bingePct>30) riskScore+=10;
            riskScore = Math.min(100,riskScore);
            document.getElementById('riskScore').textContent=riskScore+'%';
            document.getElementById('riskStatus').textContent = riskScore<25?'✅ Desapercibido':riskScore<55?'⚠️ Aviso':'🚫 Riesgo Baneo';
            document.getElementById('riskStatus').style.background = riskScore<25?'#00e676':riskScore<55?'#ff9800':'#ff4d4d';
            analyzeRecommendations(gini,ratio,peaks,bingePct);
        }
        function analyzeRecommendations(gini,ratio,peaks,bingePct) {
            const panel = document.getElementById('recommendationsPanel'), list = document.getElementById('recList');
            const recs = [];
            if(gini>0.6) recs.push('📊 Gini alto. Añade oyentes ocasionales.');
            else if(gini>0.4) recs.push('📊 Gini moderado. Vigila.');
            if(ratio>15) recs.push('🔁 Ratio alto. Aumenta base de oyentes.');
            if(peaks>=3) recs.push(`⚠️ ${peaks} picos. Distribuye actividad.`);
            if(bingePct>40) recs.push('🔥 Exceso binge. Convierte en fieles.');
            if(!recs.length) recs.push('✅ Indicadores saludables.');
            list.innerHTML = recs.map(r=>`<div>${r}</div>`).join('');
            panel.style.display = 'block';
        }
        function updateProfileStats() {
            const counts={fiel:0,explorador:0,ocasional:0,binge:0}; listeners.forEach(l=>counts[l.profile]++);
            document.getElementById('profilesStats').innerHTML = `
                <div class="profile-stat" style="border-color:#00e676">🔒 Fieles: ${counts.fiel}</div>
                <div class="profile-stat" style="border-color:#4fc3f7">🔍 Exp: ${counts.explorador}</div>
                <div class="profile-stat" style="border-color:#b388ff">🎲 Ocas: ${counts.ocasional}</div>
                <div class="profile-stat" style="border-color:#ff4d4d">🔥 Binge: ${counts.binge}</div>`;
        }

        // ---------- ESCALADO ----------
        function recommendScale() {
            const target = parseInt(document.getElementById('targetListeners').value)||500;
            const current = listeners.length;
            if(target <= current){ showToast('El objetivo debe ser mayor al actual'); return; }
            const toAdd = target - current;
            const oc = Math.floor(toAdd*0.5), fi = Math.floor(toAdd*0.3), ex = Math.floor(toAdd*0.15), bi = toAdd - oc - fi - ex;
            recommendedScale = [{profile:'ocasional',add:oc},{profile:'fiel',add:fi},{profile:'explorador',add:ex},{profile:'binge',add:bi}];
            document.getElementById('magicContent').innerHTML = `
                <b>Para llegar a ${target} oyentes:</b><br><br>
                🎲 Ocasionales: +${oc}<br>🔒 Fieles: +${fi}<br>🔍 Exploradores: +${ex}<br>🔥 Binge: +${bi}
                <br><small>Distribución segura para evitar detección</small>
            `;
            document.getElementById('magicModal').style.display='flex';
        }
        function applyScale() {
            if(!recommendedScale.length){ showToast('Usa Recomendar primero'); return; }
            let added=0;
            recommendedScale.forEach(d=>{ for(let i=0;i<d.add;i++){ addListenerWithProfile(d.profile); added++; } });
            recommendedScale=[];
            updateStats(); renderDots(); updateProfileStats(); updateIndicators();
            showToast(`✅ +${added} oyentes añadidos`);
        }

        // ---------- CSV ----------
        function loadCSV() { document.getElementById('csvFile').click(); }
        function handleCSVUpload(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result.replace(/^\uFEFF/, '');
                const rows = text.split('\n').filter(r=>r.trim());
                if(rows.length<2){ showToast('CSV inválido'); return; }
                const headers = rows[0].split(',').map(h=>h.trim().toLowerCase());
                const idx = headers.indexOf('listeners');
                if(idx===-1){ showToast('Falta columna listeners'); return; }
                const last = parseInt(rows[rows.length-1].split(',')[idx])||10;
                listeners=[]; state=[];
                const counts={ocasional:0,fiel:0,explorador:0,binge:0};
                for(let i=0;i<last;i++){
                    const p = i<last*0.4?'ocasional':i<last*0.7?'fiel':i<last*0.9?'explorador':'binge';
                    addListenerWithProfile(p); counts[p]++;
                }
                updateStats(); renderDots(); updateProfileStats(); updateIndicators();
                // Actualizar el campo objetivo con el doble de los oyentes actuales como sugerencia
                document.getElementById('targetListeners').value = last * 2;
                document.getElementById('csvContent').innerHTML = `✅ ${last} oyentes cargados<br>🔒 Fieles: ${counts.fiel}<br>🔍 Exploradores: ${counts.explorador}<br>🎲 Ocasionales: ${counts.ocasional}<br>🔥 Binge: ${counts.binge}`;
                document.getElementById('csvModal').style.display='flex';
            };
            reader.readAsText(file);
        }
        function closeCSVModal() { document.getElementById('csvModal').style.display='none'; }
        function closeMagicModal() { document.getElementById('magicModal').style.display='none'; }
        function showMagicModal(title,msg) {
            document.getElementById('magicContent').innerHTML = msg;
            document.getElementById('magicModal').style.display='flex';
        }

        // ---------- PERSISTENCIA ----------
        function saveScene() {
            const name = prompt('Nombre de la escena:');
            if (!name) return;
            const data = { listeners: listeners.map(l=>({...l})), state: state.map(s=>({...s})), totalMyPlays, totalOtherPlays, data1D, data7D, data28D, timestamp: Date.now() };
            const scenes = JSON.parse(localStorage.getItem('oyentes_scenes')||'[]');
            scenes.push({name, data});
            localStorage.setItem('oyentes_scenes', JSON.stringify(scenes));
            showToast('Escena guardada');
        }
        function loadScene() {
            const scenes = JSON.parse(localStorage.getItem('oyentes_scenes')||'[]');
            if(!scenes.length){ showToast('No hay escenas'); return; }
            const last = scenes[scenes.length-1];
            listeners = last.data.listeners.map(l=>({...l}));
            state = last.data.state.map(s=>({...s}));
            totalMyPlays = last.data.totalMyPlays||0;
            totalOtherPlays = last.data.totalOtherPlays||0;
            data1D = last.data.data1D; data7D = last.data.data7D; data28D = last.data.data28D;
            updateStats(); renderDots(); updateProfileStats(); updateIndicators();
            showToast('Escena cargada: '+last.name);
        }
        function exportJSON() {
            const data = { listeners, state, totalMyPlays, totalOtherPlays, data1D, data7D, data28D };
            const jsonStr = JSON.stringify(data, null, 2);
            navigator.clipboard.writeText(jsonStr).then(()=>showToast('Copiado al portapapeles'));
        }
        function importJSON() { document.getElementById('importFile').click(); }
        function handleImport(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                listeners = data.listeners.map(l=>({...l})); state = data.state.map(s=>({...s}));
                totalMyPlays = data.totalMyPlays||0; totalOtherPlays = data.totalOtherPlays||0;
                data1D = data.data1D; data7D = data.data7D; data28D = data.data28D;
                updateStats(); renderDots(); updateProfileStats(); updateIndicators();
                showToast('Importado correctamente');
            };
            reader.readAsText(file);
        }

        // ---------- ACCIONES ----------
        function addListeners() {
            const count = parseInt(document.getElementById('scrubberValue').textContent)||5;
            const profileKey = document.getElementById('profileSelect').value;
            for(let i=0;i<count;i++) addListenerWithProfile(profileKey==='aleatorio'?Object.keys(PROFILES)[Math.floor(Math.random()*4)]:profileKey);
            updateStats(); renderDots(); updateProfileStats(); updateIndicators();
        }
        function generateListeners() { listeners=[]; state=[]; addListeners(); }
        function addListener() { addListeners(); }
        function safeMode() {
            if(!listeners.length) return;
            let changed=0;
            listeners.forEach((l,i)=>{ if(l.profile==='binge'){ listeners[i].profile='fiel'; state[i].profile='fiel'; changed++; } });
            updateStats(); renderDots(); updateProfileStats(); updateIndicators();
            showToast(`🛡️ Modo Seguro (${changed} cambios)`);
        }
        function resetAll() { listeners=[]; state=[]; totalMyPlays=0; totalOtherPlays=0; data1D=data7D=data28D=null; updateStats(); renderDots(); updateProfileStats(); updateIndicators(); }

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent=msg; t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1530;color:var(--violet2);padding:8px 16px;border-radius:20px;z-index:9999;font-size:0.7rem;';
            document.body.appendChild(t);
            setTimeout(()=>t.remove(),2000);
        }

        // ---------- SCRUBBER ----------
        const scrubberValueEl = document.getElementById('scrubberValue');
        let scrubberCurrent = 5;
        document.getElementById('scrubberWrapper').addEventListener('pointerdown', e => {
            const startY = e.clientY, startVal = scrubberCurrent;
            const onMove = (ev) => { scrubberCurrent = Math.min(100, Math.max(1, startVal + Math.round((startY - ev.clientY)/10))); scrubberValueEl.textContent = scrubberCurrent; };
            const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
            window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
        });
        scrubberValueEl.textContent = scrubberCurrent;

        document.getElementById('heatmapToggle').addEventListener('click', ()=>{
            heatmapActive=!heatmapActive;
            if(heatmapActive) updateHeatmap();
            else if(heatLayer) map.removeLayer(heatLayer);
        });

        // ---------- EXPORTACIÓN GLOBAL ----------
        window.addListener = addListener;
        window.addListeners = addListeners;
        window.generateListeners = generateListeners;
        window.startSimulation = startSimulation;
        window.setView = setView;
        window.toggleNormalize = toggleNormalize;
        window.safeMode = safeMode;
        window.resetAll = resetAll;
        window.saveScene = saveScene;
        window.loadScene = loadScene;
        window.exportJSON = exportJSON;
        window.importJSON = importJSON;
        window.handleImport = handleImport;
        window.loadCSV = loadCSV;
        window.handleCSVUpload = handleCSVUpload;
        window.recommendScale = recommendScale;
        window.applyScale = applyScale;
        window.closeMagicModal = closeMagicModal;
        window.closeCSVModal = closeCSVModal;

        // ---------- INICIO ----------
        resizeCanvas();
        generateListeners();
        renderDots();
        updateProfileStats();
        updateIndicators();
        function populateFilters() {
            const cs=document.getElementById('filterCountry'), ps=document.getElementById('filterPlatform');
            cs.innerHTML='<option value="">🌍 Todos</option>';
            ps.innerHTML='<option value="">📱 Plataforma</option>';
            [...new Set(listeners.map(l=>l.country))].sort().forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; cs.appendChild(o); });
            [...new Set(listeners.map(l=>l.platform))].sort().forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; ps.appendChild(o); });
        }
        document.getElementById('filterCountry').addEventListener('change',renderDots);
        document.getElementById('filterPlatform').addEventListener('change',renderDots);
        populateFilters();
        setInterval(()=>{ if(!simulationRunning) updateStats(); }, 5000);
    })();
    </script>
</body>
</html>
