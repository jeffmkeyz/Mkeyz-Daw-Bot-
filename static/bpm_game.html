<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adivina el BPM — Mkeyz Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:     #0a0a0a;
  --card:   #111;
  --border: #1f1f1f;
  --gold:   #f5c518;
  --fire:   #ff4d4d;
  --green:  #00e676;
  --text:   #fff;
  --muted:  #555;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── SCREENS ── */
.screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.screen.active { display:flex; }

/* ── INTRO ── */
.logo-big { font-size:72px; margin-bottom:16px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

.title-big {
  font-size:28px; font-weight:900; letter-spacing:-1px;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-align:center; margin-bottom:8px;
}
.subtitle { font-size:14px; color:var(--muted); text-align:center; margin-bottom:40px; line-height:1.5; }

.btn-start {
  background: linear-gradient(135deg, var(--fire), #ff8c00);
  border:none; border-radius:20px; padding:18px 48px;
  font-size:18px; font-weight:800; color:#fff; cursor:pointer;
  box-shadow: 0 8px 32px rgba(255,77,77,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing:0.5px;
}
.btn-start:active { transform:scale(0.96); box-shadow:0 4px 16px rgba(255,77,77,0.3); }

.highscore-display {
  margin-top:24px; font-size:13px; color:var(--muted);
}
.highscore-display span { color:var(--gold); font-weight:700; }

/* ── GAME ── */
#game-screen {
  justify-content: space-between;
  padding: 20px 20px 32px;
}

.game-header {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding-bottom:16px;
}
.score-box { text-align:center; }
.score-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.score-val { font-size:24px; font-weight:900; color:var(--gold); }

.round-indicator { display:flex; gap:6px; }
.round-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--border); transition:background 0.3s;
}
.round-dot.done { background:var(--green); }
.round-dot.current { background:var(--gold); }

/* Beat visualizer */
.beat-visual {
  display:flex; align-items:flex-end; justify-content:center;
  gap:4px; height:80px; width:100%;
}
.bar {
  width:6px; background:var(--border); border-radius:3px;
  transition:height 0.1s ease;
}
.bar.active { background:linear-gradient(180deg, var(--gold), var(--fire)); }

/* BPM Display */
.bpm-display {
  text-align:center; width:100%;
}
.bpm-question { font-size:13px; color:var(--muted); margin-bottom:8px; letter-spacing:1px; }
.bpm-target-hint {
  font-size:48px; font-weight:900; letter-spacing:-2px;
  color:var(--text); line-height:1;
  transition:all 0.2s;
}
.bpm-range { font-size:12px; color:var(--muted); margin-top:4px; }

/* Timer bar */
.timer-wrap {
  width:100%; background:var(--border); border-radius:100px; height:6px; overflow:hidden;
}
.timer-bar {
  height:100%; border-radius:100px;
  background:linear-gradient(90deg, var(--green), var(--gold), var(--fire));
  transition:width 0.1s linear;
}

/* BPM Slider */
.slider-section { width:100%; }
.slider-label {
  display:flex; justify-content:space-between;
  font-size:12px; color:var(--muted); margin-bottom:10px;
}
.bpm-slider {
  width:100%; -webkit-appearance:none; appearance:none;
  height:6px; border-radius:100px; background:var(--border); outline:none;
  cursor:pointer;
}
.bpm-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--fire));
  cursor:pointer; box-shadow:0 4px 12px rgba(245,197,24,0.5);
}
.bpm-current {
  text-align:center; font-size:42px; font-weight:900;
  color:var(--gold); margin:12px 0; letter-spacing:-2px;
}

/* Tap button */
.btn-tap {
  width:100%; padding:20px; background:linear-gradient(135deg, #1a1a1a, #222);
  border:2px solid var(--border); border-radius:20px;
  font-size:16px; font-weight:700; color:var(--text);
  cursor:pointer; transition:all 0.08s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.btn-tap:active {
  transform:scale(0.97);
  border-color:var(--gold);
  background:linear-gradient(135deg, #1f1a00, #2a2200);
}
.tap-count { font-size:12px; color:var(--muted); }

/* Submit button */
.btn-submit {
  width:100%; padding:18px; border:none; border-radius:20px;
  background:linear-gradient(135deg, var(--fire), #ff8c00);
  font-size:18px; font-weight:800; color:#fff; cursor:pointer;
  box-shadow:0 8px 24px rgba(255,77,77,0.3);
  transition:transform 0.1s;
}
.btn-submit:active { transform:scale(0.97); }

/* ── RESULT ── */
.result-icon { font-size:64px; margin-bottom:16px; animation:bounceIn 0.5s ease; }
@keyframes bounceIn {
  0% { transform:scale(0); opacity:0; }
  60% { transform:scale(1.2); }
  100% { transform:scale(1); opacity:1; }
}
.result-title { font-size:24px; font-weight:900; margin-bottom:8px; }
.result-detail {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:20px; width:100%; margin:16px 0;
}
.result-row { display:flex; justify-content:space-between; padding:8px 0;
  border-bottom:1px solid var(--border); font-size:14px; }
.result-row:last-child { border-bottom:none; }
.result-row .label { color:var(--muted); }
.result-row .val { font-weight:700; }
.result-row .val.correct { color:var(--green); }
.result-row .val.close { color:var(--gold); }
.result-row .val.wrong { color:var(--fire); }

.points-gained {
  font-size:48px; font-weight:900; color:var(--gold);
  text-align:center; margin:16px 0;
}
.points-label { font-size:13px; color:var(--muted); }

.btn-next {
  width:100%; padding:18px; border:none; border-radius:20px;
  background:linear-gradient(135deg, var(--green), #00bcd4);
  font-size:18px; font-weight:800; color:#000; cursor:pointer;
  transition:transform 0.1s;
}
.btn-next:active { transform:scale(0.97); }

/* ── FINAL ── */
.final-score {
  font-size:80px; font-weight:900; color:var(--gold);
  line-height:1; margin:16px 0;
}
.final-label { font-size:14px; color:var(--muted); }
.final-grade { font-size:32px; font-weight:700; margin:16px 0; }
.stars { font-size:36px; margin:8px 0; letter-spacing:4px; }

.leaderboard-preview {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:16px; margin:16px 0;
}
.lb-title { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.lb-row {
  display:flex; align-items:center; gap:12px; padding:8px 0;
  border-bottom:1px solid var(--border); font-size:14px;
}
.lb-row:last-child { border-bottom:none; }
.lb-pos { font-size:16px; min-width:28px; }
.lb-name { flex:1; font-weight:600; }
.lb-pts { color:var(--gold); font-weight:800; }

.btn-play-again {
  width:100%; padding:18px; border:none; border-radius:20px;
  background:linear-gradient(135deg, var(--fire), #ff8c00);
  font-size:18px; font-weight:800; color:#fff; cursor:pointer;
  box-shadow:0 8px 24px rgba(255,77,77,0.3);
  margin-bottom:12px;
}
.btn-play-again:active { transform:scale(0.97); }

/* ── FEEDBACK FLASH ── */
.feedback-flash {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  font-size:48px; z-index:999; pointer-events:none;
  animation:none;
}
.feedback-flash.show {
  animation:flashAnim 0.6s ease forwards;
}
@keyframes flashAnim {
  0%  { transform:translate(-50%,-50%) scale(0); opacity:1; }
  50% { transform:translate(-50%,-60%) scale(1.3); opacity:1; }
  100%{ transform:translate(-50%,-80%) scale(1); opacity:0; }
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro-screen">
  <div class="logo-big">🥁</div>
  <div class="title-big">Adivina el BPM</div>
  <div class="subtitle">Escucha el ritmo, toca al compás<br>y adivina los BPM exactos.<br>5 rondas · ¡A por la puntuación máxima!</div>
  <button class="btn-start" onclick="startGame()">¡JUGAR!</button>
  <div class="highscore-display" id="intro-hs"></div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div class="game-header">
    <div class="score-box">
      <div class="score-label">Puntos</div>
      <div class="score-val" id="score-display">0</div>
    </div>
    <div class="round-indicator" id="round-dots"></div>
    <div class="score-box">
      <div class="score-label">Ronda</div>
      <div class="score-val" id="round-display">1/5</div>
    </div>
  </div>

  <div class="beat-visual" id="beat-visual"></div>

  <div class="bpm-display">
    <div class="bpm-question">¿CUÁNTOS BPM TIENE ESTE BEAT?</div>
    <div class="bpm-range" id="bpm-range-hint"></div>
  </div>

  <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>

  <div class="slider-section">
    <div class="slider-label">
      <span>60 BPM</span>
      <span>200 BPM</span>
    </div>
    <input type="range" class="bpm-slider" id="bpm-slider" min="60" max="200" value="130"
           oninput="updateSlider(this.value)">
    <div class="bpm-current" id="bpm-current-val">130</div>
  </div>

  <button class="btn-tap" id="tap-btn" onclick="tapTempo()">
    <span>👆</span>
    <div>
      <div>TAP AL RITMO</div>
      <div class="tap-count" id="tap-info">Toca para detectar el BPM</div>
    </div>
    <span id="tap-bpm" style="font-size:20px;font-weight:900;color:var(--gold)"></span>
  </button>

  <button class="btn-submit" onclick="submitAnswer()">CONFIRMAR BPM</button>
</div>

<!-- RESULT -->
<div class="screen" id="result-screen">
  <div class="result-icon" id="result-icon">🎯</div>
  <div class="result-title" id="result-title"></div>
  <div class="points-gained" id="points-gained"></div>
  <div class="points-label">puntos</div>
  <div class="result-detail">
    <div class="result-row">
      <span class="label">BPM real</span>
      <span class="val" id="real-bpm-val"></span>
    </div>
    <div class="result-row">
      <span class="label">Tu respuesta</span>
      <span class="val" id="user-bpm-val"></span>
    </div>
    <div class="result-row">
      <span class="label">Diferencia</span>
      <span class="val" id="diff-val"></span>
    </div>
  </div>
  <button class="btn-next" onclick="nextRound()">SIGUIENTE →</button>
</div>

<!-- FINAL -->
<div class="screen" id="final-screen">
  <div class="logo-big" id="final-emoji">🏆</div>
  <div class="title-big" id="final-grade"></div>
  <div class="final-score" id="final-score-val"></div>
  <div class="final-label">puntos totales</div>
  <div class="stars" id="final-stars"></div>
  <div class="leaderboard-preview" id="lb-preview">
    <div class="lb-title">🏆 Mejores puntuaciones</div>
    <div id="lb-rows">Cargando...</div>
  </div>
  <button class="btn-play-again" onclick="startGame()">🔄 JUGAR DE NUEVO</button>
</div>

<div class="feedback-flash" id="feedback-flash"></div>

<script>
const tg     = window.Telegram?.WebApp;
const userId = tg?.initDataUnsafe?.user?.id || Math.random().toString(36).slice(2);
const userName = tg?.initDataUnsafe?.user?.first_name || "Jugador";

if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#0a0a0a"); tg.setBackgroundColor("#0a0a0a"); }

// ── GAME STATE ──────────────────────────────────────────────
const ROUNDS     = 5;
const BPM_LIST   = [70,80,85,90,95,100,105,110,115,120,125,128,130,135,140,145,150,155,160,170,180];
const GAME_GENRES= ["Trap","Reggaeton","Pop Latino","Afrobeats","Lo-Fi","Hip-Hop","House","Drum & Bass"];

let state = {
  round: 0, score: 0, targetBPM: 0, userBPM: 130,
  timerInterval: null, beatInterval: null, visualInterval: null,
  timeLeft: 15, tapTimes: [], roundBPMs: []
};

let highScore = parseInt(localStorage.getItem("bpm_hs") || "0");

// ── AUDIO CONTEXT ──────────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playClick(isAccent = false) {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = isAccent ? 1200 : 800;
    osc.type = "square";
    gain.gain.setValueAtTime(isAccent ? 0.3 : 0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.05);
  } catch(e) {}
}

function playBeat(bpm) {
  clearInterval(state.beatInterval);
  let beat = 0;
  const interval = (60 / bpm) * 1000;
  state.beatInterval = setInterval(() => {
    playClick(beat % 4 === 0);
    animateBars(beat % 4 === 0);
    beat++;
  }, interval);
}

// ── VISUALIZER ────────────────────────────────────────────
function buildVisualizer() {
  const el = document.getElementById("beat-visual");
  el.innerHTML = "";
  for (let i = 0; i < 24; i++) {
    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = "20%";
    el.appendChild(bar);
  }
}

function animateBars(isAccent) {
  const bars = document.querySelectorAll(".bar");
  bars.forEach((bar, i) => {
    bar.classList.remove("active");
    const h = isAccent
      ? 30 + Math.random() * 70
      : 10 + Math.random() * 40;
    bar.style.height = h + "%";
    if (Math.random() > 0.5) bar.classList.add("active");
  });
  setTimeout(() => bars.forEach(b => {
    b.classList.remove("active");
    b.style.height = "15%";
  }), 80);
}

// ── ROUND DOTS ────────────────────────────────────────────
function buildDots() {
  const el = document.getElementById("round-dots");
  el.innerHTML = "";
  for (let i = 0; i < ROUNDS; i++) {
    const d = document.createElement("div");
    d.className = "round-dot" + (i < state.round ? " done" : i === state.round ? " current" : "");
    el.appendChild(d);
  }
}

// ── START GAME ────────────────────────────────────────────
function startGame() {
  state = { round:0, score:0, targetBPM:0, userBPM:130,
            timerInterval:null, beatInterval:null, visualInterval:null,
            timeLeft:15, tapTimes:[], roundBPMs:[] };
  if (highScore > 0) {
    document.getElementById("intro-hs").innerHTML =
      `Tu récord: <span>${highScore} pts</span>`;
  }
  showScreen("game-screen");
  buildVisualizer();
  startRound();
}

// ── START ROUND ───────────────────────────────────────────
function startRound() {
  // Pick random BPM not used yet
  let available = BPM_LIST.filter(b => !state.roundBPMs.includes(b));
  state.targetBPM = available[Math.floor(Math.random() * available.length)];
  state.roundBPMs.push(state.targetBPM);
  state.userBPM   = 130;
  state.tapTimes  = [];
  state.timeLeft  = 15;

  // Genre hint
  const genre = GAME_GENRES[Math.floor(Math.random() * GAME_GENRES.length)];
  document.getElementById("bpm-range-hint").textContent =
    "Estilo: " + genre;

  // UI
  document.getElementById("round-display").textContent = (state.round+1) + "/" + ROUNDS;
  document.getElementById("score-display").textContent = state.score;
  document.getElementById("bpm-slider").value = 130;
  document.getElementById("bpm-current-val").textContent = 130;
  document.getElementById("tap-info").textContent = "Toca para detectar el BPM";
  document.getElementById("tap-bpm").textContent = "";
  buildDots();

  // Start beat
  playBeat(state.targetBPM);

  // Timer
  clearInterval(state.timerInterval);
  document.getElementById("timer-bar").style.width = "100%";
  state.timerInterval = setInterval(() => {
    state.timeLeft -= 0.1;
    const pct = (state.timeLeft / 15) * 100;
    document.getElementById("timer-bar").style.width = Math.max(0,pct) + "%";
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      submitAnswer();
    }
  }, 100);
}

// ── SLIDER ────────────────────────────────────────────────
function updateSlider(val) {
  state.userBPM = parseInt(val);
  document.getElementById("bpm-current-val").textContent = val;
}

// ── TAP TEMPO ─────────────────────────────────────────────
function tapTempo() {
  const now = Date.now();
  state.tapTimes.push(now);
  if (state.tapTimes.length > 8) state.tapTimes.shift();

  if (tg) tg.HapticFeedback?.impactOccurred("light");

  if (state.tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < state.tapTimes.length; i++) {
      intervals.push(state.tapTimes[i] - state.tapTimes[i-1]);
    }
    const avgInterval = intervals.reduce((a,b)=>a+b,0) / intervals.length;
    const detectedBPM = Math.round(60000 / avgInterval);
    const clampedBPM  = Math.min(200, Math.max(60, detectedBPM));

    state.userBPM = clampedBPM;
    document.getElementById("bpm-slider").value = clampedBPM;
    document.getElementById("bpm-current-val").textContent = clampedBPM;
    document.getElementById("tap-bpm").textContent = clampedBPM;
    document.getElementById("tap-info").textContent =
      state.tapTimes.length >= 4 ? "BPM detectado ✓" : "Sigue tocando...";
  }
}

// ── SUBMIT ────────────────────────────────────────────────
function submitAnswer() {
  clearInterval(state.timerInterval);
  clearInterval(state.beatInterval);

  const diff   = Math.abs(state.userBPM - state.targetBPM);
  let pts      = 0;
  let icon     = "💀";
  let title    = "¡Muy lejos!";
  let valClass = "wrong";

  if (diff === 0)       { pts=500; icon="🎯"; title="¡PERFECTO!"; valClass="correct"; }
  else if (diff <= 2)   { pts=400; icon="🔥"; title="¡Increíble!"; valClass="correct"; }
  else if (diff <= 5)   { pts=300; icon="⭐"; title="¡Muy bien!"; valClass="correct"; }
  else if (diff <= 10)  { pts=200; icon="👍"; title="¡Bien!"; valClass="close"; }
  else if (diff <= 20)  { pts=100; icon="😅"; title="Cerca..."; valClass="close"; }
  else if (diff <= 35)  { pts=50;  icon="😬"; title="Lejos..."; valClass="wrong"; }
  else                  { pts=0;   icon="💀"; title="¡Muy lejos!"; valClass="wrong"; }

  // Time bonus
  const timeBonus = Math.round((state.timeLeft / 15) * 50);
  if (pts > 0) pts += timeBonus;

  state.score += pts;
  showFeedback(icon);

  // Show result
  document.getElementById("result-icon").textContent = icon;
  document.getElementById("result-title").textContent = title;
  document.getElementById("points-gained").textContent = "+" + pts;
  document.getElementById("real-bpm-val").innerHTML =
    `<span class="correct">${state.targetBPM} BPM</span>`;
  document.getElementById("user-bpm-val").innerHTML =
    `<span class="${valClass}">${state.userBPM} BPM</span>`;
  document.getElementById("diff-val").innerHTML =
    `<span class="${valClass}">${diff === 0 ? "¡Exacto!" : "±" + diff + " BPM"}</span>`;

  if (tg) {
    if (pts >= 400) tg.HapticFeedback?.notificationOccurred("success");
    else if (pts >= 100) tg.HapticFeedback?.notificationOccurred("warning");
    else tg.HapticFeedback?.notificationOccurred("error");
  }

  showScreen("result-screen");
}

// ── FEEDBACK FLASH ────────────────────────────────────────
function showFeedback(icon) {
  const el = document.getElementById("feedback-flash");
  el.textContent = icon;
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

// ── NEXT ROUND ────────────────────────────────────────────
function nextRound() {
  state.round++;
  if (state.round >= ROUNDS) {
    endGame();
  } else {
    showScreen("game-screen");
    startRound();
  }
}

// ── END GAME ──────────────────────────────────────────────
function endGame() {
  clearInterval(state.beatInterval);

  const maxScore = ROUNDS * 550;
  const pct      = state.score / maxScore;
  let grade, emoji, stars;

  if (pct >= 0.95)      { grade="LEGENDARIO 🏆"; emoji="👑"; stars="⭐⭐⭐⭐⭐"; }
  else if (pct >= 0.80) { grade="MAESTRO 🎛️";   emoji="🏆"; stars="⭐⭐⭐⭐"; }
  else if (pct >= 0.60) { grade="PRO 🎵";        emoji="🎯"; stars="⭐⭐⭐"; }
  else if (pct >= 0.40) { grade="APRENDIZ 🎤";   emoji="🎵"; stars="⭐⭐"; }
  else                  { grade="NOVATO 🥁";     emoji="💀"; stars="⭐"; }

  // Save highscore
  if (state.score > highScore) {
    highScore = state.score;
    localStorage.setItem("bpm_hs", highScore);
    saveScore();
  }

  document.getElementById("final-emoji").textContent = emoji;
  document.getElementById("final-grade").textContent = grade;
  document.getElementById("final-score-val").textContent = state.score;
  document.getElementById("final-stars").textContent = stars;

  if (tg && pct >= 0.8) tg.HapticFeedback?.notificationOccurred("success");

  loadLeaderboard();
  showScreen("final-screen");
}

// ── SAVE / LOAD SCORES ────────────────────────────────────
async function saveScore() {
  try {
    await fetch("/api/bpm/score", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({user_id: userId, name: userName, score: state.score})
    });
  } catch(e) {}
}

async function loadLeaderboard() {
  try {
    const res  = await fetch("/api/bpm/leaderboard");
    const data = await res.json();
    const medals = ["🥇","🥈","🥉"];
    document.getElementById("lb-rows").innerHTML = data.slice(0,5).map((r,i) =>
      `<div class="lb-row">
        <span class="lb-pos">${medals[i]||"·"}</span>
        <span class="lb-name">${escHtml(r.name)}</span>
        <span class="lb-pts">${r.score} pts</span>
      </div>`
    ).join("") || "<div style='color:var(--muted);font-size:13px'>Sé el primero 🏆</div>";
  } catch(e) {
    document.getElementById("lb-rows").innerHTML =
      "<div style='color:var(--muted);font-size:13px'>Sin datos aún</div>";
  }
}

// ── UTILS ─────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function escHtml(str) {
  return String(str||"").replace(/[&<>"']/g, m =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

// Init
if (highScore > 0) {
  document.getElementById("intro-hs").innerHTML =
    `Tu récord: <span style="color:var(--gold);font-weight:700">${highScore} pts</span>`;
}
</script>
