<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Comparador 360° — Mkeyz Studio</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04040e;
      --surface: #0a0c1a;
      --border: #1a1d35;
      --gold: #f0b90b;
      --fire: #ff3b3b;
      --green: #00e676;
      --blue: #4fc3f7;
      --purple: #b388ff;
      --orange: #ff9800;
      --text: #e8e8f0;
      --muted: #5a5d6e;
      --radius: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 12px 8px 80px;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: ''; position: fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse at 20% 20%, rgba(255,59,59,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 30%, rgba(79,195,247,0.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 70%, rgba(240,185,11,0.04) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift { 0%{opacity:0.6;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }
    .app-container { width:100%; max-width:560px; margin:0 auto; position:relative; z-index:1; }

    .header { text-align:center; padding:20px 0 8px; }
    .header h1 {
      font-size:26px; font-weight:900; letter-spacing:-1.5px;
      background: linear-gradient(135deg, #fff 0%, var(--fire) 30%, var(--blue) 60%, var(--gold) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow { 0%{filter:brightness(1)} 100%{filter:brightness(1.3)} }
    .header p { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

    /* Search Arena */
    .arena { display:grid; grid-template-columns:1fr auto 1fr; gap:4px; margin:16px 0; align-items:center; }
    .search-card {
      background:var(--surface); border:2px solid var(--border); border-radius:var(--radius);
      padding:14px; transition:all 0.3s; backdrop-filter:blur(10px);
    }
    .search-card.a1:focus-within { border-color:var(--fire); box-shadow:0 0 24px rgba(255,59,59,0.3); }
    .search-card.a2:focus-within { border-color:var(--blue); box-shadow:0 0 24px rgba(79,195,247,0.3); }
    .search-label { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:6px; font-weight:700; }
    .search-input {
      width:100%; background:transparent; border:none; color:var(--text); font-size:13px; font-weight:600;
      outline:none; padding:2px 0;
    }
    .search-input::placeholder { color:var(--muted); font-weight:400; }
    .vs-badge {
      width:42px; height:42px; border-radius:50%;
      background:linear-gradient(135deg, var(--fire), var(--blue));
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:14px; color:#fff; flex-shrink:0;
      box-shadow:0 0 24px rgba(255,255,255,0.3), 0 0 40px rgba(255,59,59,0.3);
      animation: vsPulse 2s ease-in-out infinite;
    }
    @keyframes vsPulse { 0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.3)} 50%{box-shadow:0 0 30px rgba(255,255,255,0.5),0 0 50px rgba(255,59,59,0.4)} }

    .btn-battle {
      width:100%; padding:16px; border:none; border-radius:20px;
      background:linear-gradient(135deg, var(--fire), var(--blue));
      font-size:16px; font-weight:800; color:#fff; cursor:pointer; margin:8px 0;
      letter-spacing:1.5px; box-shadow:0 8px 30px rgba(255,59,59,0.4);
      transition:all 0.2s; position:relative; overflow:hidden;
    }
    .btn-battle::after {
      content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
      background:linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
      animation: btnShine 3s ease-in-out infinite;
    }
    @keyframes btnShine { 0%{transform:translateX(-100%) rotate(45deg)} 100%{transform:translateX(100%) rotate(45deg)} }
    .btn-battle:active { transform:scale(0.96); }
    .btn-battle:disabled { opacity:0.4; pointer-events:none; }

    /* Tabs slider */
    .tabs-scroll {
      display:flex; gap:6px; margin:10px 0; overflow-x:auto; padding:4px 0 8px;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    .tabs-scroll::-webkit-scrollbar { height:4px; background:transparent; }
    .tabs-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
    .tab {
      padding:10px 16px; border-radius:20px; border:2px solid var(--border);
      background:rgba(10,12,26,0.7); color:var(--muted); font-weight:700; font-size:11px;
      cursor:pointer; transition:all 0.3s; white-space:nowrap; flex-shrink:0;
      backdrop-filter:blur(8px);
    }
    .tab.active { border-color:var(--gold); color:var(--gold); background:rgba(240,185,11,0.08); box-shadow:0 0 16px rgba(240,185,11,0.2); }

    /* Battle Area */
    .battle-stage { animation: stageEnter 0.5s ease; }
    @keyframes stageEnter { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .winner-spotlight { text-align:center; padding:12px 0; }
    .crown { font-size:44px; animation: floatCrown 2s ease-in-out infinite; display:inline-block; }
    @keyframes floatCrown { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .winner-name { font-size:22px; font-weight:900; color:var(--gold); margin:2px 0; }

    .player-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
    .player-card {
      background:var(--surface); border:2px solid var(--border); border-radius:var(--radius);
      padding:16px; text-align:center; position:relative; overflow:hidden;
      backdrop-filter:blur(12px); transition:all 0.4s;
      animation: cardPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .player-card:nth-child(1) { animation-delay:0.1s; }
    .player-card:nth-child(2) { animation-delay:0.2s; }
    @keyframes cardPop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
    .player-card.p1 { border-color:#ff3b3b44; }
    .player-card.p1::after { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, transparent, var(--fire), transparent); animation: glowLine 2s ease-in-out infinite alternate; }
    .player-card.p2 { border-color:#4fc3f744; }
    .player-card.p2::after { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, transparent, var(--blue), transparent); animation: glowLine 2s ease-in-out infinite alternate 0.5s; }
    @keyframes glowLine { 0%{opacity:0.6} 100%{opacity:1} }
    .avatar { width:64px; height:64px; border-radius:50%; object-fit:cover; margin-bottom:6px; border:3px solid var(--border); box-shadow:0 0 20px rgba(0,0,0,0.5); }
    .avatar-placeholder { width:64px; height:64px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 6px; }
    .player-name { font-size:14px; font-weight:800; letter-spacing:-0.3px; }
    .player-listeners { font-size:10px; color:var(--gold); font-weight:600; margin:2px 0; }
    .player-score { font-size:28px; font-weight:900; margin:6px 0 2px; }
    .tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:6px; justify-content:center; }
    .tag { padding:3px 8px; border-radius:100px; font-size:8px; font-weight:600; background:var(--border); color:var(--muted); border:1px solid rgba(255,255,255,0.05); }

    .section-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:16px; margin-bottom:10px; backdrop-filter:blur(8px);
      animation: sectionSlide 0.5s ease both;
    }
    @keyframes sectionSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .section-title { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; font-weight:700; text-align:center; }
    canvas { display:block; margin:0 auto; border-radius:12px; }

    .bar-row { margin-bottom:8px; }
    .bar-label { display:flex; justify-content:space-between; font-size:10px; margin-bottom:3px; }
    .bar-outer { background:var(--border); border-radius:10px; height:8px; overflow:hidden; display:flex; }
    .bar-inner { height:100%; transition:width 1s cubic-bezier(0.34,1.56,0.64,1); }
    .bar-red { background:linear-gradient(90deg, var(--fire), #ff8c00); box-shadow:0 0 6px rgba(255,59,59,0.5); }
    .bar-blue { background:linear-gradient(90deg, var(--blue), #00bcd4); box-shadow:0 0 6px rgba(79,195,247,0.5); }

    .stat-compare { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; align-items:center; }
    .stat-compare:last-child { border-bottom:none; }
    .stat-icon { font-size:14px; margin-right:6px; }
    .stat-vals { display:flex; gap:8px; font-weight:700; }

    .sentiment-bar { height:8px; border-radius:10px; margin:3px 0 8px; overflow:hidden; display:flex; }
    .sent-pos { background:linear-gradient(90deg, var(--green), #00c853); }
    .sent-neg { background:linear-gradient(90deg, var(--fire), #d50000); }
    .sent-neu { background:linear-gradient(90deg, var(--muted), #888); }

    .track-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:11px; }
    .track-pos { width:20px; font-weight:700; color:var(--muted); }
    .track-info { flex:1; }
    .track-title { font-weight:600; }
    .track-plays { font-size:9px; color:var(--muted); }

    .history-select { width:100%; padding:8px; background:var(--border); color:var(--text); border-radius:8px; border:none; margin-bottom:8px; font-size:11px; outline:none; }
    .prediction { font-size:11px; color:var(--gold); text-align:center; margin-top:8px; font-weight:600; }

    .share-btn {
      width:100%; padding:12px; border-radius:20px; border:2px solid var(--gold);
      background:transparent; color:var(--gold); font-weight:700; font-size:12px;
      cursor:pointer; margin-top:8px; text-align:center; transition:all 0.2s;
    }
    .share-btn:active { background:rgba(240,185,11,0.1); box-shadow:0 0 16px rgba(240,185,11,0.3); }

    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#fff; color:#000; padding:10px 20px; border-radius:100px; font-weight:700; z-index:999; transition:transform 0.3s; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .loading { text-align:center; padding:20px; color:var(--muted); font-size:12px; }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--fire); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 8px; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>Comparador 360°</h1>
    <p>Análisis multidimensional de artistas</p>
  </div>

  <div class="arena">
    <div class="search-card a1">
      <div class="search-label" style="color:var(--fire)">🔴 Artista 1</div>
      <input class="search-input" id="artist1" placeholder="Jeff Mkeyz" value="Jeff Mkeyz">
    </div>
    <div class="vs-badge">VS</div>
    <div class="search-card a2">
      <div class="search-label" style="color:var(--blue)">🔵 Artista 2</div>
      <input class="search-input" id="artist2" placeholder="Bad Bunny">
    </div>
  </div>

  <button class="btn-battle" id="btn-compare" onclick="compare()">⚡ INICIAR BATALLA</button>

  <div class="tabs-scroll" id="tabs-bar">
    <button class="tab active" data-tab="comparison">📊 Radar</button>
    <button class="tab" data-tab="history">📈 Historial</button>
    <button class="tab" data-tab="tracks">🎵 Canciones</button>
    <button class="tab" data-tab="awards">🏆 Premios</button>
    <button class="tab" data-tab="discography">💿 Discografía</button>
    <button class="tab" data-tab="fans">🎧 Fans</button>
    <button class="tab" data-tab="sentiment">🧠 Sentimiento</button>
  </div>

  <div id="tab-content"></div>
  <button class="share-btn" id="share-btn" style="display:none" onclick="shareComparison()">📤 Compartir resultados</button>
</div>
<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#04040e"); tg.setBackgroundColor("#04040e"); }

  const LF_KEY = "1820e2706ba7dbb030a6d2de30f2b2cf";
  let lastData = null, currentTab = 'comparison', cached = {};

  function fmt(n) {
    if (!n) return "N/D";
    n = parseInt(n);
    if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
    if (n >= 1e3) return (n/1e3).toFixed(0)+"K";
    return n.toLocaleString();
  }

  // Tab switching
  document.getElementById('tabs-bar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    currentTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');
    renderTab();
  });

  // APIs gratuitas
  async function fetchLastfm(name) {
    if (cached[name]) return cached[name];
    const url = `https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=${encodeURIComponent(name)}&api_key=${LF_KEY}&format=json`;
    const r = await fetch(url); const d = await r.json();
    if (d.error) throw new Error(d.message);
    cached[name] = d.artist; return d.artist;
  }

  async function fetchTopTracks(name) {
    const url = `https://ws.audioscrobbler.com/2.0/?method=artist.gettoptracks&artist=${encodeURIComponent(name)}&api_key=${LF_KEY}&format=json&limit=6`;
    const r = await fetch(url); const d = await r.json();
    return (d.toptracks?.track||[]).slice(0,6);
  }

  async function fetchWikidataAwards(artistName) {
    try {
      const query = `SELECT ?item ?itemLabel ?award ?awardLabel WHERE { ?item rdfs:label "${artistName}"@en. ?item wdt:P166 ?award. SERVICE wikibase:label { bd:serviceParam wikibase:language "es,en". } } LIMIT 30`;
      const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(query)}`;
      const r = await fetch(url); const d = await r.json();
      return d.results?.bindings?.length || 0;
    } catch(e) { return 0; }
  }

  async function fetchMusicBrainz(artistName) {
    try {
      const url = `https://musicbrainz.org/ws/2/artist/?query=${encodeURIComponent(artistName)}&fmt=json&limit=1`;
      const r = await fetch(url); const d = await r.json();
      const artist = d.artists?.[0];
      if (!artist) return { albums:0, since:'N/D', country:'N/D' };
      const releasesUrl = `https://musicbrainz.org/ws/2/release-group/?artist=${artist.id}&fmt=json&limit=100&type=album`;
      const rr = await fetch(releasesUrl); const rd = await rr.json();
      return { albums:rd['release-groups']?.length||0, since:artist['life-span']?.begin||'N/D', country:artist.country||'N/D' };
    } catch(e) { return { albums:0, since:'N/D', country:'N/D' }; }
  }

  async function fetchDeezerFans(artistName) {
    try {
      const url = `https://api.deezer.com/search/artist?q=${encodeURIComponent(artistName)}&limit=1`;
      const r = await fetch(url); const d = await r.json();
      return d.data?.[0]?.nb_fan || 0;
    } catch(e) { return 0; }
  }

  async function fetchLyrics(artist, track) {
    try {
      const url = `https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(track)}`;
      const r = await fetch(url); const d = await r.json();
      return d.lyrics || '';
    } catch(e) { return ''; }
  }

  function analyzeSentiment(text) {
    if (!text) return { positive:0, negative:0, neutral:100 };
    const lower = text.toLowerCase();
    const positive = ['love','bailar','fiesta','alegre','feliz','beso','bella','hermoso','vida','sueño','éxito','triunfo','oro','brillar','luz','calor','paz','amar','gozar','celebrar','dance','party','happy','smile','sunshine','baby','good','nice','sweet'];
    const negative = ['dolor','triste','llorar','sufrir','odio','perder','solo','oscuro','muerte','adiós','fracaso','caer','roto','vacío','guerra','fuego','sangre','miedo','noche','frío','pain','cry','hate','alone','dark','dead','broken','empty','war','fire'];
    let pos=0, neg=0;
    const words = lower.split(/\s+/);
    words.forEach(w => { if (positive.includes(w)) pos++; if (negative.includes(w)) neg++; });
    const total = pos+neg || 1;
    return { positive:Math.round(pos/total*100), negative:Math.round(neg/total*100), neutral:Math.round((1-(pos+neg)/words.length)*100) };
  }

  function calcDims(a) {
    const l = parseInt(a.stats?.listeners||0), p = parseInt(a.stats?.playcount||0);
    const tc = (a.tags?.tag||[]).length;
    return {
      popularity:Math.min(100,Math.round(Math.log10(l+1)*15)),
      engagement:Math.min(100,Math.round(Math.log10((l>0?p/l:0)+1)*25)),
      versatility:Math.min(100,tc*12+10),
      consistency:Math.min(100,Math.round((p/(l||1))*5)),
      reach:Math.min(100,Math.round(Math.sqrt(l/1e3)*2)),
      impact:Math.min(100,Math.round(Math.log10(p+1)*10))
    };
  }

  function saveHistory(name, m) {
    const h = JSON.parse(localStorage.getItem('ah')||'{}');
    if (!h[name]) h[name]=[];
    h[name].push({date:new Date().toISOString().slice(0,10),listeners:m.listeners,plays:m.plays,score:m.score});
    if (h[name].length>30) h[name].shift();
    localStorage.setItem('ah',JSON.stringify(h));
  }

  function drawRadar(canvas, d1, d2) {
    const ctx = canvas.getContext('2d'); const s=240;
    canvas.width=s*devicePixelRatio; canvas.height=s*devicePixelRatio;
    canvas.style.width=s+'px'; canvas.style.height=s+'px';
    ctx.scale(devicePixelRatio,devicePixelRatio);
    const cx=s/2, cy=s/2, r=85;
    const keys=['popularity','engagement','versatility','consistency','reach','impact'];
    const labels=['Pop','Eng','Ver','Con','Alc','Imp']; const n=keys.length;
    ctx.clearRect(0,0,s,s);
    for (let lv=1; lv<=4; lv++) {
      ctx.beginPath();
      for (let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2; const x=cx+Math.cos(a)*r*(lv/4), y=cy+Math.sin(a)*r*(lv/4); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.closePath(); ctx.strokeStyle='#1a1d35'; ctx.lineWidth=1; ctx.stroke();
    }
    [d1,d2].forEach((d,idx)=>{
      ctx.beginPath();
      for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2; const v=(d[keys[i]]||50)/100; const x=cx+Math.cos(a)*r*v, y=cy+Math.sin(a)*r*v; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.closePath(); ctx.fillStyle=idx===0?'rgba(255,59,59,0.15)':'rgba(79,195,247,0.15)'; ctx.fill();
      ctx.strokeStyle=idx===0?'#ff3b3b':'#4fc3f7'; ctx.lineWidth=2.5; ctx.stroke();
    });
    for (let i=0;i<n;i++){const a=(Math.PI*2/n)*i-Math.PI/2; ctx.fillStyle='#5a5d6e'; ctx.font='7px Inter'; ctx.textAlign='center'; ctx.fillText(labels[i],cx+Math.cos(a)*(r+14),cy+Math.sin(a)*(r+14));}
  }

  function drawHistory(canvas, data) {
    const ctx=canvas.getContext('2d'); const W=canvas.offsetWidth*devicePixelRatio, H=170*devicePixelRatio;
    canvas.width=W; canvas.height=H; canvas.style.width=canvas.offsetWidth+'px'; canvas.style.height='170px';
    ctx.scale(devicePixelRatio,devicePixelRatio);
    const pad=28, w=canvas.offsetWidth-pad*2, h=170-pad*2;
    const maxS=Math.max(...data.map(d=>d.score),1), minS=Math.min(...data.map(d=>d.score),0);
    ctx.clearRect(0,0,canvas.offsetWidth,170);
    ctx.strokeStyle='#1a1d35'; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pad+(h/4)*i; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(canvas.offsetWidth-pad,y); ctx.stroke();}
    ctx.beginPath(); ctx.strokeStyle='#ff3b3b'; ctx.lineWidth=2.5; ctx.shadowColor='#ff3b3b'; ctx.shadowBlur=8;
    data.forEach((d,i)=>{const x=pad+(w/(data.length-1))*i, y=pad+h-((d.score-minS)/(maxS-minS||1))*h; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke(); ctx.shadowBlur=0;
    data.forEach((d,i)=>{const x=pad+(w/(data.length-1))*i, y=pad+h-((d.score-minS)/(maxS-minS||1))*h; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fillStyle='#ff3b3b'; ctx.fill();});
    return data;
  }

  function renderTab() {
    const c = document.getElementById('tab-content');
    if (!lastData && currentTab!=='history') { c.innerHTML='<div class="loading">⚡ Inicia una batalla para ver los resultados</div>'; return; }
    if (currentTab==='comparison') renderComparison(c);
    if (currentTab==='history') renderHistoryTab(c);
    if (currentTab==='tracks') renderTracks(c);
    if (currentTab==='awards') renderAwards(c);
    if (currentTab==='discography') renderDiscography(c);
    if (currentTab==='fans') renderFans(c);
    if (currentTab==='sentiment' && lastData) renderSentiment(c);
  }

  function renderComparison(c) {
    const d=lastData;
    c.innerHTML = `
      <div class="battle-stage">
        <div class="winner-spotlight"><div class="crown">👑</div><div class="winner-name">${d.winner}</div></div>
        <div class="player-row">
          <div class="player-card p1">${d.img1?`<img class="avatar" src="${d.img1}">`:'<div class="avatar-placeholder">🎤</div>'}<div class="player-name" style="color:var(--fire)">${d.name1}</div><div class="player-listeners">${fmt(d.l1)} oyentes</div><div class="player-score" style="color:var(--fire)">${d.t1}</div><div class="tags">${(d.tags1||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>
          <div class="player-card p2">${d.img2?`<img class="avatar" src="${d.img2}">`:'<div class="avatar-placeholder">🎤</div>'}<div class="player-name" style="color:var(--blue)">${d.name2}</div><div class="player-listeners">${fmt(d.l2)} oyentes</div><div class="player-score" style="color:var(--blue)">${d.t2}</div><div class="tags">${(d.tags2||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>
        </div>
        <div class="section-card"><div class="section-title">📊 Radar Multidimensional</div><canvas id="radarChart"></canvas></div>
        <div class="section-card"><div class="section-title">📈 Estadísticas</div>${d.bars.map(b=>`<div class="bar-row"><div class="bar-label"><span style="color:var(--muted)">${b.label}</span><span><span style="color:var(--fire)">${b.v1}</span> · <span style="color:var(--blue)">${b.v2}</span></span></div><div class="bar-outer"><div class="bar-inner bar-red" style="width:${b.p1}%"></div><div class="bar-inner bar-blue" style="width:${b.p2}%"></div></div></div>`).join('')}</div>
      </div>`;
    setTimeout(()=>drawRadar(document.getElementById('radarChart'),d.dims1,d.dims2),60);
  }

  function renderHistoryTab(c) {
    const h=JSON.parse(localStorage.getItem('ah')||'{}'); const names=Object.keys(h);
    if(!names.length){c.innerHTML='<div class="section-card"><div class="section-title">📈 Historial</div><div style="text-align:center;color:var(--muted);padding:20px;">Sin historial. Compara artistas primero.</div></div>';return;}
    c.innerHTML=`<div class="section-card"><div class="section-title">📈 Historial de Crecimiento</div><select class="history-select" id="hs">${names.map(n=>`<option>${n}</option>`).join('')}</select><canvas id="hc"></canvas><div class="prediction" id="pt"></div></div>`;
    const upd=()=>{
      const data=h[document.getElementById('hs').value]||[];
      if(data.length<2){document.getElementById('pt').textContent='Necesita 2+ puntos';return;}
      drawHistory(document.getElementById('hc'),data);
      const n=data.length; let sx=0,sy=0,sxy=0,sx2=0;
      data.forEach((d,i)=>{sx+=i;sy+=d.score;sxy+=i*d.score;sx2+=i*i;});
      const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);
      document.getElementById('pt').textContent=`📈 Tendencia: ${slope>0?'+'+slope.toFixed(1):slope.toFixed(1)} pts/día · Proy. 30d: ${Math.round(slope*30+data[data.length-1].score)} pts`;
    };
    document.getElementById('hs').addEventListener('change',upd); setTimeout(upd,100);
  }

  function renderTracks(c) {
    const d=lastData;
    c.innerHTML=`<div class="section-card"><div class="section-title">🎵 Top ${d.name1}</div>${(d.tr1||[]).map((t,i)=>`<div class="track-item"><span class="track-pos">${i+1}</span><div class="track-info"><div class="track-title">${t.name}</div><div class="track-plays">${fmt(t.playcount)} plays</div></div></div>`).join('')||'<div style="color:var(--muted);font-size:12px;text-align:center;">Sin datos</div>'}</div><div class="section-card"><div class="section-title">🎵 Top ${d.name2}</div>${(d.tr2||[]).map((t,i)=>`<div class="track-item"><span class="track-pos">${i+1}</span><div class="track-info"><div class="track-title">${t.name}</div><div class="track-plays">${fmt(t.playcount)} plays</div></div></div>`).join('')||'<div style="color:var(--muted);font-size:12px;text-align:center;">Sin datos</div>'}</div>`;
  }

  function renderAwards(c) {
    const d=lastData;
    if (d.awards1==null||d.awards2==null) { c.innerHTML='<div class="loading"><div class="spinner"></div>Cargando premios...</div>'; return; }
    const max=Math.max(d.awards1,d.awards2,1);
    c.innerHTML=`<div class="section-card"><div class="section-title">🏆 Premios (Wikidata)</div><div class="stat-compare"><span class="stat-icon">🔴</span><span style="color:var(--fire);flex:1">${d.name1}</span><span style="color:var(--fire);font-weight:900">${d.awards1}</span></div><div class="stat-compare"><span class="stat-icon">🔵</span><span style="color:var(--blue);flex:1">${d.name2}</span><span style="color:var(--blue);font-weight:900">${d.awards2}</span></div><div class="bar-row" style="margin-top:10px"><div class="bar-outer"><div class="bar-inner bar-red" style="width:${(d.awards1/max*100).toFixed(0)}%"></div><div class="bar-inner bar-blue" style="width:${(d.awards2/max*100).toFixed(0)}%"></div></div></div></div>`;
  }

  function renderDiscography(c) {
    const d=lastData;
    if (d.disc1==null||d.disc2==null){c.innerHTML='<div class="loading"><div class="spinner"></div>Cargando discografía...</div>';return;}
    c.innerHTML=`<div class="section-card"><div class="section-title">💿 Discografía (MusicBrainz)</div><div class="stat-compare"><span style="color:var(--muted)">Álbumes</span><span><span style="color:var(--fire);font-weight:700">${d.disc1.albums}</span> · <span style="color:var(--blue);font-weight:700">${d.disc2.albums}</span></span></div><div class="stat-compare"><span style="color:var(--muted)">Desde</span><span><span style="color:var(--fire)">${d.disc1.since}</span> · <span style="color:var(--blue)">${d.disc2.since}</span></span></div><div class="stat-compare"><span style="color:var(--muted)">País</span><span><span style="color:var(--fire)">${d.disc1.country}</span> · <span style="color:var(--blue)">${d.disc2.country}</span></span></div></div>`;
  }

  function renderFans(c) {
    const d=lastData;
    if (d.deezer1==null||d.deezer2==null){c.innerHTML='<div class="loading"><div class="spinner"></div>Cargando fans...</div>';return;}
    const maxF=Math.max(d.deezer1,d.deezer2,1);
    c.innerHTML=`<div class="section-card"><div class="section-title">🎧 Fans en Deezer</div><div class="stat-compare"><span class="stat-icon">🔴</span><span style="color:var(--fire);flex:1">${d.name1}</span><span style="color:var(--fire);font-weight:900">${fmt(d.deezer1)}</span></div><div class="stat-compare"><span class="stat-icon">🔵</span><span style="color:var(--blue);flex:1">${d.name2}</span><span style="color:var(--blue);font-weight:900">${fmt(d.deezer2)}</span></div><div class="bar-row" style="margin-top:10px"><div class="bar-outer"><div class="bar-inner bar-red" style="width:${(d.deezer1/maxF*100).toFixed(0)}%"></div><div class="bar-inner bar-blue" style="width:${(d.deezer2/maxF*100).toFixed(0)}%"></div></div></div></div>`;
  }

  function renderSentiment(c) {
    const d=lastData;
    if (d.sent1==null||d.sent2==null){c.innerHTML='<div class="loading"><div class="spinner"></div>Analizando letras...</div>';return;}
    c.innerHTML=`<div class="section-card"><div class="section-title">🧠 Sentimiento de Letras</div><div style="margin-bottom:12px"><div style="font-size:10px;color:var(--fire);margin-bottom:2px">${d.name1}</div><div class="sentiment-bar"><div class="sent-pos" style="width:${d.sent1.positive}%"></div><div class="sent-neu" style="width:${d.sent1.neutral}%"></div><div class="sent-neg" style="width:${d.sent1.negative}%"></div></div><div style="font-size:8px;color:var(--muted);display:flex;justify-content:space-between"><span>😊 ${d.sent1.positive}%</span><span>😐 ${d.sent1.neutral}%</span><span>😢 ${d.sent1.negative}%</span></div></div><div><div style="font-size:10px;color:var(--blue);margin-bottom:2px">${d.name2}</div><div class="sentiment-bar"><div class="sent-pos" style="width:${d.sent2.positive}%"></div><div class="sent-neu" style="width:${d.sent2.neutral}%"></div><div class="sent-neg" style="width:${d.sent2.negative}%"></div></div><div style="font-size:8px;color:var(--muted);display:flex;justify-content:space-between"><span>😊 ${d.sent2.positive}%</span><span>😐 ${d.sent2.neutral}%</span><span>😢 ${d.sent2.negative}%</span></div></div></div>`;
  }

  async function compare() {
    const n1=document.getElementById('artist1').value.trim(), n2=document.getElementById('artist2').value.trim();
    if(!n1||!n2) return showToast('Escribe ambos artistas');
    document.getElementById('tab-content').innerHTML='<div class="loading"><div class="spinner"></div>Analizando artistas...</div>';
    document.getElementById('btn-compare').disabled=true;
    document.getElementById('share-btn').style.display='none';

    try {
      const [a1,a2]=await Promise.all([fetchLastfm(n1),fetchLastfm(n2)]);
      const dims1=calcDims(a1), dims2=calcDims(a2);
      const l1=parseInt(a1.stats?.listeners||0), l2=parseInt(a2.stats?.listeners||0);
      const p1=parseInt(a1.stats?.playcount||0), p2=parseInt(a2.stats?.playcount||0);
      const t1=Object.values(dims1).reduce((a,b)=>a+b,0), t2=Object.values(dims2).reduce((a,b)=>a+b,0);
      const winner=l1>l2?a1.name:l2>l1?a2.name:'Empate';
      const img1=a1.image?.find(i=>i.size==="large")?.["#text"]||"", img2=a2.image?.find(i=>i.size==="large")?.["#text"]||"";
      const maxL=Math.max(l1,l2)||1, maxP=Math.max(p1,p2)||1;
      const tags1=(a1.tags?.tag||[]).slice(0,4).map(t=>t.name), tags2=(a2.tags?.tag||[]).slice(0,4).map(t=>t.name);
      const bars=[
        {label:'👥 Oyentes',v1:fmt(l1),v2:fmt(l2),p1:(l1/maxL*100).toFixed(0),p2:(l2/maxL*100).toFixed(0)},
        {label:'🔄 Plays',v1:fmt(p1),v2:fmt(p2),p1:(p1/maxP*100).toFixed(0),p2:(p2/maxP*100).toFixed(0)},
        {label:'🎯 Popularidad',v1:dims1.popularity,v2:dims2.popularity,p1:dims1.popularity,p2:dims2.popularity},
        {label:'💎 Engagement',v1:dims1.engagement,v2:dims2.engagement,p1:dims1.engagement,p2:dims2.engagement},
        {label:'🌈 Versatilidad',v1:dims1.versatility,v2:dims2.versatility,p1:dims1.versatility,p2:dims2.versatility}
      ];

      lastData = { name1:n1,name2:n2,l1,l2,p1,p2,winner,img1,img2,t1,t2,tags1,tags2,dims1,dims2,bars,tr1:[],tr2:[],awards1:null,awards2:null,disc1:null,disc2:null,deezer1:null,deezer2:null,sent1:null,sent2:null };
      saveHistory(n1,{listeners:l1,plays:p1,score:t1}); saveHistory(n2,{listeners:l2,plays:p2,score:t2});

      currentTab='comparison'; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      document.querySelector('.tab[data-tab="comparison"]').classList.add('active');
      renderTab();
      document.getElementById('share-btn').style.display='block';
      if(tg) tg.HapticFeedback?.notificationOccurred('success');

      const [tr1,tr2]=await Promise.all([fetchTopTracks(n1),fetchTopTracks(n2)]);
      lastData.tr1=tr1; lastData.tr2=tr2;
      const [aw1,aw2]=await Promise.all([fetchWikidataAwards(n1),fetchWikidataAwards(n2)]);
      lastData.awards1=aw1; lastData.awards2=aw2;
      const [mb1,mb2]=await Promise.all([fetchMusicBrainz(n1),fetchMusicBrainz(n2)]);
      lastData.disc1=mb1; lastData.disc2=mb2;
      const [dz1,dz2]=await Promise.all([fetchDeezerFans(n1),fetchDeezerFans(n2)]);
      lastData.deezer1=dz1; lastData.deezer2=dz2;
      const tTop1=tr1.slice(0,3), tTop2=tr2.slice(0,3);
      let allLyrics1='', allLyrics2='';
      for (const t of tTop1) allLyrics1+=await fetchLyrics(n1,t.name)+' ';
      for (const t of tTop2) allLyrics2+=await fetchLyrics(n2,t.name)+' ';
      lastData.sent1=analyzeSentiment(allLyrics1); lastData.sent2=analyzeSentiment(allLyrics2);
      if (currentTab!=='comparison') renderTab();
    } catch(e) {
      document.getElementById('tab-content').innerHTML='<div class="loading" style="color:var(--fire)">❌ Artista no encontrado</div>';
    }
    document.getElementById('btn-compare').disabled=false;
  }

  function shareComparison() {
    if(!lastData) return;
    const d=lastData;
    const text=`⚡ Comparador 360°\n🔴 ${d.name1}: ${fmt(d.l1)} oyentes · ${d.t1} pts\n🔵 ${d.name2}: ${fmt(d.l2)} oyentes · ${d.t2} pts\n🏆 ${d.winner}\n🏅 Premios: ${d.awards1} vs ${d.awards2}\n💿 Álbumes: ${d.disc1?.albums||'?'} vs ${d.disc2?.albums||'?'}\n🎧 Deezer: ${fmt(d.deezer1)} vs ${fmt(d.deezer2)}\n🤖 Mkeyz Studio`;
    if(navigator.share) navigator.share({title:'Comparador 360°',text});
    else{navigator.clipboard?.writeText(text).then(()=>showToast('📋 Copiado'));}
  }

  function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
</body>
</html>
