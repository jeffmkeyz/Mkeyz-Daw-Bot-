<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Views Tracker — Mkeyz Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#07080d; --panel:#0d0f1a; --card:#111420; --border:#1c1f30; --gold:#f5c518; --green:#00e676; --fire:#ff4d4d; --blue:#4fc3f7; --purple:#b06afc; --text:#e8eaf6; --muted:#4a4f6a; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; min-height:100vh; padding-bottom:40px; }

/* HEADER */
.hdr { padding:12px 16px 10px; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:50; backdrop-filter:blur(10px); }
.hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.hdr-title { font-size:16px; font-weight:800; }
.period-tabs { display:flex; gap:4px; }
.ptab { flex:1; padding:7px 2px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; text-align:center; transition:all 0.2s; }
.ptab.active { background:#1a1500; color:var(--gold); border-color:var(--gold)55; }

/* SECTION TABS */
.section-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); }
.stab { flex:1; padding:12px 8px; text-align:center; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.stab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* GLOBAL TOTAL */
.global-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px 16px; background:linear-gradient(135deg,#1a1500,#111420); border-bottom:1px solid var(--border); }
.g-stat { text-align:center; }
.g-num { font-size:18px; font-weight:900; color:var(--gold); line-height:1; }
.g-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; }

/* CHART */
.chart-section { padding:8px 16px 4px; position:relative; }
canvas#chart { width:100%; border-radius:14px; display:block; background:var(--panel); border:1px solid var(--border); touch-action:none; }
.tooltip { position:absolute; background:rgba(13,15,26,0.96); border:1px solid var(--gold)77; border-radius:10px; padding:8px 14px; pointer-events:none; z-index:20; display:none; white-space:nowrap; }
.tt-date { font-size:11px; color:var(--muted); }
.tt-val  { font-size:18px; font-weight:900; }
.tt-earn { font-size:12px; color:var(--green); margin-top:2px; }
.crosshair { position:absolute; top:8px; bottom:4px; width:1px; background:rgba(245,197,24,0.4); pointer-events:none; display:none; }

/* PLATFORM SECTIONS */
.plat-section { padding:12px 16px; display:none; }
.plat-section.active { display:block; }

/* PLATFORM CARD */
.plat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:10px; }
.plat-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.plat-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.plat-name { font-size:15px; font-weight:800; }
.plat-total { margin-left:auto; text-align:right; }
.plat-total-num { font-size:16px; font-weight:900; color:var(--gold); }
.plat-total-lbl { font-size:9px; color:var(--muted); }
.plat-earn { font-size:11px; color:var(--green); margin-top:2px; }

/* METRIC SELECTOR */
.metric-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.mpill { padding:5px 12px; border-radius:100px; font-size:11px; font-weight:700; border:1px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer; transition:all 0.15s; }
.mpill.active { color:#000; border-color:transparent; }

/* ADD FORM */
.add-row { display:flex; gap:8px; margin-bottom:8px; }
.add-input { flex:1; background:#1a1a2a; border:1px solid var(--border); border-radius:8px; padding:9px 10px; color:var(--text); font-size:14px; font-weight:700; outline:none; min-width:0; }
.add-input[type=date] { color-scheme:dark; font-size:12px; }
.add-input:focus { border-color:var(--gold); }
.btn-add { width:100%; padding:11px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--gold),#ff8c00); font-size:14px; font-weight:800; color:#000; cursor:pointer; margin-bottom:6px; }
.btn-add:active { transform:scale(0.97); }

/* IMPORT */
.import-label { display:block; width:100%; padding:10px; background:rgba(79,195,247,0.05); border:1px dashed #4fc3f755; border-radius:8px; text-align:center; cursor:pointer; font-size:12px; font-weight:700; color:var(--blue); }

/* MINI CHART per platform */
canvas.mini-chart { width:100%; height:60px; border-radius:8px; display:block; margin-top:8px; }

/* HISTORY */
.hist-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border)44; font-size:13px; }
.hist-item:last-child { border-bottom:none; }
.hist-date { color:var(--muted); min-width:58px; font-size:11px; }
.hist-val  { font-weight:800; color:var(--gold); margin-left:auto; }
.hist-earn { font-size:10px; color:var(--green); }
.hist-chg.up { color:var(--green); font-size:10px; }
.hist-chg.dn { color:var(--fire); font-size:10px; }
.hist-del  { color:var(--muted); font-size:13px; cursor:pointer; padding:2px 4px; }

/* STATS ROW */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:8px 16px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px; text-align:center; }
.stat-n { font-size:14px; font-weight:900; color:var(--gold); }
.stat-l { font-size:9px; color:var(--muted); margin-top:2px; text-transform:uppercase; }

/* EARNINGS BOX */
.earn-box { margin:8px 16px; background:linear-gradient(135deg,#0d1f0d,#111420); border:1px solid #00e67644; border-radius:14px; padding:14px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; text-align:center; }
.earn-n { font-size:15px; font-weight:900; color:var(--green); }
.earn-l { font-size:9px; color:var(--muted); text-transform:uppercase; margin-top:2px; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#fff; color:#000; padding:10px 18px; border-radius:100px; font-size:13px; font-weight:700; z-index:999; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">📊 Views Tracker</div>
    <div style="text-align:right">
      <div style="font-size:16px;font-weight:900;color:var(--gold)" id="total-views">—</div>
      <div style="font-size:9px;color:var(--muted)">total global</div>
    </div>
  </div>
  <div class="period-tabs">
    <div class="ptab active" onclick="setPeriod(7,this)">7D</div>
    <div class="ptab" onclick="setPeriod(28,this)">28D</div>
    <div class="ptab" onclick="setPeriod(90,this)">3M</div>
    <div class="ptab" onclick="setPeriod(180,this)">6M</div>
    <div class="ptab" onclick="setPeriod(365,this)">1A</div>
  </div>
</div>

<!-- GLOBAL STATS -->
<div class="global-bar">
  <div class="g-stat"><div class="g-num" id="g-streams">—</div><div class="g-lbl">🎧 Streams</div></div>
  <div class="g-stat"><div class="g-num" id="g-social">—</div><div class="g-lbl">📱 Social</div></div>
  <div class="g-stat"><div class="g-num" id="g-earn">—</div><div class="g-lbl">💰 Est.</div></div>
</div>

<!-- MAIN CHART -->
<div class="chart-section">
  <canvas id="chart" height="160"></canvas>
  <div class="crosshair" id="crosshair"></div>
  <div class="tooltip" id="tooltip">
    <div class="tt-date" id="tt-date"></div>
    <div class="tt-val"  id="tt-val"></div>
    <div class="tt-earn" id="tt-earn"></div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-n" id="st-avg">—</div><div class="stat-l">Promedio</div></div>
  <div class="stat-card"><div class="stat-n" id="st-max">—</div><div class="stat-l">Mejor día</div></div>
  <div class="stat-card"><div class="stat-n" id="st-growth">—</div><div class="stat-l">Crecimiento</div></div>
</div>

<div id="earn-box-wrap"></div>

<!-- SECTION TABS -->
<div class="section-tabs">
  <div class="stab active" onclick="showSection('streaming',this)">🎵 Streaming</div>
  <div class="stab" onclick="showSection('social',this)">📱 Redes</div>
</div>

<!-- STREAMING SECTION -->
<div class="plat-section active" id="sec-streaming"></div>

<!-- SOCIAL SECTION -->
<div class="plat-section" id="sec-social"></div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#07080d"); tg.setBackgroundColor("#07080d"); }

const USER_ID  = tg?.initDataUnsafe?.user?.id || "guest";
const SAVE_KEY = `views_tracker_v3_${USER_ID}`;

// ── PLATFORM DEFINITIONS ──────────────────────────────────
const STREAMING_PLATS = [
  { id:"spotify",   name:"Spotify",    emoji:"🎵", color:"#1db954", rate:0.001106,
    metrics:["streams","listeners","monthly","followers","saves"],
    metricLabels:{streams:"Streams",listeners:"Oyentes/día",monthly:"Oyentes mes",followers:"Seguidores",saves:"Saves"},
    defaultMetric:"streams" },
  { id:"apple",     name:"Apple Music",emoji:"🍎", color:"#fc3c44", rate:0.005799,
    metrics:["streams","listeners"],
    metricLabels:{streams:"Streams",listeners:"Oyentes"},
    defaultMetric:"streams" },
  { id:"youtube",   name:"YouTube",    emoji:"▶️",  color:"#ff0000", rate:0.003197,
    metrics:["views","subscribers"],
    metricLabels:{views:"Vistas",subscribers:"Suscriptores"},
    defaultMetric:"views" },
  { id:"tidal",     name:"Tidal",      emoji:"🌊", color:"#00ffff", rate:0.003433,
    metrics:["streams"],
    metricLabels:{streams:"Streams"},
    defaultMetric:"streams" },
  { id:"amazon",    name:"Amazon Music",emoji:"📦",color:"#ff9900", rate:0.010574,
    metrics:["streams"],
    metricLabels:{streams:"Streams"},
    defaultMetric:"streams" },
  { id:"audiomack", name:"Audiomack",  emoji:"🎧", color:"#ff6a00", rate:0.001144,
    metrics:["streams","views"],
    metricLabels:{streams:"Streams",views:"Vistas"},
    defaultMetric:"streams" },
];

const SOCIAL_PLATS = [
  { id:"tiktok",    name:"TikTok",     emoji:"🎬", color:"#69C9D0", rate:0,
    metrics:["views","followers","likes"],
    metricLabels:{views:"Vistas",followers:"Seguidores",likes:"Likes"},
    defaultMetric:"views" },
  { id:"instagram", name:"Instagram",  emoji:"📸", color:"#e91e63", rate:0,
    metrics:["views","followers","reach"],
    metricLabels:{views:"Vistas",followers:"Seguidores",reach:"Alcance"},
    defaultMetric:"views" },
  { id:"twitter",   name:"X / Twitter",emoji:"🐦",color:"#1da1f2", rate:0,
    metrics:["views","followers"],
    metricLabels:{views:"Impresiones",followers:"Seguidores"},
    defaultMetric:"views" },
];

const ALL_PLATS = [...STREAMING_PLATS, ...SOCIAL_PLATS];

// ── DATA STORE ────────────────────────────────────────────
// data[platformId][date] = { metric1: val, metric2: val, ... }
let data       = {};
let period     = 7;
let activeSection = "streaming";
let platMetrics   = {}; // current metric per platform

ALL_PLATS.forEach(p => { data[p.id] = {}; platMetrics[p.id] = p.defaultMetric; });

async function load() {
  try { const l = localStorage.getItem(SAVE_KEY); if (l) data = JSON.parse(l); } catch(e) {}
  try {
    if (window.storage) {
      const r = await window.storage.get(SAVE_KEY);
      if (r?.value) data = JSON.parse(r.value);
    }
  } catch(e) {}
  // Ensure all platforms exist
  ALL_PLATS.forEach(p => { if (!data[p.id]) data[p.id] = {}; });
  render(); buildSections();
}

async function save() {
  const d = JSON.stringify(data);
  try { localStorage.setItem(SAVE_KEY, d); } catch(e) {}
  try { if (window.storage) await window.storage.set(SAVE_KEY, d); } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────
function fmtNum(n) {
  if (!n && n!==0) return "—";
  n = Math.floor(n);
  if (n>=1000000) return (n/1000000).toFixed(1)+"M";
  if (n>=1000)    return (n/1000).toFixed(1)+"K";
  return n.toString();
}
function fmtMoney(n) {
  if (!n) return "$0.00";
  if (n>=1000) return "$"+(n/1000).toFixed(1)+"K";
  return "$"+n.toFixed(2);
}
function cutoffDate() {
  const d = new Date(); d.setDate(d.getDate()-period);
  return d.toISOString().split("T")[0];
}
function getEntries(platId) {
  const cut = cutoffDate();
  return Object.entries(data[platId]||{})
    .filter(([date]) => date >= cut)
    .sort((a,b) => a[0].localeCompare(b[0]));
}
function getMetricVal(platId, dateData) {
  const m = platMetrics[platId];
  return dateData[m] || dateData.streams || dateData.views || 0;
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  // Global totals
  let totalStreams = 0, totalSocial = 0, totalEarn = 0;
  const cut = cutoffDate();

  STREAMING_PLATS.forEach(p => {
    Object.entries(data[p.id]||{}).forEach(([date, d]) => {
      if (date < cut) return;
      const v = d.streams || d.views || 0;
      totalStreams += v;
      totalEarn   += v * p.rate;
    });
  });
  SOCIAL_PLATS.forEach(p => {
    Object.entries(data[p.id]||{}).forEach(([date, d]) => {
      if (date < cut) return;
      totalSocial += d.views || d.impressions || 0;
    });
  });

  document.getElementById("total-views").textContent = fmtNum(totalStreams + totalSocial);
  document.getElementById("g-streams").textContent   = fmtNum(totalStreams);
  document.getElementById("g-social").textContent    = fmtNum(totalSocial);
  document.getElementById("g-earn").textContent      = fmtMoney(totalEarn);

  // Main chart — combined all platforms
  drawMainChart();

  // Stats from active section
  updateStats();

  // Earnings box
  if (totalEarn > 0) {
    const avgDay = totalEarn / period;
    document.getElementById("earn-box-wrap").innerHTML = `
      <div class="earn-box">
        <div><div class="earn-n">${fmtMoney(avgDay)}</div><div class="earn-l">☀️ Diario</div></div>
        <div><div class="earn-n">${fmtMoney(avgDay*30)}</div><div class="earn-l">📅 Mensual</div></div>
        <div><div class="earn-n">${fmtMoney(avgDay*365)}</div><div class="earn-l">📆 Anual</div></div>
      </div>`;
  } else {
    document.getElementById("earn-box-wrap").innerHTML = "";
  }
}

function drawMainChart() {
  const canvas = document.getElementById("chart");
  const ctx    = canvas.getContext("2d");
  const dpr    = window.devicePixelRatio || 1;
  const W      = canvas.offsetWidth * dpr;
  const H      = 160 * dpr;
  canvas.width = W; canvas.height = H;
  ctx.fillStyle = "#0d0f1a"; ctx.fillRect(0,0,W,H);

  // Aggregate all data by date
  const cut = cutoffDate();
  const byDate = {};
  ALL_PLATS.forEach(p => {
    Object.entries(data[p.id]||{}).forEach(([date, d]) => {
      if (date < cut) return;
      const v = d.streams || d.views || 0;
      byDate[date] = (byDate[date]||0) + v;
    });
  });

  const dates = Object.keys(byDate).sort();
  if (!dates.length) {
    ctx.fillStyle="#4a4f6a"; ctx.font=`${11*dpr}px -apple-system`; ctx.textAlign="center";
    ctx.fillText("Añade datos en cada plataforma 👇", W/2, H/2); return;
  }

  const vals = dates.map(d => byDate[d]);
  const maxV = Math.max(...vals) * 1.15 || 1;
  const pad  = {t:12*dpr, b:22*dpr, l:8*dpr, r:8*dpr};
  const cW   = W-pad.l-pad.r; const cH = H-pad.t-pad.b;
  const toX  = i => pad.l+(i/Math.max(dates.length-1,1))*cW;
  const toY  = v => pad.t+cH-(v/maxV)*cH;

  // Gradient fill
  const grad = ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,"rgba(245,197,24,0.5)"); grad.addColorStop(1,"rgba(245,197,24,0.02)");
  ctx.beginPath(); ctx.moveTo(toX(0),H-pad.b);
  dates.forEach((_,i) => ctx.lineTo(toX(i),toY(vals[i])));
  ctx.lineTo(toX(dates.length-1),H-pad.b); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle="#f5c518"; ctx.lineWidth=2*dpr; ctx.lineJoin="round";
  ctx.shadowColor="#f5c518"; ctx.shadowBlur=8*dpr;
  dates.forEach((_,i) => i===0 ? ctx.moveTo(toX(i),toY(vals[i])) : ctx.lineTo(toX(i),toY(vals[i])));
  ctx.stroke(); ctx.shadowBlur=0;

  // X labels
  ctx.fillStyle="#4a4f6a"; ctx.font=`${8*dpr}px -apple-system`; ctx.textAlign="center";
  const step = Math.max(1,Math.floor(dates.length/5));
  dates.forEach((d,i) => {
    if (i%step===0||i===dates.length-1) {
      const dt = new Date(d+"T00:00:00");
      ctx.fillText(`${dt.getDate()}/${dt.getMonth()+1}`, toX(i), H-pad.b+10*dpr);
    }
  });

  // Store for tooltip
  canvas._dates = dates; canvas._vals = vals;
}

function drawMiniChart(canvasEl, platId) {
  const ctx = canvasEl.getContext("2d");
  const dpr = window.devicePixelRatio||1;
  const W   = canvasEl.offsetWidth*dpr; const H = 60*dpr;
  canvasEl.width=W; canvasEl.height=H;
  ctx.fillStyle="#0d0f1a"; ctx.fillRect(0,0,W,H);

  const entries = getEntries(platId);
  if (!entries.length) return;

  const plat = ALL_PLATS.find(p=>p.id===platId);
  const vals  = entries.map(([_,d]) => getMetricVal(platId,d));
  const maxV  = Math.max(...vals)*1.15||1;
  const pad   = {t:4*dpr,b:4*dpr,l:4*dpr,r:4*dpr};
  const cW    = W-pad.l-pad.r; const cH=H-pad.t-pad.b;
  const toX   = i=>pad.l+(i/Math.max(entries.length-1,1))*cW;
  const toY   = v=>pad.t+cH-(v/maxV)*cH;

  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,plat.color+"88"); grad.addColorStop(1,plat.color+"06");
  ctx.beginPath(); ctx.moveTo(toX(0),H-pad.b);
  entries.forEach((_,i)=>ctx.lineTo(toX(i),toY(vals[i])));
  ctx.lineTo(toX(entries.length-1),H-pad.b); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle=plat.color; ctx.lineWidth=1.5*dpr; ctx.lineJoin="round";
  entries.forEach((_,i)=>i===0?ctx.moveTo(toX(i),toY(vals[i])):ctx.lineTo(toX(i),toY(vals[i])));
  ctx.stroke();
}

function updateStats() {
  const plats = activeSection==="streaming" ? STREAMING_PLATS : SOCIAL_PLATS;
  let allVals = [];
  plats.forEach(p => {
    getEntries(p.id).forEach(([_,d]) => allVals.push(getMetricVal(p.id,d)));
  });
  const avg = allVals.length ? Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length) : 0;
  const max = allVals.length ? Math.max(...allVals) : 0;
  let growth = 0;
  if (allVals.length>=2) {
    const h = Math.floor(allVals.length/2);
    const a1=allVals.slice(0,h).reduce((s,v)=>s+v,0)/h;
    const a2=allVals.slice(h).reduce((s,v)=>s+v,0)/(allVals.length-h);
    growth = a1>0?Math.round(((a2-a1)/a1)*100):0;
  }
  document.getElementById("st-avg").textContent = fmtNum(avg);
  document.getElementById("st-max").textContent = fmtNum(max);
  const gEl=document.getElementById("st-growth");
  gEl.textContent=(growth>=0?"+":"")+growth+"%";
  gEl.style.color=growth>=0?"var(--green)":"var(--fire)";
}

// ── BUILD SECTIONS ────────────────────────────────────────
function buildSections() {
  buildPlatSection("sec-streaming", STREAMING_PLATS);
  buildPlatSection("sec-social",    SOCIAL_PLATS);
}

function buildPlatSection(containerId, plats) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";

  plats.forEach(p => {
    const entries = getEntries(p.id);
    const curMetric = platMetrics[p.id];
    const vals = entries.map(([_,d]) => getMetricVal(p.id,d));
    const total = vals.reduce((a,b)=>a+b,0);
    const earn  = p.rate>0 ? entries.reduce((s,[_,d])=>s+(d.streams||d.views||0)*p.rate,0) : 0;

    const card = document.createElement("div");
    card.className = "plat-card";
    card.id = `card-${p.id}`;

    // Metric pills
    const pills = p.metrics.map(m => `
      <div class="mpill${m===curMetric?" active":""}" 
        style="${m===curMetric?`background:${p.color};color:#000;border-color:transparent`:""}"
        onclick="setMetric('${p.id}','${m}',this,'${p.color}')">${p.metricLabels[m]}</div>`).join("");

    // History (last 5)
    const hist = [...entries].reverse().slice(0,5).map(([date,d],i,arr) => {
      const v    = getMetricVal(p.id,d);
      const prev = arr[i+1] ? getMetricVal(p.id,arr[i+1][1]) : null;
      const diff = prev!==null ? v-prev : null;
      const pct  = diff!==null&&prev>0 ? Math.round((diff/prev)*100) : null;
      const dt   = new Date(date+"T00:00:00");
      const dateStr = `${dt.getDate()}/${dt.getMonth()+1}`;
      const chg  = pct!==null ? `<span class="hist-chg ${diff>=0?'up':'dn'}">${diff>=0?"▲":"▼"}${Math.abs(pct)}%</span>` : "";
      const earnStr = p.rate>0&&curMetric==="streams" ? `<span class="hist-earn">${fmtMoney(v*p.rate)}</span>` : "";
      return `<div class="hist-item">
        <span class="hist-date">${dateStr}</span>
        <span class="hist-val">${fmtNum(v)}</span>
        ${earnStr}${chg}
        <span class="hist-del" onclick="deleteEntry('${p.id}','${date}')">✕</span>
      </div>`;
    }).join("");

    const today = new Date().toISOString().split("T")[0];

    card.innerHTML = `
      <div class="plat-header">
        <div class="plat-icon" style="background:${p.color}22">${p.emoji}</div>
        <div>
          <div class="plat-name">${p.name}</div>
          <div style="font-size:10px;color:var(--muted)">${p.metricLabels[curMetric]}</div>
        </div>
        <div class="plat-total">
          <div class="plat-total-num">${fmtNum(total)}</div>
          <div class="plat-total-lbl">período</div>
          ${earn>0?`<div class="plat-earn">${fmtMoney(earn)}</div>`:""}
        </div>
      </div>
      <div class="metric-row">${pills}</div>
      <div class="add-row">
        <input class="add-input" type="date" id="date-${p.id}" value="${today}">
        <input class="add-input" type="number" id="val-${p.id}" placeholder="${p.metricLabels[curMetric]}" min="0" style="max-width:130px">
      </div>
      <button class="btn-add" style="background:linear-gradient(135deg,${p.color},${p.color}aa)" onclick="addEntry('${p.id}')">+ Añadir</button>
      ${p.id==="spotify"?`<label class="import-label" style="margin-bottom:8px">
        📁 Importar CSV de Spotify
        <input type="file" accept=".csv" style="display:none" onchange="importCSV(this,'${p.id}')">
      </label>`:""}
      <canvas class="mini-chart" id="mini-${p.id}" height="60"></canvas>
      <div id="hist-${p.id}">${hist||'<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Sin datos aún</div>'}</div>
    `;

    el.appendChild(card);
    setTimeout(() => {
      const mc = document.getElementById(`mini-${p.id}`);
      if (mc) drawMiniChart(mc, p.id);
    }, 100);
  });
}

function setMetric(platId, metric, btn, color) {
  platMetrics[platId] = metric;
  const card = document.getElementById(`card-${platId}`);
  card.querySelectorAll(".mpill").forEach(p => { p.classList.remove("active"); p.style.background=""; p.style.color=""; p.style.borderColor=""; });
  btn.classList.add("active"); btn.style.background=color; btn.style.color="#000"; btn.style.borderColor="transparent";
  // Update placeholder
  const plat = ALL_PLATS.find(p=>p.id===platId);
  const inp  = document.getElementById(`val-${platId}`);
  if (inp && plat) inp.placeholder = plat.metricLabels[metric];
  // Rebuild history
  rebuildCard(platId);
  if (tg) tg.HapticFeedback?.impactOccurred("light");
}

function addEntry(platId) {
  const date = document.getElementById(`date-${platId}`)?.value;
  const val  = parseInt(document.getElementById(`val-${platId}`)?.value);
  if (!date) { showToast("Elige una fecha"); return; }
  if (!val||val<0) { showToast("Escribe el valor"); return; }

  const metric = platMetrics[platId];
  if (!data[platId][date]) data[platId][date] = {};
  data[platId][date][metric] = val;
  // Auto-set next day to same value as starting point
  const tomorrow = new Date(date+"T00:00:00"); tomorrow.setDate(tomorrow.getDate()+1);
  const tStr = tomorrow.toISOString().split("T")[0];
  if (!data[platId][tStr]) data[platId][tStr] = {};

  save(); render(); rebuildCard(platId);
  document.getElementById(`val-${platId}`).value = "";
  showToast("✅ Dato añadido");
  if (tg) tg.HapticFeedback?.notificationOccurred("success");
}

function deleteEntry(platId, date) {
  delete data[platId][date];
  save(); render(); rebuildCard(platId);
  if (tg) tg.HapticFeedback?.impactOccurred("light");
}

function rebuildCard(platId) {
  const plats = [...STREAMING_PLATS,...SOCIAL_PLATS];
  const p = plats.find(x=>x.id===platId);
  if (!p) return;
  const secId = STREAMING_PLATS.includes(p) ? "sec-streaming" : "sec-social";
  buildPlatSection(secId, STREAMING_PLATS.includes(p) ? STREAMING_PLATS : SOCIAL_PLATS);
}

// ── CSV IMPORT ────────────────────────────────────────────
function importCSV(input, platId) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text  = e.target.result;
      const lines = text.trim().split("\n");
      const header = lines[0].replace(/^\uFEFF/,"").split(",").map(h=>h.trim());
      let added = 0;

      // Format 1: audience-timeline.csv (date, listeners, monthly listeners, streams, ...)
      const iDate    = header.findIndex(h=>h==="date");
      const iStream  = header.findIndex(h=>h==="streams");
      const iListen  = header.findIndex(h=>h==="listeners");
      const iMonthly = header.findIndex(h=>h.includes("monthly listeners")&&!h.includes("active"));
      const iFollow  = header.findIndex(h=>h==="followers");
      const iSaves   = header.findIndex(h=>h==="saves");

      // Format 2: songs-28day.csv (song, listeners, streams, saves, release_date)
      const iSong    = header.findIndex(h=>h==="song");

      if (iDate !== -1 && iStream !== -1) {
        // Format 1: timeline
        lines.slice(1).forEach(line => {
          if (!line.trim()) return;
          const c = line.split(",");
          const date = c[iDate]?.trim();
          if (!date||!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
          if (!data[platId][date]) data[platId][date] = {};
          if (iStream>=0)  data[platId][date].streams   = parseInt(c[iStream])||0;
          if (iListen>=0)  data[platId][date].listeners = parseInt(c[iListen])||0;
          if (iMonthly>=0) data[platId][date].monthly   = parseInt(c[iMonthly])||0;
          if (iFollow>=0)  data[platId][date].followers = parseInt(c[iFollow])||0;
          if (iSaves>=0)   data[platId][date].saves     = parseInt(c[iSaves])||0;
          added++;
        });
        showToast(`✅ ${added} días importados`);
      } else if (iSong !== -1) {
        // Format 2: songs-28day — aggregate all songs into today
        const today = new Date().toISOString().split("T")[0];
        let totalStreams=0, totalListeners=0, totalSaves=0;
        lines.slice(1).forEach(line => {
          if (!line.trim()) return;
          const c = line.replace(/^"|"$/g,"").split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
          totalListeners += parseInt(c[iListen])||0;
          totalStreams   += parseInt(c[iStream])||0;
          totalSaves     += parseInt(c[iSaves>=0?iSaves:3])||0;
          added++;
        });
        if (!data[platId][today]) data[platId][today]={};
        data[platId][today].streams   = totalStreams;
        data[platId][today].listeners = totalListeners;
        data[platId][today].saves     = totalSaves;
        showToast(`✅ ${added} canciones → ${today}`);
      } else {
        showToast("❌ Formato CSV no reconocido");
        return;
      }

      save(); render(); rebuildCard(platId);
      if (tg) tg.HapticFeedback?.notificationOccurred("success");
    } catch(err) { showToast("❌ Error: "+err.message); }
  };
  reader.readAsText(file,"UTF-8");
}

// ── TOOLTIP ───────────────────────────────────────────────
function setupTooltip() {
  const canvas    = document.getElementById("chart");
  const tooltip   = document.getElementById("tooltip");
  const crosshair = document.getElementById("crosshair");

  function onTouch(e) {
    const dates = canvas._dates; const vals = canvas._vals;
    if (!dates?.length) return;
    e.preventDefault();
    const rect   = canvas.getBoundingClientRect();
    const clientX = e.touches?.[0]?.clientX||e.clientX;
    const pct    = Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    const idx    = Math.round(pct*(dates.length-1));
    const date   = dates[idx]; const val = vals[idx];
    const dt     = new Date(date+"T00:00:00");
    const ds     = dt.toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short"});
    document.getElementById("tt-date").textContent = ds;
    document.getElementById("tt-val").textContent  = fmtNum(val)+" 📊";
    document.getElementById("tt-val").style.color  = "var(--gold)";
    document.getElementById("tt-earn").textContent = "";
    const ttW = 160; let ttLeft = clientX-rect.left-ttW/2;
    ttLeft = Math.max(0,Math.min(rect.width-ttW,ttLeft));
    tooltip.style.left=ttLeft+"px"; tooltip.style.top="8px"; tooltip.style.display="block";
    crosshair.style.left=(clientX-rect.left)+"px"; crosshair.style.display="block";
    if (tg) tg.HapticFeedback?.selectionChanged();
  }
  function onEnd() { setTimeout(()=>{ tooltip.style.display="none"; crosshair.style.display="none"; },1500); }
  canvas.addEventListener("touchstart",onTouch,{passive:false});
  canvas.addEventListener("touchmove", onTouch,{passive:false});
  canvas.addEventListener("touchend",  onEnd);
  canvas.addEventListener("mousemove", onTouch);
  canvas.addEventListener("mouseleave",onEnd);
}

// ── SECTION TOGGLE ────────────────────────────────────────
function showSection(name, btn) {
  activeSection = name;
  document.querySelectorAll(".stab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("sec-streaming").classList.toggle("active", name==="streaming");
  document.getElementById("sec-social").classList.toggle("active",    name==="social");
  updateStats();
}

function setPeriod(days, btn) {
  period = days;
  document.querySelectorAll(".ptab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  render(); buildSections();
}

function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

window.addEventListener("resize",()=>{ drawMainChart(); ALL_PLATS.forEach(p=>{ const mc=document.getElementById(`mini-${p.id}`); if(mc) drawMiniChart(mc,p.id); }); });
setupTooltip();
load();
</script>
