<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Views Tracker — Mkeyz Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#060810; --panel:#0a0c18; --card:#0f1120; --border:#181b2e;
  --gold:#f5c518; --green:#00e676; --fire:#ff4d4d; --blue:#4fc3f7;
  --purple:#b06afc; --pink:#f472b6; --text:#e8eaf6; --muted:#4a4f6a;
}
body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; padding-bottom:40px; }

#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* HEADER */
.hdr {
  padding:14px 16px 12px; border-bottom:1px solid rgba(245,197,24,0.1);
  background:rgba(6,8,16,0.94); position:sticky; top:0; z-index:50;
  backdrop-filter:blur(16px); box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.hdr-title { font-family:'Orbitron',monospace; font-size:13px; font-weight:900; background:linear-gradient(135deg,var(--gold),#ff9f1c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:2px; }
.total-box { text-align:right; }
.total-num { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; color:var(--gold); line-height:1; text-shadow:0 0 20px rgba(245,197,24,0.35); }
.total-lbl { font-size:9px; color:var(--muted); margin-top:3px; letter-spacing:1px; text-transform:uppercase; }
.period-tabs { display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; }
.period-tabs::-webkit-scrollbar { display:none; }
.ptab { flex-shrink:0; padding:8px 10px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; text-align:center; transition:all 0.2s; letter-spacing:0.5px; }
.ptab.active { background:rgba(245,197,24,0.1); color:var(--gold); border-color:rgba(245,197,24,0.3); box-shadow:0 0 12px rgba(245,197,24,0.12); }
.ptab:active { transform:scale(0.94); }

/* METRIC PILLS */
.metric-row { display:flex; gap:6px; overflow-x:auto; padding:10px 16px 6px; scrollbar-width:none; position:relative; z-index:1; }
.metric-row::-webkit-scrollbar { display:none; }
.mpill { flex-shrink:0; padding:7px 16px; border-radius:100px; font-size:12px; font-weight:700; border:1px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer; transition:all 0.2s; }
.mpill.active { color:#000; border-color:transparent; box-shadow:0 0 16px rgba(0,0,0,0.3); }
.mpill:active { transform:scale(0.92); }

/* PLATFORM PILLS */
.plat-row { display:flex; gap:6px; overflow-x:auto; padding:4px 16px 10px; scrollbar-width:none; position:relative; z-index:1; }
.plat-row::-webkit-scrollbar { display:none; }
.ppill { flex-shrink:0; padding:7px 16px; border-radius:100px; font-size:12px; font-weight:700; border:1px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer; transition:all 0.2s; }
.ppill.active { color:#000; border-color:transparent; }
.ppill:active { transform:scale(0.92); }

/* CHART */
.chart-section { padding:8px 16px 6px; position:relative; z-index:1; }
canvas#chart { width:100%; border-radius:18px; display:block; background:var(--panel); border:1px solid var(--border); touch-action:none; box-shadow:inset 0 0 40px rgba(0,0,0,0.5); }
.tooltip { position:absolute; background:rgba(6,8,16,0.97); border:1px solid rgba(245,197,24,0.65); border-radius:12px; padding:8px 14px; pointer-events:none; z-index:30; display:none; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.8); }
.tt-date { font-size:11px; color:var(--muted); margin-bottom:3px; }
.tt-val  { font-size:20px; font-weight:900; }
.tt-earn { font-size:12px; color:var(--green); margin-top:3px; font-weight:700; text-shadow:0 0 8px rgba(0,230,118,0.4); }
.crosshair { position:absolute; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.35); pointer-events:none; display:none; border-radius:1px; }
.chart-dot { position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; border:3px solid var(--gold); pointer-events:none; display:none; transform:translate(-50%,-50%); box-shadow:0 0 0 4px rgba(245,197,24,0.2), 0 0 16px rgba(245,197,24,0.8); z-index:25; transition:left .05s,top .05s; }

/* EARNINGS */
.earn-box { margin:10px 16px; border-radius:18px; padding:16px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center; position:relative; z-index:1; background:linear-gradient(135deg,rgba(0,230,118,0.07),rgba(0,188,212,0.04)); border:1px solid rgba(0,230,118,0.18); box-shadow:0 0 30px rgba(0,230,118,0.05); animation:fadeUp 0.4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.earn-item .earn-n { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; color:var(--green); text-shadow:0 0 12px rgba(0,230,118,0.4); }
.earn-item .earn-l { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:4px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:8px 16px; position:relative; z-index:1; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; text-align:center; transition:all 0.2s; box-shadow:inset 0 0 20px rgba(0,0,0,0.3); }
.stat-card:active { transform:scale(0.95); border-color:rgba(245,197,24,0.25); }
.stat-n { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; color:var(--gold); text-shadow:0 0 10px rgba(245,197,24,0.25); }
.stat-l { font-size:9px; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:0.5px; }

/* BOTTOM TABS */
.bottom-tabs { display:flex; gap:0; margin-top:10px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:rgba(10,12,24,0.85); backdrop-filter:blur(10px); position:sticky; top:0; z-index:10; }
.btab { flex:1; padding:13px 4px; text-align:center; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.25s; }
.btab.active { color:var(--gold); border-bottom-color:var(--gold); text-shadow:0 0 10px rgba(245,197,24,0.35); }

/* TAB CONTENT */
.btab-content { display:none; position:relative; z-index:1; }
.btab-content.active { display:block; }

/* PLATFORM CARDS */
.plat-import-card { border-radius:18px; padding:16px; margin:10px 16px 0; transition:all 0.2s; }
.plat-import-card.spotify  { background:linear-gradient(135deg,rgba(30,215,96,0.07),rgba(10,12,24,0.9)); border:1px solid rgba(30,215,96,0.22); box-shadow:0 0 24px rgba(30,215,96,0.05); }
.plat-import-card.amazon   { background:linear-gradient(135deg,rgba(255,153,0,0.07),rgba(10,12,24,0.9)); border:1px solid rgba(255,153,0,0.22); box-shadow:0 0 24px rgba(255,153,0,0.05); }
.plat-import-card.amazon-prime { background:linear-gradient(135deg,rgba(0,168,224,0.07),rgba(10,12,24,0.9)); border:1px solid rgba(0,168,224,0.22); box-shadow:0 0 24px rgba(0,168,224,0.05); }
.plat-import-card.apple    { background:linear-gradient(135deg,rgba(252,60,68,0.07),rgba(10,12,24,0.9)); border:1px solid rgba(252,60,68,0.22); box-shadow:0 0 24px rgba(252,60,68,0.05); }
.plat-import-card.youtube  { background:linear-gradient(135deg,rgba(255,0,0,0.07),rgba(10,12,24,0.9)); border:1px solid rgba(255,0,0,0.22); box-shadow:0 0 24px rgba(255,0,0,0.05); }
.plat-import-card.songs    { background:linear-gradient(135deg,rgba(176,106,252,0.07),rgba(10,12,24,0.9)); border:1px solid rgba(176,106,252,0.22); box-shadow:0 0 24px rgba(176,106,252,0.05); }

.import-label { display:block; width:100%; padding:12px; border-radius:12px; text-align:center; cursor:pointer; font-size:13px; font-weight:700; transition:all 0.2s; margin-bottom:6px; }
.import-label:active { transform:scale(0.97); }
.import-status { font-size:10px; color:var(--muted); text-align:center; margin-top:4px; }
.btn-clear { width:100%; margin-top:6px; padding:9px; background:transparent; border:1px solid rgba(255,77,77,0.2); border-radius:10px; color:rgba(255,77,77,0.5); font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-clear:active { border-color:var(--fire); color:var(--fire); }
.plat-import-title { font-size:14px; font-weight:800; margin-bottom:2px; }
.plat-import-sub   { font-size:10px; color:var(--muted); }

/* ADD FORM */
.add-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:16px; margin:10px 16px 0; box-shadow:inset 0 0 30px rgba(0,0,0,0.3); }
.add-row { display:flex; gap:8px; margin-bottom:10px; }
.add-input { flex:1; background:rgba(24,27,46,0.8); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-size:14px; font-weight:700; outline:none; min-width:0; transition:border-color 0.2s; }
.add-input[type=date] { color-scheme:dark; font-size:12px; }
.add-input:focus { border-color:rgba(245,197,24,0.35); box-shadow:0 0 12px rgba(245,197,24,0.08); }
.btn-add { width:100%; padding:13px; border:none; border-radius:12px; background:linear-gradient(135deg,var(--gold),#ff8c00); font-size:14px; font-weight:800; color:#000; cursor:pointer; transition:all 0.15s; box-shadow:0 4px 20px rgba(245,197,24,0.2); }
.btn-add:active { transform:scale(0.97); }

/* HISTORY */
.hist-list { padding:10px 16px; }
.hist-item { display:flex; align-items:center; gap:8px; padding:11px 14px; background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:7px; transition:all 0.2s; position:relative; overflow:hidden; }
.hist-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:2px 0 0 2px; background:var(--plat-color,var(--border)); box-shadow:0 0 8px var(--plat-color,transparent); }
.hist-item:active { transform:scale(0.98); }
.hist-date { font-size:11px; color:var(--muted); min-width:60px; margin-left:6px; }
.hist-plat { font-size:16px; }
.hist-val  { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; color:var(--gold); margin-left:auto; }
.hist-earn { font-size:10px; color:var(--green); font-weight:700; text-shadow:0 0 8px rgba(0,230,118,0.3); }
.hist-chg.up { color:var(--green); font-size:10px; font-weight:700; }
.hist-chg.dn { color:var(--fire); font-size:10px; font-weight:700; }
.hist-del  { color:rgba(74,79,106,0.5); font-size:14px; cursor:pointer; padding:2px 6px; transition:color 0.2s; }
.hist-del:active { color:var(--fire); }

/* SONGS */
.songs-sort { display:flex; gap:6px; padding:12px 16px 8px; }
.ssort-btn { flex:1; padding:8px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; text-align:center; transition:all 0.2s; }
.ssort-btn.active { background:rgba(176,106,252,0.1); color:var(--purple); border-color:rgba(176,106,252,0.3); box-shadow:0 0 14px rgba(176,106,252,0.08); }
.ssort-btn:active { transform:scale(0.94); }
.song-item { display:flex; align-items:center; gap:12px; padding:13px 16px; background:var(--card); border:1px solid var(--border); border-radius:16px; margin:0 16px 8px; transition:all 0.2s; }
.song-item:nth-child(1) { border-color:rgba(245,197,24,0.28); box-shadow:0 0 18px rgba(245,197,24,0.05); }
.song-item:nth-child(2) { border-color:rgba(170,170,170,0.18); }
.song-item:nth-child(3) { border-color:rgba(205,127,50,0.18); }
.song-item:active { transform:scale(0.98); }
.song-rank { font-size:16px; min-width:26px; text-align:center; font-weight:900; }
.song-rank.gold   { color:var(--gold); text-shadow:0 0 12px rgba(245,197,24,0.5); }
.song-rank.silver { color:#aaa; text-shadow:0 0 10px rgba(170,170,170,0.3); }
.song-rank.bronze { color:#cd7f32; }
.song-rank.other  { color:var(--muted); font-size:11px; }
.song-info { flex:1; min-width:0; }
.song-name { font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-bar-wrap { height:3px; background:rgba(255,255,255,0.05); border-radius:2px; margin:6px 0 4px; overflow:hidden; }
.song-bar { height:3px; border-radius:2px; background:linear-gradient(90deg,var(--purple),#ce93d8); transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 0 6px rgba(176,106,252,0.4); }
.song-meta { font-size:10px; color:var(--muted); }
.song-streams { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; color:var(--gold); text-shadow:0 0 10px rgba(245,197,24,0.25); }
.song-saves { font-size:10px; color:var(--muted); margin-top:2px; }

/* PAGOS */
.pago-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; margin:0 16px 8px; transition:all 0.2s; }
.pago-card:active { transform:scale(0.98); }
.pago-card.paid { border-color:rgba(0,230,118,0.25); box-shadow:0 0 18px rgba(0,230,118,0.05); }
.pago-card.upcoming { border-color:rgba(245,197,24,0.2); }
.pago-card.estimated { border-color:rgba(79,195,247,0.2); }
.pago-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.pago-plat-icon { font-size:22px; }
.pago-month { font-size:13px; font-weight:800; }
.pago-date-badge { margin-left:auto; font-size:10px; padding:3px 10px; border-radius:100px; font-weight:700; }
.pago-date-badge.paid     { background:rgba(0,230,118,0.12); color:var(--green); border:1px solid rgba(0,230,118,0.2); }
.pago-date-badge.upcoming { background:rgba(245,197,24,0.12); color:var(--gold); border:1px solid rgba(245,197,24,0.2); }
.pago-date-badge.estimated{ background:rgba(79,195,247,0.12); color:var(--blue); border:1px solid rgba(79,195,247,0.2); }
.pago-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.pago-stat .pn { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; }
.pago-stat .pl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
.pago-toggle { width:100%; margin-top:10px; padding:8px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.pago-toggle.paid-btn { border-color:rgba(0,230,118,0.25); color:var(--green); background:rgba(0,230,118,0.06); }

/* EMPTY STATE */
.empty-state { text-align:center; padding:36px 20px; color:var(--muted); font-size:13px; line-height:2; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(240,237,232,0.96); color:#000; padding:12px 22px; border-radius:100px; font-size:13px; font-weight:800; z-index:999; transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 20px rgba(245,197,24,0.15); backdrop-filter:blur(10px); font-family:'Space Grotesk',sans-serif; }
.toast.show { transform:translateX(-50%) translateY(0); }

.sec-label { padding:14px 16px 6px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:700; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">📊 VIEWS TRACKER</div>
    <div class="total-box">
      <div class="total-num" id="total-views">—</div>
      <div class="total-lbl" id="total-lbl">total período</div>
    </div>
  </div>
  <div class="period-tabs">
    <div class="ptab active" onclick="setPeriod(7,this)">7D</div>
    <div class="ptab" onclick="setPeriod(28,this)">28D</div>
    <div class="ptab" onclick="setPeriod(90,this)">3M</div>
    <div class="ptab" onclick="setPeriod(180,this)">6M</div>
    <div class="ptab" onclick="setPeriod(365,this)">1A</div>
    <div class="ptab" onclick="setPeriod(730,this)">2A</div>
    <div class="ptab" onclick="setPeriod(1095,this)">3A</div>
  </div>
</div>

<div class="plat-row"   id="plat-row"></div>
<div class="metric-row" id="metric-row"></div>
<div class="toggle-row" id="toggle-row" style="display:none"></div>

<div class="chart-section">
  <canvas id="chart" height="180"></canvas>
  <div class="crosshair" id="crosshair"></div>
  <div class="chart-dot" id="chart-dot"></div>
  <div class="chart-dot" id="chart-dot"></div>
  <div class="tooltip" id="tooltip">
    <span class="tt-date" id="tt-date"></span>
    <span class="tt-val"  id="tt-val"></span>
    <span class="tt-earn" id="tt-earn"></span>
  </div>
</div>

<div class="earn-box" id="earn-box" style="display:none">
  <div class="earn-item"><div class="earn-n" id="e-day">$0</div><div class="earn-l">☀️ Diario</div></div>
  <div class="earn-item"><div class="earn-n" id="e-month">$0</div><div class="earn-l">📅 Mensual</div></div>
  <div class="earn-item"><div class="earn-n" id="e-year">$0</div><div class="earn-l">📆 Anual</div></div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-n" id="st-avg">—</div><div class="stat-l">Promedio</div></div>
  <div class="stat-card"><div class="stat-n" id="st-max">—</div><div class="stat-l">Mejor día</div></div>
  <div class="stat-card"><div class="stat-n" id="st-growth">—</div><div class="stat-l">Crecimiento</div></div>
</div>

<!-- BOTTOM TABS -->
<div class="bottom-tabs">
  <div class="btab active" onclick="showBTab('import',this)">📥 Datos</div>
  <div class="btab" onclick="showBTab('history',this)">📋 Historial</div>
  <div class="btab" onclick="showBTab('songs',this)">🎵 Top Songs</div>
  <div class="btab" onclick="showBTab('pagos',this)">📅 Pagos</div>
</div>

<!-- TAB: DATOS — hidden import cards (keep inputs alive for file API) -->
<div style="position:fixed;opacity:0;pointer-events:none;width:0;height:0;overflow:hidden">
  <input type="file" accept=".csv" id="spotify-csv"      onchange="importSpotifyCSV(this)">
  <input type="file" accept=".csv" id="amazon-csv"       onchange="importAmazonCSV(this)">
  <input type="file" accept=".csv" id="amazon-prime-csv" onchange="importAmazonPrimeCSV(this)">
  <input type="file" accept=".csv" id="apple-csv"        onchange="importAppleCSV(this)">
  <input type="file" accept=".csv" id="youtube-csv"      onchange="importYouTubeCSV(this)">
  <input type="file" accept=".csv" id="pay-spotify-csv"      onchange="importPaymentCSV(this,'spotify')">
  <input type="file" accept=".csv" id="pay-amazon-csv"       onchange="importPaymentCSV(this,'amazon')">
  <input type="file" accept=".csv" id="pay-amazon_prime-csv" onchange="importPaymentCSV(this,'amazon_prime')">
  <input type="file" accept=".csv" id="pay-apple-csv"        onchange="importPaymentCSV(this,'apple')">
  <input type="file" accept=".csv" id="pay-youtube-csv"      onchange="importPaymentCSV(this,'youtube')">
  <div id="spotify-status"></div>
  <div id="amazon-status"></div>
  <div id="amazon-prime-status"></div>
  <div id="apple-status"></div>
  <div id="youtube-status"></div>
  <div id="pay-status-spotify"></div>
  <div id="pay-status-amazon"></div>
  <div id="pay-status-amazon_prime"></div>
  <div id="pay-status-apple"></div>
  <div id="pay-status-youtube"></div>
</div>

<!-- TAB: DATOS -->
<div class="btab-content active" id="btab-import">
  <div id="datos-panel"></div>


  <!-- ADD MANUAL -->
  <div class="add-card">
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">📝 Añadir manualmente</div>
    <div class="add-row">
      <input class="add-input" type="date" id="inp-date">
      <input class="add-input" type="number" id="inp-views" placeholder="Views" min="0" style="max-width:120px">
    </div>
    <button class="btn-add" onclick="addEntry()">+ Añadir registro</button>
  </div>

</div>

<!-- TAB: HISTORIAL -->
<div class="btab-content" id="btab-history">
  <div style="padding:12px 16
