<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Beat Battle Arena — Mkeyz Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0a0a0a;
    --card:    #111111;
    --border:  #1f1f1f;
    --gold:    #f5c518;
    --fire:    #ff4d4d;
    --skip:    #444;
    --text:    #ffffff;
    --muted:   #666;
    --green:   #00e676;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--border);
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    border: none;
    background: transparent;
  }
  .tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* ── SECTIONS ── */
  .section { display: none; padding: 16px; }
  .section.active { display: block; }

  /* ── BATTLE CARD ── */
  .battle-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .battle-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--fire), var(--gold), var(--fire));
    background-size: 200% 100%;
    animation: shimmer 2s infinite linear;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .battle-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .beat-author {
    font-size: 15px;
    font-weight: 700;
  }
  .beat-caption {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .time-left {
    font-size: 11px;
    color: var(--gold);
    font-weight: 600;
    background: rgba(245,197,24,0.1);
    padding: 4px 8px;
    border-radius: 8px;
  }

  /* ── VOTE BAR ── */
  .vote-bar-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 8px;
    margin: 14px 0;
    overflow: hidden;
  }
  .vote-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--fire), var(--gold));
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .vote-counts {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .vote-counts .fire-count { color: var(--fire); font-weight: 700; }
  .vote-counts .skip-count { color: var(--skip); }

  /* ── VOTE BUTTONS ── */
  .vote-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-vote {
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 14px;
    position: relative;
    overflow: hidden;
  }
  .btn-fire {
    background: linear-gradient(135deg, #ff4d4d, #ff8c00);
    color: white;
  }
  .btn-skip {
    background: var(--border);
    color: var(--muted);
  }
  .btn-vote:active { transform: scale(0.95); }
  .btn-vote.voted {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .btn-vote .ripple {
    position: absolute;
    border-radius: 50%;
    animation: ripple 0.6s ease-out;
    background: rgba(255,255,255,0.3);
    pointer-events: none;
  }
  @keyframes ripple {
    from { transform: scale(0); opacity: 1; width: 0; height: 0; }
    to   { transform: scale(4); opacity: 0; width: 100px; height: 100px; }
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── LEADERBOARD ── */
  .lb-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideIn 0.3s ease;
  }
  .lb-rank {
    font-size: 20px;
    font-weight: 900;
    min-width: 32px;
    text-align: center;
  }
  .lb-rank.gold   { color: var(--gold); }
  .lb-rank.silver { color: #aaa; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-info { flex: 1; }
  .lb-name { font-size: 14px; font-weight: 700; }
  .lb-beat { font-size: 12px; color: var(--muted); }
  .lb-score {
    font-size: 18px;
    font-weight: 800;
    color: var(--fire);
  }
  .lb-score span { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* ── LOADING ── */
  .loader {
    display: flex;
    justify-content: center;
    padding: 40px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #fff;
    color: #000;
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-in forwards;
    z-index: 9999;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎛️ Beat Battle</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('battle')">🔥 Batallas</button>
    <button class="tab" onclick="showTab('top')">🏆 Top</button>
  </div>
</div>

<div id="battle" class="section active">
  <div class="section-title">Batallas activas — vota en 24h</div>
  <div id="battles-list"><div class="loader"><div class="spinner"></div></div></div>
</div>

<div id="top" class="section">
  <div class="section-title">Clasificación global</div>
  <div id="top-list"><div class="loader"><div class="spinner"></div></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg       = window.Telegram?.WebApp;
const userId   = tg?.initDataUnsafe?.user?.id || 0;
const userName = tg?.initDataUnsafe?.user?.first_name || "Anónimo";

if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor("#0a0a0a");
  tg.setBackgroundColor("#0a0a0a");
}

let votedBattles = JSON.parse(localStorage.getItem("voted_battles") || "{}");

// ── Tabs ──────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(name).classList.add("active");
  event.target.classList.add("active");
  if (name === "top") loadTop();
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Confetti ──────────────────────────────────────────────
function fireConfetti(x, y) {
  const colors = ["#ff4d4d","#ff8c00","#f5c518","#00e676","#fff"];
  for (let i = 0; i < 20; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = (x + (Math.random() - 0.5) * 100) + "px";
    piece.style.top  = y + "px";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    piece.style.animationDuration = (0.8 + Math.random()) + "s";
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 2000);
  }
}

// ── Time left ─────────────────────────────────────────────
function timeLeft(expiresAt) {
  const diff = expiresAt - Math.floor(Date.now() / 1000);
  if (diff <= 0) return "Terminada";
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── Render battle card ─────────────────────────────────────
function renderBattle(b) {
  const total    = b.votes_fire + b.votes_skip;
  const pct      = total > 0 ? Math.round((b.votes_fire / total) * 100) : 50;
  const voted    = votedBattles[b.id];
  const isActive = b.expires_at > Math.floor(Date.now() / 1000);

  return `
  <div class="battle-card" id="battle-${b.id}">
    <div class="battle-header">
      <div>
        <div class="beat-author">🎵 ${escHtml(b.name)}</div>
        <div class="beat-caption">${escHtml(b.caption || "Sin descripción")}</div>
      </div>
      <div class="time-left">⏱ ${timeLeft(b.expires_at)}</div>
    </div>
    <div class="vote-bar-wrap">
      <div class="vote-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="vote-counts">
      <span class="fire-count">🔥 ${b.votes_fire} votos</span>
      <span>${pct}% fuego</span>
      <span class="skip-count">💀 ${b.votes_skip}</span>
    </div>
    <div class="vote-btns">
      <button class="btn-vote btn-fire ${voted ? 'voted' : ''}"
        onclick="${isActive && !voted ? `vote(${b.id}, 'fire', event)` : ''}"
        ${!isActive || voted ? 'disabled' : ''}>
        🔥 <span>${voted === 'fire' ? '¡Votaste!' : 'Fuego'}</span>
      </button>
      <button class="btn-vote btn-skip ${voted ? 'voted' : ''}"
        onclick="${isActive && !voted ? `vote(${b.id}, 'skip', event)` : ''}"
        ${!isActive || voted ? 'disabled' : ''}>
        💀 <span>${voted === 'skip' ? '¡Votaste!' : 'Skip'}</span>
      </button>
    </div>
  </div>`;
}

// ── Load battles ───────────────────────────────────────────
async function loadBattles() {
  try {
    const res  = await fetch("/api/battles/active");
    const data = await res.json();
    const list = document.getElementById("battles-list");
    if (!data.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🎵</div><p>No hay batallas activas.<br>Sube tu beat desde el bot y únete al battle!</p></div>`;
      return;
    }
    list.innerHTML = data.map(renderBattle).join("");
  } catch(e) {
    document.getElementById("battles-list").innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><p>Error cargando batallas.</p></div>`;
  }
}

// ── Vote ───────────────────────────────────────────────────
async function vote(battleId, voteType, event) {
  const btn = event.currentTarget;

  // Ripple effect
  const ripple = document.createElement("span");
  ripple.className = "ripple";
  const rect = btn.getBoundingClientRect();
  ripple.style.left = (event.clientX - rect.left - 50) + "px";
  ripple.style.top  = (event.clientY - rect.top - 50) + "px";
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  try {
    const res  = await fetch("/api/battles/vote", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({battle_id: battleId, voter_id: userId, vote: voteType})
    });
    const data = await res.json();

    if (data.already_voted) {
      showToast("Ya votaste en esta batalla");
      return;
    }

    if (data.ok) {
      // Save vote locally
      votedBattles[battleId] = voteType;
      localStorage.setItem("voted_battles", JSON.stringify(votedBattles));

      // Update UI
      const card  = document.getElementById(`battle-${battleId}`);
      const total = data.votes_fire + data.votes_skip;
      const pct   = total > 0 ? Math.round((data.votes_fire / total) * 100) : 50;

      card.querySelector(".vote-bar-fill").style.width = pct + "%";
      card.querySelector(".fire-count").textContent = `🔥 ${data.votes_fire} votos`;
      card.querySelector(".vote-counts span:nth-child(2)").textContent = `${pct}% fuego`;
      card.querySelector(".skip-count").textContent = `💀 ${data.votes_skip}`;

      card.querySelectorAll(".btn-vote").forEach(b => {
        b.classList.add("voted");
        b.disabled = true;
      });

      if (voteType === "fire") {
        card.querySelector(".btn-fire span").textContent = "¡Votaste!";
        fireConfetti(event.clientX, event.clientY);
        showToast("🔥 ¡Voto registrado!");
        if (tg) tg.HapticFeedback?.impactOccurred("medium");
      } else {
        card.querySelector(".btn-skip span").textContent = "¡Votaste!";
        showToast("💀 Skip registrado");
      }
    }
  } catch(e) {
    showToast("Error al votar. Intenta de nuevo.");
  }
}

// ── Load leaderboard ───────────────────────────────────────
async function loadTop() {
  const list = document.getElementById("top-list");
  list.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
  try {
    const res  = await fetch("/api/battles/top");
    const data = await res.json();
    if (!data.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🏆</div><p>Aún no hay beats en el ranking.<br>¡Sé el primero!</p></div>`;
      return;
    }
    const rankIcons = ["🥇","🥈","🥉"];
    const rankClass = ["gold","silver","bronze"];
    list.innerHTML = data.map((b, i) => `
      <div class="lb-item">
        <div class="lb-rank ${rankClass[i] || ''}">${rankIcons[i] || (i+1)}</div>
        <div class="lb-info">
          <div class="lb-name">${escHtml(b.name)}</div>
          <div class="lb-beat">${escHtml(b.caption || "Beat sin nombre")}</div>
          <div style="font-size:11px;color:#555;margin-top:4px">
            🔥 ${b.votes_fire}  ·  💀 ${b.votes_skip}
          </div>
        </div>
        <div class="lb-score">${b.score > 0 ? '+' : ''}${b.score}<br><span>score</span></div>
      </div>
    `).join("");
  } catch(e) {
    list.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Error cargando ranking.</p></div>`;
  }
}

function escHtml(str) {
  return String(str || "").replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

// ── Init ───────────────────────────────────────────────────
loadBattles();
// Refresh every 30 seconds
setInterval(loadBattles, 30000);
</script>
</body>
</html>
