<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mkeyz Studio — Edición Élite | Estudio Musical NFT</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ===== ESTILOS COMPACTOS Y MODERNOS (funciona en Telegram) ===== */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
:root {
  --bg-dark: #05070c;
  --card-bg: rgba(18, 22, 35, 0.75);
  --border-glow: rgba(245, 197, 24, 0.3);
  --gold: #f5c518;
  --gold2: #ff9f1c;
  --purple: #b06afc;
  --green: #00e676;
  --text: #f0f3fa;
  --text-dim: #8e94b0;
}
body {
  background: radial-gradient(circle at 10% 20%, #0a0e1a, #020408);
  color: var(--text);
  font-family: 'Segoe UI', 'Rajdhani', system-ui, -apple-system;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 60px;
}
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4; }

/* Header compacto */
.hdr {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(5, 7, 12, 0.85);
  backdrop-filter: blur(20px);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-glow);
}
.hdr-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.game-title {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 0.85rem;
  background: linear-gradient(135deg, #f5c518, #ffb347);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.coins-display, .gems-display {
  background: rgba(0,0,0,0.6);
  border-radius: 40px;
  padding: 4px 10px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.75rem;
  border: 1px solid rgba(245,197,24,0.3);
}
.coins-val, .gems-val { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 800; }
.coins-val { color: var(--gold); text-shadow: 0 0 4px #f5c518; }
.gems-val { color: var(--purple); text-shadow: 0 0 4px #b06afc; }
.xp-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.level-badge {
  background: linear-gradient(145deg, #f5c518, #e5a100);
  color: #000;
  font-weight: 900;
  font-family: 'Orbitron', monospace;
  padding: 3px 10px;
  border-radius: 30px;
  font-size: 0.7rem;
}
.xp-wrap {
  flex: 1;
  background: #1e2335;
  border-radius: 20px;
  height: 6px;
  overflow: hidden;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, #f5c518, #ffb347);
  width: 0%;
}
.xp-text { font-size: 0.65rem; color: var(--text-dim); }

/* Estudio grid */
.studio-room {
  margin: 10px 12px;
  background: radial-gradient(ellipse at 30% 30%, rgba(20, 25, 45, 0.8), rgba(5, 7, 15, 0.9));
  border-radius: 24px;
  padding: 12px 8px;
  border: 1px solid rgba(245,197,24,0.25);
}
.studio-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
@media (min-width: 480px) { .studio-grid { grid-template-columns: repeat(4, 1fr); } }
.studio-item {
  aspect-ratio: 1;
  background: radial-gradient(circle at 30% 20%, #1a1e30, #0f1220);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  border: 1px solid #2a2f44;
}
.studio-item.owned {
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(245,197,24,0.3);
  background: radial-gradient(circle at 30% 20%, #2a2510, #121524);
}
.item-emoji { font-size: 1.6rem; margin-bottom: 3px; }
.item-label { font-size: 0.55rem; font-weight: bold; color: var(--text-dim); }
.owned .item-label { color: var(--gold); }
.item-rate, .item-lvl {
  position: absolute;
  font-size: 0.5rem;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  padding: 2px 5px;
  border-radius: 12px;
}
.item-rate { top: 3px; right: 3px; color: var(--green); }
.item-lvl { bottom: 3px; left: 3px; color: #aaa; }

/* Botón collector */
.collect-wrap { padding: 0 12px 8px; }
.pending-info { font-size: 0.7rem; margin-bottom: 4px; text-align: center; }
.collect-btn {
  width: 100%;
  padding: 12px;
  font-size: 1rem;
  border-radius: 50px;
  background: linear-gradient(135deg, #f5c518, #ff9f1c);
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  border: none;
  color: black;
  box-shadow: 0 4px 0 #b57100;
  transform: translateY(-1px);
  cursor: pointer;
  transition: 0.05s linear;
}
.collect-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b57100; }
.collect-btn.empty {
  background: #2a2f44;
  box-shadow: none;
  color: var(--text-dim);
  transform: none;
}

/* Racha y recompensas */
.streak-banner {
  margin: 8px 12px;
  padding: 10px 14px;
  border-radius: 20px;
  background: linear-gradient(115deg, #1e1a0c, #0f0e1a);
  border-left: 4px solid gold;
  display: flex;
  align-items: center;
  gap: 10px;
}
.streak-title { font-size: 0.8rem; font-weight: bold; color: var(--gold); }
.streak-sub { font-size: 0.65rem; color: var(--text-dim); }
.streak-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none;
  padding: 6px 14px;
  border-radius: 40px;
  font-weight: bold;
  font-size: 0.7rem;
}
.rewards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 8px 12px;
}
.reward-card {
  background: rgba(20, 24, 40, 0.7);
  border-radius: 16px;
  padding: 8px 4px;
  text-align: center;
  font-size: 0.7rem;
  cursor: pointer;
}
.reward-card.available { border-color: #00e676; background: linear-gradient(145deg, #142010, #0a0f18); }

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  padding: 0 12px;
  margin: 8px 0 8px;
  overflow-x: auto;
}
.tab {
  background: #0c0f1c;
  border: 1px solid #2a2f44;
  border-radius: 30px;
  padding: 6px 10px;
  font-size: 0.7rem;
  font-weight: bold;
  white-space: nowrap;
  cursor: pointer;
}
.tab.active {
  background: linear-gradient(120deg, #f5c51820, #ffb34720);
  border-color: var(--gold);
  color: var(--gold);
}

/* Listas */
.shop-item, .mission-item, .minigame-card, .invite-section {
  margin: 6px 12px;
  padding: 10px 12px;
  border-radius: 20px;
  background: rgba(12, 16, 28, 0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  gap: 10px;
}
.shop-emoji, .mission-icon { font-size: 1.8rem; }
.shop-info, .mission-info { flex: 1; }
.shop-name, .mission-name { font-size: 0.85rem; font-weight: bold; }
.shop-desc, .mission-desc { font-size: 0.65rem; color: var(--text-dim); }
.shop-rate { font-size: 0.7rem; color: var(--green); }
.shop-buy {
  padding: 6px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: bold;
  border: none;
}
.shop-buy.can-buy, .shop-buy.upgrade { background: linear-gradient(135deg, #f5c518, #ffb347); color: black; }

/* Stats y logros */
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 16px;
  font-size: 0.75rem;
  border-bottom: 1px solid #2a2f44;
}
.ms-item {
  margin: 6px 12px;
  padding: 10px;
  border-radius: 16px;
  background: #0c0f1c;
  display: flex;
  gap: 12px;
  align-items: center;
}
.ms-item.reached { border-left: 3px solid gold; }

/* Popups y toasts */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.popup-box {
  background: #10131f;
  border: 1px solid gold;
  border-radius: 32px;
  padding: 20px;
  max-width: 260px;
  text-align: center;
}
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #fff;
  color: #000;
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 0.75rem;
  font-weight: bold;
  z-index: 999;
  transition: 0.3s;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.coin-float, .gem-float {
  position: fixed;
  pointer-events: none;
  font-size: 1.1rem;
  animation: floatUp 1s ease-out forwards;
  z-index: 1000;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
}
.collect-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(245,197,24,0.3) 0%, transparent 70%);
  pointer-events: none;
  animation: flash 0.5s ease-out;
}
@keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="hdr">
  <div class="hdr-top">
    <div class="game-title">🎛️ MKEYZ STUDIO</div>
    <div style="display: flex; gap: 6px;">
      <div class="coins-display"><span>🪙</span><span class="coins-val" id="coins-display">0</span></div>
      <div class="gems-display"><span>💎</span><span class="gems-val" id="gems-display">0</span></div>
    </div>
  </div>
  <div class="xp-row">
    <div class="level-badge" id="level-badge">LVL 1</div>
    <div class="xp-wrap"><div class="xp-fill" id="xp-fill"></div></div>
    <div class="xp-text" id="xp-text">0/100</div>
  </div>
</div>

<div class="studio-room"><div class="studio-grid" id="studio-grid"></div></div>
<div class="collect-wrap">
  <div class="pending-info">⚡ <span id="rate-display">0</span> 🪙/hora</div>
  <button class="collect-btn empty" id="collect-btn" onclick="collectCoins()">RECOGER COINS</button>
</div>

<div class="streak-banner" id="streakBanner">
  <div style="font-size: 1.6rem;" id="streak-icon">🔥</div>
  <div style="flex:1"><div class="streak-title" id="streak-title">Racha diaria</div><div class="streak-sub" id="streak-sub"></div></div>
  <button class="streak-btn" id="streak-btn" onclick="claimStreak()">CLAIM</button>
</div>

<div class="rewards-section">
  <div class="rewards-title" style="margin-left: 12px; margin-bottom: 4px; font-size: 0.7rem;">🎁 RECOMPENSAS DIARIAS</div>
  <div class="rewards-grid" id="rewards-grid"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('shop',this)">🛒 TIENDA</div>
  <div class="tab" onclick="showTab('missions',this)">📋 MISIONES</div>
  <div class="tab" onclick="showTab('games',this)">🎮 ACTIVO</div>
  <div class="tab" onclick="showTab('invite',this)">🎫 INVITAR</div>
  <div class="tab" onclick="showTab('stats',this)">📊 STATS</div>
  <div class="tab" onclick="showTab('milestones',this)">🏆 LOGROS</div>
</div>

<div id="tab-shop"><div class="shop-list" id="shop-list"></div></div>
<div id="tab-missions" style="display:none"><div class="missions-list" id="missions-list"></div></div>
<div id="tab-games" style="display:none"><div class="minigames-list" id="minigames-list"></div></div>
<div id="tab-invite" style="display:none"><div class="invite-section" id="invite-section"></div></div>
<div id="tab-stats" style="display:none"><div class="stats-section" id="stats-section"></div></div>
<div id="tab-milestones" style="display:none"><div class="ms-list" id="ms-list"></div></div>

<div class="popup-overlay" id="popup"><div class="popup-box"><div class="popup-emoji" id="pop-emoji">🎉</div><div class="popup-title" id="pop-title"></div><div class="popup-desc" id="pop-desc"></div><button class="popup-btn" onclick="closePopup()">✨ GENIAL ✨</button></div></div>
<div class="toast" id="toast"></div>

<script>
// --------------------------------------------------------------
// TELEGRAM & USER
// --------------------------------------------------------------
const tg = window.Telegram?.WebApp;
if(tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#05070c"); tg.setBackgroundColor("#05070c"); }
let USER_ID = tg?.initDataUnsafe?.user?.id || localStorage.getItem("mkeyz_uid") || "g_"+Math.random().toString(36).slice(2,8);
if(!tg?.initDataUnsafe?.user?.id) localStorage.setItem("mkeyz_uid", USER_ID);
const SAVE_KEY = "mkeyz_elite_"+USER_ID;

// --------------------------------------------------------------
// GAME DATA (rebalanceado)
// --------------------------------------------------------------
const EQUIPMENT = [
  { id:"laptop",     emoji:"💻", name:"Laptop",            desc:"Primer setup",           baseRate:5,    cost:0,      maxLevel:5, xpGain:10,  unlockLevel:1 },
  { id:"headphones", emoji:"🎧", name:"Auriculares",       desc:"Escucha cada detalle",   baseRate:8,    cost:40,     maxLevel:5, xpGain:15,  unlockLevel:1 },
  { id:"mic",        emoji:"🎙️", name:"Micrófono",         desc:"Graba voces",            baseRate:12,   cost:120,    maxLevel:5, xpGain:20,  unlockLevel:2 },
  { id:"keyboard",   emoji:"🎹", name:"Teclado MIDI",      desc:"Compone melodías",       baseRate:18,   cost:300,    maxLevel:5, xpGain:25,  unlockLevel:3 },
  { id:"drums",      emoji:"🥁", name:"Drum Machine",      desc:"Ritmos perfectos",       baseRate:25,   cost:600,    maxLevel:5, xpGain:30,  unlockLevel:5 },
  { id:"bass",       emoji:"🎸", name:"Bajo Eléctrico",    desc:"Frecuencias que mueven", baseRate:35,   cost:1200,   maxLevel:5, xpGain:35,  unlockLevel:7 },
  { id:"monitors",   emoji:"🔊", name:"Monitores",         desc:"Mezcla precisa",         baseRate:50,   cost:2500,   maxLevel:5, xpGain:40,  unlockLevel:10 },
  { id:"synth",      emoji:"🎛️", name:"Sintetizador",      desc:"Sonidos únicos",         baseRate:70,   cost:5000,   maxLevel:5, xpGain:50,  unlockLevel:12 },
  { id:"audio_int",  emoji:"🎚️", name:"Audio Interface",   desc:"Calidad profesional",    baseRate:100,  cost:9000,   maxLevel:5, xpGain:60,  unlockLevel:15 },
  { id:"console",    emoji:"🖥️", name:"Consola de Mezcla", desc:"Corazón del estudio",    baseRate:140,  cost:18000,  maxLevel:5, xpGain:75,  unlockLevel:20 },
  { id:"sampler",    emoji:"🎵", name:"Sampler",           desc:"Cualquier sonido",       baseRate:200,  cost:35000,  maxLevel:5, xpGain:90,  unlockLevel:25 },
  { id:"vocoder",    emoji:"🤖", name:"Vocoder",           desc:"Voz del futuro",         baseRate:280,  cost:65000,  maxLevel:5, xpGain:100, unlockLevel:30 },
  { id:"mpc",        emoji:"🟫", name:"MPC",               desc:"Instrumento legendario", baseRate:400,  cost:120000, maxLevel:5, xpGain:120, unlockLevel:40 },
  { id:"fl_studio",  emoji:"🌈", name:"FL Studio Pro",     desc:"DAW definitivo",         baseRate:550,  cost:250000, maxLevel:5, xpGain:150, unlockLevel:50 },
  { id:"studio_room",emoji:"🏠", name:"Sala de Mezcla",    desc:"Tu espacio profesional", baseRate:800,  cost:500000, maxLevel:3, xpGain:200, unlockLevel:60 },
  { id:"label",      emoji:"🏷️", name:"Sello Discográfico",desc:"Lanza artistas",         baseRate:1200, cost:1000000,maxLevel:3, xpGain:300, unlockLevel:80 }
];

const DAILY_REWARDS = [
  { id:"r_daw",      emoji:"🎛️", label:"Usar DAW",      coins:25,  xp:15, gems:1 },
  { id:"r_battle",   emoji:"🎮", label:"Beat Battle",   coins:40,  xp:25, gems:1 },
  { id:"r_playlist", emoji:"🎧", label:"Playlist",      coins:15,  xp:10, gems:1 },
  { id:"r_chord",    emoji:"🎹", label:"Chord Gen",     coins:20,  xp:12, gems:1 },
  { id:"r_voice",    emoji:"🎤", label:"Voice Studio",  coins:30,  xp:18, gems:1 },
  { id:"r_share",    emoji:"📲", label:"Compartir Bot", coins:50,  xp:30, gems:2 },
];

const MILESTONES = [
  { id:"first_buy",  icon:"🛒", name:"Primera Compra",   desc:"Compra tu primer equipo",       req: v=>v.totalPurchases>=1 },
  { id:"coins_1k",   icon:"🪙", name:"1,000 MKEYZ",      desc:"Acumula 1,000 coins",           req: v=>v.totalEarned>=1000 },
  { id:"coins_10k",  icon:"💰", name:"10,000 MKEYZ",     desc:"Acumula 10,000 coins",          req: v=>v.totalEarned>=10000 },
  { id:"streak_7",   icon:"⚡", name:"Semana Completa",  desc:"7 días consecutivos",           req: v=>v.bestStreak>=7 },
  { id:"lvl_10",     icon:"🚀", name:"Nivel 10",         desc:"Alcanza nivel 10",              req: v=>v.level>=10 },
  { id:"lvl_25",     icon:"⭐", name:"Nivel 25",         desc:"Alcanza nivel 25",              req: v=>v.level>=25 },
  { id:"rate_500",   icon:"📈", name:"500/hora",         desc:"Genera 500 MKEYZ/hora",         req: v=>calcRate()>=500 },
];

const MISSIONS_LIST = [
  { id:"collect", name:"Recolector", desc:"Recoge monedas 3 veces", target:3, rewardCoins:60, rewardXP:25, rewardGems:2 },
  { id:"upgrade", name:"Mejorador", desc:"Mejora cualquier equipo 1 vez", target:1, rewardCoins:100, rewardXP:40, rewardGems:3 },
  { id:"minigame",name:"Aventurero", desc:"Juega 2 minijuegos", target:2, rewardCoins:80, rewardXP:30, rewardGems:2 }
];

const MINIGAMES = [
  { id:"rapid", name:"🎧 Mezcla rápida", desc:"Toca los 3 botones en orden", limit:3, rewardGems:2, rewardCoins:40 },
  { id:"bpm",   name:"🎛️ Adivina BPM", desc:"Toca cuando creas que son 120 BPM (0.5s)", limit:3, rewardGems:3, rewardCoins:60 }
];

// --------------------------------------------------------------
// INITIAL STATE
// --------------------------------------------------------------
let S = {
  coins:0, totalEarned:0, gems:0, xp:0, level:1, owned:{laptop:1},
  lastCollect:Date.now(), lastLogin:null, streak:0, bestStreak:0,
  streakClaimedToday:false, totalPurchases:0, daysPlayed:0,
  milestones:{}, dailyRewards:{}, coinsPerHour:0,
  missions: {}, miniGamesLimits: {},
  referralCode: null, referredBy: null,
  eventBonus: 1.0
};

function defaultState() { return JSON.parse(JSON.stringify(S)); }

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw) {
      let p = JSON.parse(raw);
      Object.assign(S, p);
      if(!S.missions) S.missions={};
      if(!S.miniGamesLimits) S.miniGamesLimits={};
    } else {
      // PRIMERA VEZ: regalo de bienvenida y adelantar lastCollect para tener monedas pendientes
      S.coins = 20;               // 20 monedas de bienvenida
      S.totalEarned = 20;
      S.lastCollect = Date.now() - 3600000; // hace 1 hora → pending = rate * 1 hora
    }
  } catch(e) {}
  if(!S.referralCode) S.referralCode = USER_ID.slice(-6).toUpperCase();
  
  // Comprobar invitación por URL
  const urlParams = new URLSearchParams(window.location.search);
  const refStart = urlParams.get('start');
  if(refStart && refStart.startsWith('ref_') && !S.referredBy) {
    S.referredBy = refStart.slice(4);
    S.gems += 25;
    showToast(`🎉 Invitado por ${S.referredBy} +25💎`);
    saveState();
  }
  
  S.coinsPerHour = calcRate();
  checkDailyReset();
  renderAll();
  startTick();
}

function saveState() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch(e) {}
}

function calcRate() {
  return EQUIPMENT.reduce((sum,eq) => sum + ((S.owned[eq.id]||0) ? eq.baseRate * (1 + ((S.owned[eq.id]-1)*0.5)) : 0), 0);
}

function getPending() {
  let hrs = (Date.now() - S.lastCollect) / 3600000;
  return Math.floor(calcRate() * Math.min(hrs, 8));
}

function addXP(amount) {
  S.xp += amount;
  let need = Math.floor(100 * Math.pow(1.15, S.level-1));
  while(S.xp >= need && S.level < 100) {
    S.xp -= need;
    S.level++;
    need = Math.floor(100 * Math.pow(1.15, S.level-1));
    showPopup("🚀","¡NIVEL "+S.level+"!","¡Nuevos equipos disponibles!");
  }
}

function addGems(amount) {
  if(amount>0) {
    S.gems += amount;
    floatGems(amount);
    saveState();
    renderStats();
  }
}

function floatCoins(amount){
  let el=document.createElement("div"); el.className="coin-float"; el.textContent="+"+fmtNum(amount)+" 🪙";
  el.style.cssText="left:50%;top:42%;transform:translateX(-50%)";
  document.body.appendChild(el); setTimeout(()=>el.remove(),1300);
}
function floatGems(amount){
  let el=document.createElement("div"); el.className="gem-float"; el.textContent="+"+amount+" 💎";
  el.style.cssText="left:50%;top:42%;transform:translateX(-50%)";
  document.body.appendChild(el); setTimeout(()=>el.remove(),1300);
}

// --------------------------------------------------------------
// COLECCIÓN DE MONEDAS (¡AHORA SÍ FUNCIONA!)
// --------------------------------------------------------------
function collectCoins() {
  let pending = getPending();
  if(pending <= 0) {
    showToast("⏳ Aún no hay nada que recolectar. Vuelve en unos minutos.");
    if(tg) tg.HapticFeedback?.impactOccurred("light");
    return;
  }
  
  let gained = Math.floor(pending * (S.eventBonus || 1));
  S.coins += gained;
  S.totalEarned += gained;
  S.lastCollect = Date.now();  // resetear el temporizador
  
  addXP(Math.floor(gained / 10));
  trackMissionProgress("collect", 1);
  
  // Efectos visuales y hápticos
  let flash = document.createElement("div"); flash.className="collect-flash";
  document.body.appendChild(flash); setTimeout(()=>flash.remove(), 500);
  floatCoins(gained);
  
  let el = document.getElementById("coins-display");
  el.style.transform = "scale(1.2)";
  setTimeout(()=>el.style.transform = "scale(1)", 200);
  
  saveState();
  renderAll();
  checkMilestones();
  
  if(tg) tg.HapticFeedback?.notificationOccurred("success");
  showToast(`✨ ¡+${fmtNum(gained)} MKEYZ!`);
}

// --------------------------------------------------------------
// COMPRAR EQUIPO
// --------------------------------------------------------------
function buyEquipment(id){
  let eq = EQUIPMENT.find(e=>e.id===id);
  let lvl = S.owned[eq.id] || 0;
  if(lvl >= eq.maxLevel){ showToast("Nivel máximo ⭐"); return; }
  if(S.level < eq.unlockLevel){ showToast("🔒 Nivel "+eq.unlockLevel+" requerido"); return; }
  let cost = Math.floor(eq.cost * Math.pow(1.8, lvl));
  if(S.coins < cost){ showToast("🪙 Monedas insuficientes"); return; }
  
  S.coins -= cost;
  S.owned[eq.id] = lvl + 1;
  S.totalPurchases++;
  S.coinsPerHour = calcRate();
  addXP(eq.xpGain);
  
  if(lvl === 0) showPopup(eq.emoji, "¡"+eq.name+"!", eq.desc+"\n\n+"+eq.baseRate+" 🪙/hora");
  else showToast(eq.emoji+" Nivel "+(lvl+1)+" activado");
  
  saveState();
  renderAll();
  checkMilestones();
  trackMissionProgress("upgrade", 1);
  if(tg) tg.HapticFeedback?.impactOccurred("medium");
}

// --------------------------------------------------------------
// MISIONES DIARIAS Y RESETEOS
// --------------------------------------------------------------
function resetDailyMissions(){
  let today = new Date().toDateString();
  if(S.missions.date !== today){
    S.missions = { date: today, progress: { collect:0, upgrade:0, minigame:0 }, claimed: { collect:false, upgrade:false, minigame:false } };
    saveState();
  }
}
function trackMissionProgress(missionId, inc=1){
  resetDailyMissions();
  if(!S.missions.claimed[missionId]){
    S.missions.progress[missionId] = (S.missions.progress[missionId]||0) + inc;
    if(S.missions.progress[missionId] >= MISSIONS_LIST.find(m=>m.id===missionId).target){
      showToast("✨ Misión completada: "+MISSIONS_LIST.find(m=>m.id===missionId).name+" ¡Reclama!");
    }
    saveState();
  }
  renderMissions();
}
function claimMission(missionId){
  resetDailyMissions();
  if(S.missions.claimed[missionId]) return;
  let m = MISSIONS_LIST.find(m=>m.id===missionId);
  if(S.missions.progress[missionId] >= m.target){
    S.coins += m.rewardCoins;
    S.totalEarned += m.rewardCoins;
    addXP(m.rewardXP);
    addGems(m.rewardGems);
    S.missions.claimed[missionId] = true;
    saveState();
    renderAll();
    showToast(`✅ Reclamado: +${m.rewardCoins}🪙 +${m.rewardGems}💎`);
  }
}

function checkDailyReset(){
  let today = new Date().toDateString();
  if(S.lastLogin !== today){
    let yesterday = new Date(Date.now()-86400000).toDateString();
    S.streak = S.lastLogin===yesterday ? S.streak+1 : 1;
    S.bestStreak = Math.max(S.bestStreak, S.streak);
    S.lastLogin = today;
    S.daysPlayed++;
    S.streakClaimedToday = false;
    S.dailyRewards = {};
    saveState();
  }
}
function claimStreak(){
  if(S.streakClaimedToday){ showToast("Ya reclamaste hoy"); return; }
  let mult = Math.min(S.streak, 30);
  let bonus = Math.floor(calcRate() * mult);
  S.coins += bonus;
  S.totalEarned += bonus;
  S.streakClaimedToday = true;
  addGems(Math.floor(mult/3)+1);
  floatCoins(bonus);
  saveState();
  renderAll();
  showToast(`🔥 +${fmtNum(bonus)}🪙 +${Math.floor(mult/3)+1}💎 por racha x${mult}`);
  if(tg) tg.HapticFeedback?.notificationOccurred("success");
}
function claimDailyReward(r,card){
  let today=new Date().toDateString();
  if(S.dailyRewards[r.id]===today) return;
  S.dailyRewards[r.id]=today;
  S.coins+=r.coins;
  S.totalEarned+=r.coins;
  addXP(r.xp);
  addGems(r.gems);
  floatCoins(r.coins);
  if(r.gems) floatGems(r.gems);
  card.className="reward-card claimed";
  card.innerHTML = `<div class="reward-emoji">${r.emoji}</div><div class="reward-label">${r.label}</div><div class="reward-coins">✅</div>`;
  saveState();
  renderAll();
  showToast(`${r.emoji} +${r.coins}🪙 +${r.gems}💎`);
}

// --------------------------------------------------------------
// MINIJUEGOS
// --------------------------------------------------------------
function playMinigame(id){
  let limits = S.miniGamesLimits;
  let today = new Date().toDateString();
  if(!limits.date) limits.date=today;
  if(limits.date!==today){
    limits.date=today;
    limits.rapid=MINIGAMES.find(g=>g.id==="rapid").limit;
    limits.bpm=MINIGAMES.find(g=>g.id==="bpm").limit;
  }
  if(limits[id]<=0){ showToast("Hoy ya jugaste todas las partidas"); return; }
  if(id==="rapid") rapidGame();
  else bpmGame();
}
function rapidGame(){
  let seq = ["🎵","🎸","🎹"];
  let msg = seq.join(" → ")+"\n\nRepite el orden";
  let userSeq = [];
  let pop = document.createElement("div"); pop.className="popup-overlay"; pop.style.display="flex";
  pop.innerHTML = `<div class="popup-box"><div class="popup-emoji">🎧</div><div class="popup-title">Mezcla rápida</div><div class="popup-desc">${msg}</div><div style="display:flex;gap:12px;justify-content:center;margin-top:12px">${seq.map(s=>`<button style="padding:6px 12px;background:var(--gold);border:none;border-radius:12px;font-weight:bold" onclick="window._rapidClick('${s}')">${s}</button>`).join("")}</div><button class="popup-btn" onclick="this.closest('.popup-overlay').remove()">Cancelar</button></div>`;
  document.body.appendChild(pop);
  window._rapidClick = (s)=>{
    userSeq.push(s);
    if(userSeq.join("")===seq.join("")){
      pop.remove(); delete window._rapidClick;
      finishMinigame("rapid", true);
    } else if(userSeq.length===seq.length){
      pop.remove(); delete window._rapidClick;
      finishMinigame("rapid", false);
    }
  };
}
function bpmGame(){
  let start = Date.now();
  let pop = document.createElement("div"); pop.className="popup-overlay"; pop.style.display="flex";
  pop.innerHTML = `<div class="popup-box"><div class="popup-emoji">🎛️</div><div class="popup-title">Adivina BPM</div><div class="popup-desc">Toca cuando creas que han pasado 0.5s (margen 0.25s)</div><button id="bpmTap" style="padding:10px;background:var(--gold);border:none;border-radius:50px;margin-top:12px;font-weight:bold">👆 TOCAR</button><button class="popup-btn" style="margin-top:8px" onclick="this.closest('.popup-overlay').remove()">Cancelar</button></div>`;
  document.body.appendChild(pop);
  document.getElementById("bpmTap").onclick = ()=>{
    let elapsed = (Date.now()-start)/1000;
    let diff = Math.abs(elapsed-0.5);
    let success = diff < 0.25;
    pop.remove();
    finishMinigame("bpm", success);
  };
}
function finishMinigame(gameId, success){
  if(!success){ showToast("❌ Fallaste, intenta de nuevo"); return; }
  let limits = S.miniGamesLimits;
  let today = new Date().toDateString();
  if(limits.date!==today){
    limits.date=today;
    limits.rapid=MINIGAMES.find(g=>g.id==="rapid").limit;
    limits.bpm=MINIGAMES.find(g=>g.id==="bpm").limit;
  }
  if(limits[gameId]<=0) return;
  limits[gameId]--;
  let game = MINIGAMES.find(g=>g.id===gameId);
  S.coins += game.rewardCoins;
  S.totalEarned += game.rewardCoins;
  addGems(game.rewardGems);
  saveState();
  renderAll();
  showToast(`🎉 +${game.rewardCoins}🪙 +${game.rewardGems}💎`);
  trackMissionProgress("minigame",1);
  if(tg) tg.HapticFeedback?.notificationOccurred("success");
}

    <div class="invite-code" style="background:#00000066; padding:8px; border-radius:40px; text-align:center; font-family:monospace; cursor:pointer;" onclick="navigator.clipboard.writeText('${link}');showToast('📋 Link copiado')">${S.referralCode}<br><span style="font-size:0.6rem;">🔗 toca para copiar</span></div>
    <div style="margin-top: 8px; background: #1a1e30; padding: 10px; border-radius: 16px; font-size:0.7rem;">
      <div>✨ Cada amigo invitado te da <strong>5% de sus ganancias en GEMS</strong>.</div>
      ${S.referredBy ? `<div style="color:var(--green); margin-top:4px;">✅ Invitado por: ${S.referredBy} → +25💎</div>` : '<div style="color:var(--gold);">💎 Las gemas se convertirán en tokens MKEYZ exclusivos</div>'}
    </div>
  `;
}

// --------------------------------------------------------------
// RENDER ALL UI
// --------------------------------------------------------------
function fmtNum(n){
  n=Math.floor(n);
  if(n>=1e6) return (n/1e6).toFixed(1)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"K";
  return n.toString();
}
function renderAll(){
  document.getElementById("coins-display").innerText = fmtNum(S.coins);
  document.getElementById("gems-display").innerText = fmtNum(S.gems);
  let need = Math.floor(100 * Math.pow(1.15, S.level-1));
  let pct = Math.min(100, (S.xp/need)*100);
  document.getElementById("xp-fill").style.width = pct+"%";
  document.getElementById("xp-text").innerHTML = fmtNum(S.xp)+"/"+fmtNum(need);
  document.getElementById("level-badge").innerHTML = "LVL "+S.level;
  document.getElementById("rate-display").innerHTML = fmtNum(calcRate());
  renderRoom(); renderShop(); renderMissions(); renderMinigames(); renderRewards(); renderStreak(); renderStats(); renderMilestones(); renderInvite();
}
function renderRoom(){
  let grid=document.getElementById("studio-grid");
  grid.innerHTML="";
  EQUIPMENT.slice(0,12).forEach(eq=>{
    let lvl=S.owned[eq.id]||0;
    let locked=S.level<eq.unlockLevel;
    let div=document.createElement("div");
    div.className="studio-item"+(lvl>0?" owned":locked?" locked":"");
    if(lvl>0){
      let r=document.createElement("div"); r.className="item-rate";
      r.innerText="+"+fmtNum(Math.floor(eq.baseRate*(1+(lvl-1)*0.5)));
      div.appendChild(r);
    }
    let em=document.createElement("div"); em.className="item-emoji"; em.innerText=eq.emoji; div.appendChild(em);
    let lbl=document.createElement("div"); lbl.className="item-label"; lbl.innerText=eq.name.split(" ")[0]; div.appendChild(lbl);
    if(lvl>0){
      let l=document.createElement("div"); l.className="item-lvl"; l.innerText="Lv"+lvl; div.appendChild(l);
    }
    grid.appendChild(div);
  });
}
function renderShop(){
  let list=document.getElementById("shop-list");
  list.innerHTML="";
  EQUIPMENT.forEach(eq=>{
    let lvl=S.owned[eq.id]||0;
    let locked=S.level<eq.unlockLevel;
    let maxed=lvl>=eq.maxLevel;
    let cost=Math.floor(eq.cost*Math.pow(1.8,lvl));
    let canBuy=!locked&&!maxed&&S.coins>=cost;
    let rate=Math.floor(eq.baseRate*(1+lvl*0.5));
    let affordableClass = canBuy ? "affordable" : "";
    let btnClass = maxed?"maxed-btn":locked?"cant-buy":lvl>0?(canBuy?"upgrade":"cant-buy"):(canBuy?"can-buy":"cant-buy");
    let btnText = maxed?"MAX":locked?"Lv"+eq.unlockLevel:fmtNum(cost);
    let div=document.createElement("div");
    div.className=`shop-item ${affordableClass}`;
    div.innerHTML=`<div class="shop-emoji">${eq.emoji}</div><div class="shop-info"><div class="shop-name">${eq.name}${lvl>0?" Lv"+lvl:""}</div><div class="shop-desc">${locked?`Nivel ${eq.unlockLevel} requerido`:eq.desc}</div><div class="shop-rate">+${fmtNum(rate)}/h</div><div class="level-dots">${Array(eq.maxLevel).fill().map((_,i)=>`<div class="level-dot${i<lvl?" filled":""}"></div>`).join("")}</div></div><button class="shop-buy ${btnClass}">${btnText}</button>`;
    div.querySelector("button").onclick=()=>buyEquipment(eq.id);
    list.appendChild(div);
  });
}
function renderMissions(){
  let container=document.getElementById("missions-list");
  if(!container)return;
  resetDailyMissions();
  container.innerHTML=MISSIONS_LIST.map(m=>{
    let prog=S.missions.progress[m.id]||0;
    let claimed=S.missions.claimed[m.id];
    let complete=prog>=m.target;
    return `<div class="mission-item"><div class="mission-icon">${m.id==="collect"?"🪙":m.id==="upgrade"?"🔧":"🎮"}</div><div class="mission-info"><div class="mission-name">${m.name}</div><div class="mission-desc">${m.desc} (${prog}/${m.target})</div><div class="mission-progress">💰+${m.rewardCoins} ✨+${m.rewardXP} 💎+${m.rewardGems}</div></div>${!claimed&&complete?`<button class="shop-buy can-buy" onclick="claimMission('${m.id}')">RECLAMAR</button>`:claimed?`<button class="shop-buy maxed-btn" disabled>✓ OK</button>`:`<button class="shop-buy cant-buy">🔒</button>`}</div>`;
  }).join("");
}
function renderMinigames(){
  let container=document.getElementById("minigames-list");
  if(!container)return;
  let limits=S.miniGamesLimits;
  let today=new Date().toDateString();
  if(limits.date!==today){
    limits.date=today;
    limits.rapid=MINIGAMES.find(g=>g.id==="rapid").limit;
    limits.bpm=MINIGAMES.find(g=>g.id==="bpm").limit;
  }
  container.innerHTML=MINIGAMES.map(g=>`<div class="minigame-card" onclick="playMinigame('${g.id}')"><div class="mission-icon">${g.emoji}</div><div class="mission-info"><div class="mission-name">${g.name}</div><div class="mission-desc">${g.desc}</div><div class="minigame-limit">🎯 Quedan ${limits[g.id]||g.limit}/${g.limit} intentos · 💎${g.rewardGems} + 🪙${g.rewardCoins}</div></div></div>`).join("");
}
function renderRewards(){
  let grid=document.getElementById("rewards-grid");
  grid.innerHTML="";
  let today=new Date().toDateString();
  DAILY_REWARDS.forEach(r=>{
    let claimed=S.dailyRewards[r.id]===today;
    let card=document.createElement("div");
    card.className="reward-card "+(claimed?"claimed":"available");
    card.innerHTML=`<div class="reward-emoji">${r.emoji}</div><div class="reward-label">${r.label}</div><div class="reward-coins">${claimed?"✅":`+${r.coins}🪙 +${r.gems}💎`}</div>`;
    if(!claimed) card.onclick=()=>claimDailyReward(r,card);
    grid.appendChild(card);
  });
}
function renderStreak(){
  document.getElementById("streak-icon").innerHTML=S.streak>0?"🔥":"💤";
  document.getElementById("streak-title").innerHTML=S.streak>0?"Racha "+S.streak+" días":"Sin racha";
  let mult=Math.min(S.streak,30);
  let bonus=Math.floor(calcRate()*mult);
  document.getElementById("streak-sub").innerHTML=S.streakClaimedToday?"✅ Reclamado hoy":S.streak>0?`Bonus: +${fmtNum(bonus)}🪙 +${Math.floor(mult/3)+1}💎 (×${mult})`:"Entra mañana";
  let btn=document.getElementById("streak-btn");
  btn.innerText=S.streakClaimedToday?"✓ OK":"RECLAMAR";
  btn.onclick=claimStreak;
}
function renderStats(){
  let stDiv=document.getElementById("stats-section");
  if(stDiv) stDiv.innerHTML=`<div class="stat-row"><span class="s-label">🪙 Total ganado</span><span class="s-val">${fmtNum(S.totalEarned)}</span></div><div class="stat-row"><span class="s-label">💎 Gemas (futuro token)</span><span class="s-val">${fmtNum(S.gems)}</span></div><div class="stat-row"><span class="s-label">⚡ Coins/hora</span><span class="s-val">${fmtNum(calcRate())}</span></div><div class="stat-row"><span class="s-label">🔥 Racha actual</span><span class="s-val">${S.streak} días</span></div><div class="stat-row"><span class="s-label">🏆 Mejor racha</span><span class="s-val">${S.bestStreak} días</span></div><div class="stat-row"><span class="s-label">🎚️ Equipos comprados</span><span class="s-val">${S.totalPurchases}</span></div><div class="stat-row"><span class="s-label">📅 Días jugando</span><span class="s-val">${S.daysPlayed}</span></div><div class="stat-row"><span class="s-label">👤 Código único</span><span class="s-val" style="font-size:0.65rem;">${S.referralCode}</span></div>`;
}
function renderMilestones(){
  let list=document.getElementById("ms-list");
  list.innerHTML=MILESTONES.map(m=>{
    let reached=!!S.milestones[m.id];
    return `<div class="ms-item${reached?" reached":""}"><div class="ms-icon">${m.icon}</div><div><div class="ms-name">${m.name}${reached?" ✓":""}</div><div class="ms-req">${m.desc}</div></div></div>`;
  }).join("");
}
function checkMilestones(){
  MILESTONES.forEach(m=>{
    if(!S.milestones[m.id] && m.req(S)){
      S.milestones[m.id]=true;
      saveState();
      setTimeout(()=>showPopup(m.icon,m.name,m.desc),600);
    }
  });
}

// --------------------------------------------------------------
// UI HELPERS
// --------------------------------------------------------------
function showTab(name,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  ["shop","missions","games","invite","stats","milestones"].forEach(t=>document.getElementById("tab-"+t).style.display=name===t?"":"none");
  if(name==="missions") renderMissions();
  if(name==="games") renderMinigames();
  if(name==="invite") renderInvite();
  if(name==="stats") renderStats();
  if(name==="milestones") renderMilestones();
}
function showPopup(emoji,title,desc){
  document.getElementById("pop-emoji").innerHTML=emoji;
  document.getElementById("pop-title").innerHTML=title;
  document.getElementById("pop-desc").innerHTML=desc;
  document.getElementById("popup").classList.add("show");
}
function closePopup(){ document.getElementById("popup").classList.remove("show"); }
function showToast(msg){
  let t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}
function startTick(){
  setInterval(()=>{
    let pending=getPending();
    let btn=document.getElementById("collect-btn");
    if(pending>0){
      btn.className="collect-btn";
      btn.innerHTML="RECOGER +"+fmtNum(pending)+" 🪙";
    } else {
      btn.className="collect-btn empty";
      btn.innerHTML="Generando coins...";
    }
    let liveCoins = S.coins + Math.floor((calcRate()/3600000)*Math.min(Date.now()-S.lastCollect,8*3600000));
    document.getElementById("coins-display").innerText = fmtNum(liveCoins);
  }, 500);
  setInterval(()=>{ if(!document.hidden) renderMinigames(); }, 30000);
}

// --------------------------------------------------------------
// CANVAS DE FONDO
// --------------------------------------------------------------
const bgCanvas = document.getElementById("bg-canvas");
const ctx = bgCanvas.getContext("2d");
let particles = [];
function resizeCanvas(){ bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight; }
window.addEventListener("resize",resizeCanvas); resizeCanvas();
function drawBg(){
  if(!bgCanvas) return;
  requestAnimationFrame(drawBg);
  ctx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  if(particles.length<30 && Math.random()<0.2) particles.push({x:Math.random()*bgCanvas.width, y:bgCanvas.height+5, r:Math.random()*1.5+0.8, sp:Math.random()*0.6+0.3, alpha:0.6});
  particles = particles.filter(p=>p.y>-10);
  particles.forEach(p=>{ p.y-=p.sp; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(245,197,24,${p.alpha*0.4})`; ctx.fill(); });
}
drawBg();

// EXPOSICIÓN GLOBAL Y ARRANQUE

window.collectCoins = collectCoins;
window.claimMission = claimMission;
window.playMinigame = playMinigame;
window.showTab = showTab;
window.closePopup = closePopup;
window.claimStreak = claimStreak;
window.buyEquipment = buyEquipment;

loadState();
</script>
