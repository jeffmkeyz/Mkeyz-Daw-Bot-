<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mkeyz Studio — Pulido | Juego Musical Élite</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

:root {
  --gold: #ffd966;
  --gold2: #ffb347;
  --purple: #c084fc;
  --green: #4ade80;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
}

body {
  background: radial-gradient(circle at 10% 20%, #0f1222, #03050a);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  padding-bottom: 20px;
  overflow-x: hidden;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
}

/* Header compacto */
.hdr {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(5, 7, 15, 0.9);
  backdrop-filter: blur(16px);
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255, 221, 102, 0.3);
}

.hdr-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  flex-wrap: wrap;
  gap: 6px;
}

.game-title {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 0.8rem;
  background: linear-gradient(135deg, #ffdd99, #ffb347);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.coins-display, .gems-display {
  background: rgba(0, 0, 0, 0.6);
  border-radius: 40px;
  padding: 2px 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  border: 1px solid rgba(255, 200, 0, 0.5);
}
.coins-val, .gems-val {
  font-family: monospace;
  font-size: 0.85rem;
  font-weight: bold;
}
.coins-val { color: #ffd966; }
.gems-val { color: #d8b4fe; }

.xp-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.level-badge {
  background: linear-gradient(145deg, #ffd966, #ffb347);
  color: #1e1b0c;
  font-weight: bold;
  padding: 2px 10px;
  border-radius: 30px;
  font-size: 0.7rem;
}
.xp-wrap {
  flex: 1;
  background: #2d2f42;
  border-radius: 20px;
  height: 6px;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffd966, #ffaa33);
  width: 0%;
  border-radius: 20px;
}
.xp-text { font-size: 0.6rem; color: #aaa; }

/* Estudio grid compacto */
.studio-room {
  margin: 8px 8px;
  background: radial-gradient(ellipse at 30% 30%, rgba(30, 35, 60, 0.6), rgba(0, 0, 0, 0.4));
  border-radius: 20px;
  padding: 10px 6px;
  border: 1px solid rgba(255, 215, 0, 0.2);
}
.studio-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.studio-item {
  aspect-ratio: 1 / 1;
  background: radial-gradient(circle at 30% 20%, #21263f, #151a2a);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  border: 1px solid #3a3f5e;
}
.studio-item.owned {
  border-color: #ffd966;
  box-shadow: 0 0 10px rgba(255, 200, 0, 0.4);
  background: radial-gradient(circle at 30% 20%, #3a3518, #1a1e30);
}
.item-emoji { font-size: 1.3rem; margin-bottom: 2px; }
.item-label { font-size: 0.5rem; font-weight: bold; color: #b0b5d0; }
.owned .item-label { color: #ffd966; }
.item-rate, .item-lvl {
  position: absolute;
  font-size: 0.45rem;
  background: rgba(0,0,0,0.7);
  padding: 1px 4px;
  border-radius: 12px;
}
.item-rate { top: 2px; right: 2px; color: #4ade80; }
.item-lvl { bottom: 2px; left: 2px; color: #ccc; }

/* Botón collector */
.collect-wrap {
  padding: 0 12px;
  margin: 6px 0;
}
.pending-info {
  text-align: center;
  font-size: 0.65rem;
  background: rgba(0,0,0,0.5);
  border-radius: 40px;
  padding: 2px 8px;
  width: fit-content;
  margin: 0 auto 4px auto;
}
.collect-btn {
  width: 100%;
  padding: 10px;
  font-size: 0.9rem;
  border-radius: 60px;
  background: linear-gradient(135deg, #ffd966, #ff9f1c);
  font-family: monospace;
  font-weight: bold;
  border: none;
  color: #1e1a0a;
  box-shadow: 0 3px 0 #b57100;
  transform: translateY(-1px);
  cursor: pointer;
  transition: 0.05s linear;
}
.collect-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b57100; }
.collect-btn.empty {
  background: #2d2f42;
  box-shadow: none;
  color: #aaa;
  transform: none;
}

/* Racha y recompensas */
.streak-banner {
  margin: 6px 12px;
  padding: 8px 12px;
  border-radius: 20px;
  background: linear-gradient(115deg, #2a2412, #151a2a);
  border-left: 4px solid #ffd966;
  display: flex;
  align-items: center;
  gap: 8px;
}
.streak-title { font-size: 0.75rem; font-weight: bold; color: #ffd966; }
.streak-sub { font-size: 0.6rem; color: #b0b5d0; }
.streak-btn {
  background: linear-gradient(135deg, #ffd966, #ffaa33);
  border: none;
  padding: 4px 12px;
  border-radius: 30px;
  font-weight: bold;
  font-size: 0.7rem;
  cursor: pointer;
}
.rewards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin: 6px 12px;
}
.reward-card {
  background: rgba(25, 30, 50, 0.8);
  border-radius: 16px;
  padding: 6px 2px;
  text-align: center;
  font-size: 0.6rem;
  cursor: pointer;
  border: 1px solid #4a4f70;
}
.reward-card.available {
  border-color: #4ade80;
  background: linear-gradient(145deg, #1a2a1a, #0f1420);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  padding: 0 12px;
  margin: 8px 0 4px;
  overflow-x: auto;
}
.tab {
  background: #151a2a;
  border: 1px solid #3a3f5e;
  border-radius: 30px;
  padding: 4px 10px;
  font-size: 0.65rem;
  font-weight: bold;
  white-space: nowrap;
  cursor: pointer;
}
.tab.active {
  background: linear-gradient(120deg, #ffd96640, #ffaa3340);
  border-color: #ffd966;
  color: #ffd966;
}

/* Listas */
.shop-item, .mission-item, .minigame-card, .invite-section {
  margin: 6px 12px;
  padding: 8px 10px;
  border-radius: 20px;
  background: rgba(16, 20, 35, 0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  gap: 10px;
}
.shop-emoji, .mission-icon { font-size: 1.5rem; }
.shop-name, .mission-name { font-size: 0.75rem; font-weight: bold; color: #ffd966; }
.shop-desc, .mission-desc { font-size: 0.6rem; color: #b0b5d0; }
.shop-buy {
  padding: 4px 10px;
  border-radius: 30px;
  font-size: 0.65rem;
  font-weight: bold;
  border: none;
  cursor: pointer;
}
.shop-buy.can-buy { background: linear-gradient(135deg, #ffd966, #ffaa33); color: #1e1a0a; }
.shop-buy.cant-buy { background: #2d2f42; color: #aaa; cursor: not-allowed; }
.shop-buy.maxed-btn { background: #4a4f70; color: #ccc; cursor: default; }

/* Stats */
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 16px;
  font-size: 0.7rem;
  border-bottom: 1px solid #2a2f4a;
}
.stat-row .s-val { font-family: monospace; font-weight: bold; color: #ffd966; }

/* Minijuegos */
.simon-game {
  padding: 12px;
  text-align: center;
}
.simon-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 180px;
  margin: 0 auto;
}
.simon-btn {
  aspect-ratio: 1;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.05s linear;
}
.simon-btn[data-color="rojo"] { background: #ff4d4d; box-shadow: 0 0 10px red; }
.simon-btn[data-color="azul"] { background: #4fc3f7; box-shadow: 0 0 10px #4fc3f7; }
.simon-btn[data-color="verde"] { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
.simon-btn[data-color="amarillo"] { background: #ffd966; box-shadow: 0 0 10px gold; }
.timing-game {
  padding: 12px;
  text-align: center;
}
.timing-bar {
  width: 100%;
  height: 12px;
  background: #2a2f4a;
  border-radius: 20px;
  overflow: hidden;
  margin: 10px 0;
}
.timing-fill {
  height: 100%;
  width: 10%;
  background: linear-gradient(90deg, #ffd966, #ffaa33);
  border-radius: 20px;
}
.timing-btn {
  background: #ffd966;
  padding: 8px 20px;
  border-radius: 40px;
  border: none;
  font-weight: bold;
  margin-top: 8px;
  cursor: pointer;
}
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.popup-box {
  background: #14182b;
  border: 2px solid #ffd966;
  border-radius: 32px;
  padding: 16px;
  max-width: 240px;
  text-align: center;
}
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e1a0a;
  color: #ffd966;
  padding: 6px 16px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: bold;
  z-index: 999;
  transition: 0.3s;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.coin-float, .gem-float {
  position: fixed;
  pointer-events: none;
  font-size: 1rem;
  animation: floatUp 0.9s ease-out forwards;
  z-index: 1000;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-70px) scale(0.6); }
}
.collect-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(255,200,0,0.3) 0%, transparent 70%);
  pointer-events: none;
  animation: flash 0.5s ease-out;
}
@keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="hdr">
  <div class="hdr-top">
    <div class="game-title">✨ MKEYZ STUDIO • ÉLITE</div>
    <div style="display: flex; gap: 6px;">
      <div class="coins-display"><span>🪙</span><span class="coins-val" id="coins-display">0</span></div>
      <div class="gems-display"><span>💎</span><span class="gems-val" id="gems-display">0</span></div>
    </div>
  </div>
  <div class="xp-row">
    <div class="level-badge" id="level-badge">LVL 1</div>
    <div class="xp-wrap"><div class="xp-fill" id="xp-fill"></div></div>
    <div class="xp-text" id="xp-text">0/100</div>
  </div>
</div>

<div class="studio-room"><div class="studio-grid" id="studio-grid"></div></div>
<div class="collect-wrap">
  <div class="pending-info">⚡ TASA: <span id="rate-display">0</span> 🪙/h</div>
  <button class="collect-btn" id="collect-btn">✨ RECOGER ✨</button>
</div>

<div class="streak-banner">
  <div style="font-size: 1.5rem;" id="streak-icon">🔥</div>
  <div style="flex:1"><div class="streak-title" id="streak-title">Racha diaria</div><div class="streak-sub" id="streak-sub"></div></div>
  <button class="streak-btn" id="streak-btn">RECLAMAR</button>
</div>

<div class="rewards-section">
  <div style="margin-left: 12px; margin-bottom: 2px; font-size: 0.6rem;">🎁 RECOMPENSAS DIARIAS</div>
  <div class="rewards-grid" id="rewards-grid"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('shop',this)">🛒 TIENDA</div>
  <div class="tab" onclick="showTab('missions',this)">📋 MISIONES</div>
  <div class="tab" onclick="showTab('games',this)">🎮 JUEGOS</div>
  <div class="tab" onclick="showTab('invite',this)">🎫 INVITAR</div>
  <div class="tab" onclick="showTab('stats',this)">📊 STATS</div>
  <div class="tab" onclick="showTab('milestones',this)">🏆 LOGROS</div>
</div>

<div id="tab-shop"><div class="shop-list" id="shop-list"></div></div>
<div id="tab-missions" style="display:none"><div class="missions-list" id="missions-list"></div></div>
<div id="tab-games" style="display:none"><div class="minigames-list" id="minigames-list"></div></div>
<div id="tab-invite" style="display:none"><div class="invite-section" id="invite-section"></div></div>
<div id="tab-stats" style="display:none"><div class="stats-section" id="stats-section"></div></div>
<div id="tab-milestones" style="display:none"><div class="ms-list" id="ms-list"></div></div>

<div class="popup-overlay" id="popup"><div class="popup-box"><div class="popup-emoji" id="pop-emoji">🎉</div><div class="popup-title" id="pop-title"></div><div class="popup-desc" id="pop-desc"></div><button class="popup-btn" onclick="closePopup()">OK</button></div></div>
<div class="toast" id="toast"></div>

<script>
// --------------------------------------------------------------
// TELEGRAM Y USUARIO
// --------------------------------------------------------------
const tg = window.Telegram?.WebApp;
if(tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#05070c"); tg.setBackgroundColor("#05070c"); }
let USER_ID = tg?.initDataUnsafe?.user?.id || localStorage.getItem("mkeyz_uid") || "g_"+Math.random().toString(36).slice(2,8);
if(!tg?.initDataUnsafe?.user?.id) localStorage.setItem("mkeyz_uid", USER_ID);
const SAVE_KEY = "mkeyz_final_"+USER_ID;

// --------------------------------------------------------------
// DATOS DEL JUEGO
// --------------------------------------------------------------
const EQUIPMENT = [
  { id:"laptop",     emoji:"💻", name:"Laptop",        baseRate:5,    cost:0,      maxLevel:5, xpGain:10,  unlockLevel:1 },
  { id:"headphones", emoji:"🎧", name:"Auriculares",   baseRate:8,    cost:40,     maxLevel:5, xpGain:15,  unlockLevel:1 },
  { id:"mic",        emoji:"🎙️", name:"Micrófono",     baseRate:12,   cost:120,    maxLevel:5, xpGain:20,  unlockLevel:2 },
  { id:"keyboard",   emoji:"🎹", name:"Teclado MIDI",  baseRate:18,   cost:300,    maxLevel:5, xpGain:25,  unlockLevel:3 },
  { id:"drums",      emoji:"🥁", name:"Drum Machine",  baseRate:25,   cost:600,    maxLevel:5, xpGain:30,  unlockLevel:5 },
  { id:"bass",       emoji:"🎸", name:"Bajo",          baseRate:35,   cost:1200,   maxLevel:5, xpGain:35,  unlockLevel:7 },
  { id:"monitors",   emoji:"🔊", name:"Monitores",     baseRate:50,   cost:2500,   maxLevel:5, xpGain:40,  unlockLevel:10 },
  { id:"synth",      emoji:"🎛️", name:"Sintetizador",  baseRate:70,   cost:5000,   maxLevel:5, xpGain:50,  unlockLevel:12 },
  { id:"audio_int",  emoji:"🎚️", name:"Audio Int",     baseRate:100,  cost:9000,   maxLevel:5, xpGain:60,  unlockLevel:15 },
  { id:"console",    emoji:"🖥️", name:"Consola",       baseRate:140,  cost:18000,  maxLevel:5, xpGain:75,  unlockLevel:20 }
];

const DAILY_REWARDS = [
  { id:"r_daw",      emoji:"🎛️", label:"Usar DAW",      coins:30,  xp:18, gems:2 },
  { id:"r_battle",   emoji:"🎮", label:"Beat Battle",   coins:50,  xp:30, gems:2 },
  { id:"r_playlist", emoji:"🎧", label:"Playlist",      coins:20,  xp:12, gems:1 },
  { id:"r_chord",    emoji:"🎹", label:"Chord Gen",     coins:25,  xp:15, gems:1 },
  { id:"r_voice",    emoji:"🎤", label:"Voice Studio",  coins:35,  xp:20, gems:2 },
  { id:"r_share",    emoji:"📲", label:"Compartir Bot", coins:60,  xp:35, gems:3 },
];

const MISSIONS_LIST = [
  { id:"collect", name:"Recolector", desc:"Recoge 3 veces", target:3, rewardCoins:80, rewardXP:30, rewardGems:3 },
  { id:"upgrade", name:"Mejorador", desc:"Mejora 1 equipo", target:1, rewardCoins:120, rewardXP:50, rewardGems:4 },
  { id:"minigame",name:"Jugón", desc:"Juega 2 veces", target:2, rewardCoins:100, rewardXP:40, rewardGems:3 }
];

const MILESTONES = [
  { id:"first_buy",  icon:"🛒", name:"Primera Compra",   desc:"Compra tu primer equipo",       req: v=>v.totalPurchases>=1 },
  { id:"coins_1k",   icon:"🪙", name:"1,000 MKEYZ",      desc:"Acumula 1,000 coins",           req: v=>v.totalEarned>=1000 },
  { id:"coins_10k",  icon:"💰", name:"10,000 MKEYZ",     desc:"Acumula 10,000 coins",          req: v=>v.totalEarned>=10000 },
  { id:"streak_7",   icon:"⚡", name:"Semana Completa",  desc:"7 días seguidos",               req: v=>v.bestStreak>=7 },
  { id:"lvl_10",     icon:"🚀", name:"Nivel 10",         desc:"Alcanza nivel 10",              req: v=>v.level>=10 },
  { id:"all_5",      icon:"🎛️", name:"5 Equipos",        desc:"Compra 5 equipos distintos",    req: v=>Object.keys(v.owned).length>=5 }
];

// --------------------------------------------------------------
// ESTADO INICIAL
// --------------------------------------------------------------
let S = {
  coins: 60, totalEarned: 60, gems: 8, xp: 0, level: 1, owned: { laptop: 1 },
  lastCollect: Date.now() - 3600000,
  lastLogin: null, streak: 0, bestStreak: 0,
  streakClaimedToday: false, totalPurchases: 0, daysPlayed: 0,
  milestones: {}, dailyRewards: {}, coinsPerHour: 0,
  missions: {}, miniGamesLimits: {},
  referralCode: null, referredBy: null
};

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw) {
      let p = JSON.parse(raw);
      Object.assign(S, p);
      if(!S.missions) S.missions = {};
      if(!S.miniGamesLimits) S.miniGamesLimits = {};
    } else {
      S.lastCollect = Date.now() - 3600000;
      S.coins = 60;
      S.gems = 8;
    }
  } catch(e) {}
  if(!S.referralCode) S.referralCode = USER_ID.slice(-6).toUpperCase();
  
  // Procesar invitación por URL
  const urlParams = new URLSearchParams(window.location.search);
  const refStart = urlParams.get('start');
  if(refStart && refStart.startsWith('ref_') && !S.referredBy) {
    S.referredBy = refStart.slice(4);
    S.gems += 30;
    showToast(`🎉 Invitado por ${S.referredBy} +30💎`);
    saveState();
  }
  
  S.coinsPerHour = calcRate();
  checkDailyReset();
  renderAll();
  startTick();
}
function saveState() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch(e){} }

function calcRate() {
  return EQUIPMENT.reduce((sum, eq) => sum + ((S.owned[eq.id]||0) ? eq.baseRate * (1 + ((S.owned[eq.id]-1)*0.5)) : 0), 0);
}
function getPending() {
  let hrs = (Date.now() - S.lastCollect) / 3600000;
  return Math.floor(calcRate() * Math.min(hrs, 8));
}
function addXP(amount) {
  S.xp += amount;
  let need = Math.floor(100 * Math.pow(1.15, S.level-1));
  while(S.xp >= need && S.level < 100) {
    S.xp -= need;
    S.level++;
    need = Math.floor(100 * Math.pow(1.15, S.level-1));
    showPopup("🚀","¡NIVEL "+S.level+"!","Nuevos equipos disponibles!");
  }
}
function addGems(amount) {
  if(amount>0) {
    S.gems += amount;
    floatGems(amount);
    saveState();
    renderStats();
  }
}
function floatCoins(amount){
  let e = document.createElement("div");
  e.className = "coin-float";
  e.textContent = "+"+fmtNum(amount)+" 🪙";
  e.style.cssText = "left:50%;top:42%;transform:translateX(-50%)";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(), 1000);
}
function floatGems(amount){
  let e = document.createElement("div");
  e.className = "gem-float";
  e.textContent = "+"+amount+" 💎";
  e.style.cssText = "left:50%;top:42%;transform:translateX(-50%)";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(), 1000);
}

// --------------------------------------------------------------
// RECOGER (PULIDO - SIN BLOQUEOS)
// --------------------------------------------------------------
function collectCoins() {
  let pending = getPending();
  if(pending <= 0) {
    showToast("🎧 Aún no hay nada... Vuelve en unos minutos.");
    if(tg) tg.HapticFeedback?.impactOccurred("light");
    return;
  }
  
  S.coins += pending;
  S.totalEarned += pending;
  S.lastCollect = Date.now();   // Resetea el contador
  addXP(Math.floor(pending / 10));
  trackMission("collect", 1);
  
  // Efectos visuales
  let flash = document.createElement("div");
  flash.className = "collect-flash";
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(), 500);
  floatCoins(pending);
  
  // Animación del contador
  let el = document.getElementById("coins-display");
  el.style.transform = "scale(1.2)";
  setTimeout(()=>el.style.transform = "scale(1)", 200);
  
  saveState();
  renderAll();          // Actualiza toda la interfaz
  checkMilestones();
  
  if(tg) tg.HapticFeedback?.notificationOccurred("success");
  showToast(`✨ +${fmtNum(pending)} MKEYZ!`);
}

// --------------------------------------------------------------
// COMPRAR EQUIPO
// --------------------------------------------------------------
function buyEquipment(id) {
  let eq = EQUIPMENT.find(e=>e.id===id);
  let lvl = S.owned[eq.id] || 0;
  if(lvl >= eq.maxLevel) { showToast("Nivel máximo ⭐"); return; }
  if(S.level < eq.unlockLevel) { showToast("🔒 Nivel "+eq.unlockLevel+" requerido"); return; }
  let cost = Math.floor(eq.cost * Math.pow(1.8, lvl));
  if(S.coins < cost) { showToast("🪙 Monedas insuficientes"); return; }
  
  S.coins -= cost;
  S.owned[eq.id] = lvl + 1;
  S.totalPurchases++;
  S.coinsPerHour = calcRate();
  addXP(eq.xpGain);
  
  if(lvl === 0) showPopup(eq.emoji, "¡"+eq.name+"!", "+"+eq.baseRate+" 🪙/hora");
  else showToast(eq.emoji+" Nivel "+(lvl+1)+" activado");
  
  saveState();
  renderAll();
  checkMilestones();
  trackMission("upgrade", 1);
  if(tg) tg.HapticFeedback?.impactOccurred("medium");
}

// --------------------------------------------------------------
// MISIONES DIARIAS
// --------------------------------------------------------------
function resetDailyMissions() {
  let today = new Date().toDateString();
  if(S.missions.date !== today) {
    S.missions = { date: today, progress: { collect:0, upgrade:0, minigame:0 }, claimed: { collect:false, upgrade:false, minigame:false } };
    saveState();
  }
}
function trackMission(id, inc=1) {
  resetDailyMissions();
  if(!S.missions.claimed[id]) {
    S.missions.progress[id] = (S.missions.progress[id]||0) + inc;
    let m = MISSIONS_LIST.find(m=>m.id===id);
    if(S.missions.progress[id] >= m.target) {
      showToast("✨ Misión completada: "+m.name+" ¡Reclama!");
    }
    saveState();
    renderMissions();
  }
}
function claimMission(id) {
  resetDailyMissions();
  if(S.missions.claimed[id]) return;
  let m = MISSIONS_LIST.find(m=>m.id===id);
  if(S.missions.progress[id] >= m.target) {
    S.coins += m.rewardCoins;
    S.totalEarned += m.rewardCoins;
    addXP(m.rewardXP);
    addGems(m.rewardGems);
    S.missions.claimed[id] = true;
    saveState();
    renderAll();
    showToast(`✅ +${m.rewardCoins}🪙 +${m.rewardGems}💎`);
  }
}

// --------------------------------------------------------------
// RECOMPENSAS DIARIAS Y RACHA
// --------------------------------------------------------------
function checkDailyReset() {
  let today = new Date().toDateString();
  if(S.lastLogin !== today) {
    let yesterday = new Date(Date.now()-86400000).toDateString();
    S.streak = (S.lastLogin === yesterday) ? S.streak+1 : 1;
    S.bestStreak = Math.max(S.bestStreak, S.streak);
    S.lastLogin = today;
    S.daysPlayed++;
    S.streakClaimedToday = false;
    S.dailyRewards = {};
    saveState();
  }
}
function claimStreak() {
  if(S.streakClaimedToday) { showToast("Ya reclamaste hoy"); return; }
  let mult = Math.min(S.streak, 30);
  let bonus = Math.floor(calcRate() * mult);
  S.coins += bonus;
  S.totalEarned += bonus;
  S.streakClaimedToday = true;
  addGems(Math.floor(mult/3)+2);
  floatCoins(bonus);
  saveState();
  renderAll();
  showToast(`🔥 +${fmtNum(bonus)}🪙 +${Math.floor(mult/3)+2}💎 por racha x${mult}`);
  if(tg) tg.HapticFeedback?.notificationOccurred("success");
}
function claimDailyReward(r, card) {
  let today = new Date().toDateString();
  if(S.dailyRewards[r.id] === today) return;
  S.dailyRewards[r.id] = today;
  S.coins += r.coins;
  S.totalEarned += r.coins;
  addXP(r.xp);
  addGems(r.gems);
  floatCoins(r.coins);
  if(r.gems) floatGems(r.gems);
  card.innerHTML = `<div class="reward-emoji">${r.emoji}</div><div class="reward-label">${r.label}</div><div class="reward-coins">✅</div>`;
  saveState();
  renderAll();
  showToast(`${r.emoji} +${r.coins}🪙 +${r.gems}💎`);
}

// --------------------------------------------------------------
// JUEGOS (SIMÓN Y TIMING)
// --------------------------------------------------------------
let simonSequence = [], simonPlayer = [], simonActive = false;
function startSimonGame() {
  simonSequence = [];
  simonPlayer = [];
  simonActive = true;
  nextSimonStep();
}
function nextSimonStep() {
  const colors = ["rojo","azul","verde","amarillo"];
  let next = colors[Math.floor(Math.random()*4)];
  simonSequence.push(next);
  simonPlayer = [];
  playSimonSequence();
}
function playSimonSequence() {
  let i = 0;
  function showNext() {
    if(i >= simonSequence.length) {
      simonActive = true;
      return;
    }
    let color = simonSequence[i];
    let btn = document.querySelector(`.simon-btn[data-color="${color}"]`);
    if(btn) {
      btn.classList.add("active");
      setTimeout(()=>btn.classList.remove("active"), 250);
    }
    i++;
    setTimeout(showNext, 500);
  }
  simonActive = false;
  showNext();
}
function simonClick(color) {
  if(!simonActive) { showToast("¡Espera tu turno!"); return; }
  simonPlayer.push(color);
  let btn = document.querySelector(`.simon-btn[data-color="${color}"]`);
  if(btn) {
    btn.classList.add("active");
    setTimeout(()=>btn.classList.remove("active"), 150);
  }
  let idx = simonPlayer.length-1;
  if(simonPlayer[idx] !== simonSequence[idx]) {
    showToast("❌ Fallaste... vuelve a intentarlo");
    simonActive = false;
    setTimeout(()=>startSimonGame(), 1500);
    return;
  }
  if(simonPlayer.length === simonSequence.length) {
    simonActive = false;
    let reward = 30 + simonSequence.length * 3;
    S.coins += reward;
    S.totalEarned += reward;
    addGems(2);
    saveState();
    renderAll();
    showToast(`🎉 ¡Completaste la secuencia! +${reward}🪙 +2💎`);
    trackMission("minigame", 1);
    setTimeout(()=>nextSimonStep(), 1000);
  }
}

let timingInterval = null, timingValue = 0, timingActive = false;
function startTimingGame() {
  if(timingInterval) clearInterval(timingInterval);
  timingActive = true;
  timingValue = 0;
  let bar = document.getElementById("timingFill");
  if(bar) bar.style.width = "10%";
  timingInterval = setInterval(() => {
    if(!timingActive) return;
    timingValue = (timingValue + 2.5) % 100;
    let barFill = document.getElementById("timingFill");
    if(barFill) barFill.style.width = timingValue + "%";
  }, 40);
}
function hitTiming() {
  if(!timingActive) return;
  let diff = Math.abs(timingValue - 85);
  let reward = 0, gems = 0;
  if(diff <= 8) { reward = 60; gems = 3; showToast("✨ ¡CRÍTICO! +60🪙 +3💎"); }
  else if(diff <= 20) { reward = 35; gems = 1; showToast("👍 Perfecto +35🪙 +1💎"); }
  else if(diff <= 35) { reward = 15; gems = 0; showToast("✔️ Bien +15🪙"); }
  else { showToast("❌ Fallaste"); timingActive=false; clearInterval(timingInterval); return; }
  S.coins += reward;
  S.totalEarned += reward;
  addGems(gems);
  saveState();
  renderAll();
  trackMission("minigame", 1);
  timingActive = false;
  clearInterval(timingInterval);
}

// --------------------------------------------------------------
// RENDER COMPLETO (SIN UNDEFINED)
// --------------------------------------------------------------
function fmtNum(n) {
  n = Math.floor(n);
  if(n >= 1e6) return (n/1e6).toFixed(1)+"M";
  if(n >= 1e3) return (n/1e3).toFixed(1)+"K";
  return n.toString();
}
function renderAll() {
  document.getElementById("coins-display").innerText = fmtNum(S.coins);
  document.getElementById("gems-display").innerText = fmtNum(S.gems);
  let need = Math.floor(100 * Math.pow(1.15, S.level-1));
  let pct = Math.min(100, (S.xp/need)*100);
  document.getElementById("xp-fill").style.width = pct+"%";
  document.getElementById("xp-text").innerHTML = fmtNum(S.xp)+"/"+fmtNum(need);
  document.getElementById("level-badge").innerHTML = "LVL "+S.level;
  document.getElementById("rate-display").innerHTML = fmtNum(calcRate());
  renderRoom();
  renderShop();
  renderMissions();
  renderMinigames();
  renderRewards();
  renderStreak();
  renderStats();
  renderMilestones();
  renderInvite();
}
function renderRoom() {
  let grid = document.getElementById("studio-grid");
  grid.innerHTML = "";
  EQUIPMENT.slice(0,8).forEach(eq => {
    let lvl = S.owned[eq.id] || 0;
    let locked = S.level < eq.unlockLevel;
    let div = document.createElement("div");
    div.className = "studio-item" + (lvl>0 ? " owned" : locked ? " locked" : "");
    if(lvl>0) {
      let r = document.createElement("div");
      r.className = "item-rate";
      r.innerText = "+"+fmtNum(Math.floor(eq.baseRate*(1+(lvl-1)*0.5)));
      div.appendChild(r);
    }
    let em = document.createElement("div");
    em.className = "item-emoji";
    em.innerText = eq.emoji;
    div.appendChild(em);
    let lbl = document.createElement("div");
    lbl.className = "item-label";
    lbl.innerText = eq.name.split(" ")[0];
    div.appendChild(lbl);
    if(lvl>0) {
      let l = document.createElement("div");
      l.className = "item-lvl";
      l.innerText = "Lv"+lvl;
      div.appendChild(l);
    }
    grid.appendChild(div);
  });
}
function renderShop() {
  let list = document.getElementById("shop-list");
  list.innerHTML = "";
  EQUIPMENT.forEach(eq => {
    let lvl = S.owned[eq.id] || 0;
    let locked = S.level < eq.unlockLevel;
    let maxed = lvl >= eq.maxLevel;
    let cost = Math.floor(eq.cost * Math.pow(1.8, lvl));
    let canBuy = !locked && !maxed && S.coins >= cost;
    let rate = Math.floor(eq.baseRate * (1 + lvl * 0.5));
    let btnClass = maxed ? "maxed-btn" : locked ? "cant-buy" : lvl>0 ? (canBuy ? "upgrade" : "cant-buy") : (canBuy ? "can-buy" : "cant-buy");
    let btnText = maxed ? "MAX" : locked ? "Lv"+eq.unlockLevel : fmtNum(cost);
    let div = document.createElement("div");
    div.className = "shop-item";
    div.innerHTML = `<div class="shop-emoji">${eq.emoji}</div>
                     <div class="shop-info">
                       <div class="shop-name">${eq.name}${lvl>0 ? " Lv"+lvl : ""}</div>
                       <div class="shop-desc">${locked ? `Nivel ${eq.unlockLevel}` : eq.desc}</div>
                       <div class="shop-rate">+${fmtNum(rate)}/h</div>
                     </div>
                     <button class="shop-buy ${btnClass}">${btnText}</button>`;
    div.querySelector("button").onclick = () => buyEquipment(eq.id);
    list.appendChild(div);
  });
}
function renderMissions() {
  let cont = document.getElementById("missions-list");
  if(!cont) return;
  resetDailyMissions();
  cont.innerHTML = MISSIONS_LIST.map(m => {
    let prog = S.missions.progress[m.id] || 0;
    let claimed = S.missions.claimed[m.id];
    let complete = prog >= m.target;
    let icon = m.id==="collect" ? "🪙" : m.id==="upgrade" ? "🔧" : "🎮";
    return `<div class="mission-item">
              <div class="mission-icon">${icon}</div>
              <div class="mission-info">
                <div class="mission-name">${m.name}</div>
                <div class="mission-desc">${m.desc} (${prog}/${m.target})</div>
                <div class="mission-progress">💰+${m.rewardCoins} ✨+${m.rewardXP} 💎+${m.rewardGems}</div>
              </div>
              ${!claimed && complete ? `<button class="shop-buy can-buy" onclick="claimMission('${m.id}')">RECLAMAR</button>` : 
                claimed ? `<button class="shop-buy maxed-btn" disabled>✓</button>` : 
                `<button class="shop-buy cant-buy">🔒</button>`}
             </div>`;
  }).join("");
}

    <div class="minigame-card" onclick="startSimonGame();showPopup('🎛️','SIMÓN DICE','Memoriza la secuencia');">

      </div>
    </div>

      <div class="mission-icon">⏱️</div>
      <div class="mission-info">
        <div class="mission-name">TIMING PERFECTO</div>
        <div class="mission-desc">Pulsa cuando la barra llegue al final dorado</div>
      </div>
    </div>
    <div id="simonGameArea" style="display:none">
      <div class="simon-game">

          <div class="simon-btn" data-color="rojo" onclick="simonClick('rojo')"></div>

          <div class="simon-btn" data-color="amarillo" onclick="simonClick('amarillo')"></div>

    </div>

        <button class="timing-btn" onclick="hitTiming()">🎯 APRETAR</button>

  setTimeout(() => {

function renderRewards() {
  let grid = document.getElementById("rewards-grid");

                      <div class="reward-coins">${claimed ? "✅" : "+"+r.coins+"🪙 +"+r.gems+"💎"}</div>`;

    grid.appendChild(card);

function renderStreak() {

  document.getElementById("streak-title").innerHTML = S.streak > 0 ? "Racha "+S.streak+" días" : "Sin racha";
  let mult = Math.min(S.streak, 30);
  let bonus = Math.floor(calcRate() * mult);
  document.getElementById("streak-sub").innerHTML = S.streakClaimedToday ? "✅ Reclamado hoy" : 
    (S.streak > 0 ? `Bonus: +${fmtNum(bonus)}🪙 +${Math.floor(mult/3)+2}💎 (×${mult})` : "Entra mañana");

    <div class="stat-row"><span>🔥 Racha actual</span><span class="s-val">${S.streak} días</span></div>

function checkMilestones() {
  MILESTONES.forEach(m => {

      saveState();
      setTimeout(() => showPopup(m.icon, m.name, m.desc), 600);

// --------------------------------------------------------------
// TIEMPO REAL (CONTADOR VIVO)
// --------------------------------------------------------------
function startTick() {
  setInterval(() => {
    let pending = getPending();
    let btn = document.getElementById("collect-btn");
    if(pending > 0) {
      btn.className = "collect-btn";
      btn.innerHTML = "✨ RECOGER +"+fmtNum(pending)+" 🪙 ✨";
    } else {
      btn.className = "collect-btn empty";
      btn.innerHTML = "🎵 Generando ritmo...";
    }
    // Muestra las monedas actuales + las que se están generando (en tiempo real)
    let elapsed = Math.min(Date.now() - S.lastCollect, 8 * 3600000);
    let liveCoins = S.coins + Math.floor((calcRate() / 3600000) * elapsed);
    document.getElementById("coins-display").innerText = fmtNum(liveCoins);
  }, 500);
}

  let t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
function showTab(name, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  ["shop","missions","games","invite","stats","milestones"].forEach(t => {
    document.getElementById("tab-"+t).style.display = (name === t) ? "" : "none";
  });
  if(name === "games") renderMinigames();
  if(name === "stats") renderStats();
}

// --------------------------------------------------------------
// FONDO DE PARTÍCULAS
// --------------------------------------------------------------
const bgCanvas = document.getElementById("bg-canvas");
const ctx = bgCanvas.getContext("2d");
let particles = [];
function resizeCanvas() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();
function drawBg() {
  requestAnimationFrame(drawBg);
  ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  if(particles.length < 30 && Math.random() < 0.2) {
    particles.push({
      x: Math.random() * bgCanvas.width,
      y: bgCanvas.height + 5,
      r: Math.random() * 1.5 + 0.8,
      sp: Math.random() * 0.5 + 0.3
    });
  }
  particles = particles.filter(p => p.y > -10);
  particles.forEach(p => {
    p.y -= p.sp;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 200, 100, 0.5)";
    ctx.fill();
  });
}
drawBg();
