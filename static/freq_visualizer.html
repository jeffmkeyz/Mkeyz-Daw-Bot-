<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Visualizador de Frecuencias — Mkeyz Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0a0a0a; --card:#111; --border:#1f1f1f; --gold:#f5c518; --green:#00e676; --fire:#ff4d4d; --blue:#4fc3f7; --text:#fff; --muted:#555; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:16px; padding-bottom:40px; }

.header { text-align:center; padding:16px 0 20px; }
.header h1 { font-size:22px; font-weight:900; background:linear-gradient(135deg,#fff,var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
.header p { font-size:13px; color:var(--muted); }

canvas { width:100%; border-radius:16px; border:1px solid var(--border); display:block; background:#050505; }

.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; }
.stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.stat-val { font-size:18px; font-weight:900; }

.btn-big {
  width:100%; padding:18px; border:none; border-radius:18px;
  font-size:18px; font-weight:800; cursor:pointer; margin-bottom:10px;
  transition:all 0.15s;
}
.btn-big:active { transform:scale(0.97); }
.btn-start { background:linear-gradient(135deg,var(--green),#00bcd4); color:#000; }
.btn-stop  { background:linear-gradient(135deg,var(--fire),#ff8c00); color:#fff; }
.btn-mode  { background:var(--border); color:var(--muted); font-size:14px; padding:12px; }

.mode-tabs { display:flex; gap:6px; margin-bottom:12px; }
.mode-tab { flex:1; padding:10px; border:none; border-radius:10px; background:var(--border); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.mode-tab.active { background:var(--blue); color:#000; }

.freq-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:4px; padding:0 4px; }

.level-bar-wrap { background:var(--border); border-radius:100px; height:8px; margin:12px 0; overflow:hidden; }
.level-bar { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--green),var(--gold),var(--fire)); transition:width 0.1s; }
</style>
</head>
<body>

<div class="header">
  <h1>🎚️ Visualizador de Frecuencias</h1>
  <p>Analiza el espectro de tu audio en tiempo real</p>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('bars')">📊 Barras</button>
  <button class="mode-tab" onclick="setMode('wave')">〰️ Onda</button>
  <button class="mode-tab" onclick="setMode('circle')">⭕ Circular</button>
</div>

<canvas id="canvas" height="200"></canvas>
<div class="freq-labels">
  <span>Sub</span><span>Graves</span><span>Medios</span><span>Agudos</span><span>Air</span>
</div>

<div class="level-bar-wrap">
  <div class="level-bar" id="level-bar" style="width:0%"></div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">Volumen</div>
    <div class="stat-val" id="stat-db" style="color:var(--green)">— dB</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Freq. dominante</div>
    <div class="stat-val" id="stat-freq" style="color:var(--gold)">— Hz</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Zona</div>
    <div class="stat-val" id="stat-zone" style="color:var(--blue);font-size:13px">—</div>
  </div>
</div>

<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.8" id="freq-tip">
  Activa el micrófono para ver el análisis de frecuencias en tiempo real.
</div>

<button class="btn-big btn-start" id="btn-main" onclick="toggleMic()">🎤 Activar micrófono</button>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor("#0a0a0a"); tg.setBackgroundColor("#0a0a0a"); }

const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
let audioCtx, analyser, source, stream, animId;
let isActive = false;
let currentMode = "bars";

const FREQ_ZONES = [
  { name:"Sub-graves",  max:60,   color:"#9c27b0", tip:"Frecuencias que se sienten más que se escuchan. Mueven el pecho en el club." },
  { name:"Graves",      max:250,  color:"#ff4d4d",  tip:"El kick y el 808 viven aquí. Demasiado → muddiness. Poco → sin punch." },
  { name:"Medios bajos",max:500,  color:"#ff8c00",  tip:"Calidez y cuerpo del sonido. Exceso → sonido de caja de cartón." },
  { name:"Medios",      max:2000, color:"#f5c518",  tip:"La voz y los instrumentos principales. El área más sensitiva del oído." },
  { name:"Medios altos",max:4000, color:"#00e676",  tip:"Presencia y claridad. Aquí vive el ataque del snare." },
  { name:"Agudos",      max:8000, color:"#4fc3f7",  tip:"Brillo y detalle. Sibilantes de la voz. Platillos." },
  { name:"Air",         max:20000,color:"#e3f2fd",  tip:"La zona del \"aire\". Da sensación de apertura y espacio al mix." },
];

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

async function toggleMic() {
  if (isActive) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    source   = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    isActive = true;
    document.getElementById("btn-main").textContent = "⏹ Detener";
    document.getElementById("btn-main").className = "btn-big btn-stop";
    canvas.height = 200;
    draw();
    if (tg) tg.HapticFeedback?.notificationOccurred("success");
  } catch(e) {
    alert("No se pudo acceder al micrófono: " + e.message);
  }
}

function stopMic() {
  isActive = false;
  cancelAnimationFrame(animId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  document.getElementById("btn-main").textContent = "🎤 Activar micrófono";
  document.getElementById("btn-main").className = "btn-big btn-start";
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById("level-bar").style.width = "0%";
  document.getElementById("stat-db").textContent   = "— dB";
  document.getElementById("stat-freq").textContent = "— Hz";
  document.getElementById("stat-zone").textContent = "—";
}

function draw() {
  if (!isActive) return;
  animId = requestAnimationFrame(draw);

  const W    = canvas.offsetWidth * window.devicePixelRatio;
  const H    = 200 * window.devicePixelRatio;
  canvas.width  = W;
  canvas.height = H;

  const bufLen = analyser.frequencyBinCount;
  const freqData = new Uint8Array(bufLen);
  const timeData = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  ctx.clearRect(0, 0, W, H);

  if (currentMode === "bars") drawBars(freqData, W, H);
  else if (currentMode === "wave") drawWave(timeData, W, H);
  else if (currentMode === "circle") drawCircle(freqData, W, H);

  // Stats
  const rms = Math.sqrt(timeData.reduce((s, v) => s + Math.pow((v - 128) / 128, 2), 0) / timeData.length);
  const db  = rms > 0 ? Math.round(20 * Math.log10(rms)) : -100;
  document.getElementById("level-bar").style.width = Math.min(100, rms * 300) + "%";
  document.getElementById("stat-db").textContent   = (db < -60 ? "— " : db) + " dB";

  // Dominant frequency
  let maxVal = 0, maxIdx = 0;
  for (let i = 0; i < bufLen; i++) { if (freqData[i] > maxVal) { maxVal = freqData[i]; maxIdx = i; } }
  const domFreq = Math.round(maxIdx * audioCtx.sampleRate / (analyser.fftSize));
  if (domFreq > 20) {
    document.getElementById("stat-freq").textContent = domFreq < 1000 ? domFreq + " Hz" : (domFreq/1000).toFixed(1) + " kHz";
    const zone = FREQ_ZONES.find(z => domFreq <= z.max) || FREQ_ZONES[FREQ_ZONES.length - 1];
    document.getElementById("stat-zone").textContent = zone.name;
    document.getElementById("stat-zone").style.color = zone.color;
    document.getElementById("freq-tip").textContent  = zone.tip;
  }
}

function drawBars(freqData, W, H) {
  const bars  = 64;
  const barW  = W / bars - 1;
  const step  = Math.floor(freqData.length / bars);

  for (let i = 0; i < bars; i++) {
    const val  = freqData[i * step] / 255;
    const barH = val * H;
    const x    = i * (barW + 1);
    const hue  = 200 + val * 60;

    const grad = ctx.createLinearGradient(0, H, 0, H - barH);
    grad.addColorStop(0, `hsla(${hue},100%,50%,0.9)`);
    grad.addColorStop(1, `hsla(${hue + 40},100%,70%,0.6)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, H - barH, barW, barH, 3);
    ctx.fill();
  }
}

function drawWave(timeData, W, H) {
  ctx.strokeStyle = "#4fc3f7";
  ctx.lineWidth   = 2 * window.devicePixelRatio;
  ctx.shadowColor = "#4fc3f7";
  ctx.shadowBlur  = 8;
  ctx.beginPath();
  const sliceW = W / timeData.length;
  let x = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] / 128) - 1;
    const y = (v * H / 2) + H / 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    x += sliceW;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawCircle(freqData, W, H) {
  const cx = W / 2, cy = H / 2;
  const r  = Math.min(W, H) * 0.25;
  const bars = 128;
  const step = Math.floor(freqData.length / bars);

  for (let i = 0; i < bars; i++) {
    const val   = freqData[i * step] / 255;
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const r1    = r;
    const r2    = r + val * r * 1.2;
    const hue   = (i / bars) * 280 + 180;

    ctx.strokeStyle = `hsla(${hue},100%,60%,${0.4 + val * 0.6})`;
    ctx.lineWidth   = 2 * window.devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
    ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
    ctx.stroke();
  }

  // Center circle
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0, "rgba(79,195,247,0.1)");
  grad.addColorStop(1, "transparent");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
}
</script>
</body>
</html>
