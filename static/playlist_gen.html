<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#0a0a0a; --card:#111; --border:#1f1f1f; --gold:#f5c518; --green:#00e676; --fire:#ff4d4d; --blue:#4fc3f7; --purple:#9c27b0; --text:#fff; --muted:#555; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; padding:16px; padding-bottom:60px; }

.header { text-align:center; padding:14px 0 20px; }
.header h1 { font-size:22px; font-weight:900; background:linear-gradient(135deg,#fff,var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
.header p { font-size:13px; color:var(--muted); }

.section-title { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; margin-top:20px; }

/* Config card */
.config-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px; }
.form-label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }
.form-input {
  width:100%; background:#1a1a1a; border:1px solid var(--border);
  border-radius:10px; padding:10px 12px; color:#fff; font-size:14px;
  outline:none; transition:border-color 0.2s; margin-bottom:10px;
}
.form-input:focus { border-color:var(--green); }
.form-input::placeholder { color:#444; }

/* Genre circles */
.genre-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.genre-circle {
  aspect-ratio:1; border-radius:50%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer;
  border:2px solid transparent; position:relative; overflow:hidden;
  transition:all 0.2s; background:#1a1a1a;
}
.genre-circle .g-emoji { font-size:13px; margin-bottom:2px; line-height:1; }
.genre-circle .g-name  { font-size:7px; font-weight:800; text-align:center; color:#666; letter-spacing:0.2px; line-height:1.2; padding:0 2px; }
.genre-circle.selected .g-name { color:#000; }
.genre-circle::after {
  content:''; position:absolute; inset:0; border-radius:50%;
  transform:scale(0); opacity:0;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
}
.genre-circle.selected::after { transform:scale(1); opacity:0.15; }
.genre-circle.ripple-anim::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  border:3px solid currentColor; opacity:0;
  animation:genreRipple 0.6s ease-out forwards;
}
@keyframes genreRipple {
  0%   { transform:scale(0.8); opacity:0.8; }
  100% { transform:scale(1.3); opacity:0; }
}
.genre-circle:active { transform:scale(0.92); }

/* Mood/ctx chips */
.chip-grid { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  padding:8px 16px; border-radius:100px; font-size:12px; font-weight:700;
  background:#1a1a1a; color:#666; border:2px solid #2a2a2a; cursor:pointer;
  transition:all 0.2s;
}
.chip.selected { color:#000; border-color:transparent; }
.chip:active { transform:scale(0.95); }

/* Length selector */
.len-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.len-btn {
  padding:10px 4px; border-radius:10px; font-size:12px; font-weight:700;
  background:#1a1a1a; color:#666; border:1px solid #2a2a2a;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.len-btn.active { background:#0d1f0d; color:var(--green); border-color:#00e67655; }

/* Generate button */
.btn-gen {
  width:100%; padding:18px; border:none; border-radius:18px;
  background:linear-gradient(135deg,var(--green),#00bcd4);
  font-size:18px; font-weight:800; color:#000; cursor:pointer; margin-top:20px;
  transition:all 0.15s; box-shadow:0 8px 24px rgba(0,230,118,0.2);
}
.btn-gen:active { transform:scale(0.97); }
.btn-gen:disabled { opacity:0.5; }

/* Playlist result */
.playlist-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; overflow:hidden; margin-top:20px;
  animation:slideIn 0.4s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.playlist-header {
  padding:20px; background:linear-gradient(135deg,#0d1f0d,#111);
  border-bottom:1px solid var(--border);
}
.playlist-name { font-size:20px; font-weight:900; color:var(--green); margin-bottom:4px; }
.playlist-meta { font-size:12px; color:var(--muted); }
.playlist-tags { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.playlist-tag { padding:3px 10px; border-radius:100px; font-size:11px; font-weight:600; background:#1a2a1a; color:var(--green); border:1px solid #00e67633; }

/* Track list */
.track-list { padding:8px 0; }
.track-item {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  border-bottom:1px solid #0d0d0d; transition:background 0.15s;
  cursor:pointer;
}
.track-item:last-child { border-bottom:none; }
.track-item:active { background:#1a1a1a; }
.track-num { font-size:13px; color:var(--muted); min-width:20px; text-align:center; font-weight:600; }
.track-info { flex:1; }
.track-name { font-size:14px; font-weight:700; margin-bottom:2px; }
.track-artist { font-size:12px; color:var(--muted); }
.track-duration { font-size:12px; color:var(--muted); }
.track-genre-badge { font-size:10px; padding:2px 8px; border-radius:100px; margin-top:4px; display:inline-block; }

/* Jeff Mkeyz highlight */
.is-mkeyz .track-name { color:var(--gold); }
.is-mkeyz .track-artist { color:#f5c51888; }
.is-mkeyz .track-num { color:var(--gold); }
.mkeyz-badge { font-size:9px; background:#1a1500; color:var(--gold); border:1px solid #f5c51844; padding:2px 8px; border-radius:100px; margin-left:6px; vertical-align:middle; }

/* Section divider */
.section-divider { padding:10px 16px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; background:#0d0d0d; }

/* Action buttons */
.action-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:16px; border-top:1px solid var(--border); }
.action-btn {
  padding:12px; border:none; border-radius:12px; font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px;
}
.action-btn:active { transform:scale(0.96); }
.btn-copy-pl  { background:#1a2a1a; color:var(--green); }
.btn-shuffle  { background:#1a1a2a; color:var(--blue); }
.btn-new      { width:100%; background:#111; color:var(--muted); border:1px solid var(--border); border-radius:12px; padding:12px; font-size:13px; font-weight:700; cursor:pointer; margin:0 16px 16px; width:calc(100% - 32px); }

/* Spinner */
.spinner-wrap { text-align:center; padding:40px 20px; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.spinner-text { font-size:14px; color:var(--muted); }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#fff; color:#000; padding:12px 20px; border-radius:100px; font-size:14px; font-weight:700; z-index:999; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
.toast.show { transform:translateX(-50%) translateY(0); }

.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty .icon { font-size:48px; margin-bottom:12px; }
</style>
</head>

let selectedGenre = "";
let selectedMood  = "";
let selectedCtx   = "";
let playlistLen   = 10;
let includeMkeyz  = true;

// Build chips
function buildChips(containerId, items, colorFn, onSelect) {
  const el = document.getElementById(containerId);
  items.forEach((item, idx) => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.textContent = item;
    const color = colorFn(item, idx);
    chip.style.borderColor = color + "55";
    chip.style.color = color;
    chip.onclick = () => {
      el.querySelectorAll(".chip").forEach(c => {
        c.classList.remove("selected");
        const cc = colorFn(c.textContent, items.indexOf(c.textContent));
        c.style.background  = "";
        c.style.fontWeight  = "600";
        c.style.transform   = "scale(1)";
      });
      chip.classList.add("selected");
      chip.style.background  = color + "33";
      chip.style.borderColor = color;
      chip.style.transform   = "scale(1.05)";
      chip.style.boxShadow   = `0 0 12px ${color}44`;
      onSelect(item);
      if (tg) tg.HapticFeedback?.impactOccurred("light");
    };
    el.appendChild(chip);
  });
}

// Build genre circles
const genreEl = document.getElementById("genre-chips");
const GENRE_EMOJIS = {
  "Pop Latino":"🌴","Trap":"🔥","Reggaeton":"💃","Afrobeats":"🌍",
  "R&B":"💜","Hip-Hop":"🎤","Lo-Fi":"☁️","Dancehall":"🏝️",
  "Drill":"🖤","Salsa":"🎺","Bachata":"❤️","EDM":"⚡",
  "House":"🏠","Dembow":"🇩🇴"
};

  const color = GENRE_COLORS[g] || "#f5c518";
  const circle = document.createElement("div");
  circle.className = "genre-circle";
  circle.innerHTML = `<div class="g-emoji">${GENRE_EMOJIS[g]||"🎵"}</div><div class="g-name">${g}</div>`;
  circle.style.background = color + "18";
  circle.style.borderColor = color + "44";
  circle.onclick = () => {
    genreEl.querySelectorAll(".genre-circle").forEach(c => {
      c.classList.remove("selected","ripple-anim");
      c.style.background  = GENRE_COLORS[c.dataset.genre]+"18" || "#1a1a1a";
      c.style.borderColor = GENRE_COLORS[c.dataset.genre]+"44" || "#2a2a2a";
      c.style.boxShadow   = "none";
      c.querySelector(".g-name").style.color = "#666";
    });

    void circle.offsetWidth;
    circle.classList.add("ripple-anim");
    circle.style.background  = color + "44";
    circle.style.borderColor = color;
    circle.style.boxShadow   = `0 0 20px ${color}66`;
    circle.querySelector(".g-name").style.color = color;
    selectedGenre = g;
    if (window.Telegram?.WebApp) window.Telegram.WebApp.HapticFeedback?.impactOccurred("medium");
    setTimeout(() => circle.classList.remove("ripple-anim"), 700);
  };
  circle.dataset.genre = g;
  genreEl.appendChild(circle);
});

function setLen(n, btn) {
  document.querySelectorAll(".len-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  playlistLen = n;
}

function toggleMkeyz(btn) {
  includeMkeyz = !includeMkeyz;
  btn.style.background = includeMkeyz ? "var(--gold)" : "var(--border)";
  btn.querySelector("span").style.left = includeMkeyz ? "21px" : "3px";
  if (tg) tg.HapticFeedback?.impactOccurred("light");
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randDur() {
  const m = 2 + Math.floor(Math.random() * 3);
  const s = Math.floor(Math.random() * 60);
  return `${m}:${String(s).padStart(2,"0")}`;
}

function generatePlaylist() {
  if (!selectedGenre) { showToast("Elige un género primero"); return; }
  if (!selectedMood)  { showToast("Elige un mood"); return; }

  document.getElementById("result").innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-text">Generando tu playlist...</div>
    </div>`;

  setTimeout(() => buildPlaylist(), 800);
}

function buildPlaylist() {
  const artists   = shuffle(ARTISTS[selectedGenre] || ARTISTS["Hip-Hop"]);
  const mkeyzT    = MKEYZ_TRACKS[selectedGenre] || MKEYZ_TRACKS["Trap"];
  const color     = GENRE_COLORS[selectedGenre] || "#f5c518";
  const namePool  = PLAYLIST_NAMES[selectedMood] || ["Mi Playlist 🎵"];
  const plName    = namePool[Math.floor(Math.random() * namePool.length)];

  let tracks = [];

  // If include Mkeyz, add 2-3 tracks at strategic positions
  let mkeyzPositions = [];
  if (includeMkeyz && mkeyzT.length > 0) {
    const mkeyzCount = Math.min(mkeyzT.length, 3);
    for (let i = 0; i < mkeyzCount; i++) {
      mkeyzPositions.push(Math.floor(Math.random() * playlistLen));
    }
  }

  // Build track list
  let artistIdx = 0;
  let trackIdx  = 0;

  for (let i = 0; i < playlistLen; i++) {
    if (mkeyzPositions.includes(i) && mkeyzT.length > 0) {
      const mk = mkeyzT[Math.floor(Math.random() * mkeyzT.length)];
      tracks.push({
        name: mk.title,
        artist: "Jeff Mkeyz",
        duration: randDur(),
        isMkeyz: true,
        genre: selectedGenre,
      });
    } else {
      const artist = artists[artistIdx % artists.length];
      const track  = artist.tracks[trackIdx % artist.tracks.length];
      tracks.push({
        name: track,
        artist: artist.name,
        duration: randDur(),
        isMkeyz: false,
        genre: selectedGenre,
      });
      trackIdx++;
      if (trackIdx % artist.tracks.length === 0) artistIdx++;
    }
  }

  const totalMin = tracks.reduce((s, t) => {
    const [m, sec] = t.duration.split(":").map(Number);
    return s + m * 60 + sec;
  }, 0);
  const totalStr = `${Math.floor(totalMin/60)}h ${Math.floor(totalMin%60)}m`;

  renderPlaylist(plName, tracks, color, totalStr);
  if (tg) tg.HapticFeedback?.notificationOccurred("success");
}

function renderPlaylist(name, tracks, color, totalDur) {
  const ctx = selectedCtx || "General";
  const html = `
    <div class="playlist-card">
      <div class="playlist-header">
        <div class="playlist-name">${name}</div>
        <div class="playlist-meta">${tracks.length} canciones · ${totalDur} · ${selectedGenre}</div>
        <div class="playlist-tags">
          <span class="playlist-tag">${selectedGenre}</span>
          <span class="playlist-tag">${selectedMood}</span>
          ${ctx ? `<span class="playlist-tag">${ctx}</span>` : ""}
          ${includeMkeyz ? '<span class="playlist-tag" style="background:#1a1500;color:#f5c518;border-color:#f5c51844">🎛️ Jeff Mkeyz</span>' : ""}
        </div>
      </div>

      <div class="track-list">
        ${tracks.map((t, i) => `
          <div class="track-item ${t.isMkeyz ? "is-mkeyz" : ""}">
            <div class="track-num">${i+1}</div>
            <div class="track-info">
              <div class="track-name">
                ${t.name}
                ${t.isMkeyz ? '<span class="mkeyz-badge">Jeff Mkeyz</span>' : ""}
              </div>
              <div class="track-artist">${t.artist}</div>
            </div>
            <div class="track-duration">${t.duration}</div>
          </div>`).join("")}
      </div>

      <div class="action-row">
        <button class="action-btn btn-copy-pl" onclick="copyPlaylist(${JSON.stringify(tracks).replace(/"/g,'&quot;')}, '${name}')">📋 Copiar lista</button>
        <button class="action-btn btn-shuffle" onclick="shuffleTracks()">🔀 Mezclar</button>
      </div>
      <button class="btn-new" onclick="generatePlaylist()">🔄 Regenerar playlist</button>
    </div>`;

  document.getElementById("result").innerHTML = html;
  document.getElementById("result").scrollIntoView({ behavior:"smooth" });
}

function shuffleTracks() {
  generatePlaylist();
}

function copyPlaylist(tracks, name) {
  const text = `🎵 ${name}\n\n` + tracks.map((t,i) => `${i+1}. ${t.name} — ${t.artist}`).join("\n") + `\n\n🤖 Mkeyz Studio Bot\nt.me/MkeyzDAWbot`;
  navigator.clipboard?.writeText(text).then(() => showToast("✅ Playlist copiada"));
  if (tg) tg.HapticFeedback?.impactOccurred("light");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
