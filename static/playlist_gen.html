<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Playlist Generator Pro — Mkeyz Studio</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #03050a;
      --card: #0a0c14;
      --border: #1a1d2e;
      --gold: #f0b90b;
      --green: #00e676;
      --fire: #ff3b3b;
      --blue: #4fc3f7;
      --purple: #b388ff;
      --text: #ffffff;
      --muted: #6a6d7a;
      --radius: 18px;
      --glass: rgba(10, 12, 20, 0.7);
      --glass-border: rgba(255, 255, 255, 0.06);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Fondo animado */
    .bg-aurora {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(179, 136, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 70%, rgba(240, 185, 11, 0.04) 0%, transparent 50%);
      animation: auroraShift 20s ease-in-out infinite alternate;
    }
    @keyframes auroraShift {
      0% {
        transform: scale(1) translate(0, 0);
        opacity: 0.7;
      }
      100% {
        transform: scale(1.2) translate(2%, -1%);
        opacity: 1;
      }
    }

    .app-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 20px 0 12px;
    }
    .header .icon {
      font-size: 52px;
      animation: floatIcon 3s ease-in-out infinite;
      display: inline-block;
      filter: drop-shadow(0 0 25px rgba(0, 230, 118, 0.4));
    }
    @keyframes floatIcon {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      30% {
        transform: translateY(-12px) rotate(3deg);
      }
      60% {
        transform: translateY(4px) rotate(-2deg);
      }
    }
    .header h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #ffffff 0%, #00e676 30%, #4fc3f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .header .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* Cards con glassmorphism */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }
    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .section-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      opacity: 0.5;
    }

    /* Genre grid */
    .genre-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .genre-circle {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: rgba(26, 26, 26, 0.6);
      overflow: visible;
    }
    .genre-circle .g-emoji {
      font-size: 15px;
      margin-bottom: 2px;
      line-height: 1;
      transition: transform 0.3s ease;
    }
    .genre-circle .g-name {
      font-size: 7px;
      font-weight: 800;
      text-align: center;
      color: #666;
      letter-spacing: 0.3px;
      line-height: 1.2;
      padding: 0 3px;
      transition: color 0.3s;
    }
    .genre-circle:active {
      transform: scale(0.9);
    }
    .genre-circle.selected {
      transform: scale(1.08);
      z-index: 2;
    }
    .genre-circle.selected .g-emoji {
      transform: scale(1.3);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .genre-circle.selected .g-name {
      color: #fff;
      font-weight: 900;
    }
    @keyframes popIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1.3);
        opacity: 1;
      }
    }
    .genre-circle::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid transparent;
      opacity: 0;
      transition: all 0.4s ease;
    }
    .genre-circle.selected::after {
      opacity: 1;
      animation: borderPulse 1.5s ease-in-out infinite;
    }
    @keyframes borderPulse {
      0%, 100% {
        inset: -3px;
        opacity: 0.6;
      }
      50% {
        inset: -6px;
        opacity: 1;
      }
    }

    /* Chips */
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 10px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(26, 26, 26, 0.5);
      color: #888;
      border: 2px solid rgba(42, 42, 42, 0.6);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    .chip::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 100px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .chip.selected {
      color: #fff;
      border-color: transparent;
      transform: scale(1.04);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .chip.selected::before {
      opacity: 0.2;
      background: currentColor;
    }
    .chip:active {
      transform: scale(0.94);
    }

    /* Length buttons */
    .len-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .len-btn {
      padding: 14px 6px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(26, 26, 26, 0.5);
      color: #888;
      border: 2px solid rgba(42, 42, 42, 0.6);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .len-btn.active {
      color: var(--green);
      border-color: rgba(0, 230, 118, 0.4);
      background: rgba(0, 230, 118, 0.08);
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.15);
      transform: scale(1.03);
    }
    .len-btn:active {
      transform: scale(0.95);
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
    }
    .toggle-sublabel {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .toggle-switch {
      width: 50px;
      height: 28px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      background: var(--gold);
      box-shadow: 0 0 16px rgba(240, 185, 11, 0.3);
    }
    .toggle-switch.off {
      background: var(--border);
      box-shadow: none;
    }
    .toggle-switch span {
      position: absolute;
      top: 3px;
      left: 24px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }
    .toggle-switch.off span {
      left: 3px;
    }

    /* Generate button */
    .btn-gen {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #00e676 0%, #00bcd4 100%);
      font-size: 19px;
      font-weight: 900;
      color: #000;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 12px 40px rgba(0, 230, 118, 0.3);
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
    }
    .btn-gen::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255, 255, 255, 0.2) 50%, transparent 60%);
      animation: btnShine 3s ease-in-out infinite;
    }
    @keyframes btnShine {
      0% {
        transform: translateX(-100%) rotate(45deg);
      }
      100% {
        transform: translateX(100%) rotate(45deg);
      }
    }
    .btn-gen:active {
      transform: scale(0.96);
      box-shadow: 0 6px 20px rgba(0, 230, 118, 0.2);
    }
    .btn-gen:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* Playlist result */
    .playlist-card {
      background: var(--glass);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      overflow: hidden;
      margin-top: 20px;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Playlist cover */
    .playlist-cover {
      height: 180px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .playlist-cover .cover-art {
      position: absolute;
      inset: 0;
      transition: all 0.5s ease;
    }
    .playlist-cover .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(3, 5, 10, 0.9) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 24px;
    }
    .playlist-cover .pl-name {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      letter-spacing: -1px;
      text-align: center;
      padding: 0 20px;
    }
    .playlist-cover .pl-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 4px;
      text-align: center;
    }

    .playlist-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .playlist-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .playlist-tags {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .playlist-tag {
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(0, 230, 118, 0.1);
      color: var(--green);
      border: 1px solid rgba(0, 230, 118, 0.2);
    }
    .playlist-tag.mkeyz-tag {
      background: rgba(240, 185, 11, 0.1);
      color: var(--gold);
      border-color: rgba(240, 185, 11, 0.3);
    }

    /* Track list */
    .track-list {
      padding: 4px 0;
    }
    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }
    .track-item:last-child {
      border-bottom: none;
    }
    .track-item:active {
      background: rgba(255, 255, 255, 0.03);
    }
    .track-item.is-mkeyz {
      background: rgba(240, 185, 11, 0.04);
    }
    .track-num {
      font-size: 14px;
      color: var(--muted);
      min-width: 24px;
      text-align: center;
      font-weight: 700;
    }
    .track-item.is-mkeyz .track-num {
      color: var(--gold);
    }
    .track-cover {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }
    .track-info {
      flex: 1;
    }
    .track-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .track-item.is-mkeyz .track-name {
      color: var(--gold);
    }
    .track-artist {
      font-size: 12px;
      color: var(--muted);
    }
    .track-energy {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .energy-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border);
    }
    .energy-dot.filled {
      background: var(--green);
      box-shadow: 0 0 4px rgba(0, 230, 118, 0.5);
    }
    .track-duration {
      font-size: 12px;
      color: var(--muted);
      min-width: 36px;
      text-align: right;
    }
    .mkeyz-badge {
      font-size: 9px;
      background: rgba(240, 185, 11, 0.15);
      color: var(--gold);
      border: 1px solid rgba(240, 185, 11, 0.3);
      padding: 2px 8px;
      border-radius: 100px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 700;
    }

    /* Section divider */
    .section-divider {
      padding: 10px 20px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      background: rgba(255, 255, 255, 0.02);
      font-weight: 600;
    }

    /* Action buttons */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:active {
      transform: scale(0.95);
    }
    .btn-copy-pl {
      background: rgba(0, 230, 118, 0.12);
      color: var(--green);
    }
    .btn-shuffle {
      background: rgba(79, 195, 247, 0.12);
      color: var(--blue);
    }
    .btn-new {
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-new:active {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Spinner */
    .spinner-wrap {
      text-align: center;
      padding: 50px 20px;
    }
    .spinner-orbit {
      position: relative;
      width: 60px;
      height: 60px;
      margin: 0 auto 16px;
    }
    .spinner-orbit .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: orbitSpin 1.5s linear infinite;
    }
    .spinner-orbit .orbit-ring:nth-child(1) {
      inset: 0;
      border-top-color: var(--green);
      animation-duration: 1.2s;
    }
    .spinner-orbit .orbit-ring:nth-child(2) {
      inset: 6px;
      border-right-color: var(--blue);
      animation-duration: 1.6s;
      animation-direction: reverse;
    }
    .spinner-orbit .orbit-ring:nth-child(3) {
      inset: 12px;
      border-bottom-color: var(--gold);
      animation-duration: 2s;
    }
    .spinner-core {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: var(--green);
      animation: corePulse 1s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
    }
    @keyframes orbitSpin {
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes corePulse {
      0%, 100% {
        transform: scale(0.8);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }
    .spinner-text {
      font-size: 14px;
      color: var(--muted);
      animation: textFade 1.5s ease-in-out infinite;
    }
    @keyframes textFade {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #fff;
      color: #000;
      padding: 14px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 420px) {
      .genre-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }
      .genre-circle .g-emoji {
        font-size: 12px;
      }
      .genre-circle .g-name {
        font-size: 6px;
      }
      .playlist-cover {
        height: 140px;
      }
      .playlist-cover .pl-name {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-aurora"></div>
  <div class="app-container">
    <div class="header">
      <div class="icon">🎵</div>
      <h1>Playlist Generator Pro</h1>
      <div class="subtitle">Curaduría musical inteligente · Playlists que fluyen</div>
    </div>

    <!-- Género -->
    <div class="glass-card">
      <div class="section-title">🎧 Género principal</div>
      <div class="genre-grid" id="genre-chips"></div>
    </div>

    <!-- Mood -->
    <div class="glass-card">
      <div class="section-title">🌊 Mood / Ambiente</div>
      <div class="chip-grid" id="mood-chips"></div>
    </div>

    <!-- Contexto -->
    <div class="glass-card">
      <div class="section-title">📍 Contexto</div>
      <div class="chip-grid" id="ctx-chips"></div>
    </div>

    <!-- Duración -->
    <div class="glass-card">
      <div class="section-title">⏱️ Duración</div>
      <div class="len-row" id="len-btns"></div>
      <div class="len-row" style="margin-top:8px" id="len-btns2"></div>
    </div>

    <!-- Jeff Mkeyz toggle -->
    <div class="glass-card">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">🎛️ Incluir Jeff Mkeyz</div>
          <div class="toggle-sublabel">Beats exclusivos del productor</div>
        </div>
        <button class="toggle-switch" id="mkeyz-toggle" onclick="toggleMkeyz()">
          <span></span>
        </button>
      </div>
    </div>

    <button class="btn-gen" id="btn-gen" onclick="generatePlaylist()">🎵 GENERAR PLAYLIST</button>

    <div id="result"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready();
      tg.expand();
      tg.setHeaderColor("#03050a");
      tg.setBackgroundColor("#03050a"); }

    // ── EXPANDED DATABASE ────────────────────────────────────────
    const GENRES = ["Pop Latino", "Trap", "Reggaeton", "Afrobeats", "R&B", "Hip-Hop", "Lo-Fi", "Dancehall", "Drill",
      "Salsa", "Bachata", "EDM", "House", "Dembow", "Indie", "Rock Alternativo"
    ];
    const MOODS = ["Energético", "Relajado", "Romántico", "Melancólico", "Motivacional", "Oscuro", "Alegre", "Fiesta",
      "Concentración", "Workout"
    ];
    const CTXS = ["En el carro", "Sesión de estudio", "Gym", "Fiesta", "Trabajo", "Antes de dormir", "Viaje",
      "Tarde de lluvia", "Verano", "After party"
    ];

    const GENRE_COLORS = {
      "Pop Latino": "#e91e63",
      "Trap": "#ff4d4d",
      "Reggaeton": "#ff6b35",
      "Afrobeats": "#ff9800",

    // ── GENERATE PLAYLIST ────────────────────────
    function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math
        .random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]]; } return a; }

    function randDuration(minSec = 150, maxSec = 300) {
      const s = Math.floor(Math.random() * (maxSec - minSec)) + minSec;
      return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
    }

    function generatePlaylist() {
      if (!selectedGenre) { showToast("🎵 Elige un género primero"); return; }
      if (!selectedMood) { showToast("🌊 Elige un mood"); return; }

      document.getElementById("result").innerHTML = `
        <div class="spinner-wrap">
          <div class="spinner-orbit">
            <div class="orbit-ring"></div><div class="orbit-ring"></div><div class="orbit-ring"></div>
            <div class="spinner-core"></div>
          </div>
          <div class="spinner-text">Creando tu playlist curada...</div>
        </div>`;

      setTimeout(() => buildPlaylist(), 900);
    }

    function buildPlaylist() {
      const artists = ARTISTS[selectedGenre] || ARTISTS["Hip-Hop"];
      const mkeyzT = MKEYZ_TRACKS[selectedGenre] || [];
      const color = GENRE_COLORS[selectedGenre] || "#f5c518";
      const namePool = PLAYLIST_NAMES[selectedMood] || ["Mi Playlist 🎵"];
      const plName = namePool[Math.floor(Math.random() * namePool.length)];

      // Crear pool de canciones con metadatos
      let trackPool = [];
      const usedArtistNames = new Set();

      artists.forEach(artist => {
        artist.tracks.forEach(track => {
          trackPool.push({
            name: track,
            artist: artist.name,
            energy: artist.energy + (Math.random() - 0.5) * 2,
            pop: artist.pop,
            isMkeyz: false,
            genre: selectedGenre
          });
        });
      });

      // Añadir tracks de Jeff Mkeyz
      mkeyzT.forEach(mk => {
        trackPool.push({
          name: mk.title,
          artist: "Jeff Mkeyz",
          energy: mk.energy || 7,
          pop: 70,
          isMkeyz: true,
          genre: selectedGenre,
          bpm: mk.bpm
        });
      });

      // Seleccionar canciones asegurando variedad de artistas
      let selected = [];
      let pool = shuffle([...trackPool]);
      let mkeyzCount = 0;
      const maxMkeyz = includeMkeyz ? Math.min(mkeyzT.length, Math.floor(playlistLen * 0.2)) : 0;

      // Priorizar incluir Jeff Mkeyz si está activado
      if (includeMkeyz && mkeyzT.length > 0) {
        const mkeyzPool = pool.filter(t => t.isMkeyz);
        const regularPool = pool.filter(t => !t.isMkeyz);
        pool = [...shuffle(mkeyzPool).slice(0, maxMkeyz), ...shuffle(regularPool)];
      }

      // Selección con diversidad de artistas
      let artistCount = {};
      for (const track of pool) {
        if (selected.length >= playlistLen) break;
        const artistKey = track.artist;
        artistCount[artistKey] = (artistCount[artistKey] || 0);
        if (artistCount[artistKey] < 3 && (track.isMkeyz ? mkeyzCount < maxMkeyz : true)) {
          selected.push(track);
          artistCount[artistKey]++;
          if (track.isMkeyz) mkeyzCount++;
        }
      }

      // Si faltan canciones, rellenar
      if (selected.length < playlistLen) {
        const remaining = pool.filter(t => !selected.includes(t));
        selected = [...selected, ...remaining.slice(0, playlistLen - selected.length)];
      }

      // Ordenar por arco de energía (curva narrativa)
      selected.sort((a, b) => a.energy - b.energy);
      // Reorganizar para crear arco: inicio medio, subida, pico, bajada
      const mid = Math.floor(selected.length / 2);
      const highEnergy = selected.filter(t => t.energy >= 7);
      const lowEnergy = selected.filter(t => t.energy < 7);
      let ordered = [];
      // Intro (energía media-baja)
      ordered.push(...lowEnergy.slice(0, Math.floor(lowEnergy.length * 0.4)));
      // Desarrollo (subida)
      ordered.push(...highEnergy.slice(0, Math.floor(highEnergy.length * 0.3)));
      // Clímax (máxima energía)
      ordered.push(...highEnergy.slice(Math.floor(highEnergy.length * 0.3)));
      // Cierre (bajada)
      ordered.push(...lowEnergy.slice(Math.floor(lowEnergy.length * 0.4)));
      // Si hay Jeff Mkeyz, distribuir uno en el clímax
      const mkeyzTracks = ordered.filter(t => t.isMkeyz);
      const nonMkeyz = ordered.filter(t => !t.isMkeyz);
      if (mkeyzTracks.length > 0) {
        // Insertar Mkeyz en posiciones estratégicas
        const insertPositions = [Math.floor(ordered.length * 0.3), Math.floor(ordered.length * 0.6)];
        let finalList = [...nonMkeyz];
        mkeyzTracks.forEach((mk, i) => {
          const pos = Math.min(insertPositions[i] || Math.floor(finalList.length / 2), finalList.length);
          finalList.splice(pos, 0, mk);
        });
        ordered = finalList;
      }

      // Asignar duraciones realistas
      ordered = ordered.map(t => ({ ...t, duration: randDuration(t.energy > 7 ? 160 : 180, t.energy > 7 ? 280 :
          320) }));

      const totalSec = ordered.reduce((s, t) => {
        const [m, sec] = t.duration.split(":").map(Number);
        return s + m * 60 + sec;
      }, 0);
      const totalStr = `${Math.floor(totalSec/3600)}h ${Math.floor((totalSec%3600)/60)}m`;

      // Generar descripción
      const descriptions = {
        "Energético": "Una explosión de energía para mantenerte al máximo.",
        "Relajado": "Deja que el ritmo te lleve a un estado de calma.",
        "Romántico": "La banda sonora perfecta para el amor.",
        "Melancólico": "Para sentir profundo y reflexionar.",
        "Motivacional": "El impulso que necesitas para conquistar el día.",
        "Oscuro": "Sumérgete en las sombras con estos beats.",
        "Alegre": "Sonrisas garantizadas con cada canción.",
        "Fiesta": "Prende la fiesta con esta selección explosiva.",
        "Concentración": "Enfócate y alcanza tu máximo potencial.",
        "Workout": "El combustible perfecto para tu entrenamiento."
      };

      renderPlaylist(plName, ordered, color, totalStr, descriptions[selectedMood] ||
        "Una selección curada especialmente para ti.");
    }

    function renderPlaylist(name, tracks, color, totalDur, description) {
      const ctx = selectedCtx || "";
      // Generar gradiente único para la portada
      const hue1 = parseInt(color.slice(1), 16) % 360;
      const hue2 = (hue1 + 40) % 360;
      const coverGradient = `linear-gradient(135deg, hsl(${hue1},70%,30%) 0%, hsl(${hue2},80%,20%) 50%, hsl(${hue1},60%,10%) 100%)`;

      // Agrupar tracks en secciones
      const sections = [];
      const total = tracks.length;
      const sectionSize = Math.ceil(total / 3);
      for (let i = 0; i < total; i += sectionSize) {
        sections.push(tracks.slice(i, i + sectionSize));
      }
      const sectionNames = ["🎬 Intro", "🔥 Desarrollo", "🌙 Cierre"];

      let html = `
        <div class="playlist-card">
          <div class="playlist-cover" style="background:${coverGradient}">
            <div class="cover-overlay">
              <div class="pl-name">${name}</div>
              <div class="pl-desc">${description}</div>
            </div>
          </div>
          <div class="playlist-header">
            <div class="playlist-meta">
              <span>📀 ${tracks.length} canciones</span>
              <span>⏱️ ${totalDur}</span>
              <span>🎧 ${selectedGenre}</span>
            </div>
            <div class="playlist-tags">
              <span class="playlist-tag">${selectedGenre}</span>
              <span class="playlist-tag">${selectedMood}</span>
              ${ctx ? `<span class="playlist-tag">${ctx}</span>` : ""}
              ${includeMkeyz ? '<span class="playlist-tag mkeyz-tag">🎛️ Jeff Mkeyz</span>' : ""}
            </div>
          </div>
          <div class="track-list">`;

      sections.forEach((section, si) => {
        if (sections.length > 1) {
          html += `<div class="section-divider">${sectionNames[si] || '• • •'}</div>`;
        }
        section.forEach((t, i) => {
          const colors = ["#e91e63","#ff6b35","#9c27b0","#2196f3","#00bcd4","#4caf50","#ff9800","#7c4dff"];
          const bgColor = colors[Math.floor(Math.random() * colors.length)];
          html += `
            <div class="track-item ${t.isMkeyz ? "is-mkeyz" : ""}">
              <div class="track-num">${tracks.indexOf(t)+1}</div>
              <div class="track-cover" style="background:${bgColor};opacity:0.8">${t.name.charAt(0)}</div>
              <div class="track-info">
                <div class="track-name">
                  ${t.name}
                  ${t.isMkeyz ? '<span class="mkeyz-badge">Jeff Mkeyz</span>' : ""}
                </div>
                <div class="track-artist">${t.artist}</div>
              </div>
              <div class="track-duration">${t.duration}</div>
            </div>`;
        });
      });

      html += `
          </div>
          <div class="action-row">
            <button class="action-btn btn-copy-pl" onclick="copyPlaylist('${encodeURIComponent(JSON.stringify(tracks))}', '${name.replace(/'/g, "\\'")}')">📋 Copiar lista</button>
            <button class="action-btn btn-shuffle" onclick="generatePlaylist()">🔀 Regenerar</button>
          </div>
          <button class="btn-new" onclick="generatePlaylist()">🔄 Nueva playlist</button>
        </div>`;

      document.getElementById("result").innerHTML = html;
      document.getElementById("result").scrollIntoView({ behavior: "smooth" });
      if (tg) tg.HapticFeedback?.notificationOccurred("success");
    }

    function copyPlaylist(encodedTracks, name) {
      const tracks = JSON.parse(decodeURIComponent(encodedTracks));
      const text = `🎵 ${name}\n\n` + tracks.map((t, i) => `${i+1}. ${t.name} — ${t.artist}`).join("\n") +
        `\n\n🤖 Generado por Mkeyz Studio\nt.me/MkeyzDAWbot`;
      navigator.clipboard?.writeText(text).then(() => showToast("✅ Playlist copiada al portapapeles"));
      if (tg) tg.HapticFeedback?.impactOccurred("light");
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    // ── INIT ──────────────────────────────────────
    buildGenreCircles();
    buildLenButtons();
  </script>
</body>
</html>
