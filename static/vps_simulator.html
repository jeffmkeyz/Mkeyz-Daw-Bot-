<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>VPS Simulator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080b0f; --surface:#0e1318; --surface2:#141c24; --border:#1e2d3d;
  --green:#00e87a; --green-dim:rgba(0,232,122,0.12);
  --amber:#ffb800; --amber-dim:rgba(255,184,0,0.12);
  --red:#ff4757; --blue:#4fc3f7;
  --text:#c8d8e8; --text-dim:#4a6070; --text-mid:#7a9ab0;
  --radius:10px; --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:1000; }
#app { min-height:100vh; padding:0 0 calc(80px + var(--safe-bottom)); display:flex; flex-direction:column; }
.header { position:sticky; top:0; z-index:100; background:rgba(8,11,15,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 16px 12px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; flex-direction:column; gap:2px; }
.vps-name { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:#fff; letter-spacing:2px; text-transform:uppercase; }
.vps-meta { color:var(--text-dim); font-size:10px; letter-spacing:0.5px; }
.status-pill { display:flex; align-items:center; gap:6px; background:var(--green-dim); border:1px solid rgba(0,232,122,0.25); border-radius:20px; padding:4px 10px; font-size:10px; color:var(--green); letter-spacing:0.5px; }
.pulse { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse-anim 2s ease-in-out infinite; }
@keyframes pulse-anim { 0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 rgba(0,232,122,0.5);} 50%{opacity:0.7;transform:scale(0.9);box-shadow:0 0 0 4px rgba(0,232,122,0);} }
.section-title { font-size:9px; font-weight:600; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; padding:18px 16px 10px; }
.resources-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 16px; }
.res-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; position:relative; overflow:hidden; cursor:pointer; }
.res-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--radius) var(--radius) 0 0; }
.res-card.cpu::after { background:var(--green); }
.res-card.ram::after { background:var(--blue); }
.res-card.disk::after { background:var(--amber); }
.res-card.bw::after { background:#b388ff; }
.res-card:active { border-color:var(--green); background:var(--green-dim); }
.res-icon { font-size:18px; margin-bottom:6px; }
.res-label { font-size:9px; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px; }
.res-value { font-size:16px; font-weight:700; color:#fff; margin-bottom:8px; }
.res-sub { font-size:9px; color:var(--text-dim); margin-bottom:8px; }
.bar-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.bar-fill { height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
.cpu .bar-fill { background:var(--green); }
.ram .bar-fill { background:var(--blue); }
.disk .bar-fill { background:var(--amber); }
.bw .bar-fill { background:#b388ff; }
.capacity-panel { margin:8px 16px 0; background:linear-gradient(135deg,rgba(0,232,122,0.06) 0%,rgba(0,0,0,0) 60%); border:1px solid rgba(0,232,122,0.2); border-radius:var(--radius); padding:16px; display:flex; align-items:center; justify-content:space-between; }
.cap-left { display:flex; flex-direction:column; gap:4px; }
.cap-label { font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
.cap-number { font-family:'Syne',sans-serif; font-size:42px; font-weight:800; color:var(--green); line-height:1; text-shadow:0 0 30px rgba(0,232,122,0.4); }
.cap-sublabel { font-size:10px; color:var(--text-mid); }
.bottleneck-badge { font-size:9px; letter-spacing:0.5px; padding:3px 8px; border-radius:4px; background:var(--amber-dim); border:1px solid rgba(255,184,0,0.25); color:var(--amber); margin-top:4px; }
.cap-limits { display:flex; flex-direction:column; gap:5px; text-align:right; }
.cap-limit-row { font-size:10px; color:var(--text-dim); }
.cap-limit-row span { color:var(--text); }
.upgrade-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 16px; }
.upg-btn { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:11px 10px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:all 0.15s; color:var(--text); -webkit-tap-highlight-color:transparent; }
.upg-btn:active { transform:scale(0.97); border-color:var(--green); background:var(--green-dim); }
.upg-icon { font-size:14px; }
.upg-text { display:flex; flex-direction:column; gap:1px; }
.upg-name { font-size:11px; font-weight:600; color:#fff; }
.upg-detail { font-size:9px; color:var(--text-dim); }
.upg-arrow { margin-left:auto; font-size:10px; color:var(--green); opacity:0.6; }
.profiles-header { padding:18px 16px 10px; display:flex; align-items:center; justify-content:space-between; }
.profiles-header .section-title { padding:0; }
.profile-count-badge { font-size:9px; letter-spacing:1px; color:var(--green); background:var(--green-dim); border:1px solid rgba(0,232,122,0.2); padding:2px 8px; border-radius:20px; }
.profiles-list { display:flex; flex-direction:column; gap:6px; padding:0 16px; }
.profile-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:11px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:border-color 0.15s; animation:card-in 0.3s ease both; }
@keyframes card-in { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.profile-card:active { background:var(--surface2); }
.profile-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-active .profile-status-dot { background:var(--green); box-shadow:0 0 6px rgba(0,232,122,0.6); }
.status-warming .profile-status-dot { background:var(--amber); box-shadow:0 0 6px rgba(255,184,0,0.6); }
.status-idle .profile-status-dot { background:var(--text-dim); }
.profile-info { flex:1; min-width:0; }
.profile-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.profile-meta { font-size:9px; color:var(--text-dim); margin-top:2px; }
.profile-right { text-align:right; flex-shrink:0; }
.profile-status-label { font-size:9px; letter-spacing:0.5px; }
.status-active .profile-status-label { color:var(--green); }
.status-warming .profile-status-label { color:var(--amber); }
.status-idle .profile-status-label { color:var(--text-dim); }
.profile-fp { font-size:8px; color:var(--text-dim); margin-top:1px; }
.profiles-empty { padding:30px 16px; text-align:center; color:var(--text-dim); font-size:11px; line-height:1.8; }
.profiles-empty .big-icon { font-size:36px; display:block; margin-bottom:10px; opacity:0.4; }
.bottom-bar { position:fixed; bottom:0; left:0; right:0; padding:10px 16px calc(10px + var(--safe-bottom)); background:rgba(8,11,15,0.95); backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; gap:8px; z-index:200; }
.btn-primary { flex:1; padding:13px; background:var(--green); border:none; border-radius:var(--radius); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#000; cursor:pointer; letter-spacing:0.3px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.btn-primary:active { transform:scale(0.97); opacity:0.85; }
.btn-secondary { padding:13px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); cursor:pointer; letter-spacing:0.3px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.btn-secondary:active { transform:scale(0.97); border-color:var(--red); color:var(--red); }
.modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.7); display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-sheet { width:100%; background:var(--surface); border:1px solid var(--border); border-bottom:none; border-radius:18px 18px 0 0; padding:20px 16px calc(24px + var(--safe-bottom)); transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.modal-overlay.open .modal-sheet { transform:translateY(0); }
.modal-handle { width:36px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 20px; }
.modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:#fff; margin-bottom:18px; }
.modal-options { display:flex; flex-direction:column; gap:8px; }
.modal-option { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.modal-option:active { border-color:var(--green); background:var(--green-dim); }
.modal-opt-left { display:flex; flex-direction:column; gap:2px; }
.modal-opt-label { font-size:13px; font-weight:600; color:#fff; }
.modal-opt-detail { font-size:10px; color:var(--text-dim); }
.modal-opt-plus { font-size:12px; color:var(--green); font-weight:700; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a2430; border:1px solid var(--green); color:var(--green); font-size:11px; letter-spacing:0.3px; padding:8px 16px; border-radius:20px; opacity:0; pointer-events:none; transition:all 0.3s; z-index:1000; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#loading { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; height:100vh; color:var(--text-dim); font-size:11px; }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
/* ── Quick Calc Panel ── */
.quick-panel { position:fixed; inset:0; z-index:900; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.quick-panel.open { transform:translateY(0); }
.quick-body { padding:20px 16px calc(32px + var(--safe-bottom)); flex:1; display:flex; flex-direction:column; gap:16px; }
.quick-counter { display:flex; align-items:center; justify-content:center; gap:0; margin:8px 0; }
.quick-num { font-family:'Syne',sans-serif; font-size:72px; font-weight:800; color:var(--green); line-height:1; text-align:center; min-width:120px; text-shadow:0 0 40px rgba(0,232,122,0.3); }
.quick-btn { width:52px; height:52px; border-radius:50%; border:2px solid var(--border); background:var(--surface); color:#fff; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; -webkit-tap-highlight-color:transparent; flex-shrink:0; }
.quick-btn:active { background:var(--green); border-color:var(--green); color:#000; transform:scale(0.92); }
.quick-presets { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.quick-preset { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.quick-preset:active, .quick-preset.active { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.quick-result { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.quick-result-header { background:linear-gradient(135deg,rgba(0,232,122,0.08),transparent); padding:14px 16px; border-bottom:1px solid var(--border); }
.quick-result-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:#fff; margin-bottom:2px; }
.quick-result-sub { font-size:10px; color:var(--text-dim); }
.quick-result-body { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.quick-spec-row { display:flex; align-items:center; justify-content:space-between; }
.quick-spec-left { display:flex; align-items:center; gap:8px; }
.quick-spec-icon { font-size:16px; }
.quick-spec-label { font-size:11px; color:var(--text-dim); }
.quick-spec-value { font-size:13px; font-weight:700; color:#fff; }
.quick-spec-sub { font-size:9px; color:var(--text-dim); }
.quick-providers { display:flex; flex-direction:column; gap:6px; margin-top:4px; }
.quick-provider { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; }
.quick-provider.best { border-color:var(--green); background:var(--green-dim); }
.quick-prov-name { font-size:11px; font-weight:600; color:#fff; }
.quick-prov-spec { font-size:9px; color:var(--text-dim); margin-top:2px; }
.quick-prov-price { font-size:12px; font-weight:700; color:var(--green); }
.quick-prov-badge { font-size:8px; padding:1px 6px; border-radius:3px; background:var(--green-dim); color:var(--green); border:1px solid rgba(0,232,122,0.2); margin-top:2px; display:inline-block; }
/* ── Platform Selector ── */
.platform-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.plat-btn { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:10px 6px; cursor:pointer; text-align:center; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.plat-btn.selected { border-color:var(--green); background:var(--green-dim); }
.plat-btn:active { border-color:var(--green); }
.plat-icon { font-size:20px; display:block; margin-bottom:4px; }
.plat-name { font-size:9px; font-weight:600; color:var(--text-mid); letter-spacing:0.3px; }
.plat-btn.selected .plat-name { color:var(--green); }
.plat-info-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.plat-info-row { display:flex; justify-content:space-between; align-items:center; }
.plat-info-label { font-size:10px; color:var(--text-dim); }
.plat-info-value { font-size:10px; font-weight:600; color:var(--text); }
.plat-geo-badge { font-size:8px; padding:2px 7px; border-radius:4px; }
.geo-global { background:var(--green-dim); color:var(--green); border:1px solid rgba(0,232,122,0.2); }
.geo-us { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(255,184,0,0.2); }
/* ── New Profile Panel ── */
.newp-panel { position:fixed; inset:0; z-index:800; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.newp-panel.open { transform:translateY(0); }
.newp-suggest-card { background:linear-gradient(135deg,rgba(0,232,122,0.06),transparent); border:1px solid rgba(0,232,122,0.2); border-radius:var(--radius); padding:16px; margin-bottom:6px; }
.newp-suggest-title { font-size:9px; letter-spacing:2px; color:var(--green); text-transform:uppercase; margin-bottom:12px; }
.newp-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.newp-row-label { font-size:10px; color:var(--text-dim); }
.newp-row-value { font-size:11px; font-weight:600; color:#fff; text-align:right; max-width:55%; }
.newp-badge { font-size:9px; padding:2px 8px; border-radius:4px; }
.badge-low { background:rgba(0,232,122,0.15); color:var(--green); border:1px solid rgba(0,232,122,0.2); }
.badge-med { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(255,184,0,0.2); }
.newp-field { margin-bottom:12px; }
.newp-label { font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; display:block; }
.newp-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 12px; font-family:'JetBrains Mono',monospace; font-size:12px; color:#fff; outline:none; transition:border-color 0.15s; }
.newp-input:focus { border-color:var(--green); }
.newp-select { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 12px; font-family:'JetBrains Mono',monospace; font-size:12px; color:#fff; outline:none; appearance:none; }
.newp-select:focus { border-color:var(--green); }
.newp-fp { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:10px; color:var(--text-mid); font-family:monospace; display:flex; align-items:center; justify-content:space-between; }
.newp-regen { font-size:10px; color:var(--green); cursor:pointer; background:none; border:none; font-family:inherit; }
/* ── Export Panel ── */
.export-panel { position:fixed; inset:0; z-index:700; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.export-panel.open { transform:translateY(0); }
.export-header { position:sticky; top:0; background:rgba(8,11,15,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; gap:12px; z-index:10; }
.export-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:14px; }
.format-cards { display:flex; flex-direction:column; gap:8px; }
.format-card { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:14px; cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; gap:12px; }
.format-card.selected { border-color:var(--green); background:var(--green-dim); }
.format-card:active { border-color:var(--green); }
.format-icon { font-size:22px; flex-shrink:0; }
.format-info { flex:1; }
.format-name { font-size:13px; font-weight:700; color:#fff; margin-bottom:2px; }
.format-desc { font-size:10px; color:var(--text-dim); line-height:1.5; }
.format-badge { font-size:8px; padding:2px 7px; border-radius:4px; background:var(--green-dim); color:var(--green); border:1px solid rgba(0,232,122,0.2); margin-top:4px; display:inline-block; }
.export-preview { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.export-preview-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.export-preview-label { font-size:9px; letter-spacing:1px; color:var(--text-dim); text-transform:uppercase; }
.export-copy-btn { font-size:10px; color:var(--green); cursor:pointer; background:none; border:none; font-family:inherit; padding:2px 8px; border-radius:4px; background:var(--green-dim); }
.export-preview textarea { width:100%; background:transparent; border:none; outline:none; font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-mid); padding:12px 14px; resize:none; height:160px; line-height:1.6; }
.export-actions { display:flex; gap:8px; padding-bottom:calc(16px + var(--safe-bottom)); }
.export-dl-btn { flex:1; padding:14px; background:var(--green); border:none; border-radius:var(--radius); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:#000; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.export-dl-btn:active { opacity:0.85; transform:scale(0.97); }
.export-scope { display:flex; gap:6px; margin-bottom:4px; }
.scope-btn { flex:1; padding:9px; background:var(--surface); border:1px solid var(--border); border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); cursor:pointer; text-align:center; transition:all 0.15s; }
.scope-btn.active { border-color:var(--green); color:var(--green); background:var(--green-dim); }
/* ── Calculator Panel ── */
.calc-panel { position:fixed; inset:0; z-index:600; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.calc-panel.open { transform:translateY(0); }
.calc-header { position:sticky; top:0; background:rgba(8,11,15,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; gap:12px; z-index:10; }
.calc-back { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); cursor:pointer; -webkit-tap-highlight-color:transparent; }
.calc-back:active { border-color:var(--green); color:var(--green); }
.calc-title { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:#fff; }
.calc-body { padding:0 16px calc(32px + var(--safe-bottom)); flex:1; }
.calc-section { margin-top:20px; }
.calc-section-label { font-size:9px; font-weight:600; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; }
.calc-profiles-display { background:linear-gradient(135deg,rgba(0,232,122,0.06),transparent); border:1px solid rgba(0,232,122,0.2); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.calc-profiles-num { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; color:var(--green); line-height:1; }
.calc-profiles-label { font-size:10px; color:var(--text-mid); }
.plan-cards { display:flex; flex-direction:column; gap:6px; }
.plan-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.plan-card.selected { border-color:var(--green); background:var(--green-dim); }
.plan-card.insufficient { opacity:0.4; pointer-events:none; }
.plan-left { display:flex; flex-direction:column; gap:3px; }
.plan-provider { font-size:9px; letter-spacing:1px; color:var(--text-dim); }
.plan-name { font-size:12px; font-weight:600; color:#fff; }
.plan-specs { font-size:9px; color:var(--text-mid); }
.plan-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }

.plan-capacity { font-size:9px; color:var(--text-dim); }
.plan-badge { font-size:8px; padding:2px 6px; border-radius:4px; background:rgba(0,232,122,0.15); color:var(--green); border:1px solid rgba(0,232,122,0.2); }
.proxy-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.proxy-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.proxy-card.selected { border-color:var(--blue); background:rgba(79,195,247,0.08); }
.proxy-type { font-size:11px; font-weight:600; color:#fff; margin-bottom:4px; }
.proxy-price { font-size:13px; font-weight:700; color:var(--blue); }
.proxy-detail { font-size:9px; color:var(--text-dim); margin-top:2px; }
.software-options { display:flex; flex-direction:column; gap:6px; }
.software-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.software-card.selected { border-color:#b388ff; background:rgba(179,136,255,0.08); }
.software-name { font-size:12px; font-weight:600; color:#fff; }
.software-plan { font-size:9px; color:var(--text-dim); margin-top:2px; }
.software-price { font-size:13px; font-weight:700; color:#b388ff; }
.total-box { margin-top:20px; background:linear-gradient(135deg,rgba(0,232,122,0.08),rgba(0,0,0,0)); border:1px solid rgba(0,232,122,0.25); border-radius:var(--radius); padding:16px; }
.total-rows { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.total-row { display:flex; justify-content:space-between; align-items:center; }
.total-row-label { font-size:11px; color:var(--text-dim); }
.total-row-value { font-size:11px; color:var(--text); font-weight:600; }
.total-divider { height:1px; background:var(--border); margin:4px 0; }
.total-final { display:flex; justify-content:space-between; align-items:center; }
.total-final-label { font-size:13px; font-weight:600; color:#fff; }
.total-final-value { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--green); }
.total-note { font-size:9px; color:var(--text-dim); margin-top:8px; line-height:1.6; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>INICIANDO SISTEMA...</span></div>
<div id="app" style="display:none"></div>
<div class="modal-overlay" id="upgradeModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Upgrade</div>
    <div class="modal-options" id="modalOptions"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Quick Calc Panel -->
<div class="quick-panel" id="quickPanel">
  <div class="export-header">
    <button class="calc-back" onclick="closeQuick()">← Volver</button>
    <div class="calc-title">⚡ ¿Cuántos perfiles?</div>
  </div>
  <div class="quick-body" id="quickBody"></div>
</div>

<!-- New Profile Panel -->
<div class="newp-panel" id="newpPanel">
  <div class="export-header">
    <button class="calc-back" onclick="closeNewProfile()">← Volver</button>
    <div class="calc-title">➕ Nuevo Perfil</div>
  </div>
  <div class="export-body" id="newpBody" style="gap:12px"></div>
</div>

<!-- Export Panel -->
<div class="export-panel" id="exportPanel">
  <div class="export-header">
    <button class="calc-back" onclick="closeExport()">← Volver</button>
    <div class="calc-title">📤 Exportar Perfiles</div>
  </div>
  <div class="export-body" id="exportBody"></div>
</div>

<!-- Calculator Panel -->
<div class="calc-panel" id="calcPanel">
  <div class="calc-header">
    <button class="calc-back" onclick="closeCalc()">← Volver</button>
    <div class="calc-title">💰 Coste Real</div>
  </div>
  <div class="calc-body" id="calcBody"></div>
</div>

<script>
// ── Telegram Init ─────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#080b0f'); tg.setBackgroundColor('#080b0f'); }

// Obtener tg_id del usuario de Telegram
const TG_ID = tg?.initDataUnsafe?.user?.id || 0;

let vpsState = null;

// ── API ───────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, { headers: {'Content-Type':'application/json'}, ...opts });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadVPS() {
  try {
    vpsState = await apiFetch(`/api/vps?tg_id=${TG_ID}`);
    render();
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:32px 24px">
        <div style="font-size:32px;margin-bottom:16px">⚠️</div>
        <div style="font-size:13px;color:#fff;font-weight:600;margin-bottom:6px">Acceso Restringido</div>
        <div style="color:#7a9ab0;font-size:11px;margin-bottom:24px;line-height:1.7">Esta herramienta es exclusiva.<br/>Únete al canal para solicitar acceso.</div>
        <a href="https://t.me/MkeyzDawBot" target="_blank" style="display:block;background:var(--green);border:none;border-radius:8px;padding:13px 20px;font-family:inherit;font-size:12px;font-weight:700;color:#000;cursor:pointer;text-decoration:none;margin-bottom:10px">📡 Ir a Mkeyz Daw Bot</a>
        <button onclick="loadVPS()" style="background:transparent;border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-family:inherit;font-size:11px;color:var(--text-dim);cursor:pointer;width:100%">↺ Ya tengo acceso</button>
      </div>`;
  }
}

async function upgrade(type, amount) {
  closeModal();
  try {
    vpsState = await apiFetch('/api/vps/upgrade', {
      method:'POST', body: JSON.stringify({tg_id: TG_ID, type, amount})
    });
    render();
    showToast(`+${formatAmount(type, amount)} ${type.toUpperCase()} añadido ✓`);
    tg?.HapticFeedback?.impactOccurred('medium');
  } catch(e) { showToast('Error al actualizar'); }
}

async function resetVPS() {
  if (!confirm('¿Resetear el VPS a configuración base?')) return;
  try {
    vpsState = await apiFetch('/api/vps/reset', {
      method:'POST', body: JSON.stringify({tg_id: TG_ID})
    });
    render();
    showToast('VPS reseteado');
  } catch(e) { showToast('Error al resetear'); }
}

async function toggleProfileStatus(id, currentStatus) {
  const next = {idle:'active', active:'warming', warming:'idle'}[currentStatus];
  try {
    await apiFetch('/api/vps/profile/status', {
      method:'PATCH', body: JSON.stringify({tg_id: TG_ID, profile_id: id, status: next})
    });
    const p = vpsState.profiles.find(p => p.id === id);
    if (p) { p.status = next; p.last_activity = Date.now()/1000; }
    render();
    tg?.HapticFeedback?.impactOccurred('light');
  } catch(e) {}
}

// ── Format ────────────────────────────────────────────────
function formatRAM(mb)  { return mb >= 1024 ? `${mb/1024}GB` : `${mb}MB`; }
function formatDisk(gb) { return gb >= 1000 ? `${gb/1000}TB` : `${gb}GB`; }
function formatAmount(type, v) {
  if (type==='ram') return formatRAM(v);
  if (type==='cpu') return `${v} vCPU`;
  if (type==='storage') return formatDisk(v);
  return `${v}TB`;
}
function timeAgo(ts) {
  const diff = Math.floor((Date.now()/1000 - ts) / 60);
  if (diff < 1) return 'ahora';
  if (diff < 60) return `${diff}m`;
  return `${Math.floor(diff/60)}h`;
}

// ── Modal ─────────────────────────────────────────────────
const UPGRADE_OPTIONS = {
  cpu:      {label:'Potencia CPU',     options:[{amount:1,label:'+1 vCPU',detail:'añade 2 perfiles'},{amount:2,label:'+2 vCPU',detail:'añade 4 perfiles'},{amount:4,label:'+4 vCPU',detail:'añade 8 perfiles'}]},
  ram:      {label:'Memoria RAM',      options:[{amount:512,label:'+512MB',detail:'añade 1 perfil'},{amount:1024,label:'+1GB RAM',detail:'añade 2 perfiles'},{amount:4096,label:'+4GB RAM',detail:'añade 8 perfiles'}]},
  storage:  {label:'Almacenamiento',   options:[{amount:10,label:'+10GB',detail:'añade 5 perfiles'},{amount:25,label:'+25GB',detail:'añade 12 perfiles'},{amount:100,label:'+100GB',detail:'añade 50 perfiles'}]},
  bandwidth:{label:'Bandwidth',        options:[{amount:1,label:'+1TB/mes',detail:'más ancho de banda'},{amount:5,label:'+5TB/mes',detail:'alta velocidad'}]}
};

function openModal(type) {
  const conf = UPGRADE_OPTIONS[type];
  document.getElementById('modalTitle').textContent = conf.label;
  document.getElementById('modalOptions').innerHTML = conf.options.map(o => `
    <div class="modal-option" onclick="upgrade('${type}',${o.amount})">
      <div class="modal-opt-left">
        <span class="modal-opt-label">${o.label}</span>
        <span class="modal-opt-detail">${o.detail}</span>
      </div>
      <span class="modal-opt-plus">+ AGREGAR</span>
    </div>`).join('');
  document.getElementById('upgradeModal').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}
function closeModal() { document.getElementById('upgradeModal').classList.remove('open'); }
document.getElementById('upgradeModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Render ────────────────────────────────────────────────
function render() {
  if (!vpsState) return;
  const { resources, profiles, capacity, usage, name } = vpsState;
  const bottleneckLabels = {cpu:'⚡ CPU es el límite', ram:'💾 RAM es el límite', storage:'💿 Disco es el límite'};

  const profilesHTML = profiles.length === 0
    ? `<div class="profiles-empty"><span class="big-icon">🖥️</span>Sin perfiles activos.<br/>Agrega recursos para crear perfiles.</div>`
    : profiles.map((p,i) => {
        const plat = vpsState.platforms?.[p.platform] || vpsState.platforms?.general || {};
        return `
      <div class="profile-card status-${p.status}" onclick="toggleProfileStatus('${p.id}','${p.status}')" style="animation-delay:${i*0.04}s">
        <div class="profile-status-dot"></div>
        <div class="profile-info">
          <div class="profile-name">${plat.icon||'🖥️'} ${p.name}</div>
          <div class="profile-meta">${p.browser} · ${p.os} · ${timeAgo(p.last_activity)}</div>
        </div>
        <div class="profile-right">
          <div class="profile-status-label">${p.status.toUpperCase()}</div>
          <div class="profile-fp">${p.fingerprint.substring(0,8)}</div>
        </div>
      </div>`}).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="vps-name">VPS <span style="color:var(--green)">SIMULATOR</span></div>
        <div class="vps-meta">EU-WEST (Madrid) · Ubuntu 22.04 · <span style="color:var(--green);opacity:0.7">v1.2.0</span></div>
      </div>
      <div class="status-pill"><div class="pulse"></div>ONLINE</div>
    </div>
    <div class="section-title">// RECURSOS DEL SERVIDOR</div>
    <div class="resources-grid">
      <div class="res-card cpu" onclick="openModal('cpu')">
        <div class="res-icon">⚡</div><div class="res-label">CPU</div>
        <div class="res-value">${resources.cpu} vCPU</div>
        <div class="res-sub">Uso: ${usage.cpu}%</div>
        <div class="bar-track"><div class="bar-fill" style="width:${usage.cpu}%"></div></div>
      </div>
      <div class="res-card ram" onclick="openModal('ram')">
        <div class="res-icon">💾</div><div class="res-label">RAM</div>
        <div class="res-value">${formatRAM(resources.ram)}</div>
        <div class="res-sub">Uso: ${usage.ram}%</div>
        <div class="bar-track"><div class="bar-fill" style="width:${usage.ram}%"></div></div>
      </div>
      <div class="res-card disk" onclick="openModal('storage')">
        <div class="res-icon">💿</div><div class="res-label">DISCO</div>
        <div class="res-value">${formatDisk(resources.storage)}</div>
        <div class="res-sub">Uso: ${usage.storage}%</div>
        <div class="bar-track"><div class="bar-fill" style="width:${usage.storage}%"></div></div>
      </div>
      <div class="res-card bw" onclick="openModal('bandwidth')">
        <div class="res-icon">🌐</div><div class="res-label">BANDWIDTH</div>
        <div class="res-value">${resources.bandwidth}TB/mes</div>
        <div class="res-sub">Uso est: ${usage.bandwidth_gb||0}GB/mes</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,Math.round((usage.bandwidth_gb||0)/(resources.bandwidth*1024)*100))}%"></div></div>
      </div>
    </div>
    <div class="section-title">// CAPACIDAD DE PERFILES</div>
    <div class="capacity-panel">
      <div class="cap-left">
        <div class="cap-label">Perfiles disponibles</div>
        <div class="cap-number">${capacity.maxProfiles}</div>
        <div class="cap-sublabel">${profiles.filter(p=>p.status==='active').length} activos · ${profiles.filter(p=>p.status==='idle').length} inactivos</div>
        ${capacity.maxProfiles < 20 ? `<div class="bottleneck-badge">⚠ ${bottleneckLabels[capacity.bottleneck]||''}</div>` : ''}
      </div>
      <div class="cap-limits">
        <div class="cap-limit-row">CPU → <span>${capacity.limits.byCPU}</span></div>
        <div class="cap-limit-row">RAM → <span>${capacity.limits.byRAM}</span></div>
        <div class="cap-limit-row">Disco → <span>${capacity.limits.byStorage}</span></div>
      </div>
    </div>
    <div class="section-title">// AGREGAR POTENCIA</div>
    <div class="upgrade-grid">
      <div class="upg-btn" onclick="openModal('cpu')"><span class="upg-icon">⚡</span><div class="upg-text"><span class="upg-name">+ CPU</span><span class="upg-detail">Más procesos</span></div><span class="upg-arrow">›</span></div>
      <div class="upg-btn" onclick="openModal('ram')"><span class="upg-icon">💾</span><div class="upg-text"><span class="upg-name">+ RAM</span><span class="upg-detail">Más perfiles</span></div><span class="upg-arrow">›</span></div>
      <div class="upg-btn" onclick="openModal('storage')"><span class="upg-icon">💿</span><div class="upg-text"><span class="upg-name">+ Disco</span><span class="upg-detail">Más datos</span></div><span class="upg-arrow">›</span></div>
      <div class="upg-btn" onclick="openModal('bandwidth')"><span class="upg-icon">🌐</span><div class="upg-text"><span class="upg-name">+ BW</span><span class="upg-detail">Más velocidad</span></div><span class="upg-arrow">›</span></div>
    </div>
    <div class="profiles-header">
      <div class="section-title">// PERFILES DE NAVEGADOR</div>
      <div class="profile-count-badge">${profiles.length}/${capacity.maxProfiles}</div>
    </div>
    <div class="profiles-list">${profilesHTML}</div>
    <div class="bottom-bar">
      <button class="btn-primary" onclick="openQuick()">⚡ ¿CUÁNTOS PERFILES?</button>
      <button class="btn-secondary" onclick="openNewProfile()" style="padding:13px 14px;color:var(--green);border-color:var(--green-dim)">➕</button>
      <button class="btn-secondary" onclick="openExport()" style="padding:13px 14px;color:#4fc3f7;border-color:rgba(79,195,247,0.2)">📤</button>
      <button class="btn-secondary" onclick="openCalc()" style="padding:13px 14px;color:var(--amber);border-color:var(--amber-dim)">💰</button>
    </div>
  `;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ── Cost Calculator ───────────────────────────────────────
const VPS_PLANS = [
  // Hetzner (precios EUR, muy populares en EU)
  { provider:'HETZNER', name:'CX22',  specs:'2 vCPU · 4GB · 40GB SSD',  price:4.35,  profiles:8,  currency:'€' },
  { provider:'HETZNER', name:'CX32',  specs:'4 vCPU · 8GB · 80GB SSD',  price:8.56,  profiles:16, currency:'€' },
  { provider:'HETZNER', name:'CX42',  specs:'8 vCPU · 16GB · 160GB SSD', price:17.37, profiles:32, currency:'€' },
  { provider:'HETZNER', name:'CX52',  specs:'16 vCPU · 32GB · 320GB SSD',price:54.12, profiles:64, currency:'€' },
  // Contabo (mejor precio/potencia EU)
  { provider:'CONTABO', name:'VPS S', specs:'4 vCPU · 8GB · 100GB SSD',  price:6.99,  profiles:16, currency:'€' },
  { provider:'CONTABO', name:'VPS M', specs:'6 vCPU · 16GB · 200GB SSD', price:14.99, profiles:32, currency:'€' },
  { provider:'CONTABO', name:'VPS L', specs:'8 vCPU · 30GB · 400GB SSD', price:26.99, profiles:60, currency:'€' },
  // DigitalOcean (USD, más conocido)
  { provider:'DIGITALOCEAN', name:'Basic 4GB',   specs:'2 vCPU · 4GB · 80GB SSD',   price:24, profiles:8,  currency:'$' },
  { provider:'DIGITALOCEAN', name:'General 8GB', specs:'4 vCPU · 8GB · 160GB SSD',  price:48, profiles:16, currency:'$' },
  { provider:'DIGITALOCEAN', name:'General 16GB',specs:'8 vCPU · 16GB · 320GB SSD', price:96, profiles:32, currency:'$' },
];

const PROXY_OPTIONS = [
  { id:'dc',    type:'Datacenter',   detail:'IPRoyal · Proxy-Cheap',      pricePerProfile:1.5,  note:'Spotify, Apple Music, Pandora' },
  { id:'res',   type:'Residencial',  detail:'IPRoyal · Smartproxy',       pricePerProfile:8,    note:'YouTube, Tidal, ~2GB/perfil' },
  { id:'mob',   type:'Móvil 4G',     detail:'Proxidize · Soax',           pricePerProfile:25,   note:'Pandora US, máxima confianza' },
  { id:'none',  type:'Sin proxy',    detail:'IP directa del VPS',         pricePerProfile:0,    note:'Solo para pruebas' },
];

const SOFTWARE_OPTIONS = [
  { name:'AdsPower',    plan:'Team 50',       profiles:50,  price:50,  currency:'$', note:'Mejor precio/perfil' },
  { name:'AdsPower',    plan:'Team 100',      profiles:100, price:88,  currency:'$', note:'' },
  { name:'Dolphin Anty',plan:'Base 100',      profiles:100, price:89,  currency:'$', note:'Muy popular' },
  { name:'Dolphin Anty',plan:'Base 300',      profiles:300, price:159, currency:'$', note:'' },
  { name:'GoLogin',     plan:'Professional',  profiles:100, price:49,  currency:'$', note:'Más barato' },
  { name:'GoLogin',     plan:'Business',      profiles:300, price:99,  currency:'$', note:'' },
  { name:'Sin software',plan:'Perfiles manuales', profiles:999, price:0, currency:'$', note:'Solo simulación' },
];

let calcState = { vpsIdx: null, proxyId: 'dc', softwareIdx: 0 };

function openCalc() {
  if (!vpsState) return;
  const needed = vpsState.capacity.maxProfiles;
  // Auto-select cheapest fitting VPS
  const fitting = VPS_PLANS.filter(p => p.profiles >= needed);
  if (fitting.length && calcState.vpsIdx === null) {
    calcState.vpsIdx = VPS_PLANS.indexOf(fitting[0]);
  }
  // Auto-select cheapest fitting software
  const fittingSw = SOFTWARE_OPTIONS.findIndex(s => s.profiles >= needed);
  if (fittingSw >= 0 && calcState.softwareIdx === 0) calcState.softwareIdx = fittingSw;

  renderCalc();
  document.getElementById('calcPanel').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}

function closeCalc() {
  document.getElementById('calcPanel').classList.remove('open');
}

function selectVPS(idx) { calcState.vpsIdx = idx; renderCalc(); tg?.HapticFeedback?.selectionChanged?.(); }
function selectProxy(id) { calcState.proxyId = id; renderCalc(); tg?.HapticFeedback?.selectionChanged?.(); }
function selectSoftware(idx) { calcState.softwareIdx = idx; renderCalc(); tg?.HapticFeedback?.selectionChanged?.(); }

function renderCalc() {
  const needed = vpsState?.capacity?.maxProfiles || 0;
  const vps    = calcState.vpsIdx !== null ? VPS_PLANS[calcState.vpsIdx] : null;
  const proxy  = PROXY_OPTIONS.find(p => p.id === calcState.proxyId);
  const sw     = SOFTWARE_OPTIONS[calcState.softwareIdx];

  const vpsPlansHTML = VPS_PLANS.map((p, i) => {
    const fits = p.profiles >= needed;
    const isBest = fits && VPS_PLANS.filter(x => x.profiles >= needed)[0] === p;
    return `
    <div class="plan-card ${calcState.vpsIdx===i?'selected':''} ${!fits?'insufficient':''}" onclick="selectVPS(${i})">
      <div class="plan-left">
        <div class="plan-provider">${p.provider}</div>
        <div class="plan-name">${p.name}</div>
        <div class="plan-specs">${p.specs}</div>
      </div>
      <div class="plan-right">
        <div class="plan-price">${p.currency}${p.price}/mes</div>
        <div class="plan-capacity">hasta ${p.profiles} perfiles</div>
        ${isBest ? '<div class="plan-badge">✓ RECOMENDADO</div>' : ''}
        ${!fits ? '<div style="font-size:8px;color:var(--red)">insuficiente</div>' : ''}
      </div>
    </div>`}).join('');

  const proxyHTML = PROXY_OPTIONS.map(p => `
    <div class="proxy-card ${calcState.proxyId===p.id?'selected':''}" onclick="selectProxy('${p.id}')">
      <div class="proxy-type">${p.type}</div>

let exportState = { format: 'gologin', scope: 'all' };

const FORMATS = {
  gologin: {
    name: 'GoLogin',
    icon: '🦊',
    desc: 'Importa directo en GoLogin.\nFormato JSON oficial.',
    badge: 'JSON · Recomendado',
    ext: 'json',
    mime: 'application/json'
  },
  dolphin: {
    name: 'Dolphin Anty',
    icon: '🐬',
    desc: 'Compatible con Dolphin Anty.\nFormato CSV con todos los campos.',
    badge: 'CSV · Soportado',
    ext: 'csv',
    mime: 'text/csv'
  },
  adspower: {
    name: 'AdsPower',
    icon: '⚡',
    desc: 'Importa en AdsPower Team.\nFormato JSON extendido.',
    badge: 'JSON · Extendido',
    ext: 'json',
    mime: 'application/json'
  }
};

function _osMap(os) {
  if (os.includes('Windows 11')) return 'win';
  if (os.includes('Windows 10')) return 'win';
  if (os.includes('macOS'))      return 'mac';
  return 'linux';
}
function _browserVer(browser) {
  const m = browser.match(/\d+/);
  return m ? m[0] : '120';
}
function _browserName(browser) {
  if (browser.includes('Firefox')) return 'firefox';
  if (browser.includes('Edge'))    return 'edge';
  return 'chrome';
}

function generateExport(profiles, format) {
  if (format === 'gologin') {
    const data = profiles.map(p => ({
      name: p.name,
      os: _osMap(p.os),
      browser: _browserName(p.browser),
      browserVersion: _browserVer(p.browser),
      fingerprint: p.fingerprint,
      proxy: {
        mode: 'http',
        host: p.proxy,
        port: 8080,
        username: '',
        password: ''
      },
      navigator: {
        language: 'en-US,en',
        resolution: '1920x1080',
        platform: _osMap(p.os) === 'mac' ? 'MacIntel' : 'Win32'
      },
      timezone: { fillBasedOnExternalIp: true },
      webRTC: { mode: 'disabled' },
      canvas: { mode: 'noise' },
      webGL: { mode: 'noise' },
      fonts: { enableMasking: true }
    }));
    return JSON.stringify(data, null, 2);
  }

  if (format === 'dolphin') {
    const headers = 'name,browser_type,browser_version,os,proxy_type,proxy_host,proxy_port,proxy_login,proxy_password,notes';
    const rows = profiles.map(p =>
      [p.name, _browserName(p.browser), _browserVer(p.browser),
       _osMap(p.os), 'http', p.proxy, '8080', '', '',
       p.fingerprint].join(',')
    );
    return [headers, ...rows].join('\n');
  }

  if (format === 'adspower') {
    const data = profiles.map(p => ({
      name: p.name,
      domain_name: '',
      open_urls: [],
      username: '',
      password: '',
      fakey: '',
      cookie: '',
      ignore_cookie_error: '0',
      ip: p.proxy,
      ip_country: 'ES',
      sys_app_cate_id: '0',
      fingerprint_config: {
        ua: `Mozilla/5.0 (${_osMap(p.os) === 'mac' ? 'Macintosh; Intel Mac OS X 10_15_7' : 'Windows NT 10.0; Win64; x64'}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${_browserVer(p.browser)}.0.0.0 Safari/537.36`,
        screen_resolution: '1920_1080',
        canvas: '1',
        webgl: '1',
        webgl_info: '1',
        audio: '1',
        do_not_track: 'default',
        hardware_concurrency: '4',
        device_memory: '8',
        flash: 'block',
        client_rects: '1',
        device_name_switch: '0',
        random_ua: {
          ua_browser: [_browserName(p.browser)],
          ua_version: [[_browserVer(p.browser), _browserVer(p.browser)]]
        }
      }
    }));
    return JSON.stringify(data, null, 2);
  }
}

function openExport() {
  if (!vpsState || vpsState.profiles.length === 0) {
    showToast('Sin perfiles para exportar');
    return;
  }
  renderExport();
  document.getElementById('exportPanel').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}

function closeExport() {
  document.getElementById('exportPanel').classList.remove('open');
}

function setExportFormat(fmt) {
  exportState.format = fmt;
  renderExport();
}

function setExportScope(scope) {
  exportState.scope = scope;
  renderExport();
}

function renderExport() {
  const profiles = exportState.scope === 'active'
    ? vpsState.profiles.filter(p => p.status === 'active')
    : vpsState.profiles;

  const content = profiles.length > 0 ? generateExport(profiles, exportState.format) : '';
  const fmt = FORMATS[exportState.format];
  const preview = content.substring(0, 800) + (content.length > 800 ? '\n...' : '');

  document.getElementById('exportBody').innerHTML = `
    <div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px">// Seleccionar formato</div>
      <div class="format-cards">
        ${Object.entries(FORMATS).map(([key, f]) => `
          <div class="format-card ${exportState.format===key?'selected':''}" onclick="setExportFormat('${key}')">
            <div class="format-icon">${f.icon}</div>
            <div class="format-info">
              <div class="format-name">${f.name}</div>
              <div class="format-desc">${f.desc.replace('\n','<br/>')}</div>
              <span class="format-badge">${f.badge}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px">// Perfiles a exportar</div>
      <div class="export-scope">
        <div class="scope-btn ${exportState.scope==='all'?'active':''}" onclick="setExportScope('all')">Todos (${vpsState.profiles.length})</div>
        <div class="scope-btn ${exportState.scope==='active'?'active':''}" onclick="setExportScope('active')">Solo activos (${vpsState.profiles.filter(p=>p.status==='active').length})</div>
      </div>
    </div>

    ${profiles.length > 0 ? `
    <div class="export-preview">
      <div class="export-preview-header">
        <span class="export-preview-label">Preview · ${profiles.length} perfiles · .${fmt.ext}</span>
        <button class="export-copy-btn" onclick="copyExport()">Copiar</button>
      </div>
      <textarea readonly>${preview}</textarea>
    </div>
    <div class="export-actions">
      <button class="export-dl-btn" onclick="downloadExport()">⬇ Descargar ${fmt.name} (.${fmt.ext})</button>
    </div>
    <div style="margin-top:8px">
      <button onclick="shareText()" style="width:100%;padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-mid);cursor:pointer;-webkit-tap-highlight-color:transparent;">
        📋 Copiar resumen para compartir
      </button>
    </div>` : `<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:20px">Sin perfiles en este filtro</div>`}
  `;

  // Store content for download/copy
  window._exportContent = content;
  window._exportExt = fmt.ext;
  window._exportMime = fmt.mime;
  window._exportName = exportState.format;
}

function copyExport() {
  navigator.clipboard?.writeText(window._exportContent)
    .then(() => showToast('Copiado al portapapeles ✓'))
    .catch(() => showToast('Selecciona el texto manualmente'));
}

function downloadExport() {
  const blob = new Blob([window._exportContent], { type: window._exportMime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `vps-profiles-${window._exportName}-${Date.now()}.${window._exportExt}`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Descargando ${window._exportName}.${window._exportExt} ✓`);
  tg?.HapticFeedback?.notificationOccurred('success');
}

function shareText() {
  if (!vpsState) return;
  const profiles = exportState.scope === 'active'
    ? vpsState.profiles.filter(p => p.status === 'active')
    : vpsState.profiles;
  const plats = vpsState.platforms || {};

  // Group by platform
  const byPlat = {};
  profiles.forEach(p => {
    const key = p.platform || 'general';
    if (!byPlat[key]) byPlat[key] = [];
    byPlat[key].push(p);
  });

  const platLines = Object.entries(byPlat).map(([key, ps]) => {
    const plat = plats[key] || { icon: '🖥️', name: key };
    return `  ${plat.icon} ${plat.name}: ${ps.length} perfil${ps.length !== 1 ? 'es' : ''}`;
  }).join('\n');

  const res = vpsState.resources;
  const cap = vpsState.capacity;
  const usage = vpsState.usage;

  const text =
`🖥️ VPS SIMULATOR — Config
━━━━━━━━━━━━━━━━━━
⚡ CPU: ${res.cpu} vCPU (uso ${usage.cpu}%)
💾 RAM: ${formatRAM(res.ram)} (uso ${usage.ram}%)
💿 Disco: ${formatDisk(res.storage)} (uso ${usage.storage}%)
🌐 BW est: ${usage.bandwidth_gb || 0}GB/mes

📊 Perfiles: ${profiles.length}/${cap.maxProfiles}
${platLines}

🔧 Navegadores:
${[...new Set(profiles.map(p => p.browser))].map(b => `  · ${b}`).join('\n')}

🖥️ Sistemas:
${[...new Set(profiles.map(p => p.os))].map(o => `  · ${o}`).join('\n')}
━━━━━━━━━━━━━━━━━━
Generado con VPS Simulator`;

  navigator.clipboard?.writeText(text)
    .then(() => {
      showToast('✓ Resumen copiado — pégalo donde quieras');
      tg?.HapticFeedback?.notificationOccurred('success');
    })
    .catch(() => {
      // Fallback for Telegram WebApp
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showToast('✓ Resumen copiado');
      tg?.HapticFeedback?.notificationOccurred('success');
    });
}

function downloadExport() {
  const blob = new Blob([window._exportContent], { type: window._exportMime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `vps-profiles-${window._exportName}-${Date.now()}.${window._exportExt}`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Descargando ${window._exportName}.${window._exportExt} ✓`);
  tg?.HapticFeedback?.notificationOccurred('success');
}

async function saveNewProfile() {
  if (!newpSuggestion) return;
  const payload = {
    tg_id:       TG_ID,
    id:          newpSuggestion.id,
    name:        document.getElementById('newpName').value.trim() || newpSuggestion.name,
    browser:     document.getElementById('newpBrowser').value,
    os:          document.getElementById('newpOS').value,
    proxy:       document.getElementById('newpProxy').value.trim() || newpSuggestion.proxy,
    fingerprint: newpSuggestion.fingerprint,
    platform:    newpPlatform
  };
  try {
    const res = await apiFetch('/api/vps/profile/add', { method:'POST', body: JSON.stringify(payload) });
    if (res.error === 'no_capacity') { showToast('Sin capacidad — escala el servidor'); return; }
    vpsState = res.vps;
    closeNewProfile();
    render();
    const icon = vpsState.platforms?.[newpPlatform]?.icon || '🖥️';
    showToast(`✓ ${payload.name} ${icon} creado`);
    tg?.HapticFeedback?.notificationOccurred('success');
  } catch(e) { showToast('Error al crear perfil'); }
}

  quickProfiles = Math.max(1, Math.min(200, quickProfiles + delta));
  renderQuick();
  tg?.HapticFeedback?.selectionChanged?.();
}

function setQuick(n) {
  quickProfiles = n;
  renderQuick();
  tg?.HapticFeedback?.selectionChanged?.();
}

function renderQuick() {
  const n = quickProfiles;

  // Required specs
  const reqCPU     = Math.ceil(n * 0.5 * 10) / 10;
  const reqRAM     = n * 512;
  const reqStorage = n * 2;
  const reqBW      = Math.ceil(n * 8 / 1024 * 10) / 10; // avg 8GB/profile in TB

  // Find fitting VPS plans
  const fitting  = QUICK_VPS.filter(v => v.maxP >= n);
  const cheapest = fitting.length ? fitting.reduce((a,b) => a.price < b.price ? a : b) : null;
  const bestValue= fitting.filter(v=>v.provider==='CONTABO').sort((a,b)=>a.price-b.price)[0] || cheapest;

  const planRows = QUICK_VPS.filter(v => v.maxP >= n).slice(0, 5).map((v, i) => {
    const isBest = v === cheapest;
    return `
    <div class="quick-provider ${isBest?'best':''}">
      <div>
        <div class="quick-prov-name">${v.provider} ${v.name}</div>
        <div class="quick-prov-spec">${v.specs}</div>
        ${isBest ? '<span class="quick-prov-badge">✓ MÁS BARATO</span>' : ''}
      </div>
      <div style="text-align:right">
        <div class="quick-prov-price">${v.currency}${v.price}/mes</div>
        <div style="font-size:9px;color:var(--text-dim)">hasta ${v.maxP} perfiles</div>
      </div>
    </div>`;
  }).join('');

  const noFit = fitting.length === 0 ? `
    <div style="background:var(--red-dim);border:1px solid rgba(255,71,87,0.2);border-radius:8px;padding:12px;font-size:11px;color:var(--red);text-align:center">
      ⚠️ Ningún plan estándar cubre ${n} perfiles.<br/>
      <span style="font-size:9px;color:var(--text-dim)">Contacta Hetzner/Contabo para servidores dedicados.</span>
    </div>` : '';

  const presets = [5, 10, 20, 50, 100];

  document.getElementById('quickBody').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:10px;letter-spacing:1px;color:var(--text-dim);margin-bottom:16px">NÚMERO DE PERFILES</div>
      <div class="quick-counter">
        <button class="quick-btn" onclick="changeQuick(-10)">−10</button>
        <button class="quick-btn" onclick="changeQuick(-1)" style="margin:0 8px">−</button>
        <div class="quick-num">${n}</div>
        <button class="quick-btn" onclick="changeQuick(1)" style="margin:0 8px">+</button>
        <button class="quick-btn" onclick="changeQuick(10)">+10</button>
      </div>
      <div class="quick-presets" style="margin-top:16px">
        ${presets.map(p => `<div class="quick-preset ${quickProfiles===p?'active':''}" onclick="setQuick(${p})">${p}</div>`).join('')}
      </div>
    </div>

    <div class="quick-result">
      <div class="quick-result-header">
        <div class="quick-result-title">Necesitas para ${n} perfiles</div>
        <div class="quick-result-sub">Configuración mínima recomendada</div>
      </div>
      <div class="quick-result-body">
        <div class="quick-spec-row">
          <div class="quick-spec-left">
            <span class="quick-spec-icon">⚡</span>
            <span class="quick-spec-label">CPU mínima</span>
          </div>
          <div style="text-align:right">
            <div class="quick-spec-value">${reqCPU} vCPU</div>
            <div class="quick-spec-sub">0.5 vCPU × ${n}</div>
          </div>
        </div>
        <div class="quick-spec-row">
          <div class="quick-spec-left">
            <span class="quick-spec-icon">💾</span>
            <span class="quick-spec-label">RAM mínima</span>
          </div>
          <div style="text-align:right">
            <div class="quick-spec-value">${formatRAM(reqRAM)}</div>
            <div class="quick-spec-sub">512MB × ${n}</div>
          </div>
        </div>
        <div class="quick-spec-row">
          <div class="quick-spec-left">
            <span class="quick-spec-icon">💿</span>
            <span class="quick-spec-label">Disco mínimo</span>
          </div>
          <div style="text-align:right">
            <div class="quick-spec-value">${formatDisk(reqStorage)}</div>
            <div class="quick-spec-sub">2GB × ${n}</div>
          </div>
        </div>
        <div class="quick-spec-row">
          <div class="quick-spec-left">
            <span class="quick-spec-icon">🌐</span>
            <span class="quick-spec-label">Bandwidth est.</span>
          </div>
          <div style="text-align:right">
            <div class="quick-spec-value">${reqBW}TB/mes</div>
            <div class="quick-spec-sub">~8GB × ${n} promedio</div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px">// Planes que encajan</div>
      ${noFit}
      <div class="quick-providers">${planRows}</div>
    </div>

    ${cheapest ? `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">
      <div style="font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px">// Coste total estimado</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--text-dim)">VPS (${cheapest.provider} ${cheapest.name})</span>
        <span style="font-size:11px;font-weight:600">${cheapest.currency}${cheapest.price}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--text-dim)">Proxies datacenter (×${n})</span>
        <span style="font-size:11px;font-weight:600">$${(n*1.5).toFixed(0)}</span>
      </div>
      <div style="height:1px;background:var(--border);margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:600;color:#fff">TOTAL / MES</span>
        <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green)">~$${Math.round(cheapest.price + n*1.5)}/mes</span>
      </div>
      <div style="font-size:9px;color:var(--text-dim);margin-top:6px">$${((cheapest.price + n*1.5)/n).toFixed(2)}/perfil/mes · con proxy datacenter</div>
    </div>` : ''}
  `;
}

loadVPS();
setInterval(loadVPS, 30000);
</script>
</body>
</html>
