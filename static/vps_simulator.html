<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>VPS Simulator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080b0f; --surface:#0e1318; --surface2:#141c24; --border:#1e2d3d;
  --green:#00e87a; --green-dim:rgba(0,232,122,0.12);
  --amber:#ffb800; --amber-dim:rgba(255,184,0,0.12);
  --red:#ff4757; --blue:#4fc3f7;
  --text:#c8d8e8; --text-dim:#4a6070; --text-mid:#7a9ab0;
  --radius:10px; --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:1000; }
#app { min-height:100vh; padding:0 0 32px; display:flex; flex-direction:column; }
.header { position:sticky; top:0; z-index:100; background:rgba(8,11,15,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 16px 12px; display:flex; align-items:center; justify-content:center; }
.header-left { display:flex; flex-direction:column; gap:2px; align-items:center; text-align:center; }
.vps-name { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:#fff; letter-spacing:2px; text-transform:uppercase; }
.vps-meta { color:var(--text-dim); font-size:10px; letter-spacing:0.5px; }
.status-pill { display:flex; align-items:center; gap:6px; background:var(--green-dim); border:1px solid rgba(0,232,122,0.25); border-radius:20px; padding:4px 10px; font-size:10px; color:var(--green); letter-spacing:0.5px; }
.pulse { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse-anim 2s ease-in-out infinite; }
@keyframes pulse-anim { 0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 rgba(0,232,122,0.5);} 50%{opacity:0.7;transform:scale(0.9);box-shadow:0 0 0 4px rgba(0,232,122,0);} }
.section-title { font-size:9px; font-weight:600; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; padding:18px 16px 10px; }
.resources-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 16px; }
.res-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; position:relative; overflow:hidden; cursor:pointer; }
.res-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--radius) var(--radius) 0 0; }
.res-card.cpu::after { background:var(--green); }
.res-card.ram::after { background:var(--blue); }
.res-card.disk::after { background:var(--amber); }
.res-card.bw::after { background:#b388ff; }
.res-card:active { border-color:var(--green); background:var(--green-dim); }
.res-icon { font-size:18px; margin-bottom:6px; }
.res-label { font-size:9px; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px; }
.res-value { font-size:16px; font-weight:700; color:#fff; margin-bottom:8px; }
.res-sub { font-size:9px; color:var(--text-dim); margin-bottom:8px; }
.bar-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.bar-fill { height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
.cpu .bar-fill { background:var(--green); }
.ram .bar-fill { background:var(--blue); }
.disk .bar-fill { background:var(--amber); }
.bw .bar-fill { background:#b388ff; }
.capacity-panel { margin:8px 16px 0; background:linear-gradient(135deg,rgba(0,232,122,0.06) 0%,rgba(0,0,0,0) 60%); border:1px solid rgba(0,232,122,0.2); border-radius:var(--radius); padding:16px; display:flex; align-items:center; justify-content:space-between; }
.cap-left { display:flex; flex-direction:column; gap:4px; }
.cap-label { font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
.cap-number { font-family:'Syne',sans-serif; font-size:42px; font-weight:800; color:var(--green); line-height:1; text-shadow:0 0 30px rgba(0,232,122,0.4); }
.cap-sublabel { font-size:10px; color:var(--text-mid); }
.bottleneck-badge { font-size:9px; letter-spacing:0.5px; padding:3px 8px; border-radius:4px; background:var(--amber-dim); border:1px solid rgba(255,184,0,0.25); color:var(--amber); margin-top:4px; }
.cap-limits { display:flex; flex-direction:column; gap:5px; text-align:right; }
.cap-limit-row { font-size:10px; color:var(--text-dim); }
.cap-limit-row span { color:var(--text); }
.upgrade-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 16px; }
.upg-btn { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:11px 10px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:all 0.15s; color:var(--text); -webkit-tap-highlight-color:transparent; }
.upg-btn:active { transform:scale(0.97); border-color:var(--green); background:var(--green-dim); }
.upg-icon { font-size:14px; }
.upg-text { display:flex; flex-direction:column; gap:1px; }
.upg-name { font-size:11px; font-weight:600; color:#fff; }
.upg-detail { font-size:9px; color:var(--text-dim); }
.upg-arrow { margin-left:auto; font-size:10px; color:var(--green); opacity:0.6; }
.profiles-header { padding:18px 16px 10px; display:flex; align-items:center; justify-content:space-between; }
.profiles-header .section-title { padding:0; }
.profile-count-badge { font-size:9px; letter-spacing:1px; color:var(--green); background:var(--green-dim); border:1px solid rgba(0,232,122,0.2); padding:2px 8px; border-radius:20px; }
.profiles-list { display:flex; flex-direction:column; gap:6px; padding:0 16px; }
.profile-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:11px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:border-color 0.15s; animation:card-in 0.3s ease both; }
@keyframes card-in { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.profile-card:active { background:var(--surface2); }
.profile-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-active .profile-status-dot { background:var(--green); box-shadow:0 0 6px rgba(0,232,122,0.6); }
.status-warming .profile-status-dot { background:var(--amber); box-shadow:0 0 6px rgba(255,184,0,0.6); }
.status-idle .profile-status-dot { background:var(--text-dim); }
.profile-info { flex:1; min-width:0; }
.profile-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.profile-meta { font-size:9px; color:var(--text-dim); margin-top:2px; }
.profile-right { text-align:right; flex-shrink:0; }
.profile-status-label { font-size:9px; letter-spacing:0.5px; }
.status-active .profile-status-label { color:var(--green); }
.status-warming .profile-status-label { color:var(--amber); }
.status-idle .profile-status-label { color:var(--text-dim); }
.profile-fp { font-size:8px; color:var(--text-dim); margin-top:1px; }
.profiles-empty { padding:30px 16px; text-align:center; color:var(--text-dim); font-size:11px; line-height:1.8; }
.profiles-empty .big-icon { font-size:36px; display:block; margin-bottom:10px; opacity:0.4; }
.bottom-bar { display:flex; gap:8px; padding:0 16px 16px; margin-top:4px; }
.btn-primary { flex:1; padding:13px; background:var(--green); border:none; border-radius:var(--radius); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#000; cursor:pointer; letter-spacing:0.3px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.btn-primary:active { transform:scale(0.97); opacity:0.85; }
.btn-secondary { padding:13px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); cursor:pointer; letter-spacing:0.3px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.btn-secondary:active { transform:scale(0.97); border-color:var(--red); color:var(--red); }
.modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.7); display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-sheet { width:100%; background:var(--surface); border:1px solid var(--border); border-bottom:none; border-radius:18px 18px 0 0; padding:20px 16px calc(24px + var(--safe-bottom)); transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.modal-overlay.open .modal-sheet { transform:translateY(0); }
.modal-handle { width:36px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 20px; }
.modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:#fff; margin-bottom:18px; }
.modal-options { display:flex; flex-direction:column; gap:8px; }
.modal-option { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.modal-option:active { border-color:var(--green); background:var(--green-dim); }
.modal-opt-left { display:flex; flex-direction:column; gap:2px; }
.modal-opt-label { font-size:13px; font-weight:600; color:#fff; }
.modal-opt-detail { font-size:10px; color:var(--text-dim); }
.modal-opt-plus { font-size:12px; color:var(--green); font-weight:700; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a2430; border:1px solid var(--green); color:var(--green); font-size:11px; letter-spacing:0.3px; padding:8px 16px; border-radius:20px; opacity:0; pointer-events:none; transition:all 0.3s; z-index:1000; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#loading { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; height:100vh; color:var(--text-dim); font-size:11px; }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
/* ── Routine Generator ── */
.routine-panel { position:fixed; inset:0; z-index:950; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.routine-panel.open { transform:translateY(0); }
.routine-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:14px; }
.routine-week { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.routine-day-col { display:flex; flex-direction:column; gap:3px; }
.routine-day-label { font-size:8px; color:var(--text-dim); text-align:center; letter-spacing:0.5px; padding-bottom:4px; border-bottom:1px solid var(--border); margin-bottom:2px; }
.routine-slot { height:8px; border-radius:2px; background:var(--border); transition:background 0.2s; }
.routine-slot.active-slot { background:var(--green); }
.routine-slot.rest-slot   { background:var(--amber); opacity:0.5; }
.routine-profile-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; }
.routine-profile-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.routine-profile-name { font-size:12px; font-weight:600; color:#fff; }
.routine-profile-plat { font-size:9px; color:var(--text-dim); }
.routine-days-row { display:flex; gap:4px; }
.routine-day-pill { flex:1; text-align:center; border-radius:6px; padding:4px 2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.routine-day-pill.on  { background:var(--green-dim); border:1px solid rgba(0,232,122,0.3); }
.routine-day-pill.off { background:var(--surface2); border:1px solid var(--border); }
.routine-day-pill-label { font-size:8px; color:var(--text-dim); display:block; }
.routine-day-pill.on .routine-day-pill-label { color:var(--green); }
.routine-hours { display:flex; gap:6px; align-items:center; margin-top:8px; }
.routine-hours-label { font-size:9px; color:var(--text-dim); flex-shrink:0; }
.routine-hours-val { font-size:11px; font-weight:600; color:#fff; }
.routine-time-range { font-size:9px; color:var(--text-dim); margin-left:auto; }
.routine-legend { display:flex; gap:12px; padding:4px 0; }
.routine-legend-item { display:flex; align-items:center; gap:5px; font-size:9px; color:var(--text-dim); }
.routine-legend-dot { width:10px; height:10px; border-radius:2px; }
/* ── Platform Limits ── */
.limit-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; }
.limit-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.limit-plat { display:flex; align-items:center; gap:8px; }
.limit-plat-icon { font-size:18px; }
.limit-plat-name { font-size:12px; font-weight:600; color:#fff; }
.limit-plat-count { font-size:9px; color:var(--text-dim); }
.limit-status { font-size:9px; padding:3px 8px; border-radius:4px; font-weight:600; }
.limit-ok   { background:var(--green-dim); color:var(--green); border:1px solid rgba(0,232,122,0.2); }
.limit-warn { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(255,184,0,0.2); }
.limit-crit { background:var(--red-dim);   color:var(--red);   border:1px solid rgba(255,71,87,0.2); }
.limit-rows { display:flex; flex-direction:column; gap:7px; }
.limit-row { display:flex; flex-direction:column; gap:3px; }
.limit-row-top { display:flex; justify-content:space-between; align-items:center; }
.limit-row-label { font-size:9px; color:var(--text-dim); }
.limit-row-val { font-size:9px; font-weight:600; color:var(--text); }
.limit-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.limit-bar-fill { height:100%; border-radius:2px; transition:width 0.5s; }
.fill-ok   { background:var(--green); }
.fill-warn { background:var(--amber); }
.fill-crit { background:var(--red); }
/* ── Rotation ── */
.rot-badge { font-size:8px; padding:2px 6px; border-radius:4px; background:rgba(179,136,255,0.15); color:#b388ff; border:1px solid rgba(179,136,255,0.2); margin-left:4px; vertical-align:middle; }
.rot-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
.rot-card.active-rot { border-color:#b388ff; background:rgba(179,136,255,0.06); }
.rot-toggle { width:40px; height:22px; border-radius:11px; background:var(--border); border:none; cursor:pointer; position:relative; transition:background 0.2s; flex-shrink:0; }
.rot-toggle.on { background:#b388ff; }
.rot-toggle::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform 0.2s; }
.rot-toggle.on::after { transform:translateX(18px); }
.rot-timer { font-size:9px; color:#b388ff; font-weight:600; margin-top:2px; }
/* ── Health Monitor ── */
.health-panel { position:fixed; inset:0; z-index:950; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.health-panel.open { transform:translateY(0); }
.health-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:10px; }
.health-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:4px; }
.health-stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px; text-align:center; }
.health-stat-num { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; line-height:1; }
.health-stat-label { font-size:9px; color:var(--text-dim); margin-top:3px; letter-spacing:0.5px; }
.health-safe .health-stat-num { color:var(--green); }
.health-warn .health-stat-num { color:var(--amber); }
.health-danger .health-stat-num { color:var(--red); }
.health-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; gap:10px; }
.health-card.risk-low    { border-left:3px solid var(--green); }
.health-card.risk-medium { border-left:3px solid var(--amber); }
.health-card.risk-high   { border-left:3px solid var(--red); }
.health-indicator { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.risk-low    .health-indicator { background:var(--green-dim); }
.risk-medium .health-indicator { background:var(--amber-dim); }
.risk-high   .health-indicator { background:var(--red-dim); }
.health-info { flex:1; min-width:0; }
.health-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.health-issues { font-size:9px; color:var(--text-dim); margin-top:3px; line-height:1.5; }
.health-score-wrap { text-align:right; flex-shrink:0; }
.health-score { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
.risk-low    .health-score { color:var(--green); }
.risk-medium .health-score { color:var(--amber); }
.risk-high   .health-score { color:var(--red); }
.health-score-label { font-size:8px; color:var(--text-dim); }
.health-legend { display:flex; gap:12px; padding:10px 0 4px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:9px; color:var(--text-dim); }
.legend-dot { width:8px; height:8px; border-radius:50%; }
/* ── Quick Calc Panel ── */
.quick-panel { position:fixed; inset:0; z-index:900; background:var(--bg); display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); overflow-y:auto; }
.quick-panel.open { transform:translateY(0); }
.quick-body { padding:20px 16px calc(32px + var(--safe-bottom)); flex:1; display:flex; flex-direction:column; gap:16px; }
.quick-counter { display:flex; align-items:center; justify-content:center; gap:0; margin:8px 0; }
.quick-num { font-family:'Syne',sans-serif; font-size:72px; font-weight:800; color:var(--green); line-height:1; text-align:center; min-width:120px; text-shadow:0 0 40px rgba(0,232,122,0.3); }
.quick-btn { width:52px; height:52px; border-radius:50%; border:2px solid var(--border); background:var(--surface); color:#fff; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; -webkit-tap-highlight-color:transparent; flex-shrink:0; }
.quick-btn:active { background:var(--green); border-color:var(--green); color:#000; transform:scale(0.92); }
.quick-presets { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.quick-preset { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.quick-preset:active, .quick-preset.active { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.quick-result { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.quick-result-header { background:linear-gradient(135deg,rgba(0,232,122,0.08),transparent); padding:14px 16px; border-bottom:1px solid var(--border); }
.quick-result-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:#fff; margin-bottom:2px; }
.quick-result-sub { font-size:10px; color:var(--text-dim); }
.quick-result-body { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.quick-spec-row { display:flex; align-items:center; justify-content:space-between; }
.quick-spec-left { display:flex; align-items:center; gap:8px; }
.quick-spec-icon { font-size:16px; }
.quick-spec-label { font-size:11px; color:var(--text-dim); }
.quick-spec-value { font-size:13px; font-weight:700; color:#fff; }
.quick-spec-sub { font-size:9px; color:var(--text-dim); }
.quick-providers { display:flex; flex-direction:column; gap:6px; margin-top:4px; }
.quick-provider { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; }
.quick-provider.best { border-color:var(--green); background:var(--green-dim); }
.quick-prov-name { font-size:11px; font-weight:600; color:#fff; }
.quick-prov-spec { font-size:9px; color:var(--text-dim); margin-top:2px; }
.quick-prov-price { font-size:12px; font-weight:700; color:var(--green); }
.quick-prov-badge { font-size:8px; padding:1px 6px; border-radius:3px; background:var(--green-dim); color:var(--green); border:1px solid rgba(0,232,122,0.2); margin-top:2px; display:inline-block; }
/* ── Platform Selector ── */
.platform-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }

<script>
// ── Telegram Init ─────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#080b0f'); tg.setBackgroundColor('#080b0f'); }

// Obtener tg_id del usuario de Telegram
const TG_ID = tg?.initDataUnsafe?.user?.id || 0;

let vpsState = null;

// ── API ───────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, { headers: {'Content-Type':'application/json'}, ...opts });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadVPS() {
  try {
    vpsState = await apiFetch(`/api/vps?tg_id=${TG_ID}`);
    render();
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:32px 24px">
        <div style="font-size:32px;margin-bottom:16px">⚠️</div>
        <div style="font-size:13px;color:#fff;font-weight:600;margin-bottom:6px">Acceso Restringido</div>
        <div style="color:#7a9ab0;font-size:11px;margin-bottom:24px;line-height:1.7">Esta herramienta es exclusiva.<br/>Únete al canal para solicitar acceso.</div>
        <a href="https://t.me/MkeyzDawBot" target="_blank" style="display:block;background:var(--green);border:none;border-radius:8px;padding:13px 20px;font-family:inherit;font-size:12px;font-weight:700;color:#000;cursor:pointer;text-decoration:none;margin-bottom:10px">📡 Ir a Mkeyz Daw Bot</a>
        <button onclick="loadVPS()" style="background:transparent;border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-family:inherit;font-size:11px;color:var(--text-dim);cursor:pointer;width:100%">↺ Ya tengo acceso</button>
      </div>`;
  }
}

async function upgrade(type, amount) {
  closeModal();
  try {
    vpsState = await apiFetch('/api/vps/upgrade', {
      method:'POST', body: JSON.stringify({tg_id: TG_ID, type, amount})
    });
    render();
    showToast(`+${formatAmount(type, amount)} ${type.toUpperCase()} añadido ✓`);
    tg?.HapticFeedback?.impactOccurred('medium');
  } catch(e) { showToast('Error al actualizar'); }
}

async function resetVPS() {
  if (!confirm('¿Resetear el VPS a configuración base?')) return;
  try {
    vpsState = await apiFetch('/api/vps/reset', {
      method:'POST', body: JSON.stringify({tg_id: TG_ID})
    });
    render();
    showToast('VPS reseteado');
  } catch(e) { showToast('Error al resetear'); }
}

async function toggleProfileStatus(id, currentStatus) {
  const next = {idle:'active', active:'warming', warming:'idle'}[currentStatus];
  try {
    await apiFetch('/api/vps/profile/status', {
      method:'PATCH', body: JSON.stringify({tg_id: TG_ID, profile_id: id, status: next})
    });
    const p = vpsState.profiles.find(p => p.id === id);
    if (p) { p.status = next; p.last_activity = Date.now()/1000; }
    render();
    tg?.HapticFeedback?.impactOccurred('light');
  } catch(e) {}
}

// ── Format ────────────────────────────────────────────────
function formatRAM(mb)  { return mb >= 1024 ? `${mb/1024}GB` : `${mb}MB`; }
function formatDisk(gb) { return gb >= 1000 ? `${gb/1000}TB` : `${gb}GB`; }
function formatAmount(type, v) {
  if (type==='ram') return formatRAM(v);
  if (type==='cpu') return `${v} vCPU`;
  if (type==='storage') return formatDisk(v);
  return `${v}TB`;
}
function timeAgo(ts) {
  const diff = Math.floor((Date.now()/1000 - ts) / 60);
  if (diff < 1) return 'ahora';
  if (diff < 60) return `${diff}m`;
  return `${Math.floor(diff/60)}h`;
}

// ── Modal ─────────────────────────────────────────────────
const UPGRADE_OPTIONS = {
  cpu:      {label:'Potencia CPU',     options:[{amount:1,label:'+1 vCPU',detail:'añade 2 perfiles'},{amount:2,label:'+2 vCPU',detail:'añade 4 perfiles'},{amount:4,label:'+4 vCPU',detail:'añade 8 perfiles'}]},
  ram:      {label:'Memoria RAM',      options:[{amount:512,label:'+512MB',detail:'añade 1 perfil'},{amount:1024,label:'+1GB RAM',detail:'añade 2 perfiles'},{amount:4096,label:'+4GB RAM',detail:'añade 8 perfiles'}]},
  storage:  {label:'Almacenamiento',   options:[{amount:10,label:'+10GB',detail:'añade 5 perfiles'},{amount:25,label:'+25GB',detail:'añade 12 perfiles'},{amount:100,label:'+100GB',detail:'añade 50 perfiles'}]},
  bandwidth:{label:'Bandwidth',        options:[{amount:1,label:'+1TB/mes',detail:'más ancho de banda'},{amount:5,label:'+5TB/mes',detail:'alta velocidad'}]}
};

function openModal(type) {
  const conf = UPGRADE_OPTIONS[type];
  document.getElementById('modalTitle').textContent = conf.label;
  document.getElementById('modalOptions').innerHTML = conf.options.map(o => `
    <div class="modal-option" onclick="upgrade('${type}',${o.amount})">
      <div class="modal-opt-left">
        <span class="modal-opt-label">${o.label}</span>
        <span class="modal-opt-detail">${o.detail}</span>
      </div>
      <span class="modal-opt-plus">+ AGREGAR</span>
    </div>`).join('');
  document.getElementById('upgradeModal').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}
function closeModal() { document.getElementById('upgradeModal').classList.remove('open'); }
document.getElementById('upgradeModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Render ────────────────────────────────────────────────
function render() {
  if (!vpsState) return;
  const { resources, profiles, capacity, usage, name } = vpsState;
  const bottleneckLabels = {cpu:'⚡ CPU es el límite', ram:'💾 RAM es el límite', storage:'💿 Disco es el límite'};

  const profilesHTML = profiles.length === 0
    ? `<div class="profiles-empty"><span class="big-icon">🖥️</span>Sin perfiles activos.<br/>Agrega recursos para crear perfiles.</div>`
    : profiles.map((p,i) => {
        const plat    = vpsState.platforms?.[p.platform] || vpsState.platforms?.general || {};
        const isRot   = rotationEnabled[p.id];
        const limits  = ROTATION_LIMITS[p.platform || 'general'] || ROTATION_LIMITS.general;
        return `
      <div class="profile-card status-${p.status} ${isRot?'rot-card active-rot':''}" style="animation-delay:${i*0.04}s;flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="profile-status-dot" onclick="toggleProfileStatus('${p.id}','${p.status}')"></div>
          <div class="profile-info" onclick="toggleProfileStatus('${p.id}','${p.status}')">
            <div class="profile-name">${plat.icon||'🖥️'} ${p.name}${isRot?'<span class="rot-badge">AUTO</span>':''}</div>
            <div class="profile-meta">${p.browser} · ${p.os} · ${timeAgo(p.last_activity)}</div>
          </div>
          <div class="profile-right">
            <div class="profile-status-label">${p.status.toUpperCase()}</div>
            <div class="profile-fp">${p.fingerprint.substring(0,8)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)">
          <div>
            <div style="font-size:9px;color:var(--text-dim)">Rotación auto · ${limits.active/60}h activo / ${limits.idle}min descanso</div>
            <div class="rot-timer" id="rot-timer-${p.id}">${isRot ? (getRotationCountdown(p.id)||'') : ''}</div>
          </div>
          <button class="rot-toggle ${isRot?'on':''}" onclick="toggleRotation('${p.id}')"></button>
        </div>
      </div>`}).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="vps-name">VPS <span style="color:var(--green)">SIMULATOR</span></div>
        <div class="vps-meta">EU-WEST (Madrid) · Ubuntu 22.04 · <span style="color:var(--green);opacity:0.7">v2.0.0</span></div>
        <div class="status-pill" style="margin-top:6px"><div class="pulse"></div>ONLINE</div>
      </div>
    </div>
    <div class="section-title">// RECURSOS DEL SERVIDOR</div>
    <div class="resources-grid">
      <div class="res-card cpu" onclick="openModal('cpu')">
        <div class="res-icon">⚡</div><div class="res-label">CPU</div>
        <div class="res-value">${resources.cpu} vCPU</div>
        <div class="res-sub">Uso: ${usage.cpu}%</div>

let calcState = { vpsIdx: null, proxyId: 'dc', softwareIdx: 0 };

function openCalc() {
  if (!vpsState) return;
  const needed = vpsState.capacity.maxProfiles;
  // Auto-select cheapest fitting VPS
  const fitting = VPS_PLANS.filter(p => p.profiles >= needed);
  if (fitting.length && calcState.vpsIdx === null) {
    calcState.vpsIdx = VPS_PLANS.indexOf(fitting[0]);
  }
  // Auto-select cheapest fitting software
  const fittingSw = SOFTWARE_OPTIONS.findIndex(s => s.profiles >= needed);
  if (fittingSw >= 0 && calcState.softwareIdx === 0) calcState.softwareIdx = fittingSw;

  renderCalc();
  document.getElementById('calcPanel').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}

function closeCalc() {
  document.getElementById('calcPanel').classList.remove('open');
}

function selectVPS(idx) { calcState.vpsIdx = idx; renderCalc(); tg?.HapticFeedback?.selectionChanged?.(); }
function selectProxy(id) { calcState.proxyId = id; renderCalc(); tg?.HapticFeedback?.selectionChanged?.(); }
function selectSoftware(idx) { calcState.softwareIdx = idx; renderCalc(); tg?.HapticFeedback?.selectionChanged?.(); }

  const needed = vpsState?.capacity?.maxProfiles || 0;
  const vps    = calcState.vpsIdx !== null ? VPS_PLANS[calcState.vpsIdx] : null;

  const sw     = SOFTWARE_OPTIONS[calcState.softwareIdx];

  const vpsPlansHTML = VPS_PLANS.map((p, i) => {
    const fits = p.profiles >= needed;
    const isBest = fits && VPS_PLANS.filter(x => x.profiles >= needed)[0] === p;
    return `
    <div class="plan-card ${calcState.vpsIdx===i?'selected':''} ${!fits?'insufficient':''}" onclick="selectVPS(${i})">
      <div class="plan-left">

      </div>
    </div>`}).join('');

  const proxyHTML = PROXY_OPTIONS.map(p => `

    </div>`).join('');

  const softwareHTML = SOFTWARE_OPTIONS.map((s, i) => `
    <div class="software-card ${calcState.softwareIdx===i?'selected':''} ${s.profiles < needed && s.price > 0 ? 'insufficient':''}" onclick="selectSoftware(${i})">

  document.getElementById('calcBody').innerHTML = `
    <div class="calc-section">
      <div class="calc-section-label">// Perfiles a cubrir</div>

        </div>
      </div>
      ${Object.keys(vpsState.platforms||{}).filter(k=>k!=='general').length > 0 ? `

let exportState = { format: 'gologin', scope: 'all' };

const FORMATS = {
  gologin: {
    name: 'GoLogin',
    icon: '🦊',
    desc: 'Importa directo en GoLogin.\nFormato JSON oficial.',
    badge: 'JSON · Recomendado',
    ext: 'json',
    mime: 'application/json'
  },
  dolphin: {
    name: 'Dolphin Anty',
    icon: '🐬',
    desc: 'Compatible con Dolphin Anty.\nFormato CSV con todos los campos.',
    badge: 'CSV · Soportado',
    ext: 'csv',
    mime: 'text/csv'
  },
  adspower: {
    name: 'AdsPower',
    icon: '⚡',
    desc: 'Importa en AdsPower Team.\nFormato JSON extendido.',
    badge: 'JSON · Extendido',
    ext: 'json',
    mime: 'application/json'
  }
};

function _osMap(os) {
  if (os.includes('Windows 11')) return 'win';
  if (os.includes('Windows 10')) return 'win';
  if (os.includes('macOS'))      return 'mac';
  return 'linux';
}
function _browserVer(browser) {
  const m = browser.match(/\d+/);
  return m ? m[0] : '120';
}
function _browserName(browser) {
  if (browser.includes('Firefox')) return 'firefox';
  if (browser.includes('Edge'))    return 'edge';
  return 'chrome';
}

function generateExport(profiles, format) {
  if (format === 'gologin') {
    const data = profiles.map(p => ({
      name: p.name,
      os: _osMap(p.os),
      browser: _browserName(p.browser),
      browserVersion: _browserVer(p.browser),
      fingerprint: p.fingerprint,
      proxy: {
        mode: 'http',
        host: p.proxy,
        port: 8080,
        username: '',
        password: ''
      },
      navigator: {
        language: 'en-US,en',
        resolution: '1920x1080',
        platform: _osMap(p.os) === 'mac' ? 'MacIntel' : 'Win32'
      },
      timezone: { fillBasedOnExternalIp: true },
      webRTC: { mode: 'disabled' },
      canvas: { mode: 'noise' },
      webGL: { mode: 'noise' },
      fonts: { enableMasking: true }
    }));
    return JSON.stringify(data, null, 2);
  }

  if (format === 'dolphin') {
    const headers = 'name,browser_type,browser_version,os,proxy_type,proxy_host,proxy_port,proxy_login,proxy_password,notes';
    const rows = profiles.map(p =>
      [p.name, _browserName(p.browser), _browserVer(p.browser),
       _osMap(p.os), 'http', p.proxy, '8080', '', '',
       p.fingerprint].join(',')
    );
    return [headers, ...rows].join('\n');
  }

  if (format === 'adspower') {
    const data = profiles.map(p => ({
      name: p.name,
      domain_name: '',
      open_urls: [],
      username: '',
      password: '',
      fakey: '',
      cookie: '',
      ignore_cookie_error: '0',
      ip: p.proxy,
      ip_country: 'ES',
      sys_app_cate_id: '0',
      fingerprint_config: {
        ua: `Mozilla/5.0 (${_osMap(p.os) === 'mac' ? 'Macintosh; Intel Mac OS X 10_15_7' : 'Windows NT 10.0; Win64; x64'}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${_browserVer(p.browser)}.0.0.0 Safari/537.36`,
        screen_resolution: '1920_1080',
        canvas: '1',
        webgl: '1',
        webgl_info: '1',
        audio: '1',
        do_not_track: 'default',
        hardware_concurrency: '4',
        device_memory: '8',
        flash: 'block',
        client_rects: '1',
        device_name_switch: '0',
        random_ua: {
          ua_browser: [_browserName(p.browser)],
          ua_version: [[_browserVer(p.browser), _browserVer(p.browser)]]
        }
      }
    }));
    return JSON.stringify(data, null, 2);
  }
}

function openExport() {
  if (!vpsState || vpsState.profiles.length === 0) {
    showToast('Sin perfiles para exportar');
    return;
  }
  renderExport();
  document.getElementById('exportPanel').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}

function closeExport() {
  document.getElementById('exportPanel').classList.remove('open');
}

function setExportFormat(fmt) {
  exportState.format = fmt;
  renderExport();
}

function setExportScope(scope) {
  exportState.scope = scope;
  renderExport();
}

function renderExport() {
  const profiles = exportState.scope === 'active'
    ? vpsState.profiles.filter(p => p.status === 'active')
    : vpsState.profiles;

  const content = profiles.length > 0 ? generateExport(profiles, exportState.format) : '';
  const fmt = FORMATS[exportState.format];
  const preview = content.substring(0, 800) + (content.length > 800 ? '\n...' : '');

  document.getElementById('exportBody').innerHTML = `
    <div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px">// Seleccionar formato</div>
      <div class="format-cards">
        ${Object.entries(FORMATS).map(([key, f]) => `
          <div class="format-card ${exportState.format===key?'selected':''}" onclick="setExportFormat('${key}')">
            <div class="format-icon">${f.icon}</div>
            <div class="format-info">
              <div class="format-name">${f.name}</div>
              <div class="format-desc">${f.desc.replace('\n','<br/>')}</div>
              <span class="format-badge">${f.badge}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px">// Perfiles a exportar</div>
      <div class="export-scope">
        <div class="scope-btn ${exportState.scope==='all'?'active':''}" onclick="setExportScope('all')">Todos (${vpsState.profiles.length})</div>
        <div class="scope-btn ${exportState.scope==='active'?'active':''}" onclick="setExportScope('active')">Solo activos (${vpsState.profiles.filter(p=>p.status==='active').length})</div>
      </div>
    </div>

    ${profiles.length > 0 ? `
    <div class="export-preview">
      <div class="export-preview-header">
        <span class="export-preview-label">Preview · ${profiles.length} perfiles · .${fmt.ext}</span>
        <button class="export-copy-btn" onclick="copyExport()">Copiar</button>
      </div>
      <textarea readonly>${preview}</textarea>
    </div>
    <div class="export-actions">
      <button class="export-dl-btn" onclick="downloadExport()">⬇ Descargar ${fmt.name} (.${fmt.ext})</button>
    </div>
    <div style="margin-top:8px">
      <button onclick="shareText()" style="width:100%;padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-mid);cursor:pointer;-webkit-tap-highlight-color:transparent;">
        📋 Copiar resumen para compartir
      </button>
    </div>` : `<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:20px">Sin perfiles en este filtro</div>`}
  `;

  // Store content for download/copy
  window._exportContent = content;
  window._exportExt = fmt.ext;
  window._exportMime = fmt.mime;
  window._exportName = exportState.format;
}

function copyExport() {
  navigator.clipboard?.writeText(window._exportContent)
    .then(() => showToast('Copiado al portapapeles ✓'))
    .catch(() => showToast('Selecciona el texto manualmente'));
}

function downloadExport() {
  const blob = new Blob([window._exportContent], { type: window._exportMime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `vps-profiles-${window._exportName}-${Date.now()}.${window._exportExt}`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Descargando ${window._exportName}.${window._exportExt} ✓`);
  tg?.HapticFeedback?.notificationOccurred('success');
}

    ? vpsState.profiles.filter(p => p.status === 'active')

  const cap   = vpsState.capacity;
  const usage = vpsState.usage;

  const fitting  = QUICK_VPS.filter(v => v.maxP >= profiles.length);
  const cheapest = fitting.length ? fitting.reduce((a,b) => a.price < b.price ? a : b) : null;

  // Group by platform
  const byPlat = {};
  profiles.forEach(p => {
    const key = p.platform || 'general';
    if (!byPlat[key]) byPlat[key] = [];
    byPlat[key].push(p);
  });

  const platLines = Object.entries(byPlat).map(([key, ps]) => {
    const plat = plats[key] || { icon: '🖥️', name: key };
    return `${plat.icon} ${plat.name} ×${ps.length}`;
  }).join(' · ');

  const text =
`🖥️ VPS SIMULATOR

async function applyQuickConfig(n) {
  if (!vpsState) return;
  const cur = vpsState.resources;

  // Required minimums for n profiles
  const needCPU     = Math.ceil(n * 0.5 * 2) / 2;  // round to 0.5
  const needRAM     = n * 512;                        // MB
  const needStorage = n * 2;                          // GB

  const upgrades = [];
  if (cur.cpu < needCPU)         upgrades.push({ type: 'cpu',     amount: needCPU - cur.cpu });
  if (cur.ram < needRAM)         upgrades.push({ type: 'ram',     amount: needRAM - cur.ram });
  if (cur.storage < needStorage) upgrades.push({ type: 'storage', amount: needStorage - cur.storage });

  if (upgrades.length === 0) {
    showToast(`✓ Tu VPS ya soporta ${n} perfiles`);
    closeQuick();
    return;
  }

  // Apply all needed upgrades sequentially
  for (const upg of upgrades) {
    try {
      vpsState = await apiFetch('/api/vps/upgrade', {
        method: 'POST',
        body: JSON.stringify({ tg_id: TG_ID, type: upg.type, amount: upg.amount })
      });
    } catch(e) {
      showToast('Error aplicando configuración');
      return;
    }
  }

  closeQuick();
  render();
  showToast(`✓ VPS configurado para ${n} perfiles`);
  tg?.HapticFeedback?.notificationOccurred('success');
}

// Platform-specific risk rules
const HEALTH_RULES = {
  youtube:     { maxActiveHours: 4,  proxyRequired: 'res', maxSessions: 1, dailyLimit: 8 },
  spotify:     { maxActiveHours: 8,  proxyRequired: 'dc',  maxSessions: 1, dailyLimit: 16 },
  apple_music: { maxActiveHours: 8,  proxyRequired: 'dc',  maxSessions: 1, dailyLimit: 16 },
  tidal:       { maxActiveHours: 6,  proxyRequired: 'res', maxSessions: 1, dailyLimit: 12 },
  pandora:     { maxActiveHours: 6,  proxyRequired: 'mob', maxSessions: 1, dailyLimit: 10 },
  general:     { maxActiveHours: 12, proxyRequired: 'dc',  maxSessions: 2, dailyLimit: 20 }
};

function analyzeProfileHealth(profile) {
  const platform = profile.platform || 'general';
  const rules    = HEALTH_RULES[platform] || HEALTH_RULES.general;
  const plat     = (vpsState?.platforms || {})[platform] || { name: platform, icon: '🖥️' };
  const now      = Date.now() / 1000;
  const activeHours = (now - (profile.last_activity || now)) / 3600;

  let score  = 100;
  const issues = [];

  // 1. Time active check
  if (profile.status === 'active') {
    if (activeHours > rules.maxActiveHours * 2) {
      score -= 40;
      issues.push(`⏱ Activo ${Math.round(activeHours)}h — límite ${rules.maxActiveHours}h`);
    } else if (activeHours > rules.maxActiveHours) {
      score -= 20;
      issues.push(`⏱ Sesión larga (${Math.round(activeHours)}h)`);
    }
  }

  // 2. Proxy type check
  const proxyIP = profile.proxy || '';
  const isPrivate = /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)/.test(proxyIP);
  if (rules.proxyRequired === 'res' && !isPrivate) {
    score -= 25;
    issues.push(`🌐 ${plat.name} requiere proxy residencial`);
  }
  if (platform === 'pandora') {
    score -= 15;
    issues.push('🇺🇸 Pandora requiere IP de EE.UU.');
  }

  // 3. Fingerprint entropy
  const fp = profile.fingerprint || '';
  const uniqueChars = new Set(fp).size;
  if (uniqueChars < 6) {
    score -= 20;
    issues.push('🔑 Fingerprint con baja entropía');
  }

  // 4. Idle too long (stale session)
  if (profile.status === 'idle' && activeHours > 48) {
    score -= 15;
    issues.push(`😴 Sin actividad hace ${Math.round(activeHours/24)}d — sesión puede expirar`);
  }

  // 5. Browser/OS mismatch for platform
  if (platform === 'apple_music' && !profile.os?.includes('macOS') && !profile.browser?.includes('Safari')) {
    score -= 10;
    issues.push('🍎 Apple Music rinde mejor con macOS + Safari');
  }

  score = Math.max(0, score);
  const risk = score >= 75 ? 'low' : score >= 45 ? 'medium' : 'high';
  const emoji = risk === 'low' ? '✅' : risk === 'medium' ? '⚠️' : '🚨';

  return { score, risk, issues, emoji, platform, plat };
}

  if (!vpsState || vpsState.profiles.length === 0) {

  pandora: {
    maxSimultaneous: 3,
    maxDailyHours: 10,
    maxWeeklyAccounts: 8,
    warningAt: 60,
    rules: [
      { label: 'Perfiles activos simultáneos', max: 3, unit: 'perfiles' },
      { label: 'Horas de radio diarias', max: 10, unit: 'h/día' },
      { label: 'Skips por hora por perfil', max: 6, unit: 'skips' }
    ]
  }
};

function analyzePlatformLimits() {
  const profiles  = vpsState?.profiles || [];
  const platforms = vpsState?.platforms || {};
  const results   = [];

  Object.entries(PLATFORM_LIMITS).forEach(([key, limits]) => {
    const platProfiles = profiles.filter(p => p.platform === key);
    if (platProfiles.length === 0) return;

    const plat       = platforms[key] || { name: key, icon: '🖥️' };
    const activeCount = platProfiles.filter(p => p.status === 'active').length;
    const pct        = Math.round(activeCount / limits.maxSimultaneous * 100);
    const status     = pct >= 100 ? 'crit' : pct >= limits.warningAt ? 'warn' : 'ok';

    const rowData = limits.rules.map((rule, i) => {
      let current = 0;
      let pctFill = 0;
      if (i === 0) {
        current = activeCount;
        pctFill = Math.min(100, Math.round(current / rule.max * 100));
      } else if (i === 1) {
        // Estimate daily hours from rotation limits
        const rl = ROTATION_LIMITS[key] || ROTATION_LIMITS.general;
        current  = Math.round(rl.active / 60 * platProfiles.length);
        pctFill  = Math.min(100, Math.round(current / rule.max * 100));
      } else {
        // Third rule — static estimate
        current  = platProfiles.length;
        pctFill  = Math.min(100, Math.round(current / rule.max * 100));
      }
      const fillClass = pctFill >= 100 ? 'fill-crit' : pctFill >= limits.warningAt ? 'fill-warn' : 'fill-ok';
      return { ...rule, current, pctFill, fillClass };
    });

    results.push({ key, plat, platProfiles, activeCount, pct, status, rowData, limits });
  });

  return results;
}

// ── Routine Generator ─────────────────────────────────────

const DAYS      = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DAYS_FULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

// Human-like activity patterns per platform
const ROUTINE_PATTERNS = {
  youtube:     { activeDays:[1,1,1,1,1,0.6,0.7], peakHours:[18,22], minH:1, maxH:4,  pauseChance:0.3 },
  spotify:     { activeDays:[1,1,1,1,1,0.9,0.8], peakHours:[8,12,17,22], minH:2, maxH:8, pauseChance:0.2 },
  apple_music: { activeDays:[1,1,1,1,1,0.9,0.8], peakHours:[8,12,17,22], minH:2, maxH:8, pauseChance:0.2 },
  tidal:       { activeDays:[0.8,0.8,0.8,0.8,1,1,0.9], peakHours:[20,23], minH:1, maxH:6, pauseChance:0.25 },
  pandora:     { activeDays:[1,1,1,1,0.9,0.7,0.6], peakHours:[9,12,17,20], minH:1, maxH:6, pauseChance:0.35 },
  general:     { activeDays:[1,1,1,1,1,0.7,0.6], peakHours:[10,20], minH:1, maxH:8, pauseChance:0.3 }
};

// Generate deterministic-but-varied routine per profile
function generateRoutine(profile) {
  const platform = profile.platform || 'general';
  const pattern  = ROUTINE_PATTERNS[platform] || ROUTINE_PATTERNS.general;
  const limits   = ROTATION_LIMITS[platform]  || ROTATION_LIMITS.general;
  const seed     = profile.id ? profile.id.charCodeAt(0) + profile.id.charCodeAt(4) : 42;

  // Seeded random for consistency per profile
  const rand = (min, max, offset=0) => {
    const x = Math.sin(seed + offset) * 10000;
    return min + ((x - Math.floor(x)) * (max - min));
  };

  const weekPlan = DAYS.map((day, d) => {
    const isActive = rand(0, 1, d * 7) < pattern.activeDays[d];
    if (!isActive) return { day, active: false, hours: 0, startHour: null, sessions: [] };

    // Pick start hour near peak
    const peakIdx  = Math.floor(rand(0, pattern.peakHours.length, d * 13)) ;
    const peak     = pattern.peakHours[Math.min(peakIdx, pattern.peakHours.length - 1)];
    const startH   = Math.round(Math.max(6, Math.min(22, peak - 1 + rand(-2, 2, d * 17))));
    const totalH   = Math.round(rand(pattern.minH, Math.min(pattern.maxH, limits.active / 60), d * 23));

    // Split into sessions with natural pauses
    const sessions = [];
    let remaining  = totalH;
    let cursor     = startH;
    while (remaining > 0 && cursor < 24) {
      const sessionH = Math.min(remaining, Math.round(rand(1, Math.min(3, remaining + 1), cursor * 31)));
      sessions.push({ start: cursor, duration: sessionH });
      remaining -= sessionH;
      cursor    += sessionH + Math.round(rand(0.5, 2, cursor * 41)); // natural pause
    }

    return { day, active: true, hours: totalH, startHour: startH, sessions };
  });

  return weekPlan;
}

// Generate global heatmap (all profiles combined)
function generateGlobalHeatmap() {
  const profiles = vpsState?.profiles || [];
  const heatmap  = Array(7).fill(null).map(() => Array(24).fill(0));

  profiles.forEach(p => {
    const plan = generateRoutine(p);
    plan.forEach((day, d) => {
      day.sessions?.forEach(s => {
        for (let h = s.start; h < Math.min(24, s.start + s.duration); h++) {
          heatmap[d][h]++;
        }
      });
    });
  });

  return heatmap;
}

let routineView = 'global'; // 'global' | 'profiles'

function openRoutine() {
  if (!vpsState || vpsState.profiles.length === 0) {
    showToast('Sin perfiles para generar rutinas');
    return;
  }
  renderRoutine();
  document.getElementById('routinePanel').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}

function closeRoutine() {
  document.getElementById('routinePanel').classList.remove('open');
}

function setRoutineView(view) {
  routineView = view;
  renderRoutine();
}

function renderRoutine() {
  const profiles = vpsState?.profiles || [];
  const plats    = vpsState?.platforms || {};
  const heatmap  = generateGlobalHeatmap();
  const maxVal   = Math.max(...heatmap.flat(), 1);

  // Global heatmap — 7 days × 24 hours
  const heatCols = DAYS.map((day, d) => {
    const slots = Array(24).fill(0).map((_, h) => {
      const val     = heatmap[d][h];
      const pct     = val / maxVal;
      const color   = pct === 0 ? 'var(--border)'
                    : pct < 0.4 ? 'rgba(0,232,122,0.25)'
                    : pct < 0.7 ? 'rgba(0,232,122,0.55)'
                    : 'var(--green)';
      return `<div class="routine-slot" style="background:${color};height:6px" title="${val} perfiles activos ${h}:00"></div>`;
    }).join('');
    return `<div class="routine-day-col"><div class="routine-day-label">${day}</div>${slots}</div>`;
  }).join('');

  // Per-profile cards
  const profileCards = profiles.map(p => {
    const plat  = plats[p.platform] || { icon:'🖥️', name:'General' };
    const plan  = generateRoutine(p);
    const totalH = plan.reduce((s, d) => s + d.hours, 0);
    const activeDays = plan.filter(d => d.active).length;

    const dayPills = plan.map((d, i) => `
      <div class="routine-day-pill ${d.active?'on':'off'}">
        <span class="routine-day-pill-label">${DAYS[i]}</span>
        <span style="font-size:9px;font-weight:600;color:${d.active?'var(--green)':'var(--text-dim)'}">${d.active ? d.hours+'h' : '—'}</span>
      </div>`).join('');

    const peakDay  = plan.reduce((a, b) => b.hours > a.hours ? b : a, plan[0]);
    const startAvg = Math.round(plan.filter(d=>d.active && d.startHour).reduce((s,d)=>s+d.startHour,0) / Math.max(activeDays,1));

    return `
    <div class="routine-profile-card">
      <div class="routine-profile-header">
        <div>
          <div class="routine-profile-name">${plat.icon} ${p.name}</div>
          <div class="routine-profile-plat">${activeDays} días/sem · ~${totalH}h totales · arranca ~${startAvg}:00h</div>
        </div>
        <div style="text-align:right;font-size:9px;color:var(--text-dim)">
          <div>Pico: ${peakDay.day} ${peakDay.hours}h</div>
        </div>
      </div>
      <div class="routine-days-row">${dayPills}</div>
    </div>`;
  }).join('');

  // Overlap analysis
  const maxSimul = Math.max(...heatmap.flat());
  const peakHour = heatmap.flat().indexOf(maxSimul);
  const peakDay2 = Math.floor(peakHour / 24);
  const peakH2   = peakHour % 24;
  const overlapWarning = maxSimul > 3 ? `
    <div style="background:var(--amber-dim);border:1px solid rgba(255,184,0,0.2);border-radius:var(--radius);padding:12px 14px;font-size:10px;color:var(--amber)">
      ⚠️ Pico de ${maxSimul} perfiles activos simultáneos el ${DAYS_FULL[peakDay2]} a las ${peakH2}:00h — considera distribuir mejor los horarios.
    </div>` : `
    <div style="background:var(--green-dim);border:1px solid rgba(0,232,122,0.2);border-radius:var(--radius);padding:12px 14px;font-size:10px;color:var(--green)">
      ✓ Distribución de perfiles saludable — máximo ${maxSimul} activos simultáneos.
    </div>`;

  document.getElementById('routineBody').innerHTML = `
    <div style="display:flex;gap:8px">
      <div onclick="setRoutineView('global')" style="flex:1;padding:9px;text-align:center;border-radius:8px;border:1px solid ${routineView==='global'?'var(--green)':'var(--border)'};background:${routineView==='global'?'var(--green-dim)':'var(--surface)'};cursor:pointer;font-size:11px;color:${routineView==='global'?'var(--green)':'var(--text-dim)'}">Vista global</div>
      <div onclick="setRoutineView('profiles')" style="flex:1;padding:9px;text-align:center;border-radius:8px;border:1px solid ${routineView==='profiles'?'var(--green)':'var(--border)'};background:${routineView==='profiles'?'var(--green-dim)':'var(--surface)'};cursor:pointer;font-size:11px;color:${routineView==='profiles'?'var(--green)':'var(--text-dim)'}">Por perfil</div>
    </div>

    ${routineView === 'global' ? `
    <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase">// Heatmap semanal — ${profiles.length} perfiles</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
      <div class="routine-week">${heatCols}</div>
      <div class="routine-legend" style="margin-top:10px">
        <div class="routine-legend-item"><div class="routine-legend-dot" style="background:var(--border)"></div>Sin actividad</div>
        <div class="routine-legend-item"><div class="routine-legend-dot" style="background:rgba(0,232,122,0.25)"></div>Baja</div>
        <div class="routine-legend-item"><div class="routine-legend-dot" style="background:rgba(0,232,122,0.55)"></div>Media</div>
        <div class="routine-legend-item"><div class="routine-legend-dot" style="background:var(--green)"></div>Alta</div>
      </div>
    </div>
    ${overlapWarning}
    <div style="font-size:9px;color:var(--text-dim);line-height:1.7;padding:4px 0">
      💡 Las rutinas se generan según el patrón de cada plataforma — días laborables con más actividad, horarios pico realistas, pausas naturales entre sesiones. Cada perfil tiene un patrón único basado en su ID.
    </div>` : `
    <div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase">// Rutina por perfil</div>
    ${profileCards}
    <div style="font-size:9px;color:var(--text-dim);line-height:1.7">
      💡 Toca un día en gris para ver que el perfil descansa ese día. Los horarios son consistentes semana a semana para el mismo perfil.
    </div>`}

    <div style="padding-bottom:16px"></div>
  `;
}

// Active session limits per platform (minutes)
const ROTATION_LIMITS = {
  youtube:     { active: 240, idle: 30  },  // 4h active, 30min rest
  spotify:     { active: 480, idle: 20  },  // 8h active, 20min rest
  apple_music: { active: 480, idle: 20  },  // 8h active, 20min rest
  tidal:       { active: 360, idle: 25  },  // 6h active, 25min rest
  pandora:     { active: 360, idle: 30  },  // 6h active, 30min rest
  general:     { active: 720, idle: 15  }   // 12h active, 15min rest
};

const rotationTimers  = {};  // profileId → { timer, startTime, duration }
let   rotationEnabled = {};  // profileId → bool

function toggleRotation(profileId) {
  if (rotationEnabled[profileId]) {
    stopRotation(profileId);
  } else {
    startRotation(profileId);
  }
  render();
}

function startRotation(profileId) {
  if (rotationTimers[profileId]) clearTimeout(rotationTimers[profileId].timer);
  rotationEnabled[profileId] = true;

  const profile  = vpsState?.profiles?.find(p => p.id === profileId);
  if (!profile) return;

  const platform = profile.platform || 'general';
  const limits   = ROTATION_LIMITS[platform] || ROTATION_LIMITS.general;

  // If active → schedule idle after active limit
  // If idle   → schedule active after idle limit
  const isActive   = profile.status === 'active';
  const delayMins  = isActive ? limits.active : limits.idle;
  const nextStatus = isActive ? 'idle' : 'active';

  rotationTimers[profileId] = {
    startTime: Date.now(),
    duration:  delayMins * 60 * 1000,
    nextStatus,
    timer: setTimeout(() => rotateProfile(profileId, nextStatus), delayMins * 60 * 1000)
  };
}

function stopRotation(profileId) {
  if (rotationTimers[profileId]) {
    clearTimeout(rotationTimers[profileId].timer);
    delete rotationTimers[profileId];
  }
  delete rotationEnabled[profileId];
}

async function rotateProfile(profileId, newStatus) {
  try {
    await apiFetch('/api/vps/profile/status', {
      method: 'PATCH',
      body: JSON.stringify({ tg_id: TG_ID, profile_id: profileId, status: newStatus })
    });
    const profile = vpsState?.profiles?.find(p => p.id === profileId);
    if (profile) profile.status = newStatus;

    showToast(`↻ ${profile?.name || 'Perfil'} → ${newStatus.toUpperCase()}`);
    tg?.HapticFeedback?.impactOccurred('light');

    // Schedule next rotation
    if (rotationEnabled[profileId]) {
      startRotation(profileId);
    }
    render();
  } catch(e) {
    stopRotation(profileId);
  }
}

function getRotationCountdown(profileId) {
  const t = rotationTimers[profileId];
  if (!t) return null;
  const remaining = Math.max(0, t.startTime + t.duration - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  return `→ ${t.nextStatus.toUpperCase()} en ${mins}m ${secs}s`;
}

// Update countdown display every second
setInterval(() => {
  Object.keys(rotationTimers).forEach(id => {
    const el = document.getElementById(`rot-timer-${id}`);
    if (el) el.textContent = getRotationCountdown(id) || '';
  });
}, 1000);

loadVPS();

// Silent background refresh — only re-render if data changed
setInterval(async () => {
  try {
    const fresh = await apiFetch(`/api/vps?tg_id=${TG_ID}`);
    const changed = JSON.stringify(fresh.profiles) !== JSON.stringify(vpsState?.profiles)
                 || JSON.stringify(fresh.resources) !== JSON.stringify(vpsState?.resources)
                 || JSON.stringify(fresh.usage)     !== JSON.stringify(vpsState?.usage);
    if (changed) { vpsState = fresh; render(); }
  } catch(e) {}
}, 30000);
</script>
